  { match:["nonsteroidal anti-inflammatory"], name:{en:"NSAIDs (nonsteroidal anti-inflammatory drugs)", es:"AINE (antiinflamatorios no esteroideos)", zh:"非甾体抗炎药（NSAID）", vi:"NSAID (thuốc kháng viêm không steroid)", ar:"مضادات الالتهاب غير الستيرويدية (NSAIDs)", fr:"AINS (anti-inflammatoires non stéroïdiens)", ko:"NSAID (비스테로이드 항염증제)", ru:"НПВП (нестероидные противовоспалительные препараты)", pt:"AINEs (anti-inflamatórios não esteroides)", de:"NSAR (nichtsteroidale Antirheumatika)", ja:"NSAID（非ステロイド性抗炎症薬）"},
    text:{en:"NSAIDs treat pain, fever, and inflammation by blocking COX enzymes your body uses to make inflammatory chemicals. The same mechanism that helps also irritates the stomach lining and can affect kidney blood flow, especially with long-term or high-dose use.",
          es:"Los AINE tratan el dolor, la fiebre, y la inflamación bloqueando las enzimas COX que tu cuerpo usa para producir sustancias inflamatorias. El mismo mecanismo que ayuda también irrita el revestimiento del estómago y puede afectar el flujo sanguíneo renal, especialmente con uso prolongado o en dosis altas.", zh:"非甾体抗炎药通过阻断COX酶来治疗疼痛、发烧和炎症，而身体正是利用这种酶来产生炎症物质。同样的机制在起作用的同时，也会刺激胃黏膜，并可能影响肾脏的血流，尤其是长期或高剂量使用时。", vi:"NSAID điều trị đau, sốt, và viêm bằng cách ức chế enzyme COX mà cơ thể dùng để tạo ra các chất gây viêm. Chính cơ chế giúp ích này cũng gây kích ứng niêm mạc dạ dày và có thể ảnh hưởng đến lưu lượng máu ở thận, đặc biệt khi dùng lâu dài hoặc liều cao.", ar:"تعالج مضادات الالتهاب غير الستيرويدية الألم والحمى والالتهاب عن طريق تثبيط إنزيمات COX التي يستخدمها جسمك لصنع المواد المسببة للالتهاب. الآلية نفسها التي تساعد تُهيّج أيضًا بطانة المعدة ويمكن أن تؤثر على تدفق الدم إلى الكلى، خاصة مع الاستخدام طويل الأمد أو بجرعات عالية.", fr:"Les AINS traitent la douleur, la fièvre, et l'inflammation en bloquant les enzymes COX que votre corps utilise pour fabriquer des substances inflammatoires. Le même mécanisme qui soulage irrite aussi la paroi de l'estomac et peut affecter le flux sanguin rénal, surtout en cas d'usage prolongé ou à forte dose.", ko:"NSAID는 몸이 염증 물질을 만드는 데 쓰는 COX 효소를 차단해 통증, 발열, 염증을 치료합니다. 도움을 주는 바로 그 기전이 위 점막도 자극하고, 특히 장기 또는 고용량 사용 시 신장 혈류에 영향을 줄 수 있습니다.", ru:"НПВП лечат боль, лихорадку и воспаление, блокируя ферменты ЦОГ, которые организм использует для выработки воспалительных веществ. Тот же механизм, что помогает, также раздражает слизистую желудка и может влиять на почечный кровоток, особенно при длительном или высокодозовом применении.", pt:"Os AINEs tratam dor, febre e inflamação bloqueando as enzimas COX que o seu corpo usa para produzir substâncias inflamatórias. O mesmo mecanismo que ajuda também irrita a mucosa do estômago e pode afetar o fluxo sanguíneo dos rins, especialmente com uso prolongado ou em dose alta.", de:"NSAR behandeln Schmerz, Fieber und Entzündung, indem sie die COX-Enzyme blockieren, die Ihr Körper zur Bildung entzündlicher Stoffe nutzt. Derselbe Mechanismus, der hilft, reizt auch die Magenschleimhaut und kann den Nierenblutfluss beeinträchtigen, besonders bei langfristiger oder hochdosierter Anwendung.", ja:"NSAIDは、体が炎症物質を作るのに使うCOX酵素を阻害して、痛み・発熱・炎症を治療します。助けとなる同じ仕組みが胃の粘膜も刺激し、特に長期または高用量の使用で腎臓の血流に影響することがあります。"} },
  { match:["selective serotonin reuptake inhibitor"], name:{en:"SSRIs (selective serotonin reuptake inhibitors)", es:"ISRS (inhibidores selectivos de la recaptación de serotonina)", zh:"SSRI（选择性5-羟色胺再摄取抑制剂）", vi:"SSRI (thuốc ức chế tái hấp thu serotonin có chọn lọc)", ar:"مثبطات استرداد السيروتونين الانتقائية (SSRIs)", fr:"ISRS (inhibiteurs sélectifs de la recapture de la sérotonine)", ko:"SSRI (선택적 세로토닌 재흡수 억제제)", ru:"СИОЗС (селективные ингибиторы обратного захвата серотонина)", pt:"ISRSs (inibidores seletivos da recaptação de serotonina)", de:"SSRI (selektive Serotonin-Wiederaufnahmehemmer)", ja:"SSRI（選択的セロトニン再取り込み阻害薬）"},
    text:{en:"SSRIs treat depression and anxiety by leaving more serotonin available in the brain's signaling gaps. They typically take several weeks to reach full effect, and stopping abruptly can cause withdrawal-like symptoms — tapering under a doctor's guidance is standard.",
          es:"Los ISRS tratan la depresión y la ansiedad dejando más serotonina disponible en los espacios de señalización del cerebro. Suelen tardar varias semanas en alcanzar el efecto completo, y suspenderlos de golpe puede causar síntomas parecidos a la abstinencia — reducir la dosis gradualmente bajo la guía de un médico es lo estándar.", zh:"SSRI通过让大脑信号传递间隙中留存更多5-羟色胺来治疗抑郁和焦虑。通常需要几周时间才能达到完全效果，突然停药可能引起类似戒断的症状——在医生指导下逐渐减量是标准做法。", vi:"SSRI điều trị trầm cảm và lo âu bằng cách giữ lại nhiều serotonin hơn ở các khoảng trống truyền tín hiệu trong não. Thường mất vài tuần để đạt hiệu quả đầy đủ, và ngừng thuốc đột ngột có thể gây các triệu chứng giống cai thuốc — giảm liều từ từ dưới hướng dẫn của bác sĩ là cách làm tiêu chuẩn.", ar:"تعالج SSRI الاكتئاب والقلق عن طريق ترك المزيد من السيروتونين متاحًا في فجوات الإشارة في الدماغ. عادةً ما تستغرق عدة أسابيع للوصول إلى التأثير الكامل، والتوقف المفاجئ عنها يمكن أن يسبب أعراضًا شبيهة بالانسحاب — التخفيض التدريجي تحت إشراف طبيب هو المعيار المتبع.", fr:"Les ISRS traitent la dépression et l'anxiété en laissant plus de sérotonine disponible dans les espaces de communication du cerveau. Ils mettent généralement plusieurs semaines à atteindre leur plein effet, et un arrêt brutal peut provoquer des symptômes de type sevrage — une diminution progressive sous la supervision d'un médecin est la norme.", ko:"SSRI는 뇌의 신호 전달 틈에 세로토닌을 더 많이 남겨 우울과 불안을 치료합니다. 보통 완전한 효과에 이르기까지 몇 주가 걸리며, 갑자기 끊으면 금단 유사 증상이 생길 수 있어 — 의사의 지도하에 서서히 줄이는 것이 표준입니다.", ru:"СИОЗС лечат депрессию и тревогу, оставляя больше серотонина доступным в промежутках передачи сигналов мозга. Обычно требуется несколько недель для полного эффекта, а резкая отмена может вызвать симптомы, похожие на синдром отмены — постепенное снижение под наблюдением врача является стандартом.", pt:"Os ISRSs tratam depressão e ansiedade deixando mais serotonina disponível nas fendas de sinalização do cérebro. Costumam levar várias semanas para atingir o efeito pleno, e parar de repente pode causar sintomas de abstinência — reduzir gradualmente sob orientação médica é o padrão.", de:"SSRI behandeln Depression und Angst, indem sie mehr Serotonin in den Signalspalten des Gehirns verfügbar lassen. Sie brauchen meist mehrere Wochen bis zur vollen Wirkung, und ein abruptes Absetzen kann entzugsähnliche Symptome verursachen — ein schrittweises Ausschleichen unter ärztlicher Anleitung ist Standard.", ja:"SSRIは、脳の信号のすき間により多くのセロトニンを残すことで、うつと不安を治療します。通常、十分な効果が現れるまで数週間かかり、急にやめると離脱に似た症状が出ることがあるため、医師の指導のもとで徐々に減らすのが標準です。"} },
  { match:["serotonin and norepinephrine reuptake","snri"], name:{en:"SNRIs", es:"IRSN", zh:"SNRI（5-羟色胺去甲肾上腺素再摄取抑制剂）", vi:"SNRI", ar:"مثبطات استرداد السيروتونين والنورإبينفرين (SNRIs)", fr:"IRSN", ko:"SNRI", ru:"ИОЗСН", pt:"IRSNs", de:"SNRI", ja:"SNRI"},
    text:{en:"SNRIs work like SSRIs but also boost norepinephrine, another mood- and pain-related brain chemical — which is why some SNRIs are also used for certain chronic pain conditions.",
          es:"Los IRSN funcionan como los ISRS pero también elevan la norepinefrina, otra sustancia cerebral relacionada con el ánimo y el dolor — por eso algunos IRSN también se usan para ciertas condiciones de dolor crónico.", zh:"SNRI的作用方式类似SSRI，但还会提高去甲肾上腺素——另一种与情绪和疼痛相关的脑内化学物质——这也是为什么部分SNRI也用于治疗某些慢性疼痛。", vi:"SNRI hoạt động giống SSRI nhưng còn làm tăng norepinephrine, một chất hóa học khác trong não liên quan đến tâm trạng và cảm giác đau — đây là lý do một số SNRI cũng được dùng cho một số tình trạng đau mạn tính.", ar:"تعمل SNRI مثل SSRI لكنها ترفع أيضًا النورإبينفرين، وهو مادة كيميائية أخرى في الدماغ مرتبطة بالمزاج والألم — وهذا سبب استخدام بعض SNRI أيضًا لبعض حالات الألم المزمن.", fr:"Les IRSN agissent comme les ISRS mais augmentent aussi la noradrénaline, une autre substance cérébrale liée à l'humeur et à la douleur — c'est pourquoi certains IRSN sont aussi utilisés pour certaines douleurs chroniques.", ko:"SNRI는 SSRI처럼 작용하지만 기분과 통증에 관련된 또 다른 뇌 화학물질인 노르에피네프린도 높입니다 — 그래서 일부 SNRI는 특정 만성 통증에도 사용됩니다.", ru:"ИОЗСН действуют как СИОЗС, но также повышают норадреналин — ещё одно связанное с настроением и болью вещество мозга — поэтому некоторые ИОЗСН применяют и при определённых хронических болях.", pt:"Os IRSNs agem como os ISRSs, mas também aumentam a noradrenalina, outra substância cerebral ligada ao humor e à dor — por isso alguns IRSNs também são usados para certas dores crônicas.", de:"SNRI wirken wie SSRI, erhöhen aber auch Noradrenalin, einen weiteren mit Stimmung und Schmerz verbundenen Hirnbotenstoff — deshalb werden manche SNRI auch bei bestimmten chronischen Schmerzen eingesetzt.", ja:"SNRIはSSRIのように作用しますが、気分と痛みに関わるもう1つの脳内物質であるノルアドレナリンも高めます — そのため一部のSNRIは特定の慢性の痛みにも使われます。"} },
  { match:["monoamine oxidase inhibitor"], name:{en:"MAOIs", es:"IMAO", zh:"MAOI（单胺氧化酶抑制剂）", vi:"Thuốc ức chế MAO", ar:"مثبطات أوكسيديز أحادي الأمين (MAOIs)", fr:"IMAO", ko:"MAOI", ru:"ИМАО", pt:"IMAOs", de:"MAO-Hemmer", ja:"MAO阻害薬"},
    text:{en:"MAOIs block an enzyme that breaks down mood-related brain chemicals, raising their levels. That broad effect is why MAOIs interact seriously with many other medications — and with certain foods (see \"Food & drink to know about\" below, if any apply).",
          es:"Los IMAO bloquean una enzima que descompone sustancias cerebrales relacionadas con el ánimo, elevando sus niveles. Ese efecto amplio es la razón por la que los IMAO interactúan seriamente con muchos otros medicamentos — y con ciertos alimentos (mira \"Notas de alimentos y bebidas\" abajo, si aplica alguna).", zh:"MAOI会阻断分解与情绪相关的脑内化学物质的酶，从而提高其水平。正是这种广泛的作用，使MAOI与许多其他药物存在严重的相互作用——也与某些食物存在相互作用（如适用，请参见下方的\"食物与饮品须知\"）。", vi:"Thuốc ức chế MAO ngăn chặn một enzyme phân giải các chất hóa học trong não liên quan đến tâm trạng, làm tăng nồng độ của chúng. Chính tác động rộng này là lý do thuốc ức chế MAO tương tác nghiêm trọng với nhiều loại thuốc khác — và với một số thực phẩm nhất định (xem mục «Lưu ý về thực phẩm và đồ uống» bên dưới, nếu có áp dụng).", ar:"تُثبّط مثبطات MAO إنزيمًا يُفكّك المواد الكيميائية المرتبطة بالمزاج في الدماغ، فترفع مستوياتها. هذا التأثير الواسع هو سبب تفاعل مثبطات MAO بشكل خطير مع العديد من الأدوية الأخرى — ومع أطعمة معينة (انظر «ملاحظات الطعام والشراب» أدناه إن انطبقت).", fr:"Les IMAO bloquent une enzyme qui décompose des substances cérébrales liées à l'humeur, augmentant leurs niveaux. Ce large effet explique pourquoi les IMAO interagissent gravement avec de nombreux autres médicaments — et avec certains aliments (voir « Notes sur l'alimentation et les boissons » ci-dessous, le cas échéant).", ko:"MAOI는 기분에 관련된 뇌 화학물질을 분해하는 효소를 차단해 그 수치를 높입니다. 이 광범위한 효과 때문에 MAOI는 많은 다른 약 — 그리고 특정 음식(해당되면 아래 「음식과 음료 참고」 참조) —과 심각하게 상호작용합니다.", ru:"ИМАО блокируют фермент, расщепляющий связанные с настроением вещества мозга, повышая их уровень. Этот широкий эффект объясняет, почему ИМАО серьёзно взаимодействуют со многими другими лекарствами — и с определёнными продуктами (см. «Заметки о еде и напитках» ниже, если применимо).", pt:"Os IMAOs bloqueiam uma enzima que decompõe substâncias cerebrais ligadas ao humor, elevando seus níveis. Esse efeito amplo é o motivo de os IMAOs interagirem seriamente com muitos outros medicamentos — e com certos alimentos (veja «Notas sobre alimentos e bebidas» abaixo, se aplicável).", de:"MAO-Hemmer blockieren ein Enzym, das stimmungsbezogene Hirnbotenstoffe abbaut, und erhöhen deren Spiegel. Dieser breite Effekt ist der Grund, warum MAO-Hemmer ernsthaft mit vielen anderen Medikamenten wechselwirken — und mit bestimmten Lebensmitteln (siehe „Hinweise zu Nahrung und Getränken“ unten, falls zutreffend).", ja:"MAO阻害薬は、気分に関わる脳内物質を分解する酵素を阻害し、その値を高めます。この広い作用が、MAO阻害薬が多くの他の薬 — そして特定の食品（該当する場合は下の「食べ物・飲み物の注記」を参照）— と重大に相互作用する理由です。"} },
  { match:["ace inhibitor","angiotensin converting enzyme"], name:{en:"ACE inhibitors", es:"Inhibidores de la ECA", zh:"ACE抑制剂", vi:"Thuốc ức chế men chuyển (ACE)", ar:"مثبطات الإنزيم المحول للأنجيوتنسين (ACE)", fr:"Inhibiteurs de l'ECA", ko:"ACE 억제제", ru:"Ингибиторы АПФ", pt:"Inibidores da ECA", de:"ACE-Hemmer", ja:"ACE阻害薬"},
    text:{en:"ACE inhibitors lower blood pressure by blocking an enzyme that narrows blood vessels. A dry, persistent cough is a well-known side effect for some people, caused by the same enzyme pathway.",
          es:"Los inhibidores de la ECA bajan la presión arterial bloqueando una enzima que estrecha los vasos sanguíneos. Una tos seca y persistente es un efecto secundario bien conocido en algunas personas, causado por esa misma vía enzimática.", zh:"ACE抑制剂通过阻断一种使血管收缩的酶来降低血压。持续的干咳是部分人常见的副作用，由同一条酶通路引起。", vi:"Thuốc ức chế ACE làm giảm huyết áp bằng cách ức chế một enzyme làm co mạch máu. Ho khan, dai dẳng là tác dụng phụ được biết đến rõ ở một số người, do cùng con đường enzyme đó gây ra.", ar:"تخفض مثبطات ACE ضغط الدم عن طريق تثبيط إنزيم يُضيّق الأوعية الدموية. السعال الجاف المستمر أثر جانبي معروف جيدًا لدى بعض الأشخاص، ويحدث بسبب نفس المسار الإنزيمي.", fr:"Les inhibiteurs de l'ECA abaissent la tension artérielle en bloquant une enzyme qui rétrécit les vaisseaux sanguins. Une toux sèche et persistante est un effet secondaire bien connu chez certaines personnes, causé par cette même voie enzymatique.", ko:"ACE 억제제는 혈관을 좁히는 효소를 차단해 혈압을 낮춥니다. 마르고 지속되는 기침은 일부 사람에게 잘 알려진 부작용으로, 같은 효소 경로 때문에 생깁니다.", ru:"Ингибиторы АПФ снижают давление, блокируя фермент, сужающий сосуды. Сухой, стойкий кашель — хорошо известный побочный эффект у некоторых людей, вызванный тем же ферментным путём.", pt:"Os inibidores da ECA baixam a pressão arterial bloqueando uma enzima que estreita os vasos sanguíneos. Uma tosse seca e persistente é um efeito colateral bem conhecido em algumas pessoas, causado pela mesma via enzimática.", de:"ACE-Hemmer senken den Blutdruck, indem sie ein Enzym blockieren, das die Blutgefäße verengt. Ein trockener, anhaltender Husten ist eine bekannte Nebenwirkung bei manchen Menschen, verursacht durch denselben Enzymweg.", ja:"ACE阻害薬は、血管を狭める酵素を阻害して血圧を下げます。乾いた持続する咳は一部の人でよく知られた副作用で、同じ酵素の経路によって起こります。"} },
  { match:["angiotensin ii receptor","angiotensin receptor blocker"], name:{en:"ARBs (angiotensin receptor blockers)", es:"ARA-II (bloqueadores del receptor de angiotensina)", zh:"ARB（血管紧张素受体阻滞剂）", vi:"ARB (thuốc ức chế thụ thể angiotensin)", ar:"حاصرات مستقبلات الأنجيوتنسين (ARBs)", fr:"ARA (antagonistes des récepteurs de l'angiotensine)", ko:"ARB (안지오텐신 수용체 차단제)", ru:"БРА (блокаторы рецепторов ангиотензина)", pt:"BRAs (bloqueadores dos receptores de angiotensina)", de:"ARB (Angiotensin-Rezeptor-Blocker)", ja:"ARB（アンジオテンシン受容体拮抗薬）"},
    text:{en:"ARBs lower blood pressure in a similar way to ACE inhibitors, but by blocking the receptor those chemicals act on instead of the enzyme that makes them — which is why ARBs cause the dry cough far less often.",
          es:"Los ARA-II bajan la presión arterial de forma similar a los inhibidores de la ECA, pero bloqueando el receptor sobre el que actúan esas sustancias en lugar de la enzima que las produce — por eso los ARA-II causan la tos seca con mucha menos frecuencia.", zh:"ARB降低血压的方式与ACE抑制剂类似，但它阻断的是这些化学物质作用的受体，而不是产生它们的酶——这也是ARB引起干咳的情况少得多的原因。", vi:"ARB làm giảm huyết áp theo cách tương tự thuốc ức chế ACE, nhưng bằng cách ức chế thụ thể mà các chất hóa học đó tác động lên, thay vì ức chế enzyme tạo ra chúng — đây là lý do ARB gây ho khan ít hơn nhiều.", ar:"تخفض ARB ضغط الدم بطريقة مشابهة لمثبطات ACE، لكن عن طريق حصر المستقبل الذي تعمل عليه تلك المواد الكيميائية بدلاً من الإنزيم الذي يصنعها — وهذا سبب تسبب ARB في السعال الجاف بمعدل أقل بكثير.", fr:"Les ARA abaissent la tension artérielle de façon similaire aux inhibiteurs de l'ECA, mais en bloquant le récepteur sur lequel agissent ces substances plutôt que l'enzyme qui les fabrique — c'est pourquoi les ARA provoquent la toux sèche bien moins souvent.", ko:"ARB는 ACE 억제제와 비슷한 방식으로 혈압을 낮추지만, 그 물질을 만드는 효소가 아니라 그 물질이 작용하는 수용체를 차단합니다 — 그래서 ARB는 마른기침을 훨씬 덜 일으킵니다.", ru:"БРА снижают давление подобно ингибиторам АПФ, но блокируя рецептор, на который действуют эти вещества, а не фермент, который их создаёт — поэтому БРА гораздо реже вызывают сухой кашель.", pt:"Os BRAs baixam a pressão de forma semelhante aos inibidores da ECA, mas bloqueando o receptor sobre o qual essas substâncias agem em vez da enzima que as produz — por isso os BRAs causam a tosse seca com muito menos frequência.", de:"ARB senken den Blutdruck ähnlich wie ACE-Hemmer, aber indem sie den Rezeptor blockieren, auf den diese Stoffe wirken, statt das Enzym, das sie bildet — deshalb verursachen ARB den trockenen Husten weit seltener.", ja:"ARBはACE阻害薬と似た方法で血圧を下げますが、その物質を作る酵素ではなく、それらが作用する受容体を遮断します — そのためARBが乾いた咳を起こすことははるかに少ないです。"} },
  { match:["hmg-coa reductase"], name:{en:"Statins", es:"Estatinas", zh:"他汀类药物", vi:"Statin", ar:"الستاتينات", fr:"Statines", ko:"스타틴", ru:"Статины", pt:"Estatinas", de:"Statine", ja:"スタチン"},
    text:{en:"Statins lower cholesterol by blocking a liver enzyme (HMG-CoA reductase) your body uses to make it. Muscle aches are the most talked-about side effect, and a few statins interact with drugs that compete for the same liver-clearance pathway.",
          es:"Las estatinas bajan el colesterol bloqueando una enzima hepática (HMG-CoA reductasa) que tu cuerpo usa para producirlo. Los dolores musculares son el efecto secundario más comentado, y algunas estatinas interactúan con medicamentos que compiten por la misma vía de eliminación hepática.", zh:"他汀类药物通过阻断身体用来生成胆固醇的一种肝酶（HMG-CoA还原酶）来降低胆固醇。肌肉酸痛是最常被提及的副作用，一些他汀类药物会与竞争同一肝脏清除途径的药物发生相互作用。", vi:"Statin làm giảm cholesterol bằng cách ức chế một enzyme gan (HMG-CoA reductase) mà cơ thể dùng để tạo ra cholesterol. Đau cơ là tác dụng phụ được nhắc đến nhiều nhất, và một số statin tương tác với các thuốc cạnh tranh cùng con đường đào thải qua gan.", ar:"تخفض الستاتينات الكوليسترول عن طريق تثبيط إنزيم كبدي (HMG-CoA ريدكتاز) يستخدمه جسمك لصنعه. آلام العضلات هي الأثر الجانبي الأكثر تداولًا، وبعض الستاتينات تتفاعل مع أدوية تتنافس على نفس مسار التخلص الكبدي.", fr:"Les statines abaissent le cholestérol en bloquant une enzyme hépatique (HMG-CoA réductase) que votre corps utilise pour le fabriquer. Les douleurs musculaires sont l'effet secondaire le plus discuté, et quelques statines interagissent avec des médicaments qui se disputent la même voie d'élimination hépatique.", ko:"스타틴은 몸이 콜레스테롤을 만드는 데 쓰는 간 효소(HMG-CoA 환원효소)를 차단해 콜레스테롤을 낮춥니다. 근육통이 가장 많이 언급되는 부작용이며, 일부 스타틴은 같은 간 배설 경로를 놓고 경쟁하는 약과 상호작용합니다.", ru:"Статины снижают холестерин, блокируя фермент печени (ГМГ-КоА-редуктазу), который организм использует для его выработки. Мышечные боли — самый обсуждаемый побочный эффект, и некоторые статины взаимодействуют с лекарствами, конкурирующими за тот же путь печёночного выведения.", pt:"As estatinas baixam o colesterol bloqueando uma enzima do fígado (HMG-CoA redutase) que o seu corpo usa para produzi-lo. Dores musculares são o efeito colateral mais comentado, e algumas estatinas interagem com medicamentos que competem pela mesma via de eliminação hepática.", de:"Statine senken das Cholesterin, indem sie ein Leberenzym (HMG-CoA-Reduktase) blockieren, das Ihr Körper zu seiner Bildung nutzt. Muskelschmerzen sind die meistdiskutierte Nebenwirkung, und einige Statine wechselwirken mit Medikamenten, die um denselben Leberausscheidungsweg konkurrieren.", ja:"スタチンは、体がコレステロールを作るのに使う肝酵素（HMG-CoA還元酵素）を阻害して、コレステロールを下げます。筋肉痛が最もよく語られる副作用で、一部のスタチンは同じ肝臓の排出経路を奪い合う薬と相互作用します。"} },
  { match:["benzodiazepine"], name:{en:"Benzodiazepines", es:"Benzodiazepinas", zh:"苯二氮䓬类药物", vi:"Benzodiazepine", ar:"البنزوديازيبينات", fr:"Benzodiazépines", ko:"벤조디아제핀", ru:"Бензодиазепины", pt:"Benzodiazepínicos", de:"Benzodiazepine", ja:"ベンゾジアゼピン"},
    text:{en:"Benzodiazepines calm the central nervous system by boosting a natural inhibitory brain chemical (GABA). That's why they treat anxiety and seizures, and also why combining them with other sedatives (opioids, alcohol) is dangerous — the effects stack.",
          es:"Las benzodiazepinas calman el sistema nervioso central potenciando una sustancia cerebral inhibitoria natural (GABA). Por eso tratan la ansiedad y las convulsiones, y también por eso combinarlas con otros sedantes (opioides, alcohol) es peligroso — los efectos se acumulan.", zh:"苯二氮䓬类药物通过增强一种天然的抑制性脑内化学物质（GABA）来镇静中枢神经系统。这也是它们能治疗焦虑和癫痫发作的原因，同时也解释了为什么将它们与其他镇静药物（阿片类药物、酒精）合用是危险的——效果会叠加。", vi:"Benzodiazepine làm dịu hệ thần kinh trung ương bằng cách tăng cường một chất hóa học ức chế tự nhiên trong não (GABA). Đây là lý do chúng điều trị lo âu và co giật, và cũng là lý do việc kết hợp chúng với các thuốc an thần khác (opioid, rượu) rất nguy hiểm — các tác dụng sẽ cộng dồn.", ar:"تُهدّئ البنزوديازيبينات الجهاز العصبي المركزي عن طريق تعزيز مادة كيميائية مثبطة طبيعية في الدماغ (GABA). لهذا السبب تعالج القلق والنوبات التشنجية، ولهذا أيضًا يكون الجمع بينها وبين مهدئات أخرى (المواد الأفيونية، الكحول) خطيرًا — التأثيرات تتراكم.", fr:"Les benzodiazépines apaisent le système nerveux central en renforçant une substance cérébrale inhibitrice naturelle (le GABA). C'est pourquoi elles traitent l'anxiété et les convulsions, et aussi pourquoi les associer à d'autres sédatifs (opioïdes, alcool) est dangereux — les effets se cumulent.", ko:"벤조디아제핀은 자연적인 억제성 뇌 화학물질(GABA)을 강화해 중추신경계를 진정시킵니다. 그래서 불안과 발작을 치료하며, 다른 진정제(오피오이드, 알코올)와 함께 쓰면 위험한 것도 그 때문입니다 — 효과가 겹쳐 쌓입니다.", ru:"Бензодиазепины успокаивают центральную нервную систему, усиливая естественное тормозное вещество мозга (ГАМК). Поэтому они лечат тревогу и судороги, и поэтому же сочетание их с другими седативными (опиоиды, алкоголь) опасно — эффекты складываются.", pt:"Os benzodiazepínicos acalmam o sistema nervoso central reforçando uma substância cerebral inibitória natural (o GABA). É por isso que tratam ansiedade e convulsões, e também por isso que combiná-los com outros sedativos (opioides, álcool) é perigoso — os efeitos se acumulam.", de:"Benzodiazepine beruhigen das Zentralnervensystem, indem sie einen natürlichen hemmenden Hirnbotenstoff (GABA) verstärken. Deshalb behandeln sie Angst und Krampfanfälle, und deshalb ist auch die Kombination mit anderen Beruhigungsmitteln (Opioide, Alkohol) gefährlich — die Effekte stapeln sich.", ja:"ベンゾジアゼピンは、自然の抑制性の脳内物質（GABA）を強めて中枢神経系を落ち着かせます。だから不安やけいれんを治療し、だからこそ他の鎮静薬（オピオイド、アルコール）と併用すると危険です — 効果が積み重なります。"} },
  { match:["opioid"], name:{en:"Opioids", es:"Opioides", zh:"阿片类药物", vi:"Opioid", ar:"المواد الأفيونية", fr:"Opioïdes", ko:"오피오이드", ru:"Опиоиды", pt:"Opioides", de:"Opioide", ja:"オピオイド"},
    text:{en:"Opioids relieve pain by activating receptors in the brain and spinal cord that also happen to control breathing rate — which is the source of their most serious risk, especially combined with other sedatives.",
          es:"Los opioides alivian el dolor activando receptores en el cerebro y la médula espinal que también controlan la frecuencia respiratoria — de ahí viene su riesgo más grave, especialmente combinados con otros sedantes.", zh:"阿片类药物通过激活大脑和脊髓中的受体来缓解疼痛，而这些受体恰好也控制着呼吸频率——这正是其最严重风险的来源，尤其是与其他镇静药物合用时。", vi:"Opioid giảm đau bằng cách kích hoạt các thụ thể ở não và tủy sống, những thụ thể này cũng kiểm soát nhịp thở — đây chính là nguồn gốc của rủi ro nghiêm trọng nhất, đặc biệt khi kết hợp với các thuốc an thần khác.", ar:"تُخفف المواد الأفيونية الألم عن طريق تنشيط مستقبلات في الدماغ والحبل الشوكي تتحكم أيضًا في معدل التنفس — وهذا مصدر أخطر مخاطرها، خاصة عند الجمع بينها وبين مهدئات أخرى.", fr:"Les opioïdes soulagent la douleur en activant des récepteurs dans le cerveau et la moelle épinière qui contrôlent aussi le rythme respiratoire — d'où provient leur risque le plus grave, surtout en association avec d'autres sédatifs.", ko:"오피오이드는 뇌와 척수의 수용체를 활성화해 통증을 완화하는데, 이 수용체는 호흡 속도도 조절합니다 — 이것이 가장 심각한 위험의 근원이며, 특히 다른 진정제와 함께 쓸 때 그렇습니다.", ru:"Опиоиды облегчают боль, активируя рецепторы в мозге и спинном мозге, которые также контролируют частоту дыхания — это источник их самого серьёзного риска, особенно в сочетании с другими седативными.", pt:"Os opioides aliviam a dor ativando receptores no cérebro e na medula espinhal que também controlam a frequência respiratória — o que é a fonte do seu risco mais grave, especialmente combinados com outros sedativos.", de:"Opioide lindern Schmerz, indem sie Rezeptoren im Gehirn und Rückenmark aktivieren, die zufällig auch die Atemfrequenz steuern — was die Quelle ihres schwersten Risikos ist, besonders in Kombination mit anderen Beruhigungsmitteln.", ja:"オピオイドは、脳と脊髄の受容体を活性化して痛みを和らげますが、それらの受容体は呼吸の速さも制御しています — これが最も重い危険の源で、特に他の鎮静薬との併用時に顕著です。"} },
  { match:["proton pump inhibitor"], name:{en:"Proton pump inhibitors (PPIs)", es:"Inhibidores de la bomba de protones (IBP)", zh:"质子泵抑制剂（PPI）", vi:"Thuốc ức chế bơm proton (PPI)", ar:"مثبطات مضخة البروتون (PPIs)", fr:"Inhibiteurs de la pompe à protons (IPP)", ko:"양성자 펌프 억제제 (PPI)", ru:"Ингибиторы протонной помпы (ИПП)", pt:"Inibidores da bomba de prótons (IBPs)", de:"Protonenpumpenhemmer (PPI)", ja:"プロトンポンプ阻害薬（PPI）"},
    text:{en:"PPIs reduce stomach acid by shutting down the pump cells use to produce it — more completely and longer-lasting than older antacids, which is why they're often used for ongoing reflux rather than occasional heartburn.",
          es:"Los IBP reducen el ácido estomacal apagando la bomba que las células usan para producirlo — de forma más completa y duradera que los antiácidos antiguos, por eso a menudo se usan para el reflujo continuo en lugar de la acidez ocasional.", zh:"PPI通过关闭细胞用来产生胃酸的泵来减少胃酸分泌——比老一代抗酸药更彻底、作用更持久，这也是为什么它们常用于持续性反流，而不是偶尔的胃灼热。", vi:"PPI làm giảm axit dạ dày bằng cách tắt bơm mà tế bào dùng để tạo ra axit — hiệu quả toàn diện hơn và kéo dài hơn so với thuốc kháng axit cũ, đây là lý do chúng thường được dùng cho trào ngược kéo dài thay vì chỉ ợ nóng thỉnh thoảng.", ar:"تُقلّل مثبطات مضخة البروتون حمض المعدة عن طريق إيقاف المضخة التي تستخدمها الخلايا لإنتاجه — بشكل أكثر اكتمالًا ولفترة أطول من مضادات الحموضة القديمة، وهذا سبب استخدامها غالبًا لعلاج الارتجاع المستمر بدلاً من حرقة المعدة العرضية.", fr:"Les IPP réduisent l'acidité gastrique en désactivant la pompe que les cellules utilisent pour la produire — de façon plus complète et durable que les anciens antiacides, c'est pourquoi ils sont souvent utilisés pour un reflux persistant plutôt que pour des brûlures d'estomac occasionnelles.", ko:"PPI는 세포가 위산을 만드는 데 쓰는 펌프를 꺼서 위산을 줄입니다 — 오래된 제산제보다 더 완전하고 오래 지속되어, 가끔의 속쓰림보다 지속적인 역류에 자주 쓰입니다.", ru:"ИПП снижают кислотность желудка, отключая помпу, которую клетки используют для её выработки — более полно и надолго, чем старые антациды, поэтому их часто применяют при постоянном рефлюксе, а не при случайной изжоге.", pt:"Os IBPs reduzem o ácido do estômago desligando a bomba que as células usam para produzi-lo — de forma mais completa e duradoura que os antiácidos antigos, por isso são frequentemente usados para refluxo contínuo em vez de azia ocasional.", de:"PPI verringern die Magensäure, indem sie die Pumpe abschalten, die Zellen zu ihrer Bildung nutzen — vollständiger und länger anhaltend als ältere Antazida, weshalb sie oft bei anhaltendem Reflux statt bei gelegentlichem Sodbrennen eingesetzt werden.", ja:"PPIは、細胞が胃酸を作るのに使うポンプを止めて胃酸を減らします — 古い制酸薬よりも完全で長く続くため、たまの胸やけよりも続く逆流によく使われます。"} },
  { match:["histamine-2","h2-receptor antagonist"], name:{en:"H2 blockers", es:"Bloqueadores H2", zh:"H2受体阻滞剂", vi:"Thuốc chẹn H2", ar:"حاصرات H2", fr:"Anti-H2", ko:"H2 차단제", ru:"Блокаторы H2", pt:"Bloqueadores H2", de:"H2-Blocker", ja:"H2ブロッカー"},
    text:{en:"H2 blockers reduce stomach acid by blocking the histamine signal that tells acid-producing cells to turn on — a gentler, often faster-acting option than PPIs for many people.",
          es:"Los bloqueadores H2 reducen el ácido estomacal bloqueando la señal de histamina que le dice a las células productoras de ácido que se activen — una opción más suave, y a menudo de acción más rápida, que los IBP para muchas personas.", zh:"H2受体阻滞剂通过阻断告诉产酸细胞开始工作的组胺信号来减少胃酸——对许多人来说，这是一种比PPI更温和、且往往起效更快的选择。", vi:"Thuốc chẹn H2 làm giảm axit dạ dày bằng cách ức chế tín hiệu histamine báo cho tế bào sản xuất axit hoạt động — một lựa chọn nhẹ nhàng hơn, và thường có tác dụng nhanh hơn PPI đối với nhiều người.", ar:"تُقلّل حاصرات H2 حمض المعدة عن طريق تثبيط إشارة الهيستامين التي تُخبر الخلايا المنتجة للحمض بالعمل — خيار ألطف، وغالبًا أسرع مفعولًا من مثبطات مضخة البروتون لدى الكثيرين.", fr:"Les anti-H2 réduisent l'acidité gastrique en bloquant le signal d'histamine qui indique aux cellules productrices d'acide de s'activer — une option plus douce, et souvent d'action plus rapide que les IPP pour beaucoup de personnes.", ko:"H2 차단제는 산 생성 세포를 켜라고 지시하는 히스타민 신호를 차단해 위산을 줄입니다 — 많은 사람에게 PPI보다 더 순하고 흔히 더 빠르게 작용하는 선택지입니다.", ru:"Блокаторы H2 снижают кислотность желудка, блокируя гистаминовый сигнал, который велит кислотопродуцирующим клеткам включиться — более мягкий и часто быстрее действующий вариант, чем ИПП, для многих людей.", pt:"Os bloqueadores H2 reduzem o ácido do estômago bloqueando o sinal de histamina que diz às células produtoras de ácido para se ativarem — uma opção mais suave e, para muitas pessoas, muitas vezes de ação mais rápida que os IBPs.", de:"H2-Blocker verringern die Magensäure, indem sie das Histaminsignal blockieren, das den säureproduzierenden Zellen sagt, sich einzuschalten — eine sanftere und für viele Menschen oft schneller wirkende Option als PPI.", ja:"H2ブロッカーは、酸を作る細胞に働けと伝えるヒスタミンの信号を遮断して胃酸を減らします — 多くの人にとってPPIよりも穏やかで、しばしば効きが速い選択肢です。"} },
  { match:["macrolide"], name:{en:"Macrolide antibiotics", es:"Antibióticos macrólidos", zh:"大环内酯类抗生素", vi:"Kháng sinh nhóm macrolide", ar:"المضادات الحيوية من فئة الماكروليد", fr:"Antibiotiques macrolides", ko:"마크로라이드 항생제", ru:"Макролидные антибиотики", pt:"Antibióticos macrolídeos", de:"Makrolid-Antibiotika", ja:"マクロライド系抗生物質"},
    text:{en:"Macrolides stop bacteria from making proteins they need to survive. Several of them (like clarithromycin and erythromycin) also block a liver enzyme many other drugs rely on to clear from the body, which is why they're behind a number of drug interactions.",
          es:"Los macrólidos impiden que las bacterias produzcan las proteínas que necesitan para sobrevivir. Varios de ellos (como la claritromicina y la eritromicina) también bloquean una enzima hepática de la que dependen muchos otros medicamentos para eliminarse del cuerpo, por eso están detrás de varias interacciones medicamentosas.", zh:"大环内酯类药物能阻止细菌合成其生存所需的蛋白质。其中几种（如克拉霉素和红霉素）还会阻断许多其他药物赖以清除体外所需的一种肝酶，这也是它们涉及多种药物相互作用的原因。", vi:"Macrolide ngăn vi khuẩn tạo ra các protein cần thiết để tồn tại. Một số loại trong nhóm này (như clarithromycin và erythromycin) còn ức chế một enzyme gan mà nhiều loại thuốc khác phụ thuộc vào để đào thải khỏi cơ thể, đây là lý do chúng liên quan đến nhiều tương tác thuốc.", ar:"تمنع الماكروليدات البكتيريا من صنع البروتينات التي تحتاجها للبقاء. بعضها (مثل الكلاريثروميسين والإريثروميسين) يُثبّط أيضًا إنزيمًا كبديًا تعتمد عليه أدوية أخرى كثيرة للتخلص من الجسم، وهذا سبب ارتباطها بعدد من تفاعلات الأدوية.", fr:"Les macrolides empêchent les bactéries de fabriquer les protéines dont elles ont besoin pour survivre. Plusieurs d'entre eux (comme la clarithromycine et l'érythromycine) bloquent aussi une enzyme hépatique dont dépendent beaucoup d'autres médicaments pour être éliminés du corps, ce qui explique qu'ils soient à l'origine de plusieurs interactions médicamenteuses.", ko:"마크로라이드는 세균이 생존에 필요한 단백질을 만들지 못하게 막습니다. 그중 몇몇(클래리트로마이신과 에리트로마이신 등)은 다른 많은 약이 몸에서 제거되는 데 의존하는 간 효소도 차단하는데, 그래서 여러 약물 상호작용의 배후에 있습니다.", ru:"Макролиды не дают бактериям вырабатывать необходимые для выживания белки. Некоторые из них (например, кларитромицин и эритромицин) также блокируют фермент печени, на который многие другие лекарства полагаются для выведения из организма, поэтому они стоят за рядом лекарственных взаимодействий.", pt:"Os macrolídeos impedem as bactérias de produzir as proteínas de que precisam para sobreviver. Vários deles (como claritromicina e eritromicina) também bloqueiam uma enzima do fígado da qual muitos outros medicamentos dependem para serem eliminados do corpo, por isso estão por trás de várias interações medicamentosas.", de:"Makrolide hindern Bakterien daran, die zum Überleben nötigen Proteine zu bilden. Mehrere von ihnen (wie Clarithromycin und Erythromycin) blockieren auch ein Leberenzym, auf das viele andere Medikamente zur Ausscheidung aus dem Körper angewiesen sind, weshalb sie hinter einer Reihe von Arzneimittelwechselwirkungen stehen.", ja:"マクロライドは、細菌が生き延びるのに必要なタンパク質を作れないようにします。そのいくつか（クラリスロマイシンやエリスロマイシンなど）は、多くの他の薬が体から排出されるのに頼る肝酵素も阻害するため、いくつもの薬物相互作用の背後にあります。"} },
  { match:["quinolone"], name:{en:"Fluoroquinolone antibiotics", es:"Antibióticos fluoroquinolonas", zh:"氟喹诺酮类抗生素", vi:"Kháng sinh nhóm fluoroquinolone", ar:"المضادات الحيوية من فئة الفلوروكينولون", fr:"Antibiotiques fluoroquinolones", ko:"플루오로퀴놀론 항생제", ru:"Фторхинолоновые антибиотики", pt:"Antibióticos fluoroquinolonas", de:"Fluorchinolon-Antibiotika", ja:"フルオロキノロン系抗生物質"},
    text:{en:"Fluoroquinolones stop bacteria from copying their own DNA. The FDA has added warnings about tendon and nerve side effects, so these are generally reserved for infections other antibiotics can't handle.",
          es:"Las fluoroquinolonas impiden que las bacterias copien su propio ADN. La FDA ha agregado advertencias sobre efectos secundarios en tendones y nervios, así que generalmente se reservan para infecciones que otros antibióticos no pueden tratar.", zh:"氟喹诺酮类药物能阻止细菌复制自身DNA。FDA已就肌腱和神经方面的副作用发出警告，因此这类药物通常只用于其他抗生素无法应对的感染。", vi:"Fluoroquinolone ngăn vi khuẩn sao chép ADN của chính chúng. FDA đã bổ sung cảnh báo về tác dụng phụ trên gân và thần kinh, vì vậy nhóm thuốc này thường chỉ được dành cho các trường hợp nhiễm trùng mà kháng sinh khác không xử lý được.", ar:"تمنع الفلوروكينولونات البكتيريا من نسخ حمضها النووي الخاص. أضافت FDA تحذيرات بشأن آثار جانبية على الأوتار والأعصاب، لذا تُحفظ هذه الأدوية عادةً للعدوى التي لا تستطيع مضادات حيوية أخرى معالجتها.", fr:"Les fluoroquinolones empêchent les bactéries de copier leur propre ADN. La FDA a ajouté des avertissements concernant des effets secondaires sur les tendons et les nerfs, donc ils sont généralement réservés aux infections que d'autres antibiotiques ne peuvent pas traiter.", ko:"플루오로퀴놀론은 세균이 자신의 DNA를 복제하지 못하게 막습니다. FDA는 힘줄과 신경 부작용에 대한 경고를 추가했으며, 그래서 이 약들은 대개 다른 항생제로 다룰 수 없는 감염에 남겨 둡니다.", ru:"Фторхинолоны не дают бактериям копировать собственную ДНК. FDA добавило предупреждения о побочных эффектах со стороны сухожилий и нервов, поэтому их обычно оставляют для инфекций, с которыми не справляются другие антибиотики.", pt:"As fluoroquinolonas impedem as bactérias de copiar o próprio DNA. A FDA adicionou advertências sobre efeitos colaterais nos tendões e nervos, por isso costumam ser reservadas para infecções que outros antibióticos não conseguem tratar.", de:"Fluorchinolone hindern Bakterien daran, ihre eigene DNA zu kopieren. Die FDA hat Warnhinweise zu Nebenwirkungen an Sehnen und Nerven ergänzt, weshalb sie meist für Infektionen reserviert werden, die andere Antibiotika nicht bewältigen können.", ja:"フルオロキノロンは、細菌が自分のDNAを複製できないようにします。FDAは腱と神経の副作用について警告を追加したため、これらは通常、他の抗生物質では対処できない感染症のために取っておかれます。"} },
  { match:["antihistamine"], name:{en:"Antihistamines", es:"Antihistamínicos", zh:"抗组胺药", vi:"Thuốc kháng histamine", ar:"مضادات الهيستامين", fr:"Antihistaminiques", ko:"항히스타민제", ru:"Антигистаминные", pt:"Anti-histamínicos", de:"Antihistaminika", ja:"抗ヒスタミン薬"},
    text:{en:"Antihistamines block histamine, the chemical behind allergy symptoms like sneezing and itching. Older ones cross into the brain and cause drowsiness (which is also why they show up in OTC sleep aids); newer ones are designed not to.",
          es:"Los antihistamínicos bloquean la histamina, la sustancia detrás de los síntomas de alergia como los estornudos y la picazón. Los más antiguos cruzan al cerebro y causan somnolencia (por eso también aparecen en ayudas para dormir de venta libre); los más nuevos están diseñados para no hacerlo.", zh:"抗组胺药通过阻断组胺——引起打喷嚏、瘙痒等过敏症状的化学物质——来发挥作用。较早一代的药物会进入大脑并引起嗜睡（这也是它们出现在非处方助眠产品中的原因）；较新一代的药物则设计为不会如此。", vi:"Thuốc kháng histamine ức chế histamine, chất hóa học gây ra các triệu chứng dị ứng như hắt hơi và ngứa. Các loại cũ hơn đi vào não và gây buồn ngủ (đây cũng là lý do chúng xuất hiện trong các thuốc hỗ trợ giấc ngủ không kê đơn); các loại mới hơn được thiết kế để không gây ra điều đó.", ar:"تُثبّط مضادات الهيستامين مادة الهيستامين، المادة الكيميائية المسؤولة عن أعراض الحساسية مثل العطس والحكة. الأنواع الأقدم تدخل الدماغ وتسبب النعاس (وهذا أيضًا سبب ظهورها في أدوية النوم التي تُصرف دون وصفة طبية)؛ الأنواع الأحدث مصممة لتجنب ذلك.", fr:"Les antihistaminiques bloquent l'histamine, la substance à l'origine des symptômes d'allergie comme les éternuements et les démangeaisons. Les plus anciens passent dans le cerveau et provoquent de la somnolence (c'est aussi pourquoi ils figurent dans les somnifères en vente libre) ; les plus récents sont conçus pour ne pas le faire.", ko:"항히스타민제는 재채기와 가려움 같은 알레르기 증상의 배후에 있는 화학물질인 히스타민을 차단합니다. 오래된 것은 뇌로 넘어가 졸음을 일으키며(그래서 일반의약품 수면 보조제에도 들어 있습니다), 새로운 것은 그러지 않도록 설계되었습니다.", ru:"Антигистаминные блокируют гистамин — вещество, стоящее за симптомами аллергии, такими как чихание и зуд. Старые проникают в мозг и вызывают сонливость (поэтому они и входят в безрецептурные снотворные); новые разработаны так, чтобы этого не делать.", pt:"Os anti-histamínicos bloqueiam a histamina, a substância por trás dos sintomas de alergia como espirros e coceira. Os mais antigos atravessam para o cérebro e causam sonolência (por isso também aparecem em auxiliares de sono de venda livre); os mais novos são projetados para não fazer isso.", de:"Antihistaminika blockieren Histamin, den Stoff hinter Allergiesymptomen wie Niesen und Juckreiz. Ältere gelangen ins Gehirn und verursachen Schläfrigkeit (weshalb sie auch in rezeptfreien Schlafmitteln auftauchen); neuere sind so gestaltet, dass sie das nicht tun.", ja:"抗ヒスタミン薬は、くしゃみやかゆみといったアレルギー症状の背後にある物質、ヒスタミンを遮断します。古いものは脳に入り眠気を起こし（だから市販の睡眠補助薬にも入っています）、新しいものはそうならないよう設計されています。"} },
  { match:["thiazide"], name:{en:"Thiazide diuretics", es:"Diuréticos tiazídicos", zh:"噻嗪类利尿药", vi:"Thuốc lợi tiểu nhóm thiazide", ar:"مدرات البول الثيازيدية", fr:"Diurétiques thiazidiques", ko:"티아지드 이뇨제", ru:"Тиазидные мочегонные", pt:"Diuréticos tiazídicos", de:"Thiazid-Diuretika", ja:"チアジド系利尿薬"},
    text:{en:"Thiazides lower blood pressure by helping the kidneys release more salt and water. They can also shift potassium and other electrolyte levels, which is why blood tests are common while taking them.",
          es:"Las tiazidas bajan la presión arterial ayudando a los riñones a liberar más sal y agua. También pueden alterar el potasio y otros niveles de electrolitos, por eso los análisis de sangre son comunes mientras se toman.", zh:"噻嗪类药物通过帮助肾脏排出更多盐分和水分来降低血压。它们也可能改变血钾及其他电解质水平，这也是服用期间常需要进行血液检查的原因。", vi:"Thiazide làm giảm huyết áp bằng cách giúp thận thải nhiều muối và nước hơn. Chúng cũng có thể làm thay đổi kali và các mức điện giải khác, đây là lý do xét nghiệm máu thường được thực hiện trong khi dùng thuốc.", ar:"تخفض الثيازيدات ضغط الدم عن طريق مساعدة الكلى على إطلاق المزيد من الملح والماء. يمكن أن تُغيّر أيضًا مستويات البوتاسيوم والإلكتروليتات الأخرى، وهذا سبب شيوع فحوصات الدم أثناء تناولها.", fr:"Les thiazidiques abaissent la tension artérielle en aidant les reins à éliminer plus de sel et d'eau. Ils peuvent aussi modifier le potassium et d'autres niveaux d'électrolytes, c'est pourquoi des analyses de sang sont fréquentes pendant leur prise.", ko:"티아지드는 신장이 더 많은 염분과 물을 배출하도록 도와 혈압을 낮춥니다. 칼륨과 다른 전해질 수치도 바꿀 수 있어, 복용 중 혈액 검사가 흔합니다.", ru:"Тиазиды снижают давление, помогая почкам выводить больше соли и воды. Они также могут смещать уровни калия и других электролитов, поэтому во время их приёма часты анализы крови.", pt:"Os tiazídicos baixam a pressão ajudando os rins a liberar mais sal e água. Também podem alterar o potássio e outros níveis de eletrólitos, por isso exames de sangue são comuns durante o uso.", de:"Thiazide senken den Blutdruck, indem sie den Nieren helfen, mehr Salz und Wasser abzugeben. Sie können auch Kalium und andere Elektrolytwerte verschieben, weshalb Bluttests während der Einnahme üblich sind.", ja:"チアジドは、腎臓がより多くの塩と水を出すのを助けて血圧を下げます。カリウムや他の電解質の値も動かすことがあるため、服用中は血液検査がよく行われます。"} },
  { match:["potassium-sparing"], name:{en:"Potassium-sparing diuretics", es:"Diuréticos ahorradores de potasio", zh:"保钾利尿药", vi:"Thuốc lợi tiểu giữ kali", ar:"مدرات البول الموفرة للبوتاسيوم", fr:"Diurétiques épargneurs de potassium", ko:"칼륨 보존 이뇨제", ru:"Калийсберегающие мочегонные", pt:"Diuréticos poupadores de potássio", de:"Kaliumsparende Diuretika", ja:"カリウム保持性利尿薬"},
    text:{en:"These water pills help the body release fluid without losing potassium the way other diuretics do — useful, but it means combining one with something else that raises potassium can push levels too high.",
          es:"Estos diuréticos ayudan al cuerpo a liberar líquido sin perder potasio como hacen otros diuréticos — útil, pero significa que combinarlos con algo más que eleva el potasio puede llevar los niveles demasiado alto.", zh:"这类利尿药能帮助身体排出多余水分，同时不像其他利尿药那样丢失钾——这很有用，但也意味着如果与其他会升高血钾的药物合用，可能会使血钾水平过高。", vi:"Nhóm thuốc lợi tiểu này giúp cơ thể thải chất lỏng mà không làm mất kali như các thuốc lợi tiểu khác — hữu ích, nhưng cũng có nghĩa là kết hợp với thứ khác làm tăng kali có thể đẩy nồng độ lên quá cao.", ar:"تساعد هذه المدرات الجسم على التخلص من السوائل دون فقدان البوتاسيوم كما تفعل مدرات البول الأخرى — مفيد، لكنه يعني أيضًا أن الجمع بينها وبين شيء آخر يرفع البوتاسيوم قد يدفع المستويات إلى الارتفاع الزائد.", fr:"Ces diurétiques aident le corps à éliminer les liquides sans perdre le potassium comme le font les autres diurétiques — utile, mais cela signifie qu'en associer un à autre chose qui augmente le potassium peut faire monter les niveaux trop haut.", ko:"이 이뇨제는 다른 이뇨제처럼 칼륨을 잃지 않으면서 몸이 수분을 배출하도록 돕습니다 — 유용하지만, 칼륨을 높이는 다른 것과 함께 쓰면 수치가 너무 높아질 수 있다는 뜻이기도 합니다.", ru:"Эти мочегонные помогают организму выводить жидкость, не теряя калий, как другие мочегонные — полезно, но это значит, что сочетание одного из них с чем-то ещё, повышающим калий, может слишком поднять уровни.", pt:"Estes diuréticos ajudam o corpo a liberar líquido sem perder potássio como os outros diuréticos fazem — útil, mas significa que combinar um com outra coisa que aumenta o potássio pode elevar demais os níveis.", de:"Diese Diuretika helfen dem Körper, Flüssigkeit abzugeben, ohne Kalium zu verlieren, wie es andere Diuretika tun — nützlich, aber es bedeutet, dass die Kombination mit etwas anderem, das Kalium erhöht, die Werte zu hoch treiben kann.", ja:"これらの利尿薬は、他の利尿薬のようにカリウムを失わずに体が水分を出すのを助けます — 便利ですが、カリウムを上げる別のものと併用すると値が高くなりすぎることがあるという意味でもあります。"} }
];

function findClassExplainer(klass){
  if (!klass) return null;
  const k = klass.toLowerCase();
  return DRUG_CLASS_EXPLAINERS.find(e => e.match.some(m => k.includes(m))) || null;
}

const FOOD_INTERACTIONS = [
  { drugs:["warfarin"], severity:"moderate",
    food:{en:"Vitamin K-rich foods (leafy greens — kale, spinach, broccoli)", es:"Alimentos ricos en vitamina K (verduras de hoja verde — col rizada, espinaca, brócoli)", zh:"富含维生素K的食物（绿叶蔬菜——羽衣甘蓝、菠菜、西兰花）", vi:"Thực phẩm giàu vitamin K (rau lá xanh — cải xoăn, rau bina, bông cải xanh)", ar:"الأطعمة الغنية بفيتامين K (الخضروات الورقية — الكرنب المجعد، السبانخ، البروكلي)", fr:"Aliments riches en vitamine K (légumes-feuilles — chou frisé, épinards, brocoli)", ko:"비타민 K가 풍부한 음식 (잎채소 — 케일, 시금치, 브로콜리)", ru:"Продукты, богатые витамином K (листовая зелень — капуста кале, шпинат, брокколи)", pt:"Alimentos ricos em vitamina K (folhas verdes — couve, espinafre, brócolis)", de:"Vitamin-K-reiche Lebensmittel (Blattgemüse — Grünkohl, Spinat, Brokkoli)", ja:"ビタミンKが豊富な食品（葉物野菜 — ケール、ほうれん草、ブロッコリー）"},
    what:{en:"Sudden, large swings in how much vitamin K you eat can throw off how well warfarin thins your blood.",
          es:"Cambios repentinos y grandes en cuánta vitamina K comes pueden alterar qué tan bien la warfarina adelgaza tu sangre.", zh:"维生素K摄入量突然大幅波动，可能影响华法林稀释血液的效果。", vi:"Sự thay đổi đột ngột, lớn trong lượng vitamin K bạn ăn có thể làm ảnh hưởng đến hiệu quả làm loãng máu của warfarin.", ar:"التغيرات المفاجئة والكبيرة في كمية فيتامين K التي تتناولها يمكن أن تُخلّ بمدى فعالية الوارفارين في تسييل دمك.", fr:"Des variations soudaines et importantes de la quantité de vitamine K que vous consommez peuvent perturber l'efficacité de la warfarine à fluidifier votre sang.", ko:"먹는 비타민 K의 양이 갑자기 크게 변하면 와파린의 혈액 희석 효과가 흐트러질 수 있습니다.", ru:"Внезапные, крупные колебания количества потребляемого витамина K могут нарушить то, насколько хорошо варфарин разжижает вашу кровь.", pt:"Variações súbitas e grandes na quantidade de vitamina K que você come podem atrapalhar o quão bem a varfarina afina o seu sangue.", de:"Plötzliche, große Schwankungen bei der Menge an Vitamin K, die Sie essen, können beeinträchtigen, wie gut Warfarin Ihr Blut verdünnt.", ja:"食べるビタミンKの量が突然大きく変わると、ワルファリンが血液をさらさらにする効きが乱れることがあります。"},
    why:{en:"Vitamin K is what your body uses to make clotting factors — warfarin works by blocking that process, so big changes in vitamin K intake shift the balance either way.",
         es:"La vitamina K es lo que tu cuerpo usa para producir factores de coagulación — la warfarina funciona bloqueando ese proceso, así que cambios grandes en la ingesta de vitamina K alteran el equilibrio en cualquier dirección.", zh:"身体利用维生素K来生成凝血因子——华法林正是通过阻断这个过程发挥作用，所以维生素K摄入量的大幅变化会在任一方向上打破这种平衡。", vi:"Vitamin K là chất cơ thể dùng để tạo yếu tố đông máu — warfarin hoạt động bằng cách ngăn chặn quá trình đó, nên sự thay đổi lớn trong lượng vitamin K nạp vào sẽ làm lệch cân bằng theo cả hai hướng.", ar:"فيتامين K هو ما يستخدمه جسمك لصنع عوامل التخثر — يعمل الوارفارين عن طريق تثبيط تلك العملية، لذا فإن التغيرات الكبيرة في تناول فيتامين K تُخلّ بالتوازن في أي اتجاه.", fr:"La vitamine K est ce que votre corps utilise pour fabriquer les facteurs de coagulation — la warfarine agit en bloquant ce processus, donc de grands changements dans l'apport en vitamine K déséquilibrent la balance dans un sens ou l'autre.", ko:"비타민 K는 몸이 응고 인자를 만드는 데 쓰는 것입니다 — 와파린은 그 과정을 차단해 작용하므로, 비타민 K 섭취의 큰 변화는 어느 방향으로든 균형을 무너뜨립니다.", ru:"Витамин K — это то, что организм использует для выработки факторов свёртывания — варфарин действует, блокируя этот процесс, поэтому большие изменения потребления витамина K смещают баланс в любую сторону.", pt:"A vitamina K é o que o seu corpo usa para produzir fatores de coagulação — a varfarina age bloqueando esse processo, então grandes mudanças no consumo de vitamina K deslocam o equilíbrio em qualquer direção.", de:"Vitamin K ist das, was Ihr Körper zur Bildung von Gerinnungsfaktoren nutzt — Warfarin wirkt, indem es diesen Vorgang blockiert, sodass große Änderungen der Vitamin-K-Zufuhr das Gleichgewicht in beide Richtungen verschieben.", ja:"ビタミンKは体が凝固因子を作るために使うもので、ワルファリンはその過程を妨げて作用します。そのためビタミンKの摂取量が大きく変わると、どちらの方向にもバランスがずれます。"},
    mgmt:{en:"Doctors don't usually say \"avoid greens\" — the standard advice is to keep vitamin K intake roughly consistent week to week, not to cut it out.",
          es:"Los médicos generalmente no dicen \"evita las verduras\" — el consejo estándar es mantener la ingesta de vitamina K más o menos constante semana a semana, no eliminarla.", zh:"医生通常不会说\"要避免吃绿叶蔬菜\"——标准建议是让维生素K摄入量每周保持大致稳定，而不是完全不吃。", vi:"Bác sĩ thường không nói «tránh ăn rau xanh» — lời khuyên tiêu chuẩn là giữ lượng vitamin K nạp vào tương đối ổn định qua các tuần, chứ không phải loại bỏ hoàn toàn.", ar:"لا يقول الأطباء عادةً «تجنّب الخضروات الورقية» — النصيحة المعتادة هي الحفاظ على تناول فيتامين K ثابتًا تقريبًا من أسبوع لآخر، وليس التوقف عنه تمامًا.", fr:"Les médecins ne disent généralement pas « évitez les légumes verts » — le conseil standard est de garder l'apport en vitamine K à peu près constant d'une semaine à l'autre, pas de l'éliminer.", ko:"의사는 보통 「잎채소를 피하라」고 하지 않습니다 — 표준 조언은 비타민 K 섭취를 주마다 대략 일정하게 유지하라는 것이지 끊으라는 것이 아닙니다.", ru:"Врачи обычно не говорят «избегайте зелени» — стандартный совет держать потребление витамина K примерно постоянным от недели к неделе, а не исключать его.", pt:"Os médicos geralmente não dizem «evite as folhas verdes» — o conselho padrão é manter o consumo de vitamina K aproximadamente constante de semana a semana, não cortá-lo.", de:"Ärzte sagen meist nicht „meiden Sie Blattgemüse“ — der Standardrat ist, die Vitamin-K-Zufuhr von Woche zu Woche etwa konstant zu halten, nicht sie wegzulassen.", ja:"医師は通常「葉物野菜を避けなさい」とは言いません — 標準的な助言は、ビタミンKの摂取を週ごとにほぼ一定に保つことで、やめることではありません。"} },
  { drugs:STATINS, severity:"moderate",
    food:{en:"Grapefruit and grapefruit juice", es:"Toronja (pomelo) y su jugo", zh:"西柚（葡萄柚）及其果汁", vi:"Bưởi và nước ép bưởi", ar:"الجريب فروت وعصيره", fr:"Pamplemousse et jus de pamplemousse", ko:"자몽과 자몽 주스", ru:"Грейпфрут и грейпфрутовый сок", pt:"Toranja e suco de toranja", de:"Grapefruit und Grapefruitsaft", ja:"グレープフルーツとグレープフルーツジュース"},
    what:{en:"Grapefruit can raise blood levels of certain statins, increasing the risk of muscle-related side effects.",
          es:"La toronja puede elevar los niveles en sangre de ciertas estatinas, aumentando el riesgo de efectos secundarios musculares.", zh:"西柚可能提高某些他汀类药物的血药浓度，增加与肌肉相关的副作用风险。", vi:"Bưởi có thể làm tăng nồng độ trong máu của một số statin, tăng nguy cơ tác dụng phụ liên quan đến cơ.", ar:"يمكن للجريب فروت أن يرفع مستويات بعض أدوية الستاتين في الدم، مما يزيد من خطر الآثار الجانبية المتعلقة بالعضلات.", fr:"Le pamplemousse peut augmenter les taux sanguins de certaines statines, accroissant le risque d'effets secondaires musculaires.", ko:"자몽은 특정 스타틴의 혈중 농도를 높여 근육 관련 부작용 위험을 높일 수 있습니다.", ru:"Грейпфрут может повысить уровень некоторых статинов в крови, увеличивая риск побочных эффектов со стороны мышц.", pt:"A toranja pode elevar os níveis sanguíneos de certas estatinas, aumentando o risco de efeitos colaterais musculares.", de:"Grapefruit kann die Blutspiegel bestimmter Statine erhöhen und das Risiko muskelbezogener Nebenwirkungen steigern.", ja:"グレープフルーツは特定のスタチンの血中濃度を上げ、筋肉に関連する副作用のリスクを高めることがあります。"},
    why:{en:"Grapefruit blocks the same liver enzyme (CYP3A4) that clears these statins, so the drug builds up.",
         es:"La toronja bloquea la misma enzima hepática (CYP3A4) que elimina estas estatinas, así que el medicamento se acumula.", zh:"西柚会阻断清除这些他汀类药物的同一种肝酶（CYP3A4），导致药物在体内蓄积。", vi:"Bưởi ức chế cùng một enzyme gan (CYP3A4) đào thải các loại statin này, khiến thuốc tích tụ.", ar:"يُثبّط الجريب فروت نفس إنزيم الكبد (CYP3A4) الذي يُخلّص هذه الأدوية، فتتراكم في الجسم.", fr:"Le pamplemousse bloque la même enzyme hépatique (CYP3A4) qui élimine ces statines, donc le médicament s'accumule.", ko:"자몽은 이 스타틴들을 제거하는 같은 간 효소(CYP3A4)를 차단해 약이 축적됩니다.", ru:"Грейпфрут блокирует тот же фермент печени (CYP3A4), который выводит эти статины, поэтому лекарство накапливается.", pt:"A toranja bloqueia a mesma enzima do fígado (CYP3A4) que elimina essas estatinas, então o medicamento se acumula.", de:"Grapefruit blockiert dasselbe Leberenzym (CYP3A4), das diese Statine abbaut, sodass sich das Medikament anreichert.", ja:"グレープフルーツはこれらのスタチンを処理するのと同じ肝酵素（CYP3A4）を阻害するため、薬が蓄積します。"},
    mgmt:{en:"This mainly affects simvastatin, atorvastatin, and lovastatin — not all statins. Ask your pharmacist if yours is affected before assuming you need to avoid grapefruit.",
          es:"Esto afecta principalmente a la simvastatina, la atorvastatina, y la lovastatina — no a todas las estatinas. Pregúntale a tu farmacéutico si la tuya está afectada antes de asumir que debes evitar la toronja.", zh:"这主要影响辛伐他汀、阿托伐他汀和洛伐他汀——并非所有他汀类药物都受影响。在假设自己需要避开西柚之前，请先向药师确认你所用的他汀是否受影响。", vi:"Điều này chủ yếu ảnh hưởng đến simvastatin, atorvastatin, và lovastatin — không phải tất cả các statin. Hãy hỏi dược sĩ xem loại bạn dùng có bị ảnh hưởng không trước khi cho rằng bạn cần tránh bưởi.", ar:"يؤثر هذا بشكل رئيسي على سيمفاستاتين وأتورفاستاتين ولوفاستاتين — وليس جميع أدوية الستاتين. اسأل صيدليك إن كان دواؤك متأثرًا قبل افتراض أنك بحاجة لتجنب الجريب فروت.", fr:"Cela concerne principalement la simvastatine, l'atorvastatine, et la lovastatine — pas toutes les statines. Demandez à votre pharmacien si la vôtre est concernée avant de supposer que vous devez éviter le pamplemousse.", ko:"이것은 주로 심바스타틴, 아토르바스타틴, 로바스타틴에 영향을 주며 모든 스타틴은 아닙니다. 자몽을 피해야 한다고 단정하기 전에 당신의 것이 해당되는지 약사에게 물어보세요.", ru:"Это в основном касается симвастатина, аторвастатина и ловастатина — не всех статинов. Спросите у фармацевта, затронут ли ваш, прежде чем считать, что вам нужно избегать грейпфрута.", pt:"Isto afeta principalmente sinvastatina, atorvastatina e lovastatina — não todas as estatinas. Pergunte ao seu farmacêutico se a sua é afetada antes de presumir que precisa evitar a toranja.", de:"Dies betrifft vor allem Simvastatin, Atorvastatin und Lovastatin — nicht alle Statine. Fragen Sie Ihren Apotheker, ob Ihres betroffen ist, bevor Sie annehmen, Grapefruit meiden zu müssen.", ja:"これは主にシンバスタチン、アトルバスタチン、ロバスタチンに影響します — すべてのスタチンではありません。グレープフルーツを避ける必要があると決めつける前に、あなたのものが影響を受けるか薬剤師に尋ねてください。"} },
  { drugs:MAOIS, severity:"major",
    food:{en:"Aged, fermented, or cured foods high in tyramine (aged cheese, cured meats, tap beer, soy sauce)", es:"Alimentos añejados, fermentados, o curados con alto contenido de tiramina (queso añejo, carnes curadas, cerveza de barril, salsa de soya)", zh:"富含酪胺的陈年、发酵或腌制食品（陈年奶酪、腌制肉类、生啤酒、酱油）", vi:"Thực phẩm ủ lâu, lên men, hoặc ướp muối có hàm lượng tyramine cao (phô mai ủ lâu, thịt ướp muối, bia tươi, nước tương)", ar:"الأطعمة المُعتَّقة أو المُخمَّرة أو المُملَّحة الغنية بالتيرامين (الجبن المُعتَّق، اللحوم المُملَّحة، البيرة المسحوبة، صلصة الصويا)", fr:"Aliments vieillis, fermentés, ou salaisonnés riches en tyramine (fromage affiné, charcuterie, bière pression, sauce soja)", ko:"티라민이 많은 숙성·발효·염장 식품 (숙성 치즈, 염장육, 생맥주, 간장)", ru:"Выдержанные, ферментированные или вяленые продукты с высоким содержанием тирамина (выдержанный сыр, вяленое мясо, разливное пиво, соевый соус)", pt:"Alimentos envelhecidos, fermentados ou curados ricos em tiramina (queijo curado, carnes curadas, chope, molho de soja)", de:"Gereifte, fermentierte oder gepökelte Lebensmittel mit hohem Tyramingehalt (gereifter Käse, gepökeltes Fleisch, Fassbier, Sojasauce)", ja:"チラミンが多い熟成・発酵・塩漬けの食品（熟成チーズ、塩漬け肉、樽生ビール、しょうゆ）"},
    what:{en:"Eating tyramine-rich foods while on an MAOI can spike blood pressure to dangerous levels — a \"hypertensive crisis.\"",
          es:"Comer alimentos ricos en tiramina mientras tomas un IMAO puede elevar la presión arterial a niveles peligrosos — una \"crisis hipertensiva\".", zh:"在服用MAOI期间食用富含酪胺的食物，可能使血压飙升到危险水平——即\"高血压危象\"。", vi:"Ăn thực phẩm giàu tyramine trong khi dùng thuốc ức chế MAO có thể làm huyết áp tăng vọt đến mức nguy hiểm — «cơn tăng huyết áp cấp».", ar:"تناول الأطعمة الغنية بالتيرامين أثناء تناول مثبط MAO يمكن أن يرفع ضغط الدم إلى مستويات خطيرة — «أزمة ارتفاع ضغط الدم».", fr:"Manger des aliments riches en tyramine sous IMAO peut faire grimper la tension artérielle à des niveaux dangereux — une « crise hypertensive ».", ko:"MAOI 복용 중 티라민이 풍부한 음식을 먹으면 혈압이 위험한 수준까지 급등할 수 있습니다 — 「고혈압 위기」.", ru:"Употребление богатых тирамином продуктов на фоне ИМАО может резко поднять давление до опасного уровня — «гипертонический криз».", pt:"Comer alimentos ricos em tiramina enquanto se usa um IMAO pode disparar a pressão arterial a níveis perigosos — uma «crise hipertensiva».", de:"Tyraminreiche Lebensmittel unter einem MAO-Hemmer zu essen, kann den Blutdruck auf gefährliche Werte hochtreiben — eine „hypertensive Krise“.", ja:"MAO阻害薬の服用中にチラミンの豊富な食品を食べると、血圧が危険な水準まで急上昇することがあります — 「高血圧クリーゼ」です。"},
    why:{en:"MAOIs block the enzyme that normally breaks down tyramine, so it builds up and triggers a surge of norepinephrine.",
         es:"Los IMAO bloquean la enzima que normalmente descompone la tiramina, así que se acumula y desencadena un aumento repentino de norepinefrina.", zh:"MAOI会阻断正常分解酪胺的酶，导致酪胺蓄积并引发去甲肾上腺素骤增。", vi:"Thuốc ức chế MAO ngăn chặn enzyme thường phân giải tyramine, khiến nó tích tụ và gây ra sự gia tăng đột ngột norepinephrine.", ar:"تُثبّط مثبطات MAO الإنزيم الذي يُفكّك التيرامين عادةً، فيتراكم ويُطلق ارتفاعًا مفاجئًا في النورإبينفرين.", fr:"Les IMAO bloquent l'enzyme qui décompose normalement la tyramine, donc elle s'accumule et déclenche une poussée de noradrénaline.", ko:"MAOI는 보통 티라민을 분해하는 효소를 차단해, 티라민이 축적되고 노르에피네프린의 급증을 유발합니다.", ru:"ИМАО блокируют фермент, который обычно расщепляет тирамин, поэтому он накапливается и вызывает выброс норадреналина.", pt:"Os IMAOs bloqueiam a enzima que normalmente decompõe a tiramina, então ela se acumula e desencadeia um surto de noradrenalina.", de:"MAO-Hemmer blockieren das Enzym, das normalerweise Tyramin abbaut, sodass es sich anreichert und einen Noradrenalin-Schub auslöst.", ja:"MAO阻害薬は通常チラミンを分解する酵素を阻害するため、チラミンが蓄積し、ノルアドレナリンの急増を引き起こします。"},
    mgmt:{en:"Anyone prescribed an MAOI is typically given a specific low-tyramine food list by their prescriber — this is one of the most well-established food-drug interactions in medicine, not a minor caution.",
          es:"A cualquiera que le receten un IMAO generalmente se le da una lista específica de alimentos bajos en tiramina — esta es una de las interacciones alimento-medicamento más establecidas en la medicina, no una precaución menor.", zh:"任何被开具MAOI处方的人，通常会由医生提供一份具体的低酪胺饮食清单——这是医学上最确立的食物-药物相互作用之一，绝非小小的提醒。", vi:"Bất kỳ ai được kê đơn thuốc ức chế MAO thường được bác sĩ cung cấp một danh sách thực phẩm ít tyramine cụ thể — đây là một trong những tương tác thực phẩm-thuốc được xác lập rõ ràng nhất trong y học, không phải một lưu ý nhỏ.", ar:"يحصل أي شخص يُوصف له مثبط MAO عادةً على قائمة محددة منخفضة التيرامين من طبيبه المعالج — هذا أحد أكثر تفاعلات الطعام والدواء رسوخًا في الطب، وليس تحذيرًا بسيطًا.", fr:"Toute personne à qui l'on prescrit un IMAO reçoit généralement de son prescripteur une liste spécifique d'aliments pauvres en tyramine — c'est l'une des interactions alimentaire-médicamenteuse les mieux établies en médecine, pas une précaution mineure.", ko:"MAOI를 처방받은 사람은 보통 처방자로부터 구체적인 저티라민 식품 목록을 받습니다 — 이것은 의학에서 가장 확립된 음식-약물 상호작용 중 하나이며 사소한 주의가 아닙니다.", ru:"Любому, кому назначен ИМАО, обычно врач выдаёт конкретный список продуктов с низким содержанием тирамина — это одно из наиболее устоявшихся пищевых взаимодействий в медицине, а не мелкая предосторожность.", pt:"Qualquer pessoa a quem se prescreve um IMAO geralmente recebe do prescritor uma lista específica de alimentos com pouca tiramina — esta é uma das interações alimento-medicamento mais bem estabelecidas na medicina, não uma precaução menor.", de:"Wer einen MAO-Hemmer verordnet bekommt, erhält vom Verordner meist eine konkrete tyraminarme Lebensmittelliste — dies ist eine der am besten belegten Nahrungsmittel-Arzneimittel-Wechselwirkungen in der Medizin, keine geringfügige Vorsicht.", ja:"MAO阻害薬を処方された人は通常、処方医から具体的な低チラミン食品リストを渡されます — これは医学で最も確立した食品と薬の相互作用の1つであり、些細な注意ではありません。"} },
  { drugs:["metronidazole"], severity:"major",
    food:{en:"Alcohol", es:"Alcohol", zh:"酒精", vi:"Rượu bia", ar:"الكحول", fr:"Alcool", ko:"알코올", ru:"Алкоголь", pt:"Álcool", de:"Alkohol", ja:"アルコール"},
    what:{en:"Alcohol during (and for a while after) metronidazole can cause a severe reaction — flushing, nausea, vomiting, a racing heart.",

function crossSensitivityFor(tokens){
  return CROSS_SENSITIVITY.filter(c => sideHit(tokens, c.drugs));
}

/* ---- helpers ----------------------------------------------------- */
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const titlecase = s => (s||"").toLowerCase().replace(/\b\w/g, c => c.toUpperCase());

/* turn a typed name into a set of tokens we can match on */
function baseTokens(name){
  const n = name.trim().toLowerCase();
  const set = new Set([n]);
  if (ALIASES[n]) set.add(ALIASES[n]);
  // also split multiword brand like "ms contin"
  if (ALIASES[n]) {} 
  return set;
}

/* does a token set hit a rule side (list of ingredient/class tokens)? */
function sideHit(tokens, side){
  for (const t of tokens){
    for (const s of side){
      if (t === s) return true;
      if (t.includes(s) || s.includes(t)) { if (s.length>=4) return true; }
    }
  }
  return false;
}

/* ---- openFDA fetch ------------------------------------------------ */
async function fetchLabel(name){
  const q = encodeURIComponent(name.trim().toLowerCase());
  const url = `${FDA}?search=(openfda.brand_name:"${q}"+openfda.generic_name:"${q}"+openfda.substance_name:"${q}")&limit=1`;
  const res = await fetch(url);
  if (res.status === 404) return null;          // openFDA returns 404 when nothing matches
  if (!res.ok) throw new Error("FDA service error ("+res.status+")");
  const data = await res.json();
  return (data.results && data.results[0]) || null;
}

/* pull the human-meaningful pieces out of a raw label record */
function parseLabel(rec){
  const of = rec.openfda || {};
  const first = a => Array.isArray(a) && a.length ? a[0] : null;
  const clsRaw = first(of.pharm_class_epc) || first(of.pharm_class_moa) || first(of.pharm_class_cs) || null;
  return {
    brand: first(of.brand_name),
    generic: first(of.generic_name),
    klass: clsRaw ? clsRaw.replace(/\s*\[.*?\]\s*/g,"").trim() : null,
    klassRaw: clsRaw, // unstripped — needed to re-query openFDA for same-class drugs
    rxcui: first(of.rxcui),
    substances: (of.substance_name||[]).map(s=>s.toLowerCase()),
    indications: first(rec.indications_and_usage),
    moa: first(rec.mechanism_of_action),
    adverse: first(rec.adverse_reactions),
    interactionsText: (rec.drug_interactions||[]).join(" "), // used for curated/label-mention matching
    boxed: first(rec.boxed_warning),
    // full-label-details fields (Phase 4): same sourcing rule as everything
    // else here — shown verbatim from the label, never summarized into advice
    activeIngredient: first(rec.active_ingredient),
    inactiveIngredient: first(rec.inactive_ingredient),
    contraindications: first(rec.contraindications),
    warnings: first(rec.warnings) || first(rec.warnings_and_cautions),
    precautions: first(rec.precautions),
    interactionsProse: first(rec.drug_interactions), // the label's own interactions text, for display
    dosage: first(rec.dosage_and_administration),
    pregnancy: first(rec.pregnancy) || first(rec.pregnancy_or_breast_feeding) || first(rec.teratogenic_effects),
    nursing: first(rec.nursing_mothers)
  };
}

/* find a label, rescuing typos via RxNorm before giving up. Shared by
   Decode and My Cabinet so both resolve names the same way.

   Instead of silently committing to RxNorm's single best guess, this
   collects up to 5 similarly-spelled candidate names and returns them
   as `alternates` — the UI shows these as "did you mean" choices so a
   misspelling doesn't just guess once and stop. */
async function resolveLabel(name){
  let rec = await fetchLabel(name);
  let suggested = null;
  let alternates = [];
  if (!rec){
    try{
      const r = await fetch(`${RXNORM}/approximateTerm.json?term=${encodeURIComponent(name)}&maxEntries=8`);
      const j = await r.json();
      const cands = (j.approximateGroup && j.approximateGroup.candidate) || [];
      const seenRxcui = new Set();
      for (const c of cands){
        if (!c.rxcui || seenRxcui.has(c.rxcui)) continue;
        seenRxcui.add(c.rxcui);
        try{
          const r2 = await fetch(`${RXNORM}/rxcui/${c.rxcui}/property.json?propName=RxNorm%20Name`);
          const j2 = await r2.json();
          const s = j2.propConceptGroup && j2.propConceptGroup.propConcept && j2.propConceptGroup.propConcept[0].propValue;
          if (s && s.toLowerCase() !== name.toLowerCase() && !alternates.some(a=>a.toLowerCase()===s.toLowerCase())){
            alternates.push(s);
          }
        }catch(e){/* skip this candidate, try the next */}
        if (alternates.length >= 5) break;
      }
      if (alternates.length){
        suggested = alternates[0];
        rec = await fetchLabel(alternates[0].split(" ")[0]);
      }
    }catch(e){/* typo rescue is best-effort */}
  }
  return { rec, suggested, alternates };
}

/* trim long FDA prose to a readable excerpt */
function excerpt(t, n=480){
  if (!t) return null;
  t = t.replace(/\s+/g," ").trim();
  if (t.length <= n) return t;
  const cut = t.slice(0,n); const sp = cut.lastIndexOf(" ");
  return cut.slice(0, sp>0?sp:n) + "…";
}

/* ---- OPTIONAL plain-English mode (Claude via your proxy) ----------
   Strictly a rephraser (or, in Spanish mode, a translator+rephraser).
   The system prompt forbids adding facts, in every language — locked
   server-side in worker.js, keyed by `lang`. The original FDA text
   always stays available behind a toggle.
------------------------------------------------------------------- */
async function toPlainEnglish(text, label, lang){
  if (!CLAUDE_PROXY_URL || !text) return null;
  // The safety-locked prompt lives in the Worker (worker.js), NOT here — so
  // the proxy can only ever rephrase/translate FDA text and can't be
  // repurposed to generate medical claims. We just hand it the text, which
  // section it is, and which language to render it in.
  try{
    const res = await fetch(CLAUDE_PROXY_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ text, label, lang: lang || "en" })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return (data.plain || "").trim() || null;
  }catch(e){ return null; }
}

async function decode(){
  const name = $("#decode-input").value.trim();
  const box = $("#decode-results");
  if (!name){ box.innerHTML = `<div class="err">${esc(t("decode_type_first"))}</div>`; return; }
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("decode_looking_up_prefix"))} “${esc(name)}” ${esc(t("decode_looking_up_suffix"))}</div>`;

  let rec, noteName = null, altNames = [];
  try{ const rr = await resolveLabel(name); rec = rr.rec; noteName = rr.suggested; altNames = rr.alternates || []; }
  catch(e){ box.innerHTML = `<div class="err">${esc(e.message)}. ${esc(t("try_again_moment"))}</div>`; return; }

  if (!rec){
    box.innerHTML = `<div class="nofind"><span class="eyebrow">${esc(t("decode_no_match_eyebrow"))}</span>
      <h3>${esc(t("decode_no_match_title_prefix"))} “${esc(name)}”.</h3>
      <p>${esc(t("decode_no_match_body"))}</p></div>
      ${altNames.length ? didYouMeanHTML(altNames) : ""}`;
    wireDidYouMean(box);
    return;
  }

  const d = parseLabel(rec);
  const displayName = d.brand && d.generic && d.brand.toLowerCase()!==d.generic.toLowerCase()
      ? titlecase(d.brand) : titlecase(d.generic||d.brand||name);

  // build the monograph card
  let strip = [];
  if (d.generic) strip.push(`<span><b>generic</b> ${esc(titlecase(d.generic))}</span>`);
  if (d.brand && d.brand.toLowerCase()!==(d.generic||"").toLowerCase()) strip.push(`<span><b>brand</b> ${esc(titlecase(d.brand))}</span>`);
  if (d.klass) strip.push(`<span><b>class</b> ${esc(d.klass)}</span>`);
  if (d.rxcui) strip.push(`<span><b>rxcui</b> ${esc(d.rxcui)}</span>`);

  // tokens for this drug, same shape the drug-drug engine uses — lets us
  // check the food/alcohol and cross-sensitivity curated sets too
  const tokens = baseTokens(name);
  (d.substances||[]).forEach(s=>tokens.add(s));
  if (d.generic) tokens.add(d.generic.toLowerCase());
  const classExplainer = findClassExplainer(d.klass);
  const foodHits = foodInteractionsFor(tokens);
  const sensitivityHits = crossSensitivityFor(tokens);

  // Overview — the same core fields Plainscript has always shown
  const rows = [];
  rows.push(makeRow(t("row_used_for"), d.indications, t("src_indications")));
  rows.push(makeRow(t("row_how_works"), d.moa, t("src_moa")));
  if (classExplainer) rows.push(makeRow(`${t("about_class_prefix")} ${pickLang(classExplainer.name)}`, pickLang(classExplainer.text), t("src_class_explainer")));
  rows.push(makeRow(t("row_side_effects"), d.adverse, t("src_adverse")));
  if (d.boxed) rows.push(makeRow(t("row_boxed"), d.boxed, t("src_boxed"), true));

  // Full label details — everything else on the label, verbatim. This is
  // reference text straight from the FDA label, same as the rows above —
  // not a recommendation, not a calculated dose, just what the label says.
  const fullRows = [];
  fullRows.push(makeRow(t("row_active_ingredient"), d.activeIngredient, t("src_active_ingredient")));
  fullRows.push(makeRow(t("row_inactive_ingredient"), d.inactiveIngredient, t("src_inactive_ingredient")));
  fullRows.push(makeRow(t("row_contraindications"), d.contraindications, t("src_contraindications")));
  fullRows.push(makeRow(t("row_warnings"), d.warnings, t("src_warnings")));
  fullRows.push(makeRow(t("row_precautions"), d.precautions, t("src_precautions")));
  fullRows.push(makeRow(t("row_interacts"), d.interactionsProse, t("src_interacts")));
  fullRows.push(makeRow(t("row_dosage"), d.dosage, t("src_dosage")));
  fullRows.push(makeRow(t("row_pregnancy"), d.pregnancy, t("src_pregnancy")));
  fullRows.push(makeRow(t("row_nursing"), d.nursing, t("src_nursing")));
  const hasFullRows = fullRows.some(Boolean);

  box.innerHTML = `
    ${noteName ? `<div class="status">${esc(t("decode_closest_match"))} <strong>${esc(titlecase(noteName))}</strong></div>`:""}
    ${altNames.length>1 ? didYouMeanHTML(altNames.filter(n=>n.toLowerCase()!==noteName.toLowerCase())) : ""}
    ${(uiLang==="es" && !CLAUDE_PROXY_URL) ? `<div class="status" style="padding-bottom:10px;">🌐 ${esc(t("spanish_no_worker_note"))}</div>` : ""}
    <article class="card">
      <div class="card-head">
        <span class="eyebrow">${esc(t("overview_eyebrow"))}</span>
        <div class="name">${esc(displayName)}</div>
        ${strip.length?`<div class="datastrip">${strip.join("")}</div>`:""}
      </div>
      <div class="card-body">${rows.filter(Boolean).join("")}</div>
    </article>
    ${hasFullRows ? `
    <article class="card">
      <div class="card-head">
        <span class="eyebrow">${esc(t("full_label_eyebrow"))}</span>
        <div class="name" style="font-size:19px;">${esc(t("full_label_title_prefix"))} ${esc(displayName)}${esc(t("full_label_title_suffix"))}</div>
      </div>
      <div class="card-body">${fullRows.filter(Boolean).join("")}</div>
    </article>` : ""}
    ${(foodHits.length || sensitivityHits.length) ? renderFoodAndAllergyCard(displayName, foodHits, sensitivityHits) : ""}
    <p class="status" style="padding-top:4px;">${esc(t("decode_footer_note"))}</p>
  `;

  // a misspelling can still resolve to a closest match AND surface other
  // close spellings — those chips need wiring here too, not just in the
  // no-match branch above (otherwise clicking them did nothing).
  wireDidYouMean(box);

  // Phase 2: offer to save this med to the signed-in user's cabinet
  addCabinetSave(box, d, name);

  // similar/related medications — same-class, other forms/strengths, and
  // combination products that share this ingredient (Phase 4)
  addSimilarButton(box, d, displayName);

  // optional: upgrade prose to plain English if proxy configured
  enhanceRows(box, d);
}

function makeRow(label, text, src, warn){
  if (!text) return "";
  const ex = excerpt(text);
  const full = text.replace(/\s+/g," ").trim();
  const needExpand = full.length > ex.length;
  const id = "r"+Math.random().toString(36).slice(2,8);
  return `<div class="row" data-full="${esc(full)}" data-label="${esc(label)}">
    <span class="eyebrow">${esc(label)}</span>
    <p data-role="text">${esc(ex)}</p>
    ${needExpand?`<button class="expand" data-target="${id}">${esc(t("show_full_text"))}</button><p id="${id}" data-role="full" hidden style="margin-top:8px;color:var(--ink-soft);">${esc(full)}</p>`:""}
    <div class="src">${esc(src)}</div>
  </div>`;
}

/* the food/alcohol and allergy cross-sensitivity card on a Decode result —

function renderFoodAndAllergyCard(displayName, foodHits, sensitivityHits){
  const rank = {major:0,moderate:1,minor:2};

/* wire up expanders + (if enabled) plain-English rephrasing */
async function enhanceRows(box, d){
  const fullLabel = t("show_full_text"), hideLabel = t("hide_full_text");
  box.querySelectorAll(".expand").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const target = box.querySelector("#"+btn.dataset.target);

      btn.textContent = open ? fullLabel : hideLabel;
    });
  });
  if (!CLAUDE_PROXY_URL) return;
  // rephrase (or, in Spanish mode, translate) each row's text in place,
  // keeping the original FDA wording available behind a toggle
  const plainLabel = t("show_plain_english"), origLabel = t("show_original"), rephrasedTag = t("rephrased_tag");
  for (const row of box.querySelectorAll(".row")){
    const label = row.dataset.label, full = row.dataset.full;

    p.insertAdjacentElement("afterend", tog);
    const tag = document.createElement("div"); tag.className="pe-toggle"; tag.textContent = rephrasedTag;
    p.insertAdjacentElement("afterend", tag);
  }
}

/* ---- voice input (Phase 5) ----------------------------------------
   Feature-detected: Firefox and some browsers don't support the Web
   Speech API at all, so the mic button simply never appears there —
   no broken UI, no dependency, nothing to configure. Chrome/Edge/Safari
   (recent versions) support it natively. */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

/* attaches a mic button right after `inputEl`. If `autoSubmit` is given,
   it's called automatically once speech is recognized (fine for a
   read-only action like Decode); if not, the field is just filled and
   the user reviews before submitting themselves (used for My Cabinet,
   where auto-submitting a mis-heard drug name would silently save it). */
function addVoiceButton(inputEl, autoSubmit){
  if (!SpeechRec) return;
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "mic-btn";
  btn.title = "Speak instead of typing";
  btn.setAttribute("aria-label", "Use voice input instead of typing");
  btn.textContent = "🎤";
  btn.addEventListener("click", () => {
    if (btn.classList.contains("listening")) return; // already listening — ignore a second tap
    const rec = new SpeechRec();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    btn.classList.add("listening");
    btn.textContent = "●";
    rec.onresult = (e) => {
      const text = e.results[0][0].transcript;
      inputEl.value = text;
      if (autoSubmit) autoSubmit();
    };
    rec.onerror = () => {};
    rec.onend = () => { btn.classList.remove("listening"); btn.textContent = "🎤"; };
    try{ rec.start(); }catch(e){ btn.classList.remove("listening"); btn.textContent = "🎤"; }
  });
  inputEl.insertAdjacentElement("afterend", btn);
}
