<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plainscript — Medication Reference</title>
<meta name="description" content="An educational tool that decodes medications, checks drug interactions, and points to general symptom guidance, using FDA and NIH data. Not medical advice." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#16202E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     PLAINSCRIPT — design tokens
     Aesthetic: a calm clinical reference instrument, not a
     consumer health app. Cool clinical paper, navy ink, one
     restrained teal accent. Color is rationed: red/orange/amber
     mean SEVERITY and nothing else, so an alarming color always
     means an alarming thing.
     ============================================================ */
  :root{
    --paper:#F4F6F8;
    --card:#FFFFFF;
    --ink:#16202E;
    --ink-soft:#4A5A6E;
    --ink-faint:#546678; /* darkened from #8194A6 — that was 2.88:1 on --paper, failing WCAG AA for text */
    --line:#DCE3EA;
    --line-soft:#E9EEF2;
    --accent:#0F766E;
    --accent-deep:#0B5752;
    --accent-wash:#E6F1EF;

    /* severity scale — used ONLY for interaction severity */
    --major-bg:#FBEBEA; --major-bar:#C0392B; --major-ink:#8A241C;
    --mod-bg:#FCF1E6;   --mod-bar:#D17A12;   --mod-ink:#8F4E08;
    --minor-bg:#FBF6E6; --minor-bar:#B5920A; --minor-ink:#6F5905;
    /* neutral states — label mentions and "nothing found" */
    --note-bg:#EDF1F5;  --note-bar:#54606E;  --note-ink:#3A4759; /* note-bar darkened from #69788A for safe contrast with white pill text */

    --radius:10px;
    --shadow:0 1px 2px rgba(22,32,46,.04), 0 8px 24px rgba(22,32,46,.06);
    --mono:"Spline Sans Mono",ui-monospace,Menlo,monospace;
    --sans:"Spline Sans",system-ui,-apple-system,sans-serif;
    --serif:"Newsreader",Georgia,serif;
    --safety-bg:#16202E;
  }

  /* ---- dark theme: same sober clinical instrument, lights turned down.
         Not neon — a calm, low-glare clinical dark. Starts on light. ---- */
  [data-theme="dark"]{
    --paper:#0F141A;
    --card:#171E27;
    --ink:#E4EAF1;
    --ink-soft:#9DAABA;
    --ink-faint:#8693A2; /* lightened from #6B7A8B — that was 4.21:1 on dark --paper, failing WCAG AA for text */
    --line:#273039;
    --line-soft:#1D242D;
    --accent:#35C4B8;
    --accent-deep:#63D6CC;
    --accent-wash:#123230;
    --major-bg:#241413; --major-bar:#E5544A; --major-ink:#F1A9A3;
    --mod-bg:#241910;   --mod-bar:#E08A2E;   --mod-ink:#F0C089;
    --minor-bg:#211E10; --minor-bar:#D4B33C; --minor-ink:#E6D385;
    --note-bg:#1A222C;  --note-bar:#7C8A9B;  --note-ink:#B7C3D0;
    --safety-bg:#0A0E13;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--sans); font-size:16px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
    transition:background-color .25s ease, color .25s ease;
  }
  .card,.verdict,.nofind,input[type=text],.themetoggle,.tab,.card-head,.row,.mini,.provider,.signin,textarea{
    transition:background-color .25s ease, border-color .25s ease, color .25s ease;
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
  .wrap{max-width:760px; margin:0 auto; padding:0 20px;}

  /* eyebrow / data labels — the clinical "instrument" texture */
  .eyebrow{
    font-family:var(--mono); font-size:11px; font-weight:600;
    letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);
  }

  /* ---------- safety frame: persistent, calm but present ---------- */
  .safetybar{
    background:var(--safety-bg); color:#E8EDF2; font-size:13px;
    border-bottom:1px solid #0c1420;
  }
  .safetybar .wrap{display:flex; gap:10px; align-items:center; padding:9px 20px;}
  .safetybar strong{color:#fff; font-weight:600;}
  .safetybar .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;}

  /* ---------- header ---------- */
  header.site{padding:30px 0 18px; border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;}
  .brand h1{
    font-family:var(--serif); font-weight:600; font-size:30px;
    letter-spacing:-.01em; margin:0; line-height:1;
  }
  .brand .tag{font-family:var(--mono); font-size:12px; color:var(--accent-deep); letter-spacing:.04em;}
  .lede{margin:12px 0 0; color:var(--ink-soft); max-width:60ch; font-size:15.5px;}

  .themetoggle{
    margin-left:auto; align-self:center; appearance:none; cursor:pointer;
    font-family:var(--mono); font-size:12px; letter-spacing:.03em;
    display:inline-flex; align-items:center; gap:7px; padding:8px 13px;
    border:1px solid var(--line); border-radius:20px; background:var(--card); color:var(--ink-soft);
  }
  .themetoggle:hover{border-color:var(--accent); color:var(--accent-deep);}
  .themetoggle:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .themetoggle .ticon{font-size:13px; line-height:1;}

  /* language selector — same pill look as .themetoggle, but a real <select>
     since a single click-toggle only scales to two languages */
  .lang-select-wrap{
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--line); border-radius:20px; background:var(--card);
    padding:0 12px 0 13px; align-self:center;
  }
  .lang-select-wrap:hover, .lang-select-wrap:focus-within{border-color:var(--accent);}
  .lang-select-wrap .ticon{font-size:13px; line-height:1;}
  .lang-select-wrap select{
    appearance:none; -webkit-appearance:none; border:none; background:transparent;
    font-family:var(--mono); font-size:12px; letter-spacing:.03em; color:var(--ink-soft);
    cursor:pointer; padding:8px 2px; outline:none;
  }
  .lang-select-wrap select:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}
  /* the dropdown's own option list renders with the OS/browser's native
     styling regardless — that's expected and fine, only the closed pill
     needs to match the app's look */
  .lang-select-wrap select option{color:#000; background:#fff;}

  /* ---------- tabs ---------- */
  .tabs{display:flex; gap:4px; margin:22px 0 0; border-bottom:1px solid var(--line);}
  .tab{
    appearance:none; background:none; border:none; cursor:pointer;
    font-family:var(--sans); font-size:15px; font-weight:600; color:var(--ink-faint);
    padding:11px 14px; border-bottom:2px solid transparent; margin-bottom:-1px;
    display:flex; align-items:center; gap:8px;
  }
  .tab:hover{color:var(--ink-soft);}
  .tab[aria-selected="true"]{color:var(--ink); border-bottom-color:var(--accent);}
  .tab .num{font-family:var(--mono); font-size:11px; color:var(--accent); }
  .tab:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}

  main{padding:26px 0 60px;}
  .panel[hidden]{display:none;}
  .panel-intro{color:var(--ink-soft); font-size:15px; margin:0 0 18px;}

  /* ---------- input row ---------- */
  .field label{display:block; margin-bottom:7px;}
  .inrow{display:flex; gap:9px; flex-wrap:wrap;}
  input[type=text]{
    flex:1 1 220px; min-width:0; font-family:var(--sans); font-size:16px;
    padding:13px 14px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--card); color:var(--ink);
  }
  input[type=text]::placeholder{color:var(--ink-faint);}
  input[type=text]:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash);}
  button.go{
    appearance:none; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:15px;
    padding:13px 20px; border-radius:var(--radius); border:1px solid var(--accent-deep);
    background:var(--accent); color:#fff;
  }
  button.go:hover{background:var(--accent-deep);}
  button.go:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
  button.ghost{
    appearance:none; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:14px;
    padding:11px 14px; border-radius:var(--radius); border:1px dashed var(--line);
    background:transparent; color:var(--accent-deep);
  }
  button.ghost:hover{border-color:var(--accent); background:var(--accent-wash);}
  button.ghost:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .druglist{display:flex; flex-direction:column; gap:9px; margin:0 0 12px;}
  .drugrow{display:flex; gap:9px; align-items:center;}
  /* .rm is reused for both the pairwise Check-tab row AND the My Cabinet
     med-card remove button — was scoped to .drugrow .rm only, so the
     cabinet one was rendering with zero styling. Un-scoped it. */
  .rm{
    appearance:none; border:1px solid var(--line); background:var(--card); cursor:pointer;
    width:44px; height:44px; flex:none; border-radius:var(--radius); color:var(--ink-faint);
    font-size:18px; line-height:1;
  }
  .rm:hover{color:var(--major-bar); border-color:var(--major-bar);}
  .rm:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .checkbar{display:flex; gap:9px; align-items:center; flex-wrap:wrap; margin-top:4px;}

  /* ---------- result: monograph card (the signature) ---------- */
  .results{margin-top:24px; display:flex; flex-direction:column; gap:16px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden; animation:rise .35s ease both;
  }
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){ .card{animation:none;} }

  .card-head{padding:18px 20px 14px; border-bottom:1px solid var(--line-soft);}
  .card-head .name{font-family:var(--serif); font-size:23px; font-weight:600; line-height:1.15; margin:2px 0 0;}
  .datastrip{
    font-family:var(--mono); font-size:12px; color:var(--ink-soft);
    display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:10px;
  }
  .datastrip b{color:var(--ink-faint); font-weight:500;}
  .card-body{padding:6px 20px 18px;}
  .row{padding:13px 0; border-bottom:1px solid var(--line-soft);}
  .row:last-child{border-bottom:none;}
  .row .eyebrow{display:block; margin-bottom:5px;}
  .row p{margin:0; color:var(--ink); font-size:15px;}
  .row .src{font-family:var(--mono); font-size:11px; color:var(--ink-faint); margin-top:6px;}
  .expand{
    appearance:none; background:none; border:none; cursor:pointer; padding:0; margin-top:6px;
    font-family:var(--mono); font-size:11.5px; color:var(--accent-deep); letter-spacing:.03em;
  }
  .expand:hover{text-decoration:underline;}
  .expand:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .pe-toggle{display:inline-flex; gap:6px; align-items:center; margin-top:8px; font-size:12.5px; color:var(--ink-faint); font-family:var(--mono);}

  /* ---------- interaction verdict ---------- */
  .verdict{display:flex; border-radius:var(--radius); overflow:hidden; border:1px solid var(--line); box-shadow:var(--shadow);}
  .verdict .bar{width:6px; flex:none;}
  .verdict .vbody{padding:15px 18px; flex:1;}
  .verdict .pair{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em;}
  .verdict .sev{font-family:var(--serif); font-size:19px; font-weight:600; margin:3px 0 0; display:flex; align-items:center; gap:9px;}
  .sev .pill{font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:20px;}
  .verdict p{margin:9px 0 0; font-size:14.5px;}
  .verdict .mgmt{margin-top:8px; font-size:13.5px; color:var(--ink-soft);}
  .verdict .src{font-family:var(--mono); font-size:11px; color:var(--ink-faint); margin-top:9px;}

  /* pill text colors are picked per severity to actually hit 4.5:1 against
     that pill's own background — white doesn't work for every bar color
     (verified: moderate/minor bars only clear ~3:1 with white, which fails
     WCAG AA for text this small; dark ink clears 5:1+ on those two). */
  .v-major{background:var(--major-bg);} .v-major .bar{background:var(--major-bar);} .v-major .pill{background:var(--major-bar); color:#fff;} .v-major .sev{color:var(--major-ink);}
  .v-moderate{background:var(--mod-bg);} .v-moderate .bar{background:var(--mod-bar);} .v-moderate .pill{background:var(--mod-bar); color:var(--ink);} .v-moderate .sev{color:var(--mod-ink);}
  .v-minor{background:var(--minor-bg);} .v-minor .bar{background:var(--minor-bar);} .v-minor .pill{background:var(--minor-bar); color:var(--ink);} .v-minor .sev{color:var(--minor-ink);}
  .v-note{background:var(--note-bg);} .v-note .bar{background:var(--note-bar);} .v-note .pill{background:var(--note-bar); color:#fff;} .v-note .sev{color:var(--note-ink); font-size:16px;}

  /* dark theme's severity bars are brighter/more saturated than light
     theme's, so white pill text fails contrast across the board there —
     verified all four need dark text in dark mode specifically. */
  [data-theme="dark"] .sev .pill{color:var(--safety-bg);}

  /* the cautious "nothing found" state — deliberately NOT green */
  .nofind{
    background:var(--note-bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px;
  }
  .nofind .eyebrow{color:var(--note-ink);}
  .nofind h3{font-family:var(--serif); font-weight:600; font-size:18px; margin:4px 0 6px; color:var(--note-ink);}
  .nofind p{margin:0; font-size:14.5px; color:var(--ink-soft);}

  /* ---------- status / errors ---------- */
  .status{font-family:var(--mono); font-size:13px; color:var(--ink-soft); padding:14px 0;}
  .status .spin{display:inline-block; width:11px; height:11px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-1px; margin-right:8px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){ .spin{animation:none;} }
  .err{background:var(--major-bg); border:1px solid var(--major-bar); color:var(--major-ink); padding:13px 16px; border-radius:var(--radius); font-size:14px;}

  /* ---------- methodology accordion (credibility / sourcing) ---------- */
  .method{margin-top:40px; border-top:1px solid var(--line); padding-top:8px;}
  details{border-bottom:1px solid var(--line-soft); padding:4px 0;}
  details summary{
    cursor:pointer; list-style:none; padding:13px 2px; font-weight:600; font-size:15px;
    display:flex; justify-content:space-between; align-items:center; color:var(--ink);
  }
  details summary::-webkit-details-marker{display:none;}
  details summary .chev{font-family:var(--mono); color:var(--accent); transition:transform .2s;}
  details[open] summary .chev{transform:rotate(90deg);}
  details .content{padding:0 2px 16px; color:var(--ink-soft); font-size:14.5px;}
  details .content p{margin:0 0 10px;} details .content p:last-child{margin:0;}
  details .content a{color:var(--accent-deep);}
  details .content code{font-family:var(--mono); font-size:12.5px; background:var(--line-soft); padding:1px 5px; border-radius:4px; color:var(--ink);}

  /* ---------- accounts + My Cabinet (Phase 2) ---------- */
  .acct{display:inline-flex; align-items:center; gap:8px; align-self:center;}
  .acct .who{
    font-family:var(--mono); font-size:11.5px; color:var(--ink-faint);
    max-width:190px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .mini{
    appearance:none; cursor:pointer; font-family:var(--mono); font-size:12px; letter-spacing:.03em;
    padding:8px 13px; border:1px solid var(--line); border-radius:20px;
    background:var(--card); color:var(--ink-soft);
  }
  .mini:hover{border-color:var(--accent); color:var(--accent-deep);}
  .mini:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .mini:disabled{opacity:.6; cursor:default;}
  .mini:disabled:hover{border-color:var(--line); color:var(--ink-soft);}

  .signin{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:22px 20px;
  }
  .signin h3{font-family:var(--serif); font-size:20px; font-weight:600; margin:6px 0 8px;}
  .signin p{margin:0 0 14px; color:var(--ink-soft); font-size:14.5px; max-width:58ch;}
  .providers{display:flex; gap:9px; flex-wrap:wrap;}
  .provider{
    appearance:none; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:14.5px;
    padding:12px 18px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--card); color:var(--ink); display:inline-flex; gap:9px; align-items:center;
  }
  .provider:hover{border-color:var(--accent); background:var(--accent-wash);}
  .provider:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .medrow .medgrid{display:flex; gap:12px; padding:16px 18px; align-items:flex-start;}
  .medrow .medinfo{flex:1; min-width:0;}
  .medrow .name{font-family:var(--serif); font-size:19px; font-weight:600; line-height:1.2;}
  .medrow .datastrip{margin-top:6px;}
  .mednote{margin-top:10px;}
  .mednote p{margin:0 0 4px; font-size:14px; color:var(--ink-soft); font-style:italic;}
  .mednote textarea{
    width:100%; font-family:var(--sans); font-size:14.5px; padding:10px 12px;
    border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--ink);
    resize:vertical; min-height:64px;
  }
  .mednote textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash);}
  .notebtns{display:flex; gap:8px; margin-top:8px;}
  .cab-tools{display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-top:18px;}

  /* ---------- Cabinet Scan (Phase 3) ---------- */
  .scan-summary{
    border-radius:var(--radius); border:1px solid var(--line); box-shadow:var(--shadow);
    padding:16px 18px; margin:18px 0; background:var(--card);
  }
  .scan-summary .headline{font-family:var(--serif); font-size:20px; font-weight:600; margin:2px 0 0;}
  .scan-summary .counts{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
  .scan-summary .count-pill{font-family:var(--mono); font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:20px;}
  .cpill-major{background:var(--major-bg); color:var(--major-ink); border:1px solid var(--major-bar);}
  .cpill-mod{background:var(--mod-bg); color:var(--mod-ink); border:1px solid var(--mod-bar);}
  .cpill-minor{background:var(--minor-bg); color:var(--minor-ink); border:1px solid var(--minor-bar);}
  .cpill-note{background:var(--note-bg); color:var(--note-ink); border:1px solid var(--note-bar);}

  .cabinet-map{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0;}
  .map-chip{font-family:var(--mono); font-size:12.5px; padding:6px 11px; border-radius:20px; border:1px solid var(--line); background:var(--paper); color:var(--ink-soft);}
  .map-chip b{color:var(--ink); font-weight:600;}

  .askpharmacist{
    border-radius:var(--radius); border:1px dashed var(--accent-deep); background:var(--accent-wash);
    padding:16px 18px; margin:18px 0;
  }
  .askpharmacist h3{font-family:var(--serif); font-size:17px; font-weight:600; margin:2px 0 10px; color:var(--accent-deep);}
  .askpharmacist ol{margin:0; padding-left:20px; display:flex; flex-direction:column; gap:9px;}
  .askpharmacist li{font-size:14.5px; color:var(--ink);}

  /* ---------- "did you mean" spelling chips (Phase 4) ---------- */
  .chip-btn{
    appearance:none; cursor:pointer; font-family:var(--mono); font-size:12px;
    padding:5px 10px; margin:2px 4px 2px 0; border-radius:20px;
    border:1px solid var(--line); background:var(--card); color:var(--accent-deep);
  }
  .chip-btn:hover{border-color:var(--accent); background:var(--accent-wash);}
  .chip-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* clickable variant of the (otherwise informational) cabinet-map chip,
     used in the similar/related modal to jump straight to that drug */
  button.map-chip{cursor:pointer; appearance:none;}
  button.map-chip:hover{border-color:var(--accent); background:var(--accent-wash);}
  button.map-chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* ---------- similar & related modal (Phase 4) ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; padding:24px; z-index:1000;
  }
  .modal-box{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    width:100%; max-width:720px; max-height:85vh; overflow-y:auto; padding:22px 24px 26px;
  }
  .modal-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:14px;}
  .modal-head h2{font-family:var(--serif); font-size:21px; font-weight:600; margin:0;}

    method_source_content: `

    method_why_summary: "Why do drug interactions happen at all?",
    method_why_content: `
      <p>Every "why" explanation on this site traces back to one of a handful of recurring mechanisms. Knowing them makes the individual explanations click instead of feeling like random trivia:</p>
      <p><b>Liver-enzyme competition.</b> Your liver clears most drugs using a family of enzymes called CYP450. Some drugs block or overload a specific CYP enzyme, so anything else that relies on that same enzyme builds up in your blood instead of clearing normally — this is behind most of the "raises the level of" interactions here (statins + certain antibiotics, warfarin + certain antifungals).</p>
      <p><b>Additive (stacking) effects.</b> Two drugs that do a similar thing to your body — sedate the central nervous system, thin the blood, raise serotonin — don't just add up mildly when combined; the combined effect is often much stronger than either alone. This is why opioids + benzodiazepines, or two serotonin-raising drugs together, are treated as serious.</p>

    faq_pharmacist_content: `<p>No — never. Plainscript is a reference for understanding your medications and getting your bearings before a real conversation, not a replacement for one. A pharmacist knows your full history, your doses, and your other conditions; nothing here does.</p>`,
    faq_notfound_summary: "Why isn't my medication showing up in Decode?",
    faq_notfound_content: `<p>Decode only shows what's in the FDA's openFDA label database. Some compounded medications, very new drugs, or products sold under an unusual name may not be indexed there yet. Try the generic name if you searched a brand (or the other way around) — the "did you mean" suggestions can help if it's a spelling issue.</p>`,
    faq_current_summary: "How current is the data?",
    faq_current_content: `<p>Decode and the interaction checker's FDA-label layer are pulled live from openFDA every time you search — never cached or out of date on our end. The curated interaction, food/alcohol, and drug-class content is hand-reviewed periodically, not live-updated automatically, so it moves slower than the FDA label data itself.</p>`,
    faq_free_summary: "Is it free? Will it stay free?",
    faq_free_content: `<p>Yes, and that's the plan. Plainscript runs on free-tier infrastructure (openFDA and RxNorm are free and keyless; Supabase and Cloudflare have generous free tiers). There's no paid tier planned.</p>`,

    method_heading: "Cómo funciona esto y qué no puede hacer",
    method_source_summary: "De dónde vienen los datos",
    method_source_content: `
      <p><b>Los datos de los medicamentos</b> vienen de la <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">API de etiquetas de medicamentos de openFDA</a> de la FDA de EE. UU. — el etiquetado oficial aprobado de cada medicamento (para qué sirve, cómo funciona, efectos secundarios, nombres comerciales/genéricos, clase de medicamento).</p>
      <p><b>La coincidencia de nombres</b> usa la <a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">API RxNorm</a> del NIH/NLM, que estandariza nombres de medicamentos y tolera errores de escritura.</p>
      <p><b>La gravedad de las interacciones</b> proviene de un conjunto curado a mano de interacciones bien documentadas, cada una revisada contra la información de prescripción de la FDA y referencias clínicas estándar.</p>
      <p><b>Las explicaciones de clases de medicamentos, las interacciones con alimentos/alcohol, y las notas de sensibilidad cruzada a alergias</b> son contenido propio de Plainscript, sometido al mismo estándar que el conjunto de interacciones anterior — nunca es texto de la FDA, y siempre está etiquetado como nuestro dondequiera que aparezca.</p>
    `,
    method_safe_summary: `Por qué no hay un simple resultado de "estás a salvo"`,
    method_safe_content: `
      <p>En enero de 2024, la Biblioteca Nacional de Medicina de EE. UU. cerró su API gratuita de interacciones medicamentosas. Ya no existe una base de datos gratuita, integral y con clasificación de gravedad — las bases de datos clínicas de pago (DrugBank, Micromedex) tienen esos datos ahora.</p>
      <p>Así que esta herramienta puede confirmar una interacción que conoce, pero <b>nunca</b> puede demostrar que una combinación es segura. Un resultado de "no se encontró nada" solo significa que no estaba en nuestro conjunto curado ni en las etiquetas de la FDA que revisamos — no que los medicamentos sean seguros juntos. Por eso nunca verás una marca verde aquí. Siempre confirma con un farmacéutico.</p>
    `,
    method_why_summary: "¿Por qué ocurren las interacciones medicamentosas?",
    method_why_content: `
      <p>Cada explicación de "por qué" en este sitio se remonta a uno de un puñado de mecanismos recurrentes. Conocerlos hace que las explicaciones individuales tengan sentido, en lugar de sentirse como datos sueltos:</p>
      <p><b>Competencia de enzimas hepáticas.</b> Tu hígado elimina la mayoría de los medicamentos usando una familia de enzimas llamada CYP450. Algunos medicamentos bloquean o saturan una enzima CYP específica, así que cualquier otra cosa que dependa de esa misma enzima se acumula en tu sangre en lugar de eliminarse con normalidad — esto explica la mayoría de las interacciones de "eleva el nivel de" en este sitio (estatinas + ciertos antibióticos, warfarina + ciertos antimicóticos).</p>
      <p><b>Efectos aditivos (acumulativos).</b> Dos medicamentos que le hacen algo similar a tu cuerpo — sedar el sistema nervioso central, adelgazar la sangre, elevar la serotonina — no simplemente se suman de forma leve al combinarse; el efecto combinado suele ser mucho más fuerte que cualquiera de los dos por separado. Por eso los opioides + benzodiazepinas, o dos medicamentos que elevan la serotonina juntos, se tratan como algo serio.</p>
      <p><b>Cambios en electrolitos y en la eliminación renal.</b> Algunos pares de medicamentos empujan el mismo electrolito (como el potasio) en la misma dirección, o uno cambia qué tan rápido los riñones eliminan al otro — algo pequeño por separado, pero la combinación puede llevar un nivel demasiado alto o demasiado bajo.</p>
      <p><b>Interferencia en la absorción o en la unión a proteínas.</b> A veces una sustancia bloquea físicamente la absorción de otra, o la desplaza de las proteínas que la transportan en el torrente sanguíneo, cambiando cuánto medicamento activo hay realmente disponible.</p>
      <p>Cada interacción específica listada en este sitio indica cuál de estos mecanismos está ocurriendo en su propia línea de "Por qué" — esta sección solo conecta los puntos.</p>
    `,
    method_account_summary: "Qué pasa con los datos de mi cuenta",
    method_account_content: `<p>Iniciar sesión es opcional — Descifrar y la revisión de interacciones funcionan sin una cuenta. Si inicias sesión (para usar Mi Botiquín), lo único que se guarda son los medicamentos que elegiste guardar y las notas que escribiste, en una base de datos de <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> bajo tu ID de usuario. La seguridad a nivel de fila garantiza, a nivel de base de datos, que tus filas solo puedan ser leídas y modificadas por ti. Eliminar un medicamento borra su fila; no hay una copia aparte. Nada de tus búsquedas se guarda.</p>`,
    method_symptoms_summary: "Qué es (y qué no es) la pestaña de Síntomas",
    method_symptoms_content: `
      <p><b>No diagnostica nada.</b> No hay una lista clasificada de "causas probables", ni una puntuación de gravedad, ni una IA adivinando qué te pasa. Elegir "dolor de cabeza" y "congestión nasal" no produce una condición médica — produce las categorías generales de productos de venta libre que la gente suele usar para esos síntomas (p. ej., "analgésicos", "descongestionantes"), el mismo tipo de mapeo a nivel de libro de texto que usaría una guía de primeros auxilios.</p>
      <p>Ese mapeo de síntoma a categoría es un conjunto pequeño, curado a mano y revisado contra referencias estándar — no se inventa sobre la marcha. Los ejemplos de productos reales que se muestran en cada categoría se obtienen <b>en vivo de openFDA</b> en el momento en que buscas, igual que el resto de esta aplicación.</p>
      <p>La lista de "busca atención ahora" es una guía estándar de salud pública para emergencias, no algo calculado a partir de lo que elegiste — se muestra completa sin importar tus respuestas, porque reconocer una emergencia no debería depender de acertar un cuestionario.</p>
    `,
    method_limits_summary: "Limitaciones honestas",
    method_limits_content: `<p>El conjunto curado cubre unas pocas docenas de las interacciones más importantes, no todas. La capa de etiquetas de la FDA solo detecta interacciones que una etiqueta menciona directamente, y las etiquetas varían en su nivel de detalle. Las dosis, tus condiciones de salud, la alimentación y los suplementos importan y no se consideran aquí. Esta es una herramienta de aprendizaje, no un sistema de decisión clínica.</p>`,

    faq_heading: "Preguntas frecuentes",
    faq_pharmacist_summary: "¿Esto sustituye a mi farmacéutico o médico?",
    faq_pharmacist_content: `<p>No — nunca. Plainscript es una referencia para entender tus medicamentos y orientarte antes de una conversación real, no un reemplazo de esa conversación. Un farmacéutico conoce tu historial completo, tus dosis y tus otras condiciones; nada aquí lo sabe.</p>`,
    faq_notfound_summary: "¿Por qué mi medicamento no aparece en Descifrar?",
    faq_notfound_content: `<p>Descifrar solo muestra lo que está en la base de datos de etiquetas openFDA de la FDA. Algunos medicamentos preparados por fórmula magistral, medicamentos muy nuevos, o productos vendidos con un nombre poco común, pueden no estar indexados todavía. Prueba el nombre genérico si buscaste una marca (o al revés) — las sugerencias de "quisiste decir" pueden ayudar si es un problema de ortografía.</p>`,
    faq_current_summary: "¿Qué tan actualizados están los datos?",
    faq_current_content: `<p>Descifrar y la capa de etiquetas de la FDA del revisor de interacciones se obtienen en vivo de openFDA cada vez que buscas — nunca están guardados en caché ni desactualizados de nuestro lado. El contenido curado de interacciones, alimentos/alcohol, y clases de medicamentos se revisa periódicamente a mano, no se actualiza en vivo automáticamente, así que avanza más lento que los datos de las etiquetas de la FDA.</p>`,
    faq_free_summary: "¿Es gratis? ¿Seguirá siendo gratis?",
    faq_free_content: `<p>Sí, y ese es el plan. Plainscript funciona con infraestructura de nivel gratuito (openFDA y RxNorm son gratuitos y no requieren clave; Supabase y Cloudflare tienen niveles gratuitos generosos). No hay ningún nivel de pago planeado.</p>`,
    faq_caregiver_summary: "¿Puedo usar esto para alguien que cuido, no solo para mí?",
    faq_caregiver_content: `<p>Sí — Descifrar, el revisor de interacciones, y la pestaña de Síntomas funcionan para los medicamentos de cualquier persona, con o sin sesión iniciada. Mi Botiquín está diseñado alrededor de una sola cuenta con sesión iniciada y todavía no separa las listas de medicamentos de varias personas — si estás manejando los medicamentos de más de una persona, ten esto en cuenta por ahora.</p>`,
    faq_error_summary: "¿Qué pasa si encuentro algo incorrecto?",
    faq_error_content: `<p>Por favor, avísanos — mira "Reportar un error" en el pie de página. Cada dato curado aquí (interacciones, explicaciones de clases de medicamentos, notas de alimentos/alcohol) se revisa contra referencias estándar, pero los errores siguen siendo posibles, y una herramienta que no se puede corregir no es confiable. Las correcciones se revisan y se corrigen, no se ignoran.</p>`,

    footer_text: `Plainscript · proyecto educativo · datos de openFDA y NIH RxNorm · no afiliado con la FDA ni el NIH · Este producto usa datos disponibles públicamente de la Biblioteca Nacional de Medicina de EE. UU. y de la Administración de Alimentos y Medicamentos de EE. UU., pero no está respaldado por ellas.`,

    method_source_content: `
      <p><b>药物信息</b>来自美国FDA的<a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">openFDA药品标签API</a>——每种药物实际获批的标签内容（治疗什么、作用机制、副作用、商品名/通用名、药物类别）。</p>
      <p><b>名称匹配</b>使用NIH/NLM的<a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">RxNorm API</a>，它能规范药物名称并容忍拼写错误。</p>
      <p><b>相互作用的严重程度</b>来自一套人工整理、有充分记录的相互作用集合，每一条都对照FDA处方信息和标准临床参考文献进行了审核。</p>
      <p><b>药物类别说明、食物/酒精相互作用，以及过敏交叉敏感性提示</b>是Plainscript自己整理的内容，遵循与上述相互作用集合相同的标准——绝不是FDA原文，且在任何出现的地方都会明确标注为我们自己的内容。</p>
    `,
    method_safe_summary: `为什么没有一个简单的"你很安全"的结果`,
    method_safe_content: `
      <p>2024年1月，美国国立医学图书馆关闭了其免费的药物相互作用API。目前已不存在免费、全面、带严重程度分级的相互作用数据库——这类数据现在掌握在付费的临床数据库（DrugBank、Micromedex）手中。</p>
      <p>因此，这个工具可以确认它已知的某个相互作用，但<b>永远无法</b>证明某种组合是安全的。"未找到结果"只意味着它不在我们整理的集合中，也没有在我们查过的FDA标签中找到——并不代表这些药物一起使用是安全的。这就是为什么你在这里永远不会看到绿色的对勾。请务必咨询药师确认。</p>
    `,
    method_why_summary: "药物相互作用究竟为什么会发生？",
    method_why_content: `
      <p>本网站上每一条"为什么"的解释，都可以追溯到几种反复出现的机制之一。了解这些机制，能让每一条具体解释变得有意义，而不只是零散的知识点：</p>
      <p><b>肝酶竞争。</b>你的肝脏使用一类叫做CYP450的酶来清除大多数药物。某些药物会阻断或占用某种特定的CYP酶，导致依赖同一种酶的其他药物无法正常清除，反而在血液中累积——本站大多数"会提高……水平"的相互作用都源于此（他汀类药物+某些抗生素、华法林+某些抗真菌药）。</p>
      <p><b>叠加（累积）效应。</b>两种对身体产生类似作用的药物——抑制中枢神经系统、稀释血液、提高血清素水平——合并使用时并不会只是温和地相加；合并后的效应往往比单独使用任何一种都强得多。这就是为什么阿片类药物+苯二氮䓬类药物，或两种提高血清素的药物合用，都被视为严重情况。</p>
      <p><b>电解质和肾脏清除变化。</b>有些药物组合会把同一种电解质（比如钾）往同一个方向推，或者其中一种会改变肾脏清除另一种的速度——单独看影响很小，但组合起来可能使水平过高或过低。</p>
      <p><b>吸收或蛋白结合干扰。</b>有时一种物质会从物理上阻碍另一种物质被吸收，或将其从血液中负责运输的蛋白质上替换下来，从而改变实际可用的有效药物量。</p>
      <p>本站列出的每一条具体相互作用，都会在自己的"为什么"这一行说明实际发生的是上述哪种机制——这一部分只是把这些点连起来。</p>
    `,
    method_account_summary: "我的账户数据会怎样处理",
    method_account_content: `<p>登录是可选的——解读功能和相互作用检查无需账户即可使用。如果你登录（是为了使用"我的药柜"），系统只会保存你选择保存的药物和你输入的备注，存放在<a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a>数据库中，与你的用户ID绑定。行级安全策略在数据库层面确保你的数据只能被你自己读取和修改。删除一种药物会删除对应的记录，不会留有另外的副本。你的搜索记录不会被保存。</p>`,
    method_symptoms_summary: "「症状」标签页到底是什么（以及不是什么）",
    method_symptoms_content: `
      <p><b>它不诊断任何东西。</b>这里没有"可能病因"的排序列表，没有严重程度评分，也没有AI猜测你到底怎么了。选择"头痛"和"流鼻涕"并不会得出某种病症——它只会给出人们通常针对这些症状使用的非处方产品的大类（例如"止痛药"、"减充血剂"），这和急救指南里的那种教科书级别的对应关系是一样的。</p>
      <p>这种"症状对应类别"的映射是一个经过对照标准参考文献审核的小型人工整理集合——不是临时编造的。每个类别下展示的实际产品示例，都是你搜索的那一刻<b>从openFDA实时获取</b>的，和本应用其他部分的做法完全一样。</p>
      <p>"立即就医"清单是标准的公共卫生紧急指南，并不是根据你的选择计算出来的——无论你选了什么，它都会完整显示，因为识别紧急情况不应该取决于你有没有答对一份问卷。</p>
    `,
    method_limits_summary: "如实说明局限性",
    method_limits_content: `<p>整理的相互作用集合只涵盖了几十种最重要的相互作用，并非全部。FDA标签这一层只能捕捉到标签中直接提及的相互作用，而不同标签的详略程度也不一样。剂量、你的健康状况、饮食和补充剂都会产生影响，但本工具都没有考虑这些因素。这是一个学习工具，不是临床决策系统。</p>`,

    faq_heading: "常见问题",
    faq_pharmacist_summary: "这能替代我的药师或医生吗？",
    faq_pharmacist_content: `<p>不能——绝对不能。Plainscript是帮助你了解自己所用药物、在真正对话之前做好心理准备的参考工具，而不是替代那次对话。药师了解你的完整病史、用药剂量和其他病情；而这里的任何内容都不了解这些。</p>`,
    faq_notfound_summary: "为什么我的药物在「解读」里查不到？",
    faq_notfound_content: `<p>"解读"功能只显示FDA openFDA标签数据库中收录的内容。有些配制药物、非常新的药物，或以不常见名称销售的产品，可能尚未被收录。如果你搜索的是商品名，可以试试通用名（反之亦然）——如果是拼写问题，"你是不是想找"的建议可能会有帮助。</p>`,
    faq_current_summary: "数据的时效性如何？",
    faq_current_content: `<p>"解读"功能和相互作用检查器中的FDA标签层，都是你每次搜索时从openFDA实时获取的——在我们这边绝不会被缓存或过期。而经过人工整理的相互作用、食物/酒精，以及药物类别相关内容，是定期人工审核的，不会自动实时更新，所以更新速度会比FDA标签数据本身慢一些。</p>`,
    faq_free_summary: "这是免费的吗？以后会一直免费吗？",
    faq_free_content: `<p>是的，而且这就是我们的计划。Plainscript运行在免费层级的基础设施上（openFDA和RxNorm是免费且无需密钥的；Supabase和Cloudflare都提供慷慨的免费额度）。目前没有计划推出付费版本。</p>`,
    faq_caregiver_summary: "我可以用它来照顾别人，而不只是我自己吗？",
    faq_caregiver_content: `<p>可以——"解读"、相互作用检查器，以及「症状」标签页，都可以用于任何人的药物，无论是否登录。"我的药柜"目前是围绕单一登录账户设计的，还不能区分多个人的用药清单——如果你在同时管理多个人的用药，请先留意这一点。</p>`,

    faq_error_content: `<p>请告诉我们——见页脚的"报告错误"链接。这里的每一条整理内容（相互作用、药物类别说明、食物/酒精提示）都对照标准参考文献审核过，但仍然可能出错，而一个无法被纠正的工具是不值得信赖的。收到的更正会被审核并修复，而不是被忽视。</p>`,

    method_source_content: `
      <p><b>Thông tin thuốc</b> đến từ <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">API nhãn thuốc openFDA</a> của FDA Hoa Kỳ — nội dung nhãn được phê duyệt chính thức cho từng loại thuốc (điều trị bệnh gì, cơ chế hoạt động, tác dụng phụ, tên biệt dược/tên gốc, nhóm thuốc).</p>
      <p><b>Việc khớp tên thuốc</b> sử dụng <a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">API RxNorm</a> của NIH/NLM, giúp chuẩn hóa tên thuốc và chấp nhận lỗi chính tả.</p>
      <p><b>Mức độ nghiêm trọng của tương tác</b> đến từ một bộ dữ liệu được biên soạn thủ công, có nhiều dẫn chứng, mỗi mục đều được rà soát đối chiếu với thông tin kê đơn của FDA và các tài liệu tham khảo lâm sàng tiêu chuẩn.</p>

    method_safe_summary: `Tại sao không có kết quả đơn giản là "bạn an toàn"`,
    method_safe_content: `
      <p>Vào tháng 1 năm 2024, Thư viện Y khoa Quốc gia Hoa Kỳ đã đóng API tương tác thuốc miễn phí của mình. Hiện không còn cơ sở dữ liệu tương tác thuốc miễn phí, toàn diện, có phân loại mức độ nghiêm trọng — các cơ sở dữ liệu lâm sàng trả phí (DrugBank, Micromedex) hiện đang nắm giữ dữ liệu đó.</p>
      <p>Vì vậy, công cụ này có thể xác nhận một tương tác mà nó đã biết, nhưng <b>không bao giờ</b> có thể chứng minh rằng một sự kết hợp nào đó là an toàn. Kết quả "không tìm thấy" chỉ có nghĩa là nó không nằm trong bộ dữ liệu đã biên soạn hoặc trong các nhãn thuốc FDA mà chúng tôi đã kiểm tra — không có nghĩa là các loại thuốc đó an toàn khi dùng chung. Đó là lý do bạn sẽ không bao giờ thấy dấu tích xanh ở đây. Luôn xác nhận với dược sĩ.</p>
    `,
    method_why_summary: "Vì sao tương tác thuốc lại xảy ra?",
    method_why_content: `
      <p>Mỗi lời giải thích "vì sao" trên trang này đều bắt nguồn từ một trong số ít cơ chế lặp đi lặp lại. Hiểu được những cơ chế này sẽ giúp từng lời giải thích trở nên hợp lý, thay vì chỉ là những thông tin rời rạc:</p>
      <p><b>Cạnh tranh enzyme gan.</b> Gan của bạn đào thải phần lớn thuốc bằng một nhóm enzyme gọi là CYP450. Một số thuốc sẽ ức chế hoặc làm quá tải một enzyme CYP cụ thể, khiến bất kỳ thuốc nào khác phụ thuộc vào enzyme đó bị tích tụ trong máu thay vì được đào thải bình thường — đây là nguyên nhân của phần lớn các tương tác "làm tăng nồng độ" ở đây (statin + một số kháng sinh, warfarin + một số thuốc kháng nấm).</p>
      <p><b>Hiệu ứng cộng dồn (chồng chất).</b> Hai loại thuốc có tác dụng tương tự lên cơ thể — an thần hệ thần kinh trung ương, làm loãng máu, tăng serotonin — không chỉ đơn giản cộng lại một cách nhẹ nhàng khi kết hợp; hiệu ứng kết hợp thường mạnh hơn nhiều so với dùng riêng lẻ. Đây là lý do vì sao opioid + benzodiazepine, hoặc hai loại thuốc làm tăng serotonin dùng cùng nhau, đều được coi là nghiêm trọng.</p>
      <p><b>Thay đổi điện giải và đào thải qua thận.</b> Một số cặp thuốc đều đẩy cùng một chất điện giải (như kali) theo cùng một hướng, hoặc một loại thay đổi tốc độ thận đào thải loại kia — mỗi loại ảnh hưởng nhỏ riêng lẻ, nhưng kết hợp lại có thể đẩy mức điện giải lên quá cao hoặc xuống quá thấp.</p>
      <p><b>Cản trở hấp thu hoặc liên kết protein.</b> Đôi khi một chất sẽ cản trở về mặt vật lý việc hấp thu chất khác, hoặc đẩy nó ra khỏi các protein vận chuyển trong máu, làm thay đổi lượng thuốc thực sự có hoạt tính.</p>
      <p>Mỗi tương tác cụ thể được liệt kê trên trang này đều nêu rõ cơ chế nào trong số này đang thực sự xảy ra, trong chính dòng "Vì sao" của nó — phần này chỉ là bản tổng hợp kết nối các điểm lại với nhau.</p>
    `,
    method_account_summary: "Chuyện gì xảy ra với dữ liệu tài khoản của tôi",
    method_account_content: `<p>Đăng nhập là tùy chọn — chức năng Giải mã và kiểm tra tương tác hoạt động mà không cần tài khoản. Nếu bạn đăng nhập (để dùng Tủ thuốc của tôi), thứ duy nhất được lưu trữ là các loại thuốc bạn chọn lưu và ghi chú bạn đã nhập, trong cơ sở dữ liệu <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> gắn với ID người dùng của bạn. Bảo mật cấp hàng đảm bảo, ở cấp cơ sở dữ liệu, rằng chỉ bạn mới có thể đọc và ghi các hàng dữ liệu của mình. Xóa một loại thuốc sẽ xóa hàng dữ liệu tương ứng; không có bản sao nào khác. Không có thông tin tìm kiếm nào của bạn được lưu lại.</p>`,
    method_symptoms_summary: "Tab Triệu chứng thực sự là gì (và không phải là gì)",
    method_symptoms_content: `
      <p><b>Nó không chẩn đoán bất cứ điều gì.</b> Không có danh sách xếp hạng "nguyên nhân có thể xảy ra", không có điểm số mức độ nghiêm trọng, và không có AI đoán xem bạn bị làm sao. Chọn "đau đầu" và "sổ mũi" không tạo ra một tình trạng bệnh — nó chỉ tạo ra các nhóm thuốc không kê đơn nói chung mà mọi người thường dùng cho những triệu chứng đó (ví dụ: "thuốc giảm đau", "thuốc thông mũi"), giống loại đối chiếu ở mức sách giáo khoa được dùng trong hướng dẫn sơ cứu.</p>
      <p>Việc đối chiếu triệu chứng với nhóm thuốc này là một bộ dữ liệu nhỏ, được biên soạn thủ công và rà soát đối chiếu với các tài liệu tham khảo tiêu chuẩn — không phải tự đặt ra tùy tiện. Các ví dụ sản phẩm thực tế hiển thị dưới mỗi nhóm đều được lấy <b>trực tiếp từ openFDA</b> ngay tại thời điểm bạn tìm kiếm, giống như mọi phần khác của ứng dụng này.</p>
      <p>Danh sách "hãy đi khám ngay" là hướng dẫn khẩn cấp y tế công cộng tiêu chuẩn, không phải thứ được tính toán từ những gì bạn chọn — nó luôn hiển thị đầy đủ bất kể câu trả lời của bạn, vì việc nhận biết một tình huống khẩn cấp không nên phụ thuộc vào việc bạn trả lời đúng một bảng câu hỏi.</p>
    `,
    method_limits_summary: "Những hạn chế được nói thẳng",
    method_limits_content: `<p>Bộ dữ liệu đã biên soạn chỉ bao gồm vài chục tương tác quan trọng nhất, không phải tất cả. Lớp dữ liệu nhãn FDA chỉ phát hiện được các tương tác mà nhãn thuốc nêu trực tiếp, và các nhãn thuốc khác nhau về mức độ chi tiết. Liều lượng, tình trạng sức khỏe của bạn, thực phẩm, và thực phẩm chức năng đều quan trọng nhưng không được xem xét ở đây. Đây là một công cụ học tập, không phải hệ thống ra quyết định lâm sàng.</p>`,

    faq_heading: "Câu hỏi thường gặp",
    faq_pharmacist_summary: "Công cụ này có thay thế được dược sĩ hoặc bác sĩ của tôi không?",
    faq_pharmacist_content: `<p>Không — không bao giờ. Plainscript là một công cụ tham khảo để giúp bạn hiểu về thuốc của mình và chuẩn bị tâm lý trước một cuộc trò chuyện thực sự, chứ không phải là sự thay thế cho cuộc trò chuyện đó. Dược sĩ biết toàn bộ tiền sử bệnh, liều lượng, và các tình trạng khác của bạn; không có gì ở đây biết được điều đó.</p>`,
    faq_notfound_summary: "Vì sao thuốc của tôi không hiện ra trong mục Giải mã?",
    faq_notfound_content: `<p>Giải mã chỉ hiển thị những gì có trong cơ sở dữ liệu nhãn thuốc openFDA của FDA. Một số thuốc pha chế theo đơn, thuốc rất mới, hoặc sản phẩm bán dưới tên không phổ biến có thể chưa được đưa vào. Hãy thử tên gốc nếu bạn tìm bằng tên biệt dược (hoặc ngược lại) — gợi ý "có phải bạn muốn tìm" có thể hữu ích nếu đó là vấn đề chính tả.</p>`,
    faq_current_summary: "Dữ liệu này cập nhật đến mức nào?",
    faq_current_content: `<p>Chức năng Giải mã và lớp dữ liệu nhãn FDA của công cụ kiểm tra tương tác được lấy trực tiếp từ openFDA mỗi khi bạn tìm kiếm — không bao giờ được lưu đệm hay lỗi thời ở phía chúng tôi. Nội dung tương tác, thực phẩm/rượu, và nhóm thuốc đã biên soạn được rà soát thủ công định kỳ, không tự động cập nhật trực tiếp, nên sẽ chậm hơn so với chính dữ liệu nhãn FDA.</p>`,
    faq_free_summary: "Công cụ này có miễn phí không? Liệu có mãi miễn phí không?",
    faq_free_content: `<p>Có, và đó là kế hoạch. Plainscript vận hành trên hạ tầng miễn phí (openFDA và RxNorm miễn phí và không cần khóa API; Supabase và Cloudflare có hạn mức miễn phí hào phóng). Không có kế hoạch nào cho gói trả phí.</p>`,
    faq_caregiver_summary: "Tôi có thể dùng công cụ này để chăm sóc người khác, không chỉ cho bản thân không?",
    faq_caregiver_content: `<p>Có — Giải mã, công cụ kiểm tra tương tác, và tab Triệu chứng đều hoạt động cho thuốc của bất kỳ ai, dù đăng nhập hay không. Tủ thuốc của tôi được thiết kế xoay quanh một tài khoản đăng nhập duy nhất và chưa thể phân tách danh sách thuốc của nhiều người — nếu bạn đang quản lý thuốc cho nhiều hơn một người, hãy lưu ý điều này.</p>`,
    faq_error_summary: "Nếu tôi phát hiện điều gì đó sai thì sao?",
    faq_error_content: `<p>Hãy cho chúng tôi biết — xem mục "Báo lỗi" ở chân trang bên dưới. Mọi thông tin đã biên soạn ở đây (tương tác, giải thích nhóm thuốc, lưu ý thực phẩm/rượu) đều được rà soát đối chiếu với các tài liệu tham khảo tiêu chuẩn, nhưng sai sót vẫn có thể xảy ra, và một công cụ không thể sửa lỗi thì không đáng tin cậy. Các phản hồi sẽ được xem xét và sửa chữa, không bị bỏ qua.</p>`,

    method_source_content: `
      <p><b>حقائق الأدوية</b> تأتي من <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">واجهة برمجة تطبيقات ملصقات الأدوية openFDA</a> التابعة لإدارة الغذاء والدواء الأمريكية (FDA) — الملصق المعتمد الفعلي لكل دواء (ما يعالجه، كيف يعمل، آثاره الجانبية، الأسماء التجارية والعلمية، فئة الدواء).</p>

      <p><b>شروحات فئات الأدوية، وملاحظات تفاعل الطعام/الكحول، وملاحظات الحساسية المتبادلة</b> هي محتوى Plainscript الخاص المُعدّ بعناية، وتخضع لنفس معايير مجموعة التفاعلات أعلاه — وليست أبدًا نص FDA، ويُشار إليها دائمًا كمحتوى خاص بنا أينما ظهرت.</p>

    method_safe_summary: `لماذا لا توجد نتيجة بسيطة تقول "أنت آمن"`,
    method_safe_content: `
      <p>في يناير 2024 أوقفت المكتبة الوطنية الأمريكية للطب واجهتها المجانية لتفاعلات الأدوية. لم تعد هناك قاعدة بيانات مجانية وشاملة ومصنّفة حسب الشدة للتفاعلات — قواعد البيانات السريرية المدفوعة (DrugBank وMicromedex) هي من تملك هذه البيانات الآن.</p>
      <p>لذلك يمكن لهذه الأداة تأكيد تفاعل تعرفه، لكنها لا تستطيع <b>أبدًا</b> إثبات أن مزيجًا ما آمن. نتيجة "لم يُعثر على شيء" تعني فقط أنه لم يكن ضمن مجموعتنا المُعدّة أو ملصقات FDA التي راجعناها — وليس أن الأدوية آمنة معًا. لهذا السبب لن ترى أبدًا علامة صح خضراء هنا. تأكد دائمًا من الصيدلي.</p>
    `,
    method_why_summary: "لماذا تحدث تفاعلات الأدوية أصلًا؟",
    method_why_content: `
      <p>كل شرح "لماذا" في هذا الموقع يعود إلى واحدة من عدد قليل من الآليات المتكررة. معرفتها تجعل الشروحات الفردية مفهومة بدلًا من أن تبدو معلومات عشوائية:</p>
      <p><b>التنافس على إنزيمات الكبد.</b> يُخلّص كبدك معظم الأدوية باستخدام عائلة من الإنزيمات تُدعى CYP450. بعض الأدوية تُثبّط أو تُحمّل إنزيم CYP معينًا بشكل زائد، فيتراكم أي دواء آخر يعتمد على نفس الإنزيم في دمك بدلًا من أن يُخلّص بشكل طبيعي — وهذا وراء معظم تفاعلات "يرفع مستوى" هنا (الستاتينات + بعض المضادات الفطرية، الوارفارين + بعض مضادات الفطريات).</p>
      <p><b>التأثيرات التراكمية (المتراكبة).</b> دواءان يفعلان شيئًا مشابهًا لجسمك — تهدئة الجهاز العصبي المركزي، تسييل الدم، رفع السيروتونين — لا يُضافان بشكل بسيط عند دمجهما؛ التأثير المشترك غالبًا ما يكون أقوى بكثير من كل منهما بمفرده. لهذا يُنظر إلى دمج المواد الأفيونية مع البنزوديازيبينات، أو دواءين يرفعان السيروتونين معًا، على أنه أمر خطير.</p>
      <p><b>تحولات الإلكتروليتات وتصفية الكلى.</b> بعض أزواج الأدوية تدفع نفس الإلكتروليت (مثل البوتاسيوم) في نفس الاتجاه، أو يُغيّر أحدها سرعة تخلص الكلى من الآخر — تأثير صغير لكل منهما بمفرده، لكن الجمع بينهما قد يدفع المستوى إلى الارتفاع أو الانخفاض الزائد.</p>
      <p><b>تداخل الامتصاص أو الارتباط بالبروتين.</b> أحيانًا تمنع مادة أخرى ماديًا امتصاص مادة أخرى، أو تُزيحها عن البروتينات التي تحملها عبر مجرى الدم، مما يغيّر كمية الدواء الفعّال المتاحة فعليًا.</p>
      <p>كل تفاعل محدد مذكور في هذا الموقع يُسمّي أيًا من هذه الآليات يحدث فعليًا في سطر "لماذا" الخاص به — هذا القسم هو فقط نسخة ربط النقاط.</p>
    `,
    method_account_summary: "ماذا يحدث لبيانات حسابي",
    method_account_content: `<p>تسجيل الدخول اختياري — فك الرموز والتحقق من التفاعل يعملان دون حساب. إذا سجّلت الدخول (لاستخدام خزانتي)، فإن الأشياء الوحيدة المخزّنة هي الأدوية التي اخترت حفظها وأي ملاحظات كتبتها، في قاعدة بيانات <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> تحت معرّف المستخدم الخاص بك. يفرض أمان مستوى الصفوف، على مستوى قاعدة البيانات، أن صفوفك قابلة للقراءة والكتابة من قبلك أنت فقط. حذف دواء يحذف صفه؛ لا توجد نسخة منفصلة. لا شيء من عمليات بحثك يُخزَّن.</p>`,
    method_symptoms_summary: "ما هو قسم الأعراض فعليًا (وما ليس كذلك)",
    method_symptoms_content: `
      <p><b>هو لا يشخّص أي شيء.</b> لا توجد قائمة مرتبة بـ"الأسباب المحتملة"، ولا درجة شدة، ولا ذكاء اصطناعي يخمّن ما خطبك. اختيار "صداع" و"سيلان الأنف" لا ينتج عنه حالة مرضية — بل ينتج عنه الفئات العامة من المنتجات التي تُصرف دون وصفة طبية والتي يستخدمها الناس عادةً لهذه الأعراض (مثل "مسكنات الألم"، "مزيلات الاحتقان")، وهو نوع من التصنيف على مستوى الكتب المدرسية، مثل دليل الإسعافات الأولية.</p>
      <p>هذا التصنيف من الأعراض إلى الفئات هو مجموعة صغيرة مُعدّة يدويًا وتمت مراجعتها مقابل مراجع قياسية — وليس مُخترَعًا في اللحظة. أما أمثلة المنتجات الفعلية المعروضة تحت كل فئة فتُسحب <b>مباشرة من openFDA</b> لحظة بحثك، بنفس الطريقة التي يعمل بها كل جزء آخر من هذا التطبيق.</p>
      <p>قائمة "اطلب الرعاية فورًا" هي إرشاد طوارئ صحي عام قياسي، وليست شيئًا يُحسب بناءً على ما اخترته — تُعرض كاملة بغض النظر عن إجاباتك، لأن التعرف على حالة طارئة لا ينبغي أن يعتمد على الإجابة الصحيحة على استبيان.</p>
    `,
    method_limits_summary: "حدود صادقة",
    method_limits_content: `<p>تغطي المجموعة المُعدّة يدويًا بضع عشرات من أهم التفاعلات، وليس جميعها. طبقة ملصق FDA تلتقط فقط التفاعلات التي يذكرها الملصق مباشرة، وتتفاوت الملصقات في التفاصيل. الجرعات، وحالتك الصحية، والطعام، والمكملات كلها مهمة ولا تؤخذ بعين الاعتبار هنا. هذه أداة تعليمية، وليست نظام قرار سريري.</p>`,

    method_heading: "Comment cela fonctionne et ce que ça ne peut pas faire",
    method_source_summary: "D'où viennent les données",
    method_source_content: `
      <p><b>Les données sur les médicaments</b> proviennent de l'<a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">API des étiquettes de médicaments openFDA</a> de la FDA américaine — l'étiquetage réellement approuvé pour chaque médicament (ce qu'il traite, comment il agit, ses effets secondaires, ses noms de marque/génériques, sa classe thérapeutique).</p>
      <p><b>La correspondance des noms</b> utilise l'<a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">API RxNorm</a> du NIH/NLM, qui normalise les noms de médicaments et tolère les fautes de frappe.</p>
      <p><b>La gravité des interactions</b> provient d'un ensemble d'interactions bien documentées, sélectionné à la main, chacune vérifiée par rapport aux informations de prescription de la FDA et aux références cliniques standard.</p>
      <p><b>Les explications sur les classes de médicaments, les interactions alimentaires/alcool, et les notes de sensibilité croisée aux allergies</b> sont le contenu propre de Plainscript, conçu selon les mêmes normes que l'ensemble d'interactions ci-dessus — jamais du texte de la FDA, toujours indiqué comme notre propre contenu partout où il apparaît.</p>
    `,
    method_safe_summary: `Pourquoi il n'y a pas de résultat simple « vous êtes en sécurité »`,
    method_safe_content: `
      <p>En janvier 2024, la Bibliothèque nationale de médecine des États-Unis a fermé son API gratuite sur les interactions médicamenteuses. Il n'existe plus de base de données gratuite, complète, et classée par gravité pour les interactions — les bases de données cliniques payantes (DrugBank, Micromedex) détiennent désormais ces informations.</p>
      <p>Cet outil peut donc confirmer une interaction qu'il connaît, mais il ne peut <b>jamais</b> prouver qu'une combinaison est sûre. Un résultat « rien trouvé » signifie seulement que ce n'était pas dans notre ensemble sélectionné ou dans les étiquettes de la FDA consultées — pas que les médicaments sont sûrs ensemble. C'est pourquoi vous ne verrez jamais de coche verte ici. Confirmez toujours avec un pharmacien.</p>
    `,
    method_why_summary: "Pourquoi les interactions médicamenteuses se produisent-elles ?",
    method_why_content: `
      <p>Chaque explication du « pourquoi » sur ce site remonte à l'un d'une poignée de mécanismes récurrents. Les connaître rend les explications individuelles compréhensibles plutôt que de sembler être des faits aléatoires :</p>
      <p><b>Compétition des enzymes hépatiques.</b> Votre foie élimine la plupart des médicaments grâce à une famille d'enzymes appelée CYP450. Certains médicaments bloquent ou surchargent une enzyme CYP spécifique, de sorte que tout autre médicament dépendant de cette même enzyme s'accumule dans votre sang au lieu de se dégrader normalement — c'est à l'origine de la plupart des interactions « augmente le niveau de » mentionnées ici (statines + certains antibiotiques, warfarine + certains antifongiques).</p>
      <p><b>Effets additifs (cumulatifs).</b> Deux médicaments qui font une chose similaire à votre corps — sédation du système nerveux central, fluidification du sang, augmentation de la sérotonine — ne s'ajoutent pas simplement légèrement lorsqu'ils sont combinés ; l'effet combiné est souvent bien plus fort que chacun pris seul. C'est pourquoi les opioïdes + benzodiazépines, ou deux médicaments augmentant la sérotonine ensemble, sont traités comme sérieux.</p>
      <p><b>Changements d'électrolytes et de clairance rénale.</b> Certaines paires de médicaments poussent toutes deux le même électrolyte (comme le potassium) dans la même direction, ou l'un modifie la vitesse à laquelle les reins éliminent l'autre — un effet minime individuellement, mais la combinaison peut faire monter ou descendre un taux de manière excessive.</p>
      <p><b>Interférence d'absorption ou de liaison aux protéines.</b> Parfois, une substance bloque physiquement l'absorption d'une autre, ou la déloge des protéines qui la transportent dans le sang, changeant ainsi la quantité de médicament actif réellement disponible.</p>
      <p>Chaque interaction spécifique mentionnée sur ce site indique lequel de ces mécanismes se produit réellement dans sa propre ligne « Pourquoi » — cette section n'est que la version qui relie les points.</p>
    `,
    method_account_summary: "Ce qu'il advient des données de mon compte",
    method_account_content: `<p>La connexion est facultative — Décoder et la vérification d'interaction fonctionnent sans compte. Si vous vous connectez (pour utiliser Ma pharmacie), les seules choses stockées sont les médicaments que vous avez choisi d'enregistrer et les notes que vous avez tapées, dans une base de données <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> sous votre identifiant utilisateur. La sécurité au niveau des lignes garantit, au niveau de la base de données, que vos lignes ne sont lisibles et modifiables que par vous. Supprimer un médicament supprime sa ligne ; il n'y a pas de copie séparée. Rien de vos recherches n'est stocké.</p>`,
    method_symptoms_summary: "Ce qu'est réellement (et n'est pas) l'onglet Symptômes",
    method_symptoms_content: `
      <p><b>Il ne diagnostique rien.</b> Il n'y a pas de liste classée de « causes probables », pas de score de gravité, et pas d'IA qui devine ce qui ne va pas chez vous. Choisir « mal de tête » et « nez qui coule » ne produit pas une condition médicale — cela produit les catégories générales de produits en vente libre que les gens utilisent couramment pour ces symptômes (par exemple « analgésiques », « décongestionnants »), le même type de correspondance de niveau manuel scolaire utilisé pour un guide de premiers secours.</p>
      <p>Cette correspondance symptôme-catégorie est un petit ensemble sélectionné à la main, vérifié par rapport à des références standard — pas inventé à la volée. Les exemples de produits réels affichés sous chaque catégorie sont extraits <b>en direct depuis openFDA</b> au moment de votre recherche, de la même manière que fonctionne chaque autre partie de cette application.</p>
      <p>La liste « consultez immédiatement » est un conseil d'urgence de santé publique standard, pas quelque chose calculé à partir de vos choix — elle s'affiche en entier quelles que soient vos réponses, car reconnaître une urgence ne devrait pas dépendre du bon remplissage d'un questionnaire.</p>
    `,
    method_limits_summary: "Limites honnêtes",
    method_limits_content: `<p>L'ensemble sélectionné couvre quelques dizaines des interactions les plus importantes, pas toutes. La couche des étiquettes de la FDA ne détecte que les interactions qu'une étiquette mentionne directement, et les étiquettes varient en détail. Les doses, votre état de santé, l'alimentation, et les compléments comptent tous et ne sont pas pris en compte ici. C'est un outil d'apprentissage, pas un système de décision clinique.</p>`,

    faq_heading: "Questions fréquentes",
    faq_pharmacist_summary: "Ceci remplace-t-il mon pharmacien ou mon médecin ?",
    faq_pharmacist_content: `<p>Non — jamais. Plainscript est une référence pour comprendre vos médicaments et vous situer avant une vraie conversation, pas un remplacement pour celle-ci. Un pharmacien connaît tout votre historique, vos doses, et vos autres conditions ; rien ici ne le sait.</p>`,
    faq_notfound_summary: "Pourquoi mon médicament n'apparaît-il pas dans Décoder ?",
    faq_notfound_content: `<p>Décoder n'affiche que ce qui se trouve dans la base de données des étiquettes openFDA de la FDA. Certains médicaments composés, médicaments très récents, ou produits vendus sous un nom inhabituel peuvent ne pas encore y être indexés. Essayez le nom générique si vous avez cherché une marque (ou l'inverse) — les suggestions « vouliez-vous dire » peuvent aider s'il s'agit d'un problème d'orthographe.</p>`,
    faq_current_summary: "Quelle est l'actualité des données ?",
    faq_current_content: `<p>Décoder et la couche d'étiquette FDA du vérificateur d'interactions sont extraits en direct depuis openFDA à chaque recherche — jamais mis en cache ni obsolètes de notre côté. Le contenu sélectionné sur les interactions, l'alimentation/l'alcool, et les classes de médicaments est révisé manuellement périodiquement, pas mis à jour automatiquement en direct, donc il évolue plus lentement que les données d'étiquette FDA elles-mêmes.</p>`,
    faq_free_summary: "Est-ce gratuit ? Le restera-t-il ?",

    faq_caregiver_summary: "Puis-je utiliser ceci pour quelqu'un dont je m'occupe, pas seulement pour moi-même ?",
    faq_caregiver_content: `<p>Oui — Décoder, le vérificateur d'interactions, et l'onglet Symptômes fonctionnent tous pour les médicaments de n'importe qui, connecté ou non. Ma pharmacie est conçue autour d'un seul compte connecté et ne sépare pas encore les listes de médicaments de plusieurs personnes — si vous gérez les médicaments de plus d'une personne, gardez cela à l'esprit pour l'instant.</p>`,

function t(key){
  const dict = I18N[uiLang] || I18N.en;
  return (key in dict) ? dict[key] : (I18N.en[key] || key);
}

/* picks the current-language version of a {en, es, ...} translatable
   field on the curated data arrays below; falls back to English. */
function pickLang(field){
  if (!field) return "";
  if (typeof field === "string") return field; // already-plain string, untranslated field
  return field[uiLang] || field.en || "";
}

function applyTranslations(){
  document.documentElement.lang = uiLang;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.querySelectorAll("[data-i18n-aria-label]").forEach(el => { el.setAttribute("aria-label", t(el.dataset.i18nAriaLabel)); });
  const langLabel = document.getElementById("lang-label");
  if (langLabel) langLabel.textContent = uiLang.toUpperCase();
}

          es:"La FDA coloca una advertencia destacada en esta combinación. Solo debería ocurrir bajo supervisión médica directa.",
          zh:"FDA对这种组合设有黑框警告。这种组合只应在医生的直接监督下进行。", vi:"FDA đặt cảnh báo đóng khung cho sự kết hợp này. Chỉ nên thực hiện dưới sự giám sát y tế trực tiếp.", ar:"تضع FDA تحذيرًا محاطًا بإطار على هذا المزيج. يجب ألا يحدث إلا تحت إشراف طبي مباشر.", fr:"La FDA place un avertissement encadré sur cette combinaison. Elle ne devrait jamais se produire que sous surveillance médicale directe."} },

  { a:MAOIS, b:SSRIS, severity:"major",
    what:{en:"Two different antidepressant types together can trigger serotonin syndrome — a serious, sometimes fatal reaction.",
          es:"Dos tipos diferentes de antidepresivos juntos pueden desencadenar el síndrome serotoninérgico — una reacción grave, a veces mortal.",
          zh:"两种不同类型的抗抑郁药同时使用可能引发5-羟色胺综合征——一种严重、有时致命的反应。", vi:"Hai loại thuốc chống trầm cảm khác nhau dùng cùng nhau có thể gây ra hội chứng serotonin — một phản ứng nghiêm trọng, đôi khi gây tử vong.", ar:"نوعان مختلفان من مضادات الاكتئاب معًا يمكن أن يُحفّزا متلازمة السيروتونين — رد فعل خطير، وقاتل أحيانًا.", fr:"Deux types différents d'antidépresseurs ensemble peuvent déclencher un syndrome sérotoninergique — une réaction grave, parfois mortelle."},
    why:{en:"Both raise serotonin levels; combined, serotonin can spike dangerously high.",
         es:"Ambos elevan los niveles de serotonina; combinados, la serotonina puede subir a niveles peligrosos.",
          zh:"两者都会提高5-羟色胺水平；合用时5-羟色胺可能升高到危险程度。", vi:"Cả hai đều làm tăng nồng độ serotonin; khi kết hợp, serotonin có thể tăng vọt đến mức nguy hiểm.", ar:"كلاهما يرفع مستويات السيروتونين؛ ومجتمعين، يمكن أن يرتفع السيروتونين إلى مستويات خطيرة.", fr:"Les deux augmentent les niveaux de sérotonine ; combinés, la sérotonine peut monter à des niveaux dangereux."},
    mgmt:{en:"A washout period (often 2+ weeks) is required when switching between these drugs. Never overlap them without a prescriber's plan.",
          es:"Se requiere un período de lavado (a menudo 2+ semanas) al cambiar entre estos medicamentos. Nunca los combines sin un plan de tu médico.",
          zh:"在这两类药物之间切换时需要一个洗脱期（通常2周以上）。未经医生的方案安排，切勿让两者重叠使用。", vi:"Cần có một khoảng thời gian đào thải (thường từ 2 tuần trở lên) khi chuyển đổi giữa các loại thuốc này. Không bao giờ dùng chồng lấn nếu không có kế hoạch của bác sĩ.", ar:"تُطلب فترة تخلّص (غالبًا أسبوعان أو أكثر) عند التبديل بين هذه الأدوية. لا تجمع بينها أبدًا دون خطة من الطبيب المعالج.", fr:"Une période de sevrage (souvent 2 semaines ou plus) est nécessaire lors du passage d'un médicament à l'autre. Ne les combinez jamais sans un plan de votre médecin prescripteur."} },

  { a:SSRIS, b:["sumatriptan","rizatriptan","zolmitriptan","tramadol","linezolid"], severity:"moderate",
    what:{en:"Adding a migraine triptan (or certain other serotonin‑raising drugs) to an SSRI can increase serotonin syndrome risk.",
          es:"Agregar un triptán para la migraña (u otros medicamentos que elevan la serotonina) a un ISRS puede aumentar el riesgo de síndrome serotoninérgico.",
          zh:"在服用SSRI的基础上加用偏头痛曲坦类药物（或其他某些提高5-羟色胺的药物）可能增加5-羟色胺综合征的风险。", vi:"Thêm thuốc nhóm triptan trị đau nửa đầu (hoặc một số thuốc khác làm tăng serotonin) vào SSRI có thể tăng nguy cơ hội chứng serotonin.", ar:"إضافة دواء تريبتان لعلاج الصداع النصفي (أو بعض الأدوية الأخرى الرافعة للسيروتونين) إلى SSRI يمكن أن يزيد من خطر متلازمة السيروتونين.", fr:"Ajouter un triptan contre la migraine (ou certains autres médicaments qui augmentent la sérotonine) à un ISRS peut augmenter le risque de syndrome sérotoninergique."},
    why:{en:"Each nudges serotonin upward; together the rise can become a problem in some people.",
         es:"Cada uno eleva un poco la serotonina; juntos, el aumento puede ser un problema en algunas personas.",
          zh:"每种药物都会略微提高5-羟色胺；合用时这种升高在部分人身上可能成为问题。", vi:"Mỗi loại đều đẩy serotonin tăng nhẹ; khi kết hợp, mức tăng này có thể trở thành vấn đề ở một số người.", ar:"كل منهما يرفع السيروتونين قليلاً؛ ومعًا يمكن أن يصبح هذا الارتفاع مشكلة لدى بعض الأشخاص.", fr:"Chacun pousse légèrement la sérotonine vers le haut ; ensemble, cette hausse peut devenir un problème chez certaines personnes."},
    mgmt:{en:"Often used together with monitoring, but watch for agitation, racing heart, tremor, or fever and report them.",
          es:"A menudo se usan juntos con supervisión, pero vigila la agitación, el corazón acelerado, el temblor, o la fiebre, y repórtalos.",
          zh:"两者常在监测下合用，但要留意躁动、心跳加快、震颤或发热等情况并及时报告。", vi:"Thường được dùng cùng nhau kèm theo dõi, nhưng cần chú ý các dấu hiệu như kích động, tim đập nhanh, run rẩy, hoặc sốt và báo cáo ngay.", ar:"غالبًا ما تُستخدم معًا مع المراقبة، لكن راقب الهياج، وتسارع نبضات القلب، والارتعاش، أو الحمى وأبلغ عنها.", fr:"Souvent utilisés ensemble avec surveillance, mais surveillez l'agitation, un rythme cardiaque rapide, des tremblements, ou de la fièvre et signalez-les."} },

  { a:STATINS, b:MACRO, severity:"major",
    what:{en:"Certain cholesterol statins with certain antibiotics can cause severe muscle breakdown (rhabdomyolysis).",
          es:"Ciertas estatinas para el colesterol con ciertos antibióticos pueden causar una descomposición muscular grave (rabdomiólisis).",
          zh:"某些降胆固醇的他汀类药物与某些抗生素同时使用可能导致严重的肌肉分解（横纹肌溶解）。", vi:"Một số thuốc statin hạ cholesterol dùng cùng một số kháng sinh có thể gây tiêu cơ vân nghiêm trọng.", ar:"بعض أدوية الستاتين لخفض الكوليسترول مع بعض المضادات الحيوية يمكن أن تسبب انحلالًا شديدًا للعضلات (انحلال الربيدات).", fr:"Certaines statines pour le cholestérol avec certains antibiotiques peuvent provoquer une dégradation musculaire sévère (rhabdomyolyse)."},
    why:{en:"The antibiotic blocks the liver enzyme (CYP3A4) that clears the statin, so statin levels climb.",
         es:"El antibiótico bloquea la enzima hepática (CYP3A4) que elimina la estatina, así que los niveles de la estatina suben.",
          zh:"该抗生素会阻断清除他汀类药物的肝酶（CYP3A4），导致他汀水平升高。", vi:"Kháng sinh này ức chế enzyme gan (CYP3A4) đào thải statin, khiến nồng độ statin tăng cao.", ar:"يُثبّط المضاد الحيوي إنزيم الكبد (CYP3A4) الذي يُخلّص الستاتين، فترتفع مستوياته.", fr:"L'antibiotique bloque l'enzyme hépatique (CYP3A4) qui élimine la statine, donc les niveaux de statine augmentent."},
    mgmt:{en:"Doctors may pause the statin during the antibiotic course. Report unexplained muscle pain or dark urine.",
          es:"Los médicos pueden pausar la estatina durante el tratamiento con el antibiótico. Reporta dolor muscular inexplicado u orina oscura.",
          zh:"医生可能会在使用抗生素期间暂停他汀类药物。如出现不明原因的肌肉疼痛或尿液发黑，请及时报告。", vi:"Bác sĩ có thể tạm ngừng statin trong thời gian dùng kháng sinh. Hãy báo ngay nếu có đau cơ không rõ nguyên nhân hoặc nước tiểu sẫm màu.", ar:"قد يُوقف الأطباء الستاتين مؤقتًا أثناء دورة المضاد الحيوي. أبلغ عن أي ألم عضلي غير مُفسَّر أو بول داكن.", fr:"Les médecins peuvent suspendre la statine pendant la cure d'antibiotique. Signalez toute douleur musculaire inexpliquée ou urine foncée."} },

  { a:STATINS, b:AZOLES, severity:"major",
    what:{en:"Some statins with azole antifungals can cause severe muscle injury.",
          es:"Algunas estatinas con antimicóticos azólicos pueden causar una lesión muscular grave.",
          zh:"某些他汀类药物与唑类抗真菌药同时使用可能导致严重的肌肉损伤。", vi:"Một số statin dùng cùng thuốc kháng nấm nhóm azole có thể gây tổn thương cơ nghiêm trọng.", ar:"بعض أدوية الستاتين مع مضادات الفطريات الآزولية يمكن أن تسبب إصابة عضلية شديدة.", fr:"Certaines statines avec des antifongiques azolés peuvent provoquer une lésion musculaire sévère."},
    why:{en:"Azoles strongly inhibit the enzyme that breaks down the statin, letting it accumulate.",
         es:"Los azoles inhiben fuertemente la enzima que descompone la estatina, permitiendo que se acumule.",
          zh:"唑类药物会强烈抑制分解他汀类药物的酶，使其在体内蓄积。", vi:"Azole ức chế mạnh enzyme phân giải statin, khiến thuốc tích tụ trong cơ thể.", ar:"تُثبّط الآزولات بشدة الإنزيم الذي يُفكّك الستاتين، مما يسمح بتراكمه.", fr:"Les azolés inhibent fortement l'enzyme qui décompose la statine, lui permettant de s'accumuler."},
    mgmt:{en:"A different statin or a temporary hold is often used. Watch for muscle pain or weakness.",
          es:"A menudo se usa una estatina diferente o se pausa temporalmente. Vigila el dolor o la debilidad muscular.",
          zh:"通常会改用其他他汀类药物或暂时停用。请留意肌肉疼痛或无力的情况。", vi:"Thường sẽ đổi sang statin khác hoặc tạm ngừng thuốc. Hãy chú ý các dấu hiệu đau hoặc yếu cơ.", ar:"غالبًا ما يُستخدم ستاتين مختلف أو يُوقَف مؤقتًا. راقب ألم العضلات أو الضعف.", fr:"Une statine différente ou un arrêt temporaire est souvent utilisé. Surveillez la douleur ou la faiblesse musculaire."} },

  { a:ACE, b:KSPARE, severity:"major",
    what:{en:"This blood‑pressure combination can drive potassium too high, which can disturb heart rhythm.",
          es:"Esta combinación de medicamentos para la presión arterial puede elevar demasiado el potasio, lo cual puede alterar el ritmo cardíaco.",
          zh:"这种降血压药物组合可能使血钾过高，从而扰乱心律。", vi:"Sự kết hợp thuốc huyết áp này có thể đẩy kali lên quá cao, gây rối loạn nhịp tim.", ar:"مزيج أدوية ضغط الدم هذا يمكن أن يرفع البوتاسيوم كثيرًا، مما قد يُخلّ بنظم القلب.", fr:"Cette combinaison de médicaments pour la tension artérielle peut faire monter le potassium trop haut, ce qui peut perturber le rythme cardiaque."},
    why:{en:"Both raise potassium; stacked together, levels can become dangerous.",
         es:"Ambos elevan el potasio; combinados, los niveles pueden volverse peligrosos.",
          zh:"两者都会提高血钾水平；叠加使用时，血钾水平可能变得危险。", vi:"Cả hai đều làm tăng kali; khi kết hợp, nồng độ có thể trở nên nguy hiểm.", ar:"كلاهما يرفع البوتاسيوم؛ ومع تراكمهما معًا، يمكن أن تصبح المستويات خطيرة.", fr:"Les deux augmentent le potassium ; cumulés ensemble, les niveaux peuvent devenir dangereux."},
    mgmt:{en:"Potassium and kidney function are usually monitored with blood tests when these are combined.",
          es:"El potasio y la función renal suelen monitorearse con análisis de sangre cuando se combinan estos medicamentos.",
          zh:"这两类药物合用时，通常需要通过血液检查监测血钾和肾功能。", vi:"Kali và chức năng thận thường được theo dõi bằng xét nghiệm máu khi kết hợp hai loại thuốc này.", ar:"عادةً ما تتم مراقبة البوتاسيوم ووظيفة الكلى بواسطة تحاليل الدم عند الجمع بين هذين الدواءين.", fr:"Le potassium et la fonction rénale sont généralement surveillés par des analyses de sang lorsque ceux-ci sont combinés."} },

  { a:ACE, b:["potassium","losartan","valsartan","olmesartan","irbesartan","candesartan"], severity:"moderate",
    what:{en:"Pairing an ACE inhibitor with a potassium supplement or an ARB can raise potassium and stress the kidneys.",
          es:"Combinar un inhibidor de la ECA con un suplemento de potasio o un ARA-II puede elevar el potasio y estresar los riñones.",
          zh:"将ACE抑制剂与钾补充剂或ARB类药物同时使用，可能升高血钾并给肾脏带来负担。", vi:"Kết hợp thuốc ức chế men chuyển (ACE) với thực phẩm bổ sung kali hoặc thuốc ức chế thụ thể angiotensin (ARB) có thể làm tăng kali và gây áp lực lên thận.", ar:"الجمع بين مثبط ACE ومكمل بوتاسيوم أو دواء ARB يمكن أن يرفع البوتاسيوم ويُجهد الكلى.", fr:"Associer un inhibiteur de l'ECA à un supplément de potassium ou à un ARA peut augmenter le potassium et stresser les reins."},
    why:{en:"Both reduce how much potassium the body gets rid of.",
         es:"Ambos reducen cuánto potasio elimina el cuerpo.",
          zh:"两者都会减少身体排出钾的量。", vi:"Cả hai đều làm giảm lượng kali cơ thể đào thải ra ngoài.", ar:"كلاهما يُقلّل من كمية البوتاسيوم التي يتخلص منها الجسم.", fr:"Les deux réduisent la quantité de potassium que le corps élimine."},
    mgmt:{en:"Generally avoided unless specifically directed and monitored with blood tests.",
          es:"Generalmente se evita a menos que sea indicado específicamente y monitoreado con análisis de sangre.",
          zh:"一般应避免这种组合，除非有明确的医嘱并通过血液检查进行监测。", vi:"Thường được tránh trừ khi có chỉ định cụ thể và được theo dõi bằng xét nghiệm máu.", ar:"يُتجنَّب هذا عمومًا ما لم يُوجَّه به تحديدًا وتتم مراقبته بتحاليل الدم.", fr:"Généralement évité sauf indication spécifique et surveillance par analyses de sang."} },

  { a:["methotrexate"], b:NSAIDS, severity:"major",
    what:{en:"Anti‑inflammatory painkillers can raise methotrexate to toxic levels, especially at higher methotrexate doses.",
          es:"Los analgésicos antiinflamatorios pueden elevar el metotrexato a niveles tóxicos, especialmente con dosis más altas de metotrexato.",
          zh:"抗炎止痛药可能使甲氨蝶呤升高到中毒水平，尤其是在甲氨蝶呤剂量较高时。", vi:"Thuốc giảm đau kháng viêm có thể làm tăng methotrexate lên mức gây độc, đặc biệt ở liều methotrexate cao hơn.", ar:"يمكن لمسكنات الألم المضادة للالتهاب أن ترفع الميثوتريكسات إلى مستويات سامة، خاصة عند جرعات الميثوتريكسات الأعلى.", fr:"Les analgésiques anti-inflammatoires peuvent faire monter le méthotrexate à des niveaux toxiques, surtout à des doses de méthotrexate plus élevées."},
    why:{en:"NSAIDs reduce how fast the kidneys clear methotrexate.",
         es:"Los AINE reducen qué tan rápido los riñones eliminan el metotrexato.",
          zh:"非甾体抗炎药会降低肾脏清除甲氨蝶呤的速度。", vi:"NSAID làm giảm tốc độ thận đào thải methotrexate.", ar:"تُقلّل مضادات الالتهاب غير الستيرويدية من سرعة تخلّص الكلى من الميثوتريكسات.", fr:"Les AINS réduisent la vitesse à laquelle les reins éliminent le méthotrexate."},
    mgmt:{en:"Higher‑dose methotrexate and NSAIDs are a dangerous mix; low‑dose use needs a doctor's guidance.",
          es:"El metotrexato en dosis altas y los AINE son una mezcla peligrosa; el uso en dosis bajas necesita la guía de un médico.",
          zh:"高剂量甲氨蝶呤与非甾体抗炎药同用是危险的组合；低剂量使用也需要在医生指导下进行。", vi:"Methotrexate liều cao kết hợp NSAID là sự kết hợp nguy hiểm; ngay cả dùng liều thấp cũng cần có hướng dẫn của bác sĩ.", ar:"الميثوتريكسات بجرعة أعلى مع مضادات الالتهاب غير الستيرويدية مزيج خطير؛ الاستخدام بجرعة منخفضة يحتاج إلى توجيه من طبيب.", fr:"Le méthotrexate à forte dose et les AINS sont un mélange dangereux ; l'utilisation à faible dose nécessite les conseils d'un médecin."} },

  { a:["lithium"], b:NSAIDS, severity:"moderate",
    what:{en:"NSAIDs can push lithium levels up, and lithium has a narrow safe range.",
          es:"Los AINE pueden elevar los niveles de litio, y el litio tiene un rango seguro muy estrecho.",
          zh:"非甾体抗炎药可能使锂盐水平升高，而锂盐的安全范围本身就很窄。", vi:"NSAID có thể làm tăng nồng độ lithium, trong khi lithium có phạm vi an toàn rất hẹp.", ar:"يمكن لمضادات الالتهاب غير الستيرويدية أن ترفع مستويات الليثيوم، والليثيوم له نطاق أمان ضيق.", fr:"Les AINS peuvent faire monter les niveaux de lithium, et le lithium a une marge de sécurité étroite."},
    why:{en:"NSAIDs reduce lithium clearance through the kidneys.",
         es:"Los AINE reducen la eliminación de litio a través de los riñones.",
          zh:"非甾体抗炎药会降低肾脏对锂盐的清除能力。", vi:"NSAID làm giảm khả năng đào thải lithium qua thận.", ar:"تُقلّل مضادات الالتهاب غير الستيرويدية من تصفية الليثيوم عبر الكلى.", fr:"Les AINS réduisent la clairance du lithium par les reins."},
    mgmt:{en:"Lithium levels are often checked if an NSAID is added. Watch for tremor, confusion, or nausea.",
          es:"Los niveles de litio suelen revisarse si se agrega un AINE. Vigila el temblor, la confusión, o las náuseas.",
          zh:"加用非甾体抗炎药后通常会复查锂盐水平。请留意震颤、意识模糊或恶心等情况。", vi:"Nồng độ lithium thường được kiểm tra lại nếu thêm NSAID. Hãy chú ý các dấu hiệu run rẩy, lú lẫn, hoặc buồn nôn.", ar:"غالبًا ما تُفحص مستويات الليثيوم إذا أُضيف مضاد التهاب غير ستيرويدي. راقب الارتعاش أو الارتباك أو الغثيان.", fr:"Les niveaux de lithium sont souvent vérifiés si un AINS est ajouté. Surveillez les tremblements, la confusion, ou les nausées."} },

  { a:["lithium"], b:THIAZ, severity:"moderate",
    what:{en:"Thiazide water pills can raise lithium to toxic levels.",
          es:"Los diuréticos tiazídicos pueden elevar el litio a niveles tóxicos.",
          zh:"噻嗪类利尿药（水丸）可能使锂盐升高到中毒水平。", vi:"Thuốc lợi tiểu nhóm thiazide có thể làm tăng lithium lên mức gây độc.", ar:"يمكن لأقراص الماء الثيازيدية أن ترفع الليثيوم إلى مستويات سامة.", fr:"Les diurétiques thiazidiques peuvent faire monter le lithium à des niveaux toxiques."},
    why:{en:"They make the kidneys hold on to lithium.",
         es:"Hacen que los riñones retengan el litio.",
          zh:"它们会让肾脏更多地保留锂盐。", vi:"Chúng khiến thận giữ lại lithium nhiều hơn.", ar:"تجعل الكلى تحتفظ بالليثيوم أكثر.", fr:"Ils font en sorte que les reins retiennent davantage le lithium."},
    mgmt:{en:"Lithium monitoring and dose adjustment are common when a thiazide is started.",
          es:"El monitoreo de litio y el ajuste de dosis son comunes cuando se inicia una tiazida.",

  { a:["digoxin"], b:["amiodarone"], severity:"major",

/* ---- DRUG-CLASS EXPLAINERS (Phase 4) ------------------------------
   Plain-English "what this class of drug actually is" — textbook-level,

   is Plainscript's OWN content, not FDA text, so it's always labeled
