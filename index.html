<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plainscript — Medication Reference</title>
<meta name="description" content="An educational tool that decodes medications, checks drug interactions, and points to general symptom guidance, using FDA and NIH data. Not medical advice." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#16202E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     PLAINSCRIPT — design tokens
     Aesthetic: a calm clinical reference instrument, not a
     consumer health app. Cool clinical paper, navy ink, one
     restrained teal accent. Color is rationed: red/orange/amber
     mean SEVERITY and nothing else, so an alarming color always
     means an alarming thing.
     ============================================================ */
  :root{
    --paper:#F4F6F8;
    --card:#FFFFFF;
    --ink:#16202E;
    --ink-soft:#4A5A6E;
    --ink-faint:#546678; /* darkened from #8194A6 — that was 2.88:1 on --paper, failing WCAG AA for text */
    --line:#DCE3EA;
    --line-soft:#E9EEF2;
    --accent:#0F766E;
    --accent-deep:#0B5752;
    --accent-wash:#E6F1EF;

    /* severity scale — used ONLY for interaction severity */
    --major-bg:#FBEBEA; --major-bar:#C0392B; --major-ink:#8A241C;
    --mod-bg:#FCF1E6;   --mod-bar:#D17A12;   --mod-ink:#8F4E08;
    --minor-bg:#FBF6E6; --minor-bar:#B5920A; --minor-ink:#6F5905;
    /* neutral states — label mentions and "nothing found" */
    --note-bg:#EDF1F5;  --note-bar:#54606E;  --note-ink:#3A4759; /* note-bar darkened from #69788A for safe contrast with white pill text */

    --radius:10px;
    --shadow:0 1px 2px rgba(22,32,46,.04), 0 8px 24px rgba(22,32,46,.06);
    --mono:"Spline Sans Mono",ui-monospace,Menlo,monospace;
    --sans:"Spline Sans",system-ui,-apple-system,sans-serif;
    --serif:"Newsreader",Georgia,serif;
    --safety-bg:#16202E;
  }

  /* ---- dark theme: same sober clinical instrument, lights turned down.
         Not neon — a calm, low-glare clinical dark. Starts on light. ---- */
  [data-theme="dark"]{
    --paper:#0F141A;
    --card:#171E27;
    --ink:#E4EAF1;
    --ink-soft:#9DAABA;
    --ink-faint:#8693A2; /* lightened from #6B7A8B — that was 4.21:1 on dark --paper, failing WCAG AA for text */
    --line:#273039;
    --line-soft:#1D242D;
    --accent:#35C4B8;
    --accent-deep:#63D6CC;
    --accent-wash:#123230;
    --major-bg:#241413; --major-bar:#E5544A; --major-ink:#F1A9A3;
    --mod-bg:#241910;   --mod-bar:#E08A2E;   --mod-ink:#F0C089;
    --minor-bg:#211E10; --minor-bar:#D4B33C; --minor-ink:#E6D385;
    --note-bg:#1A222C;  --note-bar:#7C8A9B;  --note-ink:#B7C3D0;
    --safety-bg:#0A0E13;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--sans); font-size:16px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
    transition:background-color .25s ease, color .25s ease;
  }
  .card,.verdict,.nofind,input[type=text],.themetoggle,.tab,.card-head,.row,.mini,.provider,.signin,textarea{
    transition:background-color .25s ease, border-color .25s ease, color .25s ease;
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
  .wrap{max-width:760px; margin:0 auto; padding:0 20px;}

  /* eyebrow / data labels — the clinical "instrument" texture */
  .eyebrow{
    font-family:var(--mono); font-size:11px; font-weight:600;
    letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);
  }

  /* ---------- safety frame: persistent, calm but present ---------- */
  .safetybar{
    background:var(--safety-bg); color:#E8EDF2; font-size:13px;
    border-bottom:1px solid #0c1420;
  }
  .safetybar .wrap{display:flex; gap:10px; align-items:center; padding:9px 20px;}
  .safetybar strong{color:#fff; font-weight:600;}
  .safetybar .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;}

  /* ---------- header ---------- */
  header.site{padding:30px 0 18px; border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;}
  .brand h1{
    font-family:var(--serif); font-weight:600; font-size:30px;
    letter-spacing:-.01em; margin:0; line-height:1;
  }
  .brand .tag{font-family:var(--mono); font-size:12px; color:var(--accent-deep); letter-spacing:.04em;}
  .lede{margin:12px 0 0; color:var(--ink-soft); max-width:60ch; font-size:15.5px;}

  .themetoggle{
    margin-left:auto; align-self:center; appearance:none; cursor:pointer;
    font-family:var(--mono); font-size:12px; letter-spacing:.03em;
    display:inline-flex; align-items:center; gap:7px; padding:8px 13px;
    border:1px solid var(--line); border-radius:20px; background:var(--card); color:var(--ink-soft);
  }
  .themetoggle:hover{border-color:var(--accent); color:var(--accent-deep);}
  .themetoggle:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .themetoggle .ticon{font-size:13px; line-height:1;}

  /* language selector — same pill look as .themetoggle, but a real <select>
     since a single click-toggle only scales to two languages */
  .lang-select-wrap{
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--line); border-radius:20px; background:var(--card);
    padding:0 12px 0 13px; align-self:center;
  }
  .lang-select-wrap:hover, .lang-select-wrap:focus-within{border-color:var(--accent);}
  .lang-select-wrap .ticon{font-size:13px; line-height:1;}
  .lang-select-wrap select{
    appearance:none; -webkit-appearance:none; border:none; background:transparent;
    font-family:var(--mono); font-size:12px; letter-spacing:.03em; color:var(--ink-soft);
    cursor:pointer; padding:8px 2px; outline:none;
  }
  .lang-select-wrap select:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}
  /* the dropdown's own option list renders with the OS/browser's native
     styling regardless — that's expected and fine, only the closed pill
     needs to match the app's look */
  .lang-select-wrap select option{color:#000; background:#fff;}

  /* ---------- tabs ---------- */
  .tabs{display:flex; gap:4px; margin:22px 0 0; border-bottom:1px solid var(--line);}
  .tab{
    appearance:none; background:none; border:none; cursor:pointer;
    font-family:var(--sans); font-size:15px; font-weight:600; color:var(--ink-faint);
    padding:11px 14px; border-bottom:2px solid transparent; margin-bottom:-1px;
    display:flex; align-items:center; gap:8px;
  }
  .tab:hover{color:var(--ink-soft);}
  .tab[aria-selected="true"]{color:var(--ink); border-bottom-color:var(--accent);}
  .tab .num{font-family:var(--mono); font-size:11px; color:var(--accent); }
  .tab:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}

  main{padding:26px 0 60px;}
  .panel[hidden]{display:none;}
  .panel-intro{color:var(--ink-soft); font-size:15px; margin:0 0 18px;}

  /* ---------- input row ---------- */
  .field label{display:block; margin-bottom:7px;}
  .inrow{display:flex; gap:9px; flex-wrap:wrap;}
  input[type=text]{
    flex:1 1 220px; min-width:0; font-family:var(--sans); font-size:16px;
    padding:13px 14px; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--card); color:var(--ink);
  }
  input[type=text]::placeholder{color:var(--ink-faint);}
  input[type=text]:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash);}
  button.go{
    appearance:none; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:15px;
    padding:13px 20px; border-radius:var(--radius); border:1px solid var(--accent-deep);
    background:var(--accent); color:#fff;
  }
  button.go:hover{background:var(--accent-deep);}
  button.go:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
  button.ghost{
    appearance:none; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:14px;
    padding:11px 14px; border-radius:var(--radius); border:1px dashed var(--line);
    background:transparent; color:var(--accent-deep);
  }
  button.ghost:hover{border-color:var(--accent); background:var(--accent-wash);}
  button.ghost:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .druglist{display:flex; flex-direction:column; gap:9px; margin:0 0 12px;}
  .drugrow{display:flex; gap:9px; align-items:center;}
  /* .rm is reused for both the pairwise Check-tab row AND the My Cabinet
     med-card remove button — was scoped to .drugrow .rm only, so the
     cabinet one was rendering with zero styling. Un-scoped it. */
  .rm{
    appearance:none; border:1px solid var(--line); background:var(--card); cursor:pointer;
    width:44px; height:44px; flex:none; border-radius:var(--radius); color:var(--ink-faint);
    font-size:18px; line-height:1;
  }
  .rm:hover{color:var(--major-bar); border-color:var(--major-bar);}
  .rm:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .checkbar{display:flex; gap:9px; align-items:center; flex-wrap:wrap; margin-top:4px;}

  /* ---------- result: monograph card (the signature) ---------- */
  .results{margin-top:24px; display:flex; flex-direction:column; gap:16px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden; animation:rise .35s ease both;
  }
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){ .card{animation:none;} }

  .card-head{padding:18px 20px 14px; border-bottom:1px solid var(--line-soft);}
  .card-head .name{font-family:var(--serif); font-size:23px; font-weight:600; line-height:1.15; margin:2px 0 0;}
  .datastrip{
    font-family:var(--mono); font-size:12px; color:var(--ink-soft);
    display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:10px;
  }
  .datastrip b{color:var(--ink-faint); font-weight:500;}
  .card-body{padding:6px 20px 18px;}
  .row{padding:13px 0; border-bottom:1px solid var(--line-soft);}
  .row:last-child{border-bottom:none;}
  .row .eyebrow{display:block; margin-bottom:5px;}
  .row p{margin:0; color:var(--ink); font-size:15px;}
  .row .src{font-family:var(--mono); font-size:11px; color:var(--ink-faint); margin-top:6px;}
  .expand{
    appearance:none; background:none; border:none; cursor:pointer; padding:0; margin-top:6px;
    font-family:var(--mono); font-size:11.5px; color:var(--accent-deep); letter-spacing:.03em;
  }
  .expand:hover{text-decoration:underline;}
  .expand:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .pe-toggle{display:inline-flex; gap:6px; align-items:center; margin-top:8px; font-size:12.5px; color:var(--ink-faint); font-family:var(--mono);}

  /* ---------- interaction verdict ---------- */
  .verdict{display:flex; border-radius:var(--radius); overflow:hidden; border:1px solid var(--line); box-shadow:var(--shadow);}
  .verdict .bar{width:6px; flex:none;}
  .verdict .vbody{padding:15px 18px; flex:1;}
  .verdict .pair{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); letter-spacing:.02em;}
  .verdict .sev{font-family:var(--serif); font-size:19px; font-weight:600; margin:3px 0 0; display:flex; align-items:center; gap:9px;}
  .sev .pill{font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:20px;}
  .verdict p{margin:9px 0 0; font-size:14.5px;}
  .verdict .mgmt{margin-top:8px; font-size:13.5px; color:var(--ink-soft);}
  .verdict .src{font-family:var(--mono); font-size:11px; color:var(--ink-faint); margin-top:9px;}

  /* pill text colors are picked per severity to actually hit 4.5:1 against
     that pill's own background — white doesn't work for every bar color
     (verified: moderate/minor bars only clear ~3:1 with white, which fails
     WCAG AA for text this small; dark ink clears 5:1+ on those two). */
  .v-major{background:var(--major-bg);} .v-major .bar{background:var(--major-bar);} .v-major .pill{background:var(--major-bar); color:#fff;} .v-major .sev{color:var(--major-ink);}
  .v-moderate{background:var(--mod-bg);} .v-moderate .bar{background:var(--mod-bar);} .v-moderate .pill{background:var(--mod-bar); color:var(--ink);} .v-moderate .sev{color:var(--mod-ink);}
  .v-minor{background:var(--minor-bg);} .v-minor .bar{background:var(--minor-bar);} .v-minor .pill{background:var(--minor-bar); color:var(--ink);} .v-minor .sev{color:var(--minor-ink);}
  .v-note{background:var(--note-bg);} .v-note .bar{background:var(--note-bar);} .v-note .pill{background:var(--note-bar); color:#fff;} .v-note .sev{color:var(--note-ink); font-size:16px;}

  /* dark theme's severity bars are brighter/more saturated than light
     theme's, so white pill text fails contrast across the board there —
     verified all four need dark text in dark mode specifically. */
  [data-theme="dark"] .sev .pill{color:var(--safety-bg);}

  /* the cautious "nothing found" state — deliberately NOT green */
  .nofind{
    background:var(--note-bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px;
  }
  .nofind .eyebrow{color:var(--note-ink);}
  .nofind h3{font-family:var(--serif); font-weight:600; font-size:18px; margin:4px 0 6px; color:var(--note-ink);}
  .nofind p{margin:0; font-size:14.5px; color:var(--ink-soft);}

  /* ---------- status / errors ---------- */
  .status{font-family:var(--mono); font-size:13px; color:var(--ink-soft); padding:14px 0;}
  .status .spin{display:inline-block; width:11px; height:11px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-1px; margin-right:8px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){ .spin{animation:none;} }
  .err{background:var(--major-bg); border:1px solid var(--major-bar); color:var(--major-ink); padding:13px 16px; border-radius:var(--radius); font-size:14px;}

  /* ---------- methodology accordion (credibility / sourcing) ---------- */
  .method{margin-top:40px; border-top:1px solid var(--line); padding-top:8px;}
  details{border-bottom:1px solid var(--line-soft); padding:4px 0;}
  details summary{
    cursor:pointer; list-style:none; padding:13px 2px; font-weight:600; font-size:15px;
    display:flex; justify-content:space-between; align-items:center; color:var(--ink);
  }
  details summary::-webkit-details-marker{display:none;}
  details summary .chev{font-family:var(--mono); color:var(--accent); transition:transform .2s;}
  details[open] summary .chev{transform:rotate(90deg);}
  details .content{padding:0 2px 16px; color:var(--ink-soft); font-size:14.5px;}
  details .content p{margin:0 0 10px;} details .content p:last-child{margin:0;}
  details .content a{color:var(--accent-deep);}
  details .content code{font-family:var(--mono); font-size:12.5px; background:var(--line-soft); padding:1px 5px; border-radius:4px; color:var(--ink);}

  /* ---------- accounts + My Cabinet (Phase 2) ---------- */
  .acct{display:inline-flex; align-items:center; gap:8px; align-self:center;}
  .acct .who{
    font-family:var(--mono); font-size:11.5px; color:var(--ink-faint);
    max-width:190px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .mini{
    appearance:none; cursor:pointer; font-family:var(--mono); font-size:12px; letter-spacing:.03em;
    padding:8px 13px; border:1px solid var(--line); border-radius:20px;
    background:var(--card); color:var(--ink-soft);
  }
  .mini:hover{border-color:var(--accent); color:var(--accent-deep);}
  .mini:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .mini:disabled{opacity:.6; cursor:default;}
  .mini:disabled:hover{border-color:var(--line); color:var(--ink-soft);}

  .signin{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:22px 20px;
  }
  .signin h3{font-family:var(--serif); font-size:20px; font-weight:600; margin:6px 0 8px;}
  .signin p{margin:0 0 14px; color:var(--ink-soft); font-size:14.5px; max-width:58ch;}
  .providers{display:flex; gap:9px; flex-wrap:wrap;}
  .provider{
    appearance:none; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:14.5px;
    padding:12px 18px; border-radius:var(--radius); border:1px solid var(--line);
    background:var(--card); color:var(--ink); display:inline-flex; gap:9px; align-items:center;
  }
  .provider:hover{border-color:var(--accent); background:var(--accent-wash);}
  .provider:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .medrow .medgrid{display:flex; gap:12px; padding:16px 18px; align-items:flex-start;}
  .medrow .medinfo{flex:1; min-width:0;}
  .medrow .name{font-family:var(--serif); font-size:19px; font-weight:600; line-height:1.2;}
  .medrow .datastrip{margin-top:6px;}
  .mednote{margin-top:10px;}
  .mednote p{margin:0 0 4px; font-size:14px; color:var(--ink-soft); font-style:italic;}
  .mednote textarea{
    width:100%; font-family:var(--sans); font-size:14.5px; padding:10px 12px;
    border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--ink);
    resize:vertical; min-height:64px;
  }
  .mednote textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash);}
  .notebtns{display:flex; gap:8px; margin-top:8px;}
  .cab-tools{display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-top:18px;}

  /* ---------- Cabinet Scan (Phase 3) ---------- */
  .scan-summary{
    border-radius:var(--radius); border:1px solid var(--line); box-shadow:var(--shadow);
    padding:16px 18px; margin:18px 0; background:var(--card);
  }
  .scan-summary .headline{font-family:var(--serif); font-size:20px; font-weight:600; margin:2px 0 0;}
  .scan-summary .counts{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
  .scan-summary .count-pill{font-family:var(--mono); font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:20px;}
  .cpill-major{background:var(--major-bg); color:var(--major-ink); border:1px solid var(--major-bar);}
  .cpill-mod{background:var(--mod-bg); color:var(--mod-ink); border:1px solid var(--mod-bar);}
  .cpill-minor{background:var(--minor-bg); color:var(--minor-ink); border:1px solid var(--minor-bar);}
  .cpill-note{background:var(--note-bg); color:var(--note-ink); border:1px solid var(--note-bar);}

  .cabinet-map{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0;}
  .map-chip{font-family:var(--mono); font-size:12.5px; padding:6px 11px; border-radius:20px; border:1px solid var(--line); background:var(--paper); color:var(--ink-soft);}
  .map-chip b{color:var(--ink); font-weight:600;}

  .askpharmacist{
    border-radius:var(--radius); border:1px dashed var(--accent-deep); background:var(--accent-wash);
    padding:16px 18px; margin:18px 0;
  }
  .askpharmacist h3{font-family:var(--serif); font-size:17px; font-weight:600; margin:2px 0 10px; color:var(--accent-deep);}
  .askpharmacist ol{margin:0; padding-left:20px; display:flex; flex-direction:column; gap:9px;}
  .askpharmacist li{font-size:14.5px; color:var(--ink);}

  /* ---------- "did you mean" spelling chips (Phase 4) ---------- */
  .chip-btn{
    appearance:none; cursor:pointer; font-family:var(--mono); font-size:12px;
    padding:5px 10px; margin:2px 4px 2px 0; border-radius:20px;
    border:1px solid var(--line); background:var(--card); color:var(--accent-deep);
  }
  .chip-btn:hover{border-color:var(--accent); background:var(--accent-wash);}
  .chip-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* clickable variant of the (otherwise informational) cabinet-map chip,
     used in the similar/related modal to jump straight to that drug */
  button.map-chip{cursor:pointer; appearance:none;}
  button.map-chip:hover{border-color:var(--accent); background:var(--accent-wash);}
  button.map-chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* ---------- similar & related modal (Phase 4) ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,14,20,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; padding:24px; z-index:1000;
  }
  .modal-box{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    width:100%; max-width:720px; max-height:85vh; overflow-y:auto; padding:22px 24px 26px;
  }
  .modal-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:14px;}
  .modal-head h2{font-family:var(--serif); font-size:21px; font-weight:600; margin:0;}

    method_source_content: `

    method_why_summary: "Why do drug interactions happen at all?",
    method_why_content: `
      <p>Every "why" explanation on this site traces back to one of a handful of recurring mechanisms. Knowing them makes the individual explanations click instead of feeling like random trivia:</p>
      <p><b>Liver-enzyme competition.</b> Your liver clears most drugs using a family of enzymes called CYP450. Some drugs block or overload a specific CYP enzyme, so anything else that relies on that same enzyme builds up in your blood instead of clearing normally — this is behind most of the "raises the level of" interactions here (statins + certain antibiotics, warfarin + certain antifungals).</p>
      <p><b>Additive (stacking) effects.</b> Two drugs that do a similar thing to your body — sedate the central nervous system, thin the blood, raise serotonin — don't just add up mildly when combined; the combined effect is often much stronger than either alone. This is why opioids + benzodiazepines, or two serotonin-raising drugs together, are treated as serious.</p>

    faq_pharmacist_content: `<p>No — never. Plainscript is a reference for understanding your medications and getting your bearings before a real conversation, not a replacement for one. A pharmacist knows your full history, your doses, and your other conditions; nothing here does.</p>`,
    faq_notfound_summary: "Why isn't my medication showing up in Decode?",
    faq_notfound_content: `<p>Decode only shows what's in the FDA's openFDA label database. Some compounded medications, very new drugs, or products sold under an unusual name may not be indexed there yet. Try the generic name if you searched a brand (or the other way around) — the "did you mean" suggestions can help if it's a spelling issue.</p>`,
    faq_current_summary: "How current is the data?",
    faq_current_content: `<p>Decode and the interaction checker's FDA-label layer are pulled live from openFDA every time you search — never cached or out of date on our end. The curated interaction, food/alcohol, and drug-class content is hand-reviewed periodically, not live-updated automatically, so it moves slower than the FDA label data itself.</p>`,
    faq_free_summary: "Is it free? Will it stay free?",
    faq_free_content: `<p>Yes, and that's the plan. Plainscript runs on free-tier infrastructure (openFDA and RxNorm are free and keyless; Supabase and Cloudflare have generous free tiers). There's no paid tier planned.</p>`,

    method_heading: "Cómo funciona esto y qué no puede hacer",
    method_source_summary: "De dónde vienen los datos",
    method_source_content: `
      <p><b>Los datos de los medicamentos</b> vienen de la <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">API de etiquetas de medicamentos de openFDA</a> de la FDA de EE. UU. — el etiquetado oficial aprobado de cada medicamento (para qué sirve, cómo funciona, efectos secundarios, nombres comerciales/genéricos, clase de medicamento).</p>
      <p><b>La coincidencia de nombres</b> usa la <a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">API RxNorm</a> del NIH/NLM, que estandariza nombres de medicamentos y tolera errores de escritura.</p>
      <p><b>La gravedad de las interacciones</b> proviene de un conjunto curado a mano de interacciones bien documentadas, cada una revisada contra la información de prescripción de la FDA y referencias clínicas estándar.</p>
      <p><b>Las explicaciones de clases de medicamentos, las interacciones con alimentos/alcohol, y las notas de sensibilidad cruzada a alergias</b> son contenido propio de Plainscript, sometido al mismo estándar que el conjunto de interacciones anterior — nunca es texto de la FDA, y siempre está etiquetado como nuestro dondequiera que aparezca.</p>
    `,
    method_safe_summary: `Por qué no hay un simple resultado de "estás a salvo"`,
    method_safe_content: `
      <p>En enero de 2024, la Biblioteca Nacional de Medicina de EE. UU. cerró su API gratuita de interacciones medicamentosas. Ya no existe una base de datos gratuita, integral y con clasificación de gravedad — las bases de datos clínicas de pago (DrugBank, Micromedex) tienen esos datos ahora.</p>
      <p>Así que esta herramienta puede confirmar una interacción que conoce, pero <b>nunca</b> puede demostrar que una combinación es segura. Un resultado de "no se encontró nada" solo significa que no estaba en nuestro conjunto curado ni en las etiquetas de la FDA que revisamos — no que los medicamentos sean seguros juntos. Por eso nunca verás una marca verde aquí. Siempre confirma con un farmacéutico.</p>
    `,
    method_why_summary: "¿Por qué ocurren las interacciones medicamentosas?",
    method_why_content: `
      <p>Cada explicación de "por qué" en este sitio se remonta a uno de un puñado de mecanismos recurrentes. Conocerlos hace que las explicaciones individuales tengan sentido, en lugar de sentirse como datos sueltos:</p>
      <p><b>Competencia de enzimas hepáticas.</b> Tu hígado elimina la mayoría de los medicamentos usando una familia de enzimas llamada CYP450. Algunos medicamentos bloquean o saturan una enzima CYP específica, así que cualquier otra cosa que dependa de esa misma enzima se acumula en tu sangre en lugar de eliminarse con normalidad — esto explica la mayoría de las interacciones de "eleva el nivel de" en este sitio (estatinas + ciertos antibióticos, warfarina + ciertos antimicóticos).</p>
      <p><b>Efectos aditivos (acumulativos).</b> Dos medicamentos que le hacen algo similar a tu cuerpo — sedar el sistema nervioso central, adelgazar la sangre, elevar la serotonina — no simplemente se suman de forma leve al combinarse; el efecto combinado suele ser mucho más fuerte que cualquiera de los dos por separado. Por eso los opioides + benzodiazepinas, o dos medicamentos que elevan la serotonina juntos, se tratan como algo serio.</p>
      <p><b>Cambios en electrolitos y en la eliminación renal.</b> Algunos pares de medicamentos empujan el mismo electrolito (como el potasio) en la misma dirección, o uno cambia qué tan rápido los riñones eliminan al otro — algo pequeño por separado, pero la combinación puede llevar un nivel demasiado alto o demasiado bajo.</p>
      <p><b>Interferencia en la absorción o en la unión a proteínas.</b> A veces una sustancia bloquea físicamente la absorción de otra, o la desplaza de las proteínas que la transportan en el torrente sanguíneo, cambiando cuánto medicamento activo hay realmente disponible.</p>
      <p>Cada interacción específica listada en este sitio indica cuál de estos mecanismos está ocurriendo en su propia línea de "Por qué" — esta sección solo conecta los puntos.</p>
    `,
    method_account_summary: "Qué pasa con los datos de mi cuenta",
    method_account_content: `<p>Iniciar sesión es opcional — Descifrar y la revisión de interacciones funcionan sin una cuenta. Si inicias sesión (para usar Mi Botiquín), lo único que se guarda son los medicamentos que elegiste guardar y las notas que escribiste, en una base de datos de <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> bajo tu ID de usuario. La seguridad a nivel de fila garantiza, a nivel de base de datos, que tus filas solo puedan ser leídas y modificadas por ti. Eliminar un medicamento borra su fila; no hay una copia aparte. Nada de tus búsquedas se guarda.</p>`,
    method_symptoms_summary: "Qué es (y qué no es) la pestaña de Síntomas",
    method_symptoms_content: `
      <p><b>No diagnostica nada.</b> No hay una lista clasificada de "causas probables", ni una puntuación de gravedad, ni una IA adivinando qué te pasa. Elegir "dolor de cabeza" y "congestión nasal" no produce una condición médica — produce las categorías generales de productos de venta libre que la gente suele usar para esos síntomas (p. ej., "analgésicos", "descongestionantes"), el mismo tipo de mapeo a nivel de libro de texto que usaría una guía de primeros auxilios.</p>
      <p>Ese mapeo de síntoma a categoría es un conjunto pequeño, curado a mano y revisado contra referencias estándar — no se inventa sobre la marcha. Los ejemplos de productos reales que se muestran en cada categoría se obtienen <b>en vivo de openFDA</b> en el momento en que buscas, igual que el resto de esta aplicación.</p>
      <p>La lista de "busca atención ahora" es una guía estándar de salud pública para emergencias, no algo calculado a partir de lo que elegiste — se muestra completa sin importar tus respuestas, porque reconocer una emergencia no debería depender de acertar un cuestionario.</p>
    `,
    method_limits_summary: "Limitaciones honestas",
    method_limits_content: `<p>El conjunto curado cubre unas pocas docenas de las interacciones más importantes, no todas. La capa de etiquetas de la FDA solo detecta interacciones que una etiqueta menciona directamente, y las etiquetas varían en su nivel de detalle. Las dosis, tus condiciones de salud, la alimentación y los suplementos importan y no se consideran aquí. Esta es una herramienta de aprendizaje, no un sistema de decisión clínica.</p>`,

    faq_heading: "Preguntas frecuentes",
    faq_pharmacist_summary: "¿Esto sustituye a mi farmacéutico o médico?",
    faq_pharmacist_content: `<p>No — nunca. Plainscript es una referencia para entender tus medicamentos y orientarte antes de una conversación real, no un reemplazo de esa conversación. Un farmacéutico conoce tu historial completo, tus dosis y tus otras condiciones; nada aquí lo sabe.</p>`,
    faq_notfound_summary: "¿Por qué mi medicamento no aparece en Descifrar?",
    faq_notfound_content: `<p>Descifrar solo muestra lo que está en la base de datos de etiquetas openFDA de la FDA. Algunos medicamentos preparados por fórmula magistral, medicamentos muy nuevos, o productos vendidos con un nombre poco común, pueden no estar indexados todavía. Prueba el nombre genérico si buscaste una marca (o al revés) — las sugerencias de "quisiste decir" pueden ayudar si es un problema de ortografía.</p>`,
    faq_current_summary: "¿Qué tan actualizados están los datos?",
    faq_current_content: `<p>Descifrar y la capa de etiquetas de la FDA del revisor de interacciones se obtienen en vivo de openFDA cada vez que buscas — nunca están guardados en caché ni desactualizados de nuestro lado. El contenido curado de interacciones, alimentos/alcohol, y clases de medicamentos se revisa periódicamente a mano, no se actualiza en vivo automáticamente, así que avanza más lento que los datos de las etiquetas de la FDA.</p>`,
    faq_free_summary: "¿Es gratis? ¿Seguirá siendo gratis?",
    faq_free_content: `<p>Sí, y ese es el plan. Plainscript funciona con infraestructura de nivel gratuito (openFDA y RxNorm son gratuitos y no requieren clave; Supabase y Cloudflare tienen niveles gratuitos generosos). No hay ningún nivel de pago planeado.</p>`,
    faq_caregiver_summary: "¿Puedo usar esto para alguien que cuido, no solo para mí?",
    faq_caregiver_content: `<p>Sí — Descifrar, el revisor de interacciones, y la pestaña de Síntomas funcionan para los medicamentos de cualquier persona, con o sin sesión iniciada. Mi Botiquín está diseñado alrededor de una sola cuenta con sesión iniciada y todavía no separa las listas de medicamentos de varias personas — si estás manejando los medicamentos de más de una persona, ten esto en cuenta por ahora.</p>`,
    faq_error_summary: "¿Qué pasa si encuentro algo incorrecto?",
    faq_error_content: `<p>Por favor, avísanos — mira "Reportar un error" en el pie de página. Cada dato curado aquí (interacciones, explicaciones de clases de medicamentos, notas de alimentos/alcohol) se revisa contra referencias estándar, pero los errores siguen siendo posibles, y una herramienta que no se puede corregir no es confiable. Las correcciones se revisan y se corrigen, no se ignoran.</p>`,

    footer_text: `Plainscript · proyecto educativo · datos de openFDA y NIH RxNorm · no afiliado con la FDA ni el NIH · Este producto usa datos disponibles públicamente de la Biblioteca Nacional de Medicina de EE. UU. y de la Administración de Alimentos y Medicamentos de EE. UU., pero no está respaldado por ellas.`,

    method_source_content: `
      <p><b>药物信息</b>来自美国FDA的<a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">openFDA药品标签API</a>——每种药物实际获批的标签内容（治疗什么、作用机制、副作用、商品名/通用名、药物类别）。</p>
      <p><b>名称匹配</b>使用NIH/NLM的<a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">RxNorm API</a>，它能规范药物名称并容忍拼写错误。</p>
      <p><b>相互作用的严重程度</b>来自一套人工整理、有充分记录的相互作用集合，每一条都对照FDA处方信息和标准临床参考文献进行了审核。</p>
      <p><b>药物类别说明、食物/酒精相互作用，以及过敏交叉敏感性提示</b>是Plainscript自己整理的内容，遵循与上述相互作用集合相同的标准——绝不是FDA原文，且在任何出现的地方都会明确标注为我们自己的内容。</p>
    `,
    method_safe_summary: `为什么没有一个简单的"你很安全"的结果`,
    method_safe_content: `
      <p>2024年1月，美国国立医学图书馆关闭了其免费的药物相互作用API。目前已不存在免费、全面、带严重程度分级的相互作用数据库——这类数据现在掌握在付费的临床数据库（DrugBank、Micromedex）手中。</p>
      <p>因此，这个工具可以确认它已知的某个相互作用，但<b>永远无法</b>证明某种组合是安全的。"未找到结果"只意味着它不在我们整理的集合中，也没有在我们查过的FDA标签中找到——并不代表这些药物一起使用是安全的。这就是为什么你在这里永远不会看到绿色的对勾。请务必咨询药师确认。</p>
    `,
    method_why_summary: "药物相互作用究竟为什么会发生？",
    method_why_content: `
      <p>本网站上每一条"为什么"的解释，都可以追溯到几种反复出现的机制之一。了解这些机制，能让每一条具体解释变得有意义，而不只是零散的知识点：</p>
      <p><b>肝酶竞争。</b>你的肝脏使用一类叫做CYP450的酶来清除大多数药物。某些药物会阻断或占用某种特定的CYP酶，导致依赖同一种酶的其他药物无法正常清除，反而在血液中累积——本站大多数"会提高……水平"的相互作用都源于此（他汀类药物+某些抗生素、华法林+某些抗真菌药）。</p>
      <p><b>叠加（累积）效应。</b>两种对身体产生类似作用的药物——抑制中枢神经系统、稀释血液、提高血清素水平——合并使用时并不会只是温和地相加；合并后的效应往往比单独使用任何一种都强得多。这就是为什么阿片类药物+苯二氮䓬类药物，或两种提高血清素的药物合用，都被视为严重情况。</p>
      <p><b>电解质和肾脏清除变化。</b>有些药物组合会把同一种电解质（比如钾）往同一个方向推，或者其中一种会改变肾脏清除另一种的速度——单独看影响很小，但组合起来可能使水平过高或过低。</p>
      <p><b>吸收或蛋白结合干扰。</b>有时一种物质会从物理上阻碍另一种物质被吸收，或将其从血液中负责运输的蛋白质上替换下来，从而改变实际可用的有效药物量。</p>
      <p>本站列出的每一条具体相互作用，都会在自己的"为什么"这一行说明实际发生的是上述哪种机制——这一部分只是把这些点连起来。</p>
    `,
    method_account_summary: "我的账户数据会怎样处理",
    method_account_content: `<p>登录是可选的——解读功能和相互作用检查无需账户即可使用。如果你登录（是为了使用"我的药柜"），系统只会保存你选择保存的药物和你输入的备注，存放在<a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a>数据库中，与你的用户ID绑定。行级安全策略在数据库层面确保你的数据只能被你自己读取和修改。删除一种药物会删除对应的记录，不会留有另外的副本。你的搜索记录不会被保存。</p>`,
    method_symptoms_summary: "「症状」标签页到底是什么（以及不是什么）",
    method_symptoms_content: `
      <p><b>它不诊断任何东西。</b>这里没有"可能病因"的排序列表，没有严重程度评分，也没有AI猜测你到底怎么了。选择"头痛"和"流鼻涕"并不会得出某种病症——它只会给出人们通常针对这些症状使用的非处方产品的大类（例如"止痛药"、"减充血剂"），这和急救指南里的那种教科书级别的对应关系是一样的。</p>
      <p>这种"症状对应类别"的映射是一个经过对照标准参考文献审核的小型人工整理集合——不是临时编造的。每个类别下展示的实际产品示例，都是你搜索的那一刻<b>从openFDA实时获取</b>的，和本应用其他部分的做法完全一样。</p>
      <p>"立即就医"清单是标准的公共卫生紧急指南，并不是根据你的选择计算出来的——无论你选了什么，它都会完整显示，因为识别紧急情况不应该取决于你有没有答对一份问卷。</p>
    `,
    method_limits_summary: "如实说明局限性",
    method_limits_content: `<p>整理的相互作用集合只涵盖了几十种最重要的相互作用，并非全部。FDA标签这一层只能捕捉到标签中直接提及的相互作用，而不同标签的详略程度也不一样。剂量、你的健康状况、饮食和补充剂都会产生影响，但本工具都没有考虑这些因素。这是一个学习工具，不是临床决策系统。</p>`,

    faq_heading: "常见问题",
    faq_pharmacist_summary: "这能替代我的药师或医生吗？",
    faq_pharmacist_content: `<p>不能——绝对不能。Plainscript是帮助你了解自己所用药物、在真正对话之前做好心理准备的参考工具，而不是替代那次对话。药师了解你的完整病史、用药剂量和其他病情；而这里的任何内容都不了解这些。</p>`,
    faq_notfound_summary: "为什么我的药物在「解读」里查不到？",
    faq_notfound_content: `<p>"解读"功能只显示FDA openFDA标签数据库中收录的内容。有些配制药物、非常新的药物，或以不常见名称销售的产品，可能尚未被收录。如果你搜索的是商品名，可以试试通用名（反之亦然）——如果是拼写问题，"你是不是想找"的建议可能会有帮助。</p>`,
    faq_current_summary: "数据的时效性如何？",
    faq_current_content: `<p>"解读"功能和相互作用检查器中的FDA标签层，都是你每次搜索时从openFDA实时获取的——在我们这边绝不会被缓存或过期。而经过人工整理的相互作用、食物/酒精，以及药物类别相关内容，是定期人工审核的，不会自动实时更新，所以更新速度会比FDA标签数据本身慢一些。</p>`,
    faq_free_summary: "这是免费的吗？以后会一直免费吗？",
    faq_free_content: `<p>是的，而且这就是我们的计划。Plainscript运行在免费层级的基础设施上（openFDA和RxNorm是免费且无需密钥的；Supabase和Cloudflare都提供慷慨的免费额度）。目前没有计划推出付费版本。</p>`,
    faq_caregiver_summary: "我可以用它来照顾别人，而不只是我自己吗？",
    faq_caregiver_content: `<p>可以——"解读"、相互作用检查器，以及「症状」标签页，都可以用于任何人的药物，无论是否登录。"我的药柜"目前是围绕单一登录账户设计的，还不能区分多个人的用药清单——如果你在同时管理多个人的用药，请先留意这一点。</p>`,

    faq_error_content: `<p>请告诉我们——见页脚的"报告错误"链接。这里的每一条整理内容（相互作用、药物类别说明、食物/酒精提示）都对照标准参考文献审核过，但仍然可能出错，而一个无法被纠正的工具是不值得信赖的。收到的更正会被审核并修复，而不是被忽视。</p>`,

function t(key){
  const dict = I18N[uiLang] || I18N.en;
  return (key in dict) ? dict[key] : (I18N.en[key] || key);
}

/* picks the current-language version of a {en, es, ...} translatable
   field on the curated data arrays below; falls back to English. */
function pickLang(field){
  if (!field) return "";
  if (typeof field === "string") return field; // already-plain string, untranslated field
  return field[uiLang] || field.en || "";
}

function applyTranslations(){
  document.documentElement.lang = uiLang;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.querySelectorAll("[data-i18n-aria-label]").forEach(el => { el.setAttribute("aria-label", t(el.dataset.i18nAriaLabel)); });
  const langLabel = document.getElementById("lang-label");
  if (langLabel) langLabel.textContent = uiLang.toUpperCase();
}

/* ---- helpers ----------------------------------------------------- */
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const titlecase = s => (s||"").toLowerCase().replace(/\b\w/g, c => c.toUpperCase());

/* turn a typed name into a set of tokens we can match on */
function baseTokens(name){
  const n = name.trim().toLowerCase();
  const set = new Set([n]);
  if (ALIASES[n]) set.add(ALIASES[n]);
  // also split multiword brand like "ms contin"
  if (ALIASES[n]) {} 
  return set;
}

/* does a token set hit a rule side (list of ingredient/class tokens)? */
function sideHit(tokens, side){
  for (const t of tokens){
    for (const s of side){
      if (t === s) return true;
      if (t.includes(s) || s.includes(t)) { if (s.length>=4) return true; }
    }
  }
  return false;
}

/* ---- openFDA fetch ------------------------------------------------ */
async function fetchLabel(name){
  const q = encodeURIComponent(name.trim().toLowerCase());
  const url = `${FDA}?search=(openfda.brand_name:"${q}"+openfda.generic_name:"${q}"+openfda.substance_name:"${q}")&limit=1`;
  const res = await fetch(url);
  if (res.status === 404) return null;          // openFDA returns 404 when nothing matches
  if (!res.ok) throw new Error("FDA service error ("+res.status+")");
  const data = await res.json();
  return (data.results && data.results[0]) || null;
}

/* pull the human-meaningful pieces out of a raw label record */
function parseLabel(rec){
  const of = rec.openfda || {};
  const first = a => Array.isArray(a) && a.length ? a[0] : null;
  const clsRaw = first(of.pharm_class_epc) || first(of.pharm_class_moa) || first(of.pharm_class_cs) || null;
  return {
    brand: first(of.brand_name),
    generic: first(of.generic_name),
    klass: clsRaw ? clsRaw.replace(/\s*\[.*?\]\s*/g,"").trim() : null,
    klassRaw: clsRaw, // unstripped — needed to re-query openFDA for same-class drugs
    rxcui: first(of.rxcui),
    substances: (of.substance_name||[]).map(s=>s.toLowerCase()),
    indications: first(rec.indications_and_usage),
    moa: first(rec.mechanism_of_action),
    adverse: first(rec.adverse_reactions),
    interactionsText: (rec.drug_interactions||[]).join(" "), // used for curated/label-mention matching
    boxed: first(rec.boxed_warning),
    // full-label-details fields (Phase 4): same sourcing rule as everything
    // else here — shown verbatim from the label, never summarized into advice
    activeIngredient: first(rec.active_ingredient),
    inactiveIngredient: first(rec.inactive_ingredient),
    contraindications: first(rec.contraindications),
    warnings: first(rec.warnings) || first(rec.warnings_and_cautions),
    precautions: first(rec.precautions),
    interactionsProse: first(rec.drug_interactions), // the label's own interactions text, for display
    dosage: first(rec.dosage_and_administration),
    pregnancy: first(rec.pregnancy) || first(rec.pregnancy_or_breast_feeding) || first(rec.teratogenic_effects),
    nursing: first(rec.nursing_mothers)
  };
}

/* find a label, rescuing typos via RxNorm before giving up. Shared by
   Decode and My Cabinet so both resolve names the same way.

   Instead of silently committing to RxNorm's single best guess, this
   collects up to 5 similarly-spelled candidate names and returns them
   as `alternates` — the UI shows these as "did you mean" choices so a
   misspelling doesn't just guess once and stop. */
async function resolveLabel(name){
  let rec = await fetchLabel(name);
  let suggested = null;
  let alternates = [];
  if (!rec){
    try{
      const r = await fetch(`${RXNORM}/approximateTerm.json?term=${encodeURIComponent(name)}&maxEntries=8`);
      const j = await r.json();
      const cands = (j.approximateGroup && j.approximateGroup.candidate) || [];
      const seenRxcui = new Set();
      for (const c of cands){
        if (!c.rxcui || seenRxcui.has(c.rxcui)) continue;
        seenRxcui.add(c.rxcui);
        try{
          const r2 = await fetch(`${RXNORM}/rxcui/${c.rxcui}/property.json?propName=RxNorm%20Name`);
          const j2 = await r2.json();
          const s = j2.propConceptGroup && j2.propConceptGroup.propConcept && j2.propConceptGroup.propConcept[0].propValue;
          if (s && s.toLowerCase() !== name.toLowerCase() && !alternates.some(a=>a.toLowerCase()===s.toLowerCase())){
            alternates.push(s);
          }
        }catch(e){/* skip this candidate, try the next */}
        if (alternates.length >= 5) break;
      }
      if (alternates.length){
        suggested = alternates[0];
        rec = await fetchLabel(alternates[0].split(" ")[0]);
      }
    }catch(e){/* typo rescue is best-effort */}
  }
  return { rec, suggested, alternates };
}

/* trim long FDA prose to a readable excerpt */
function excerpt(t, n=480){
  if (!t) return null;
  t = t.replace(/\s+/g," ").trim();
  if (t.length <= n) return t;
  const cut = t.slice(0,n); const sp = cut.lastIndexOf(" ");
  return cut.slice(0, sp>0?sp:n) + "…";
}

/* ---- OPTIONAL plain-English mode (Claude via your proxy) ----------
   Strictly a rephraser (or, in Spanish mode, a translator+rephraser).
   The system prompt forbids adding facts, in every language — locked
   server-side in worker.js, keyed by `lang`. The original FDA text
   always stays available behind a toggle.
------------------------------------------------------------------- */
async function toPlainEnglish(text, label, lang){
  if (!CLAUDE_PROXY_URL || !text) return null;
  // The safety-locked prompt lives in the Worker (worker.js), NOT here — so
  // the proxy can only ever rephrase/translate FDA text and can't be
  // repurposed to generate medical claims. We just hand it the text, which
  // section it is, and which language to render it in.
  try{
    const res = await fetch(CLAUDE_PROXY_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ text, label, lang: lang || "en" })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return (data.plain || "").trim() || null;
  }catch(e){ return null; }
}

  try{ const rr = await resolveLabel(name); rec = rr.rec; noteName = rr.suggested; altNames = rr.alternates || []; }
  catch(e){ box.innerHTML = `<div class="err">${esc(e.message)}. ${esc(t("try_again_moment"))}</div>`; return; }

  if (!rec){
    box.innerHTML = `<div class="nofind"><span class="eyebrow">${esc(t("decode_no_match_eyebrow"))}</span>
      <h3>${esc(t("decode_no_match_title_prefix"))} “${esc(name)}”.</h3>
      <p>${esc(t("decode_no_match_body"))}</p></div>
      ${altNames.length ? didYouMeanHTML(altNames) : ""}`;
    wireDidYouMean(box);
    return;
  }

  const d = parseLabel(rec);
  const displayName = d.brand && d.generic && d.brand.toLowerCase()!==d.generic.toLowerCase()
      ? titlecase(d.brand) : titlecase(d.generic||d.brand||name);

  // build the monograph card
  let strip = [];
  if (d.generic) strip.push(`<span><b>generic</b> ${esc(titlecase(d.generic))}</span>`);
  if (d.brand && d.brand.toLowerCase()!==(d.generic||"").toLowerCase()) strip.push(`<span><b>brand</b> ${esc(titlecase(d.brand))}</span>`);
  if (d.klass) strip.push(`<span><b>class</b> ${esc(d.klass)}</span>`);
  if (d.rxcui) strip.push(`<span><b>rxcui</b> ${esc(d.rxcui)}</span>`);

  // tokens for this drug, same shape the drug-drug engine uses — lets us
  // check the food/alcohol and cross-sensitivity curated sets too
  const tokens = baseTokens(name);
  (d.substances||[]).forEach(s=>tokens.add(s));
  if (d.generic) tokens.add(d.generic.toLowerCase());
  const classExplainer = findClassExplainer(d.klass);
  const foodHits = foodInteractionsFor(tokens);
  const sensitivityHits = crossSensitivityFor(tokens);

  // Overview — the same core fields Plainscript has always shown
  const rows = [];
  rows.push(makeRow(t("row_used_for"), d.indications, t("src_indications")));
  rows.push(makeRow(t("row_how_works"), d.moa, t("src_moa")));
  if (classExplainer) rows.push(makeRow(`${t("about_class_prefix")} ${pickLang(classExplainer.name)}`, pickLang(classExplainer.text), t("src_class_explainer")));
  rows.push(makeRow(t("row_side_effects"), d.adverse, t("src_adverse")));
  if (d.boxed) rows.push(makeRow(t("row_boxed"), d.boxed, t("src_boxed"), true));

  // Full label details — everything else on the label, verbatim. This is
  // reference text straight from the FDA label, same as the rows above —
  // not a recommendation, not a calculated dose, just what the label says.
  const fullRows = [];
  fullRows.push(makeRow(t("row_active_ingredient"), d.activeIngredient, t("src_active_ingredient")));
  fullRows.push(makeRow(t("row_inactive_ingredient"), d.inactiveIngredient, t("src_inactive_ingredient")));
  fullRows.push(makeRow(t("row_contraindications"), d.contraindications, t("src_contraindications")));
  fullRows.push(makeRow(t("row_warnings"), d.warnings, t("src_warnings")));
  fullRows.push(makeRow(t("row_precautions"), d.precautions, t("src_precautions")));
  fullRows.push(makeRow(t("row_interacts"), d.interactionsProse, t("src_interacts")));
  fullRows.push(makeRow(t("row_dosage"), d.dosage, t("src_dosage")));
  fullRows.push(makeRow(t("row_pregnancy"), d.pregnancy, t("src_pregnancy")));
  fullRows.push(makeRow(t("row_nursing"), d.nursing, t("src_nursing")));
  const hasFullRows = fullRows.some(Boolean);

  box.innerHTML = `
    ${noteName ? `<div class="status">${esc(t("decode_closest_match"))} <strong>${esc(titlecase(noteName))}</strong></div>`:""}
    ${altNames.length>1 ? didYouMeanHTML(altNames.filter(n=>n.toLowerCase()!==noteName.toLowerCase())) : ""}
    ${(uiLang==="es" && !CLAUDE_PROXY_URL) ? `<div class="status" style="padding-bottom:10px;">🌐 ${esc(t("spanish_no_worker_note"))}</div>` : ""}
    <article class="card">
      <div class="card-head">
        <span class="eyebrow">${esc(t("overview_eyebrow"))}</span>
        <div class="name">${esc(displayName)}</div>
        ${strip.length?`<div class="datastrip">${strip.join("")}</div>`:""}
      </div>
      <div class="card-body">${rows.filter(Boolean).join("")}</div>
    </article>
    ${hasFullRows ? `
    <article class="card">
      <div class="card-head">
        <span class="eyebrow">${esc(t("full_label_eyebrow"))}</span>
        <div class="name" style="font-size:19px;">${esc(t("full_label_title_prefix"))} ${esc(displayName)}${esc(t("full_label_title_suffix"))}</div>
      </div>
      <div class="card-body">${fullRows.filter(Boolean).join("")}</div>
    </article>` : ""}
    ${(foodHits.length || sensitivityHits.length) ? renderFoodAndAllergyCard(displayName, foodHits, sensitivityHits) : ""}
    <p class="status" style="padding-top:4px;">${esc(t("decode_footer_note"))}</p>
  `;

  // Phase 2: offer to save this med to the signed-in user's cabinet
  addCabinetSave(box, d, name);

  // similar/related medications — same-class, other forms/strengths, and
  // combination products that share this ingredient (Phase 4)
  addSimilarButton(box, d, displayName);

  // optional: upgrade prose to plain English if proxy configured
  enhanceRows(box, d);
}

function makeRow(label, text, src, warn){
  if (!text) return "";
  const ex = excerpt(text);
  const full = text.replace(/\s+/g," ").trim();
  const needExpand = full.length > ex.length;
  const id = "r"+Math.random().toString(36).slice(2,8);
  return `<div class="row" data-full="${esc(full)}" data-label="${esc(label)}">
    <span class="eyebrow">${esc(label)}</span>
    <p data-role="text">${esc(ex)}</p>
    ${needExpand?`<button class="expand" data-target="${id}">${esc(t("show_full_text"))}</button><p id="${id}" data-role="full" hidden style="margin-top:8px;color:var(--ink-soft);">${esc(full)}</p>`:""}
    <div class="src">${esc(src)}</div>
  </div>`;
}

        <p>${esc(pickLang(f.what))}</p>

  box.querySelectorAll(".expand").forEach(btn=>{
    btn.addEventListener("click",()=>{

    });

/* ---- voice input (Phase 5) ----------------------------------------
   Feature-detected: Firefox and some browsers don't support the Web
   Speech API at all, so the mic button simply never appears there —
   no broken UI, no dependency, nothing to configure. Chrome/Edge/Safari
   (recent versions) support it natively. */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

/* attaches a mic button right after `inputEl`. If `autoSubmit` is given,
   it's called automatically once speech is recognized (fine for a
   read-only action like Decode); if not, the field is just filled and
   the user reviews before submitting themselves (used for My Cabinet,
   where auto-submitting a mis-heard drug name would silently save it). */
function addVoiceButton(inputEl, autoSubmit){
  if (!SpeechRec) return;
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "mic-btn";
  btn.title = "Speak instead of typing";
  btn.setAttribute("aria-label", "Use voice input instead of typing");
  btn.textContent = "🎤";
  btn.addEventListener("click", () => {
    if (btn.classList.contains("listening")) return; // already listening — ignore a second tap
    const rec = new SpeechRec();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    btn.classList.add("listening");
    btn.textContent = "●";
    rec.onresult = (e) => {
      const text = e.results[0][0].transcript;
      inputEl.value = text;
      if (autoSubmit) autoSubmit();
    };
    rec.onerror = () => {};
    rec.onend = () => { btn.classList.remove("listening"); btn.textContent = "🎤"; };
    try{ rec.start(); }catch(e){ btn.classList.remove("listening"); btn.textContent = "🎤"; }
  });
  inputEl.insertAdjacentElement("afterend", btn);
}

/* resolve one name into curated-matching tokens + its FDA label. Shared by
   the pairwise Check tab and the whole-cabinet Scan (Phase 3) so both run
   the exact same resolution. */
async function resolveForAnalysis(name){
  const tokens = baseTokens(name);
  let label = null;
  try{ const rec = await fetchLabel(name); if (rec){ label = parseLabel(rec); (label.substances||[]).forEach(s=>tokens.add(s)); if(label.generic) tokens.add(label.generic.toLowerCase()); } }
  catch(e){ /* label optional */ }
  return { name, display:titlecase(name), tokens, label };
}

/* run every unique pair of resolved drugs through the curated set, then the
   FDA-label mention layer. Shared by the Check tab and Cabinet Scan. */
function analyzeDrugPairs(drugs){
  const findings = [];   // curated severity hits
  const mentions = [];   // FDA-label cross-references
  for (let i=0;i<drugs.length;i++){
    for (let j=i+1;j<drugs.length;j++){
      const A=drugs[i], B=drugs[j];

      let matched=false;
      for (const rule of INTERACTIONS){
        const ab = sideHit(A.tokens,rule.a) && sideHit(B.tokens,rule.b);
        const ba = sideHit(A.tokens,rule.b) && sideHit(B.tokens,rule.a);
        if (ab||ba){ findings.push({A,B,rule}); matched=true; break; }
      }
      if (matched) continue;

      const m = labelMentions(A,B) || labelMentions(B,A);
      if (m) mentions.push(m);
    }
  }
  return { findings, mentions };
}

async function checkInteractions(){
  const inputs = [...$("#drug-list").querySelectorAll("input")].map(i=>i.value.trim()).filter(Boolean);
  const box = $("#check-results");
  if (inputs.length < 2){ box.innerHTML = `<div class="err">${esc(t("check_min_two"))}</div>`; return; }
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("check_checking_prefix"))} ${inputs.length} ${esc(t("check_checking_suffix"))}</div>`;

  const drugs = [];
  for (const name of inputs) drugs.push(await resolveForAnalysis(name));

  const { findings, mentions } = analyzeDrugPairs(drugs);
  renderResults(box, drugs, findings, mentions);
}

/* check whether drug X's FDA interaction text names drug Y */
function labelMentions(X, Y){
  if (!X.label || !X.label.interactionsText) return null;
  const text = X.label.interactionsText.toLowerCase();
  const cands = [...Y.tokens].filter(t=>t.length>=5); // avoid short false hits
  for (const t of cands){
    const idx = text.indexOf(t);
    if (idx>-1){
      // grab the surrounding sentence as a snippet
      let start = text.lastIndexOf(".", idx); start = start<0?0:start+1;
      let end = text.indexOf(".", idx); end = end<0?Math.min(text.length, idx+160):end+1;
      const snip = X.label.interactionsText.slice(start,end).replace(/\s+/g," ").trim();
      return { from:X.display, to:Y.display, term:t, snippet: snip.length>220? snip.slice(0,220)+"…":snip };
    }
  }
  return null;
}

function renderResults(box, drugs, findings, mentions){
  let html = "";

  // order curated findings by severity
  const rank = {major:0,moderate:1,minor:2};
  findings.sort((x,y)=>rank[x.rule.severity]-rank[y.rule.severity]);

  if (findings.length){
    html += `<p class="eyebrow" style="margin-bottom:2px;">${esc(t("documented_interactions"))} · ${findings.length}</p>`;
    for (const f of findings){
      const s=f.rule.severity;
      const sevLabel = s==="major"?t("sev_major"):s==="moderate"?t("sev_moderate"):t("sev_minor");
      html += `<div class="verdict v-${s}">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(f.A.display)} ✕ ${esc(f.B.display)}</div>
          <div class="sev"><span class="pill">${s}</span> ${esc(sevLabel)}</div>
          <p>${esc(pickLang(f.rule.what))}</p>
          <p class="mgmt"><b>${esc(t("why_label"))}</b> ${esc(pickLang(f.rule.why))}</p>
          <p class="mgmt"><b>${esc(t("mgmt_label"))}</b> ${esc(pickLang(f.rule.mgmt))}</p>
          <div class="src">${t("src_curated_interaction")}</div>
        </div>
      </div>`;
    }
  }

  if (mentions.length){
    html += `<p class="eyebrow" style="margin:18px 0 2px;">${esc(t("also_noted_fda"))} · ${mentions.length}</p>`;
    for (const m of mentions){
      html += `<div class="verdict v-note">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(m.from)} → mentions → ${esc(m.to)}</div>
          <div class="sev"><span class="pill">${esc(t("label_pill"))}</span> ${esc(t("named_in_label"))}</div>
          <p>${esc(m.from)}${esc(t("mentions_text"))} ${esc(m.to)} ${esc(t("mentions_text2"))}</p>
          <p class="mgmt" style="font-style:italic;">“…${esc(m.snippet)}…”</p>
          <div class="src">${esc(t("src_fda_mention"))}</div>
        </div>
      </div>`;
    }
  }

  // the cautious empty state — never a green "safe"
  if (!findings.length && !mentions.length){
    html += `<div class="nofind">
      <span class="eyebrow">${esc(t("no_interaction_eyebrow"))}</span>
      <h3>${esc(t("no_interaction_title"))}</h3>
      <p>${esc(t("no_interaction_body"))}</p>
    </div>`;
  } else {
    html += `<p class="status" style="padding-top:14px;">${esc(t("check_results_note"))}</p>`;
  }

  box.innerHTML = html;
}

async function runSymptomLookup(){
  const box = $("#symptom-results");
  const checked = [...document.querySelectorAll('#symptom-list input:checked')].map(i => i.value);
  if (!checked.length){ box.innerHTML = `<div class="err">${esc(t("symptoms_pick_one"))}</div>`; return; }

  // multiple picked symptoms can map to the same category (headache + fever
  // both land on pain/fever relievers) — collapse to one section each
  const matched = [];
  const seenCategory = new Set();
  for (const key of checked){
    const entry = SYMPTOM_CATEGORIES.find(s => s.key === key);
    if (!entry || seenCategory.has(entry.catKey)) continue;
    seenCategory.add(entry.catKey);
    matched.push(entry);
  }

  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("symptoms_looking_up"))}</div>`;

  const sections = [];
  for (const m of matched){
    const items = [];
    for (const ingredient of m.examples){
      try{
        const rec = await fetchLabel(ingredient);
        if (rec){
          const p = parseLabel(rec);
          const label = titlecase(p.brand || p.generic || ingredient);
          if (!items.some(x => x.name.toLowerCase() === label.toLowerCase())){
            items.push({ name: label, generic: p.generic || ingredient });
          }
        }
      }catch(e){ /* skip this one example, keep going */ }
    }
    sections.push({ ...m, items });
  }

  box.innerHTML = sections.map(s => `
    <article class="card" style="margin-bottom:14px;">
      <div class="card-head">
        <span class="eyebrow">${esc(t("symptom_category_eyebrow"))} · ${esc(pickLang(s.symptom))}</span>
        <div class="name" style="font-size:19px;">${esc(pickLang(s.category))}</div>
      </div>
      <div class="card-body">
        <div class="row">
          <p>${esc(pickLang(s.note))}</p>
          <div class="src">${esc(t("src_symptom_category"))}</div>
        </div>
        ${s.items.length ? `<div class="row">
          <span class="eyebrow">${esc(t("real_examples_eyebrow"))}</span>
          <div class="cabinet-map" style="margin-top:8px;">
            ${s.items.map(it => `<button class="map-chip" data-name="${esc(it.name)}"><b>${esc(it.name)}</b>${it.generic ? ` · ${esc(titlecase(it.generic))}` : ""}</button>`).join("")}
          </div>
        </div>` : ""}
      </div>
    </article>
  `).join("") + `<p class="status" style="padding-top:6px;">${esc(t("symptoms_result_note"))}</p>`;

  box.querySelectorAll("button.map-chip").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      selectTab("decode");
      $("#decode-input").value = btn.dataset.name;
      decode();
    });
  });
}
