const DRUG_CLASS_EXPLAINERS = [
  { match:["nonsteroidal anti-inflammatory"], name:{en:"NSAIDs (nonsteroidal anti-inflammatory drugs)", es:"AINE (antiinflamatorios no esteroideos)", zh:"非甾体抗炎药（NSAID）", vi:"NSAID (thuốc kháng viêm không steroid)", ar:"مضادات الالتهاب غير الستيرويدية (NSAIDs)", fr:"AINS (anti-inflammatoires non stéroïdiens)"},
    text:{en:"NSAIDs treat pain, fever, and inflammation by blocking COX enzymes your body uses to make inflammatory chemicals. The same mechanism that helps also irritates the stomach lining and can affect kidney blood flow, especially with long-term or high-dose use.",
          es:"Los AINE tratan el dolor, la fiebre, y la inflamación bloqueando las enzimas COX que tu cuerpo usa para producir sustancias inflamatorias. El mismo mecanismo que ayuda también irrita el revestimiento del estómago y puede afectar el flujo sanguíneo renal, especialmente con uso prolongado o en dosis altas.", zh:"非甾体抗炎药通过阻断COX酶来治疗疼痛、发烧和炎症，而身体正是利用这种酶来产生炎症物质。同样的机制在起作用的同时，也会刺激胃黏膜，并可能影响肾脏的血流，尤其是长期或高剂量使用时。", vi:"NSAID điều trị đau, sốt, và viêm bằng cách ức chế enzyme COX mà cơ thể dùng để tạo ra các chất gây viêm. Chính cơ chế giúp ích này cũng gây kích ứng niêm mạc dạ dày và có thể ảnh hưởng đến lưu lượng máu ở thận, đặc biệt khi dùng lâu dài hoặc liều cao.", ar:"تعالج مضادات الالتهاب غير الستيرويدية الألم والحمى والالتهاب عن طريق تثبيط إنزيمات COX التي يستخدمها جسمك لصنع المواد المسببة للالتهاب. الآلية نفسها التي تساعد تُهيّج أيضًا بطانة المعدة ويمكن أن تؤثر على تدفق الدم إلى الكلى، خاصة مع الاستخدام طويل الأمد أو بجرعات عالية.", fr:"Les AINS traitent la douleur, la fièvre, et l'inflammation en bloquant les enzymes COX que votre corps utilise pour fabriquer des substances inflammatoires. Le même mécanisme qui soulage irrite aussi la paroi de l'estomac et peut affecter le flux sanguin rénal, surtout en cas d'usage prolongé ou à forte dose."} },
  { match:["selective serotonin reuptake inhibitor"], name:{en:"SSRIs (selective serotonin reuptake inhibitors)", es:"ISRS (inhibidores selectivos de la recaptación de serotonina)", zh:"SSRI（选择性5-羟色胺再摄取抑制剂）", vi:"SSRI (thuốc ức chế tái hấp thu serotonin có chọn lọc)", ar:"مثبطات استرداد السيروتونين الانتقائية (SSRIs)", fr:"ISRS (inhibiteurs sélectifs de la recapture de la sérotonine)"},
    text:{en:"SSRIs treat depression and anxiety by leaving more serotonin available in the brain's signaling gaps. They typically take several weeks to reach full effect, and stopping abruptly can cause withdrawal-like symptoms — tapering under a doctor's guidance is standard.",
          es:"Los ISRS tratan la depresión y la ansiedad dejando más serotonina disponible en los espacios de señalización del cerebro. Suelen tardar varias semanas en alcanzar el efecto completo, y suspenderlos de golpe puede causar síntomas parecidos a la abstinencia — reducir la dosis gradualmente bajo la guía de un médico es lo estándar.", zh:"SSRI通过让大脑信号传递间隙中留存更多5-羟色胺来治疗抑郁和焦虑。通常需要几周时间才能达到完全效果，突然停药可能引起类似戒断的症状——在医生指导下逐渐减量是标准做法。", vi:"SSRI điều trị trầm cảm và lo âu bằng cách giữ lại nhiều serotonin hơn ở các khoảng trống truyền tín hiệu trong não. Thường mất vài tuần để đạt hiệu quả đầy đủ, và ngừng thuốc đột ngột có thể gây các triệu chứng giống cai thuốc — giảm liều từ từ dưới hướng dẫn của bác sĩ là cách làm tiêu chuẩn.", ar:"تعالج SSRI الاكتئاب والقلق عن طريق ترك المزيد من السيروتونين متاحًا في فجوات الإشارة في الدماغ. عادةً ما تستغرق عدة أسابيع للوصول إلى التأثير الكامل، والتوقف المفاجئ عنها يمكن أن يسبب أعراضًا شبيهة بالانسحاب — التخفيض التدريجي تحت إشراف طبيب هو المعيار المتبع.", fr:"Les ISRS traitent la dépression et l'anxiété en laissant plus de sérotonine disponible dans les espaces de communication du cerveau. Ils mettent généralement plusieurs semaines à atteindre leur plein effet, et un arrêt brutal peut provoquer des symptômes de type sevrage — une diminution progressive sous la supervision d'un médecin est la norme."} },
  { match:["serotonin and norepinephrine reuptake","snri"], name:{en:"SNRIs", es:"IRSN", zh:"SNRI（5-羟色胺去甲肾上腺素再摄取抑制剂）", vi:"SNRI", ar:"مثبطات استرداد السيروتونين والنورإبينفرين (SNRIs)", fr:"IRSN"},
    text:{en:"SNRIs work like SSRIs but also boost norepinephrine, another mood- and pain-related brain chemical — which is why some SNRIs are also used for certain chronic pain conditions.",
          es:"Los IRSN funcionan como los ISRS pero también elevan la norepinefrina, otra sustancia cerebral relacionada con el ánimo y el dolor — por eso algunos IRSN también se usan para ciertas condiciones de dolor crónico.", zh:"SNRI的作用方式类似SSRI，但还会提高去甲肾上腺素——另一种与情绪和疼痛相关的脑内化学物质——这也是为什么部分SNRI也用于治疗某些慢性疼痛。", vi:"SNRI hoạt động giống SSRI nhưng còn làm tăng norepinephrine, một chất hóa học khác trong não liên quan đến tâm trạng và cảm giác đau — đây là lý do một số SNRI cũng được dùng cho một số tình trạng đau mạn tính.", ar:"تعمل SNRI مثل SSRI لكنها ترفع أيضًا النورإبينفرين، وهو مادة كيميائية أخرى في الدماغ مرتبطة بالمزاج والألم — وهذا سبب استخدام بعض SNRI أيضًا لبعض حالات الألم المزمن.", fr:"Les IRSN agissent comme les ISRS mais augmentent aussi la noradrénaline, une autre substance cérébrale liée à l'humeur et à la douleur — c'est pourquoi certains IRSN sont aussi utilisés pour certaines douleurs chroniques."} },
  { match:["monoamine oxidase inhibitor"], name:{en:"MAOIs", es:"IMAO", zh:"MAOI（单胺氧化酶抑制剂）", vi:"Thuốc ức chế MAO", ar:"مثبطات أوكسيديز أحادي الأمين (MAOIs)", fr:"IMAO"},
    text:{en:"MAOIs block an enzyme that breaks down mood-related brain chemicals, raising their levels. That broad effect is why MAOIs interact seriously with many other medications — and with certain foods (see \"Food & drink to know about\" below, if any apply).",
          es:"Los IMAO bloquean una enzima que descompone sustancias cerebrales relacionadas con el ánimo, elevando sus niveles. Ese efecto amplio es la razón por la que los IMAO interactúan seriamente con muchos otros medicamentos — y con ciertos alimentos (mira \"Notas de alimentos y bebidas\" abajo, si aplica alguna).", zh:"MAOI会阻断分解与情绪相关的脑内化学物质的酶，从而提高其水平。正是这种广泛的作用，使MAOI与许多其他药物存在严重的相互作用——也与某些食物存在相互作用（如适用，请参见下方的\"食物与饮品须知\"）。", vi:"Thuốc ức chế MAO ngăn chặn một enzyme phân giải các chất hóa học trong não liên quan đến tâm trạng, làm tăng nồng độ của chúng. Chính tác động rộng này là lý do thuốc ức chế MAO tương tác nghiêm trọng với nhiều loại thuốc khác — và với một số thực phẩm nhất định (xem mục «Lưu ý về thực phẩm và đồ uống» bên dưới, nếu có áp dụng).", ar:"تُثبّط مثبطات MAO إنزيمًا يُفكّك المواد الكيميائية المرتبطة بالمزاج في الدماغ، فترفع مستوياتها. هذا التأثير الواسع هو سبب تفاعل مثبطات MAO بشكل خطير مع العديد من الأدوية الأخرى — ومع أطعمة معينة (انظر «ملاحظات الطعام والشراب» أدناه إن انطبقت).", fr:"Les IMAO bloquent une enzyme qui décompose des substances cérébrales liées à l'humeur, augmentant leurs niveaux. Ce large effet explique pourquoi les IMAO interagissent gravement avec de nombreux autres médicaments — et avec certains aliments (voir « Notes sur l'alimentation et les boissons » ci-dessous, le cas échéant)."} },
  { match:["ace inhibitor","angiotensin converting enzyme"], name:{en:"ACE inhibitors", es:"Inhibidores de la ECA", zh:"ACE抑制剂", vi:"Thuốc ức chế men chuyển (ACE)", ar:"مثبطات الإنزيم المحول للأنجيوتنسين (ACE)", fr:"Inhibiteurs de l'ECA"},
    text:{en:"ACE inhibitors lower blood pressure by blocking an enzyme that narrows blood vessels. A dry, persistent cough is a well-known side effect for some people, caused by the same enzyme pathway.",
          es:"Los inhibidores de la ECA bajan la presión arterial bloqueando una enzima que estrecha los vasos sanguíneos. Una tos seca y persistente es un efecto secundario bien conocido en algunas personas, causado por esa misma vía enzimática.", zh:"ACE抑制剂通过阻断一种使血管收缩的酶来降低血压。持续的干咳是部分人常见的副作用，由同一条酶通路引起。", vi:"Thuốc ức chế ACE làm giảm huyết áp bằng cách ức chế một enzyme làm co mạch máu. Ho khan, dai dẳng là tác dụng phụ được biết đến rõ ở một số người, do cùng con đường enzyme đó gây ra.", ar:"تخفض مثبطات ACE ضغط الدم عن طريق تثبيط إنزيم يُضيّق الأوعية الدموية. السعال الجاف المستمر أثر جانبي معروف جيدًا لدى بعض الأشخاص، ويحدث بسبب نفس المسار الإنزيمي.", fr:"Les inhibiteurs de l'ECA abaissent la tension artérielle en bloquant une enzyme qui rétrécit les vaisseaux sanguins. Une toux sèche et persistante est un effet secondaire bien connu chez certaines personnes, causé par cette même voie enzymatique."} },
  { match:["angiotensin ii receptor","angiotensin receptor blocker"], name:{en:"ARBs (angiotensin receptor blockers)", es:"ARA-II (bloqueadores del receptor de angiotensina)", zh:"ARB（血管紧张素受体阻滞剂）", vi:"ARB (thuốc ức chế thụ thể angiotensin)", ar:"حاصرات مستقبلات الأنجيوتنسين (ARBs)", fr:"ARA (antagonistes des récepteurs de l'angiotensine)"},
    text:{en:"ARBs lower blood pressure in a similar way to ACE inhibitors, but by blocking the receptor those chemicals act on instead of the enzyme that makes them — which is why ARBs cause the dry cough far less often.",
          es:"Los ARA-II bajan la presión arterial de forma similar a los inhibidores de la ECA, pero bloqueando el receptor sobre el que actúan esas sustancias en lugar de la enzima que las produce — por eso los ARA-II causan la tos seca con mucha menos frecuencia.", zh:"ARB降低血压的方式与ACE抑制剂类似，但它阻断的是这些化学物质作用的受体，而不是产生它们的酶——这也是ARB引起干咳的情况少得多的原因。", vi:"ARB làm giảm huyết áp theo cách tương tự thuốc ức chế ACE, nhưng bằng cách ức chế thụ thể mà các chất hóa học đó tác động lên, thay vì ức chế enzyme tạo ra chúng — đây là lý do ARB gây ho khan ít hơn nhiều.", ar:"تخفض ARB ضغط الدم بطريقة مشابهة لمثبطات ACE، لكن عن طريق حصر المستقبل الذي تعمل عليه تلك المواد الكيميائية بدلاً من الإنزيم الذي يصنعها — وهذا سبب تسبب ARB في السعال الجاف بمعدل أقل بكثير.", fr:"Les ARA abaissent la tension artérielle de façon similaire aux inhibiteurs de l'ECA, mais en bloquant le récepteur sur lequel agissent ces substances plutôt que l'enzyme qui les fabrique — c'est pourquoi les ARA provoquent la toux sèche bien moins souvent."} },
  { match:["hmg-coa reductase"], name:{en:"Statins", es:"Estatinas", zh:"他汀类药物", vi:"Statin", ar:"الستاتينات", fr:"Statines"},
    text:{en:"Statins lower cholesterol by blocking a liver enzyme (HMG-CoA reductase) your body uses to make it. Muscle aches are the most talked-about side effect, and a few statins interact with drugs that compete for the same liver-clearance pathway.",
          es:"Las estatinas bajan el colesterol bloqueando una enzima hepática (HMG-CoA reductasa) que tu cuerpo usa para producirlo. Los dolores musculares son el efecto secundario más comentado, y algunas estatinas interactúan con medicamentos que compiten por la misma vía de eliminación hepática.", zh:"他汀类药物通过阻断身体用来生成胆固醇的一种肝酶（HMG-CoA还原酶）来降低胆固醇。肌肉酸痛是最常被提及的副作用，一些他汀类药物会与竞争同一肝脏清除途径的药物发生相互作用。", vi:"Statin làm giảm cholesterol bằng cách ức chế một enzyme gan (HMG-CoA reductase) mà cơ thể dùng để tạo ra cholesterol. Đau cơ là tác dụng phụ được nhắc đến nhiều nhất, và một số statin tương tác với các thuốc cạnh tranh cùng con đường đào thải qua gan.", ar:"تخفض الستاتينات الكوليسترول عن طريق تثبيط إنزيم كبدي (HMG-CoA ريدكتاز) يستخدمه جسمك لصنعه. آلام العضلات هي الأثر الجانبي الأكثر تداولًا، وبعض الستاتينات تتفاعل مع أدوية تتنافس على نفس مسار التخلص الكبدي.", fr:"Les statines abaissent le cholestérol en bloquant une enzyme hépatique (HMG-CoA réductase) que votre corps utilise pour le fabriquer. Les douleurs musculaires sont l'effet secondaire le plus discuté, et quelques statines interagissent avec des médicaments qui se disputent la même voie d'élimination hépatique."} },
  { match:["benzodiazepine"], name:{en:"Benzodiazepines", es:"Benzodiazepinas", zh:"苯二氮䓬类药物", vi:"Benzodiazepine", ar:"البنزوديازيبينات", fr:"Benzodiazépines"},
    text:{en:"Benzodiazepines calm the central nervous system by boosting a natural inhibitory brain chemical (GABA). That's why they treat anxiety and seizures, and also why combining them with other sedatives (opioids, alcohol) is dangerous — the effects stack.",
          es:"Las benzodiazepinas calman el sistema nervioso central potenciando una sustancia cerebral inhibitoria natural (GABA). Por eso tratan la ansiedad y las convulsiones, y también por eso combinarlas con otros sedantes (opioides, alcohol) es peligroso — los efectos se acumulan.", zh:"苯二氮䓬类药物通过增强一种天然的抑制性脑内化学物质（GABA）来镇静中枢神经系统。这也是它们能治疗焦虑和癫痫发作的原因，同时也解释了为什么将它们与其他镇静药物（阿片类药物、酒精）合用是危险的——效果会叠加。", vi:"Benzodiazepine làm dịu hệ thần kinh trung ương bằng cách tăng cường một chất hóa học ức chế tự nhiên trong não (GABA). Đây là lý do chúng điều trị lo âu và co giật, và cũng là lý do việc kết hợp chúng với các thuốc an thần khác (opioid, rượu) rất nguy hiểm — các tác dụng sẽ cộng dồn.", ar:"تُهدّئ البنزوديازيبينات الجهاز العصبي المركزي عن طريق تعزيز مادة كيميائية مثبطة طبيعية في الدماغ (GABA). لهذا السبب تعالج القلق والنوبات التشنجية، ولهذا أيضًا يكون الجمع بينها وبين مهدئات أخرى (المواد الأفيونية، الكحول) خطيرًا — التأثيرات تتراكم.", fr:"Les benzodiazépines apaisent le système nerveux central en renforçant une substance cérébrale inhibitrice naturelle (le GABA). C'est pourquoi elles traitent l'anxiété et les convulsions, et aussi pourquoi les associer à d'autres sédatifs (opioïdes, alcool) est dangereux — les effets se cumulent."} },
  { match:["opioid"], name:{en:"Opioids", es:"Opioides", zh:"阿片类药物", vi:"Opioid", ar:"المواد الأفيونية", fr:"Opioïdes"},
    text:{en:"Opioids relieve pain by activating receptors in the brain and spinal cord that also happen to control breathing rate — which is the source of their most serious risk, especially combined with other sedatives.",
          es:"Los opioides alivian el dolor activando receptores en el cerebro y la médula espinal que también controlan la frecuencia respiratoria — de ahí viene su riesgo más grave, especialmente combinados con otros sedantes.", zh:"阿片类药物通过激活大脑和脊髓中的受体来缓解疼痛，而这些受体恰好也控制着呼吸频率——这正是其最严重风险的来源，尤其是与其他镇静药物合用时。", vi:"Opioid giảm đau bằng cách kích hoạt các thụ thể ở não và tủy sống, những thụ thể này cũng kiểm soát nhịp thở — đây chính là nguồn gốc của rủi ro nghiêm trọng nhất, đặc biệt khi kết hợp với các thuốc an thần khác.", ar:"تُخفف المواد الأفيونية الألم عن طريق تنشيط مستقبلات في الدماغ والحبل الشوكي تتحكم أيضًا في معدل التنفس — وهذا مصدر أخطر مخاطرها، خاصة عند الجمع بينها وبين مهدئات أخرى.", fr:"Les opioïdes soulagent la douleur en activant des récepteurs dans le cerveau et la moelle épinière qui contrôlent aussi le rythme respiratoire — d'où provient leur risque le plus grave, surtout en association avec d'autres sédatifs."} },
  { match:["proton pump inhibitor"], name:{en:"Proton pump inhibitors (PPIs)", es:"Inhibidores de la bomba de protones (IBP)", zh:"质子泵抑制剂（PPI）", vi:"Thuốc ức chế bơm proton (PPI)", ar:"مثبطات مضخة البروتون (PPIs)", fr:"Inhibiteurs de la pompe à protons (IPP)"},
    text:{en:"PPIs reduce stomach acid by shutting down the pump cells use to produce it — more completely and longer-lasting than older antacids, which is why they're often used for ongoing reflux rather than occasional heartburn.",
          es:"Los IBP reducen el ácido estomacal apagando la bomba que las células usan para producirlo — de forma más completa y duradera que los antiácidos antiguos, por eso a menudo se usan para el reflujo continuo en lugar de la acidez ocasional.", zh:"PPI通过关闭细胞用来产生胃酸的泵来减少胃酸分泌——比老一代抗酸药更彻底、作用更持久，这也是为什么它们常用于持续性反流，而不是偶尔的胃灼热。", vi:"PPI làm giảm axit dạ dày bằng cách tắt bơm mà tế bào dùng để tạo ra axit — hiệu quả toàn diện hơn và kéo dài hơn so với thuốc kháng axit cũ, đây là lý do chúng thường được dùng cho trào ngược kéo dài thay vì chỉ ợ nóng thỉnh thoảng.", ar:"تُقلّل مثبطات مضخة البروتون حمض المعدة عن طريق إيقاف المضخة التي تستخدمها الخلايا لإنتاجه — بشكل أكثر اكتمالًا ولفترة أطول من مضادات الحموضة القديمة، وهذا سبب استخدامها غالبًا لعلاج الارتجاع المستمر بدلاً من حرقة المعدة العرضية.", fr:"Les IPP réduisent l'acidité gastrique en désactivant la pompe que les cellules utilisent pour la produire — de façon plus complète et durable que les anciens antiacides, c'est pourquoi ils sont souvent utilisés pour un reflux persistant plutôt que pour des brûlures d'estomac occasionnelles."} },
  { match:["histamine-2","h2-receptor antagonist"], name:{en:"H2 blockers", es:"Bloqueadores H2", zh:"H2受体阻滞剂", vi:"Thuốc chẹn H2", ar:"حاصرات H2", fr:"Anti-H2"},
    text:{en:"H2 blockers reduce stomach acid by blocking the histamine signal that tells acid-producing cells to turn on — a gentler, often faster-acting option than PPIs for many people.",
          es:"Los bloqueadores H2 reducen el ácido estomacal bloqueando la señal de histamina que le dice a las células productoras de ácido que se activen — una opción más suave, y a menudo de acción más rápida, que los IBP para muchas personas.", zh:"H2受体阻滞剂通过阻断告诉产酸细胞开始工作的组胺信号来减少胃酸——对许多人来说，这是一种比PPI更温和、且往往起效更快的选择。", vi:"Thuốc chẹn H2 làm giảm axit dạ dày bằng cách ức chế tín hiệu histamine báo cho tế bào sản xuất axit hoạt động — một lựa chọn nhẹ nhàng hơn, và thường có tác dụng nhanh hơn PPI đối với nhiều người.", ar:"تُقلّل حاصرات H2 حمض المعدة عن طريق تثبيط إشارة الهيستامين التي تُخبر الخلايا المنتجة للحمض بالعمل — خيار ألطف، وغالبًا أسرع مفعولًا من مثبطات مضخة البروتون لدى الكثيرين.", fr:"Les anti-H2 réduisent l'acidité gastrique en bloquant le signal d'histamine qui indique aux cellules productrices d'acide de s'activer — une option plus douce, et souvent d'action plus rapide que les IPP pour beaucoup de personnes."} },
  { match:["macrolide"], name:{en:"Macrolide antibiotics", es:"Antibióticos macrólidos", zh:"大环内酯类抗生素", vi:"Kháng sinh nhóm macrolide", ar:"المضادات الحيوية من فئة الماكروليد", fr:"Antibiotiques macrolides"},
    text:{en:"Macrolides stop bacteria from making proteins they need to survive. Several of them (like clarithromycin and erythromycin) also block a liver enzyme many other drugs rely on to clear from the body, which is why they're behind a number of drug interactions.",
          es:"Los macrólidos impiden que las bacterias produzcan las proteínas que necesitan para sobrevivir. Varios de ellos (como la claritromicina y la eritromicina) también bloquean una enzima hepática de la que dependen muchos otros medicamentos para eliminarse del cuerpo, por eso están detrás de varias interacciones medicamentosas.", zh:"大环内酯类药物能阻止细菌合成其生存所需的蛋白质。其中几种（如克拉霉素和红霉素）还会阻断许多其他药物赖以清除体外所需的一种肝酶，这也是它们涉及多种药物相互作用的原因。", vi:"Macrolide ngăn vi khuẩn tạo ra các protein cần thiết để tồn tại. Một số loại trong nhóm này (như clarithromycin và erythromycin) còn ức chế một enzyme gan mà nhiều loại thuốc khác phụ thuộc vào để đào thải khỏi cơ thể, đây là lý do chúng liên quan đến nhiều tương tác thuốc.", ar:"تمنع الماكروليدات البكتيريا من صنع البروتينات التي تحتاجها للبقاء. بعضها (مثل الكلاريثروميسين والإريثروميسين) يُثبّط أيضًا إنزيمًا كبديًا تعتمد عليه أدوية أخرى كثيرة للتخلص من الجسم، وهذا سبب ارتباطها بعدد من تفاعلات الأدوية.", fr:"Les macrolides empêchent les bactéries de fabriquer les protéines dont elles ont besoin pour survivre. Plusieurs d'entre eux (comme la clarithromycine et l'érythromycine) bloquent aussi une enzyme hépatique dont dépendent beaucoup d'autres médicaments pour être éliminés du corps, ce qui explique qu'ils soient à l'origine de plusieurs interactions médicamenteuses."} },
  { match:["quinolone"], name:{en:"Fluoroquinolone antibiotics", es:"Antibióticos fluoroquinolonas", zh:"氟喹诺酮类抗生素", vi:"Kháng sinh nhóm fluoroquinolone", ar:"المضادات الحيوية من فئة الفلوروكينولون", fr:"Antibiotiques fluoroquinolones"},
    text:{en:"Fluoroquinolones stop bacteria from copying their own DNA. The FDA has added warnings about tendon and nerve side effects, so these are generally reserved for infections other antibiotics can't handle.",
          es:"Las fluoroquinolonas impiden que las bacterias copien su propio ADN. La FDA ha agregado advertencias sobre efectos secundarios en tendones y nervios, así que generalmente se reservan para infecciones que otros antibióticos no pueden tratar.", zh:"氟喹诺酮类药物能阻止细菌复制自身DNA。FDA已就肌腱和神经方面的副作用发出警告，因此这类药物通常只用于其他抗生素无法应对的感染。", vi:"Fluoroquinolone ngăn vi khuẩn sao chép ADN của chính chúng. FDA đã bổ sung cảnh báo về tác dụng phụ trên gân và thần kinh, vì vậy nhóm thuốc này thường chỉ được dành cho các trường hợp nhiễm trùng mà kháng sinh khác không xử lý được.", ar:"تمنع الفلوروكينولونات البكتيريا من نسخ حمضها النووي الخاص. أضافت FDA تحذيرات بشأن آثار جانبية على الأوتار والأعصاب، لذا تُحفظ هذه الأدوية عادةً للعدوى التي لا تستطيع مضادات حيوية أخرى معالجتها.", fr:"Les fluoroquinolones empêchent les bactéries de copier leur propre ADN. La FDA a ajouté des avertissements concernant des effets secondaires sur les tendons et les nerfs, donc ils sont généralement réservés aux infections que d'autres antibiotiques ne peuvent pas traiter."} },
  { match:["antihistamine"], name:{en:"Antihistamines", es:"Antihistamínicos", zh:"抗组胺药", vi:"Thuốc kháng histamine", ar:"مضادات الهيستامين", fr:"Antihistaminiques"},
    text:{en:"Antihistamines block histamine, the chemical behind allergy symptoms like sneezing and itching. Older ones cross into the brain and cause drowsiness (which is also why they show up in OTC sleep aids); newer ones are designed not to.",
          es:"Los antihistamínicos bloquean la histamina, la sustancia detrás de los síntomas de alergia como los estornudos y la picazón. Los más antiguos cruzan al cerebro y causan somnolencia (por eso también aparecen en ayudas para dormir de venta libre); los más nuevos están diseñados para no hacerlo.", zh:"抗组胺药通过阻断组胺——引起打喷嚏、瘙痒等过敏症状的化学物质——来发挥作用。较早一代的药物会进入大脑并引起嗜睡（这也是它们出现在非处方助眠产品中的原因）；较新一代的药物则设计为不会如此。", vi:"Thuốc kháng histamine ức chế histamine, chất hóa học gây ra các triệu chứng dị ứng như hắt hơi và ngứa. Các loại cũ hơn đi vào não và gây buồn ngủ (đây cũng là lý do chúng xuất hiện trong các thuốc hỗ trợ giấc ngủ không kê đơn); các loại mới hơn được thiết kế để không gây ra điều đó.", ar:"تُثبّط مضادات الهيستامين مادة الهيستامين، المادة الكيميائية المسؤولة عن أعراض الحساسية مثل العطس والحكة. الأنواع الأقدم تدخل الدماغ وتسبب النعاس (وهذا أيضًا سبب ظهورها في أدوية النوم التي تُصرف دون وصفة طبية)؛ الأنواع الأحدث مصممة لتجنب ذلك.", fr:"Les antihistaminiques bloquent l'histamine, la substance à l'origine des symptômes d'allergie comme les éternuements et les démangeaisons. Les plus anciens passent dans le cerveau et provoquent de la somnolence (c'est aussi pourquoi ils figurent dans les somnifères en vente libre) ; les plus récents sont conçus pour ne pas le faire."} },
  { match:["thiazide"], name:{en:"Thiazide diuretics", es:"Diuréticos tiazídicos", zh:"噻嗪类利尿药", vi:"Thuốc lợi tiểu nhóm thiazide", ar:"مدرات البول الثيازيدية", fr:"Diurétiques thiazidiques"},
    text:{en:"Thiazides lower blood pressure by helping the kidneys release more salt and water. They can also shift potassium and other electrolyte levels, which is why blood tests are common while taking them.",
          es:"Las tiazidas bajan la presión arterial ayudando a los riñones a liberar más sal y agua. También pueden alterar el potasio y otros niveles de electrolitos, por eso los análisis de sangre son comunes mientras se toman.", zh:"噻嗪类药物通过帮助肾脏排出更多盐分和水分来降低血压。它们也可能改变血钾及其他电解质水平，这也是服用期间常需要进行血液检查的原因。", vi:"Thiazide làm giảm huyết áp bằng cách giúp thận thải nhiều muối và nước hơn. Chúng cũng có thể làm thay đổi kali và các mức điện giải khác, đây là lý do xét nghiệm máu thường được thực hiện trong khi dùng thuốc.", ar:"تخفض الثيازيدات ضغط الدم عن طريق مساعدة الكلى على إطلاق المزيد من الملح والماء. يمكن أن تُغيّر أيضًا مستويات البوتاسيوم والإلكتروليتات الأخرى، وهذا سبب شيوع فحوصات الدم أثناء تناولها.", fr:"Les thiazidiques abaissent la tension artérielle en aidant les reins à éliminer plus de sel et d'eau. Ils peuvent aussi modifier le potassium et d'autres niveaux d'électrolytes, c'est pourquoi des analyses de sang sont fréquentes pendant leur prise."} },
  { match:["potassium-sparing"], name:{en:"Potassium-sparing diuretics", es:"Diuréticos ahorradores de potasio", zh:"保钾利尿药", vi:"Thuốc lợi tiểu giữ kali", ar:"مدرات البول الموفرة للبوتاسيوم", fr:"Diurétiques épargneurs de potassium"},
    text:{en:"These water pills help the body release fluid without losing potassium the way other diuretics do — useful, but it means combining one with something else that raises potassium can push levels too high.",
          es:"Estos diuréticos ayudan al cuerpo a liberar líquido sin perder potasio como hacen otros diuréticos — útil, pero significa que combinarlos con algo más que eleva el potasio puede llevar los niveles demasiado alto.", zh:"这类利尿药能帮助身体排出多余水分，同时不像其他利尿药那样丢失钾——这很有用，但也意味着如果与其他会升高血钾的药物合用，可能会使血钾水平过高。", vi:"Nhóm thuốc lợi tiểu này giúp cơ thể thải chất lỏng mà không làm mất kali như các thuốc lợi tiểu khác — hữu ích, nhưng cũng có nghĩa là kết hợp với thứ khác làm tăng kali có thể đẩy nồng độ lên quá cao.", ar:"تساعد هذه المدرات الجسم على التخلص من السوائل دون فقدان البوتاسيوم كما تفعل مدرات البول الأخرى — مفيد، لكنه يعني أيضًا أن الجمع بينها وبين شيء آخر يرفع البوتاسيوم قد يدفع المستويات إلى الارتفاع الزائد.", fr:"Ces diurétiques aident le corps à éliminer les liquides sans perdre le potassium comme le font les autres diurétiques — utile, mais cela signifie qu'en associer un à autre chose qui augmente le potassium peut faire monter les niveaux trop haut."} }
];

function findClassExplainer(klass){
  if (!klass) return null;
  const k = klass.toLowerCase();
  return DRUG_CLASS_EXPLAINERS.find(e => e.match.some(m => k.includes(m))) || null;
}

    what:{en:"Sudden, large swings in how much vitamin K you eat can throw off how well warfarin thins your blood.",

    mgmt:{en:"Doctors don't usually say \"avoid greens\" — the standard advice is to keep vitamin K intake roughly consistent week to week, not to cut it out.",
          es:"Los médicos generalmente no dicen \"evita las verduras\" — el consejo estándar es mantener la ingesta de vitamina K más o menos constante semana a semana, no eliminarla.", zh:"医生通常不会说\"要避免吃绿叶蔬菜\"——标准建议是让维生素K摄入量每周保持大致稳定，而不是完全不吃。", vi:"Bác sĩ thường không nói «tránh ăn rau xanh» — lời khuyên tiêu chuẩn là giữ lượng vitamin K nạp vào tương đối ổn định qua các tuần, chứ không phải loại bỏ hoàn toàn.", ar:"لا يقول الأطباء عادةً «تجنّب الخضروات الورقية» — النصيحة المعتادة هي الحفاظ على تناول فيتامين K ثابتًا تقريبًا من أسبوع لآخر، وليس التوقف عنه تمامًا.", fr:"Les médecins ne disent généralement pas « évitez les légumes verts » — le conseil standard est de garder l'apport en vitamine K à peu près constant d'une semaine à l'autre, pas de l'éliminer."} },
  { drugs:STATINS, severity:"moderate",

    what:{en:"Grapefruit can raise blood levels of certain statins, increasing the risk of muscle-related side effects.",

    why:{en:"Grapefruit blocks the same liver enzyme (CYP3A4) that clears these statins, so the drug builds up.",
         es:"La toronja bloquea la misma enzima hepática (CYP3A4) que elimina estas estatinas, así que el medicamento se acumula.", zh:"西柚会阻断清除这些他汀类药物的同一种肝酶（CYP3A4），导致药物在体内蓄积。", vi:"Bưởi ức chế cùng một enzyme gan (CYP3A4) đào thải các loại statin này, khiến thuốc tích tụ.", ar:"يُثبّط الجريب فروت نفس إنزيم الكبد (CYP3A4) الذي يُخلّص هذه الأدوية، فتتراكم في الجسم.", fr:"Le pamplemousse bloque la même enzyme hépatique (CYP3A4) qui élimine ces statines, donc le médicament s'accumule."},
    mgmt:{en:"This mainly affects simvastatin, atorvastatin, and lovastatin — not all statins. Ask your pharmacist if yours is affected before assuming you need to avoid grapefruit.",

function crossSensitivityFor(tokens){
  return CROSS_SENSITIVITY.filter(c => sideHit(tokens, c.drugs));
}

/* ---- helpers ----------------------------------------------------- */
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const titlecase = s => (s||"").toLowerCase().replace(/\b\w/g, c => c.toUpperCase());

/* turn a typed name into a set of tokens we can match on */
function baseTokens(name){
  const n = name.trim().toLowerCase();
  const set = new Set([n]);
  if (ALIASES[n]) set.add(ALIASES[n]);
  // also split multiword brand like "ms contin"
  if (ALIASES[n]) {} 
  return set;
}

/* does a token set hit a rule side (list of ingredient/class tokens)? */
function sideHit(tokens, side){
  for (const t of tokens){
    for (const s of side){
      if (t === s) return true;
      if (t.includes(s) || s.includes(t)) { if (s.length>=4) return true; }
    }
  }
  return false;
}

/* ---- openFDA fetch ------------------------------------------------ */
async function fetchLabel(name){
  const q = encodeURIComponent(name.trim().toLowerCase());
  const url = `${FDA}?search=(openfda.brand_name:"${q}"+openfda.generic_name:"${q}"+openfda.substance_name:"${q}")&limit=1`;
  const res = await fetch(url);
  if (res.status === 404) return null;          // openFDA returns 404 when nothing matches
  if (!res.ok) throw new Error("FDA service error ("+res.status+")");
  const data = await res.json();
  return (data.results && data.results[0]) || null;
}

/* pull the human-meaningful pieces out of a raw label record */
function parseLabel(rec){
  const of = rec.openfda || {};
  const first = a => Array.isArray(a) && a.length ? a[0] : null;
  const clsRaw = first(of.pharm_class_epc) || first(of.pharm_class_moa) || first(of.pharm_class_cs) || null;
  return {
    brand: first(of.brand_name),
    generic: first(of.generic_name),
    klass: clsRaw ? clsRaw.replace(/\s*\[.*?\]\s*/g,"").trim() : null,
    klassRaw: clsRaw, // unstripped — needed to re-query openFDA for same-class drugs
    rxcui: first(of.rxcui),
    substances: (of.substance_name||[]).map(s=>s.toLowerCase()),
    indications: first(rec.indications_and_usage),
    moa: first(rec.mechanism_of_action),
    adverse: first(rec.adverse_reactions),
    interactionsText: (rec.drug_interactions||[]).join(" "), // used for curated/label-mention matching
    boxed: first(rec.boxed_warning),
    // full-label-details fields (Phase 4): same sourcing rule as everything
    // else here — shown verbatim from the label, never summarized into advice
    activeIngredient: first(rec.active_ingredient),
    inactiveIngredient: first(rec.inactive_ingredient),
    contraindications: first(rec.contraindications),
    warnings: first(rec.warnings) || first(rec.warnings_and_cautions),
    precautions: first(rec.precautions),
    interactionsProse: first(rec.drug_interactions), // the label's own interactions text, for display
    dosage: first(rec.dosage_and_administration),
    pregnancy: first(rec.pregnancy) || first(rec.pregnancy_or_breast_feeding) || first(rec.teratogenic_effects),
    nursing: first(rec.nursing_mothers)
  };
}

/* find a label, rescuing typos via RxNorm before giving up. Shared by
   Decode and My Cabinet so both resolve names the same way.

   Instead of silently committing to RxNorm's single best guess, this
   collects up to 5 similarly-spelled candidate names and returns them
   as `alternates` — the UI shows these as "did you mean" choices so a
   misspelling doesn't just guess once and stop. */
async function resolveLabel(name){
  let rec = await fetchLabel(name);
  let suggested = null;
  let alternates = [];
  if (!rec){
    try{
      const r = await fetch(`${RXNORM}/approximateTerm.json?term=${encodeURIComponent(name)}&maxEntries=8`);
      const j = await r.json();
      const cands = (j.approximateGroup && j.approximateGroup.candidate) || [];
      const seenRxcui = new Set();
      for (const c of cands){
        if (!c.rxcui || seenRxcui.has(c.rxcui)) continue;
        seenRxcui.add(c.rxcui);
        try{
          const r2 = await fetch(`${RXNORM}/rxcui/${c.rxcui}/property.json?propName=RxNorm%20Name`);
          const j2 = await r2.json();
          const s = j2.propConceptGroup && j2.propConceptGroup.propConcept && j2.propConceptGroup.propConcept[0].propValue;
          if (s && s.toLowerCase() !== name.toLowerCase() && !alternates.some(a=>a.toLowerCase()===s.toLowerCase())){
            alternates.push(s);
          }
        }catch(e){/* skip this candidate, try the next */}
        if (alternates.length >= 5) break;
      }
      if (alternates.length){
        suggested = alternates[0];
        rec = await fetchLabel(alternates[0].split(" ")[0]);
      }
    }catch(e){/* typo rescue is best-effort */}
  }
  return { rec, suggested, alternates };
}

/* trim long FDA prose to a readable excerpt */
function excerpt(t, n=480){
  if (!t) return null;
  t = t.replace(/\s+/g," ").trim();
  if (t.length <= n) return t;
  const cut = t.slice(0,n); const sp = cut.lastIndexOf(" ");
  return cut.slice(0, sp>0?sp:n) + "…";
}

/* ---- OPTIONAL plain-English mode (Claude via your proxy) ----------
   Strictly a rephraser (or, in Spanish mode, a translator+rephraser).
   The system prompt forbids adding facts, in every language — locked
   server-side in worker.js, keyed by `lang`. The original FDA text
   always stays available behind a toggle.
------------------------------------------------------------------- */
async function toPlainEnglish(text, label, lang){
  if (!CLAUDE_PROXY_URL || !text) return null;
  // The safety-locked prompt lives in the Worker (worker.js), NOT here — so
  // the proxy can only ever rephrase/translate FDA text and can't be
  // repurposed to generate medical claims. We just hand it the text, which
  // section it is, and which language to render it in.
  try{
    const res = await fetch(CLAUDE_PROXY_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ text, label, lang: lang || "en" })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return (data.plain || "").trim() || null;
  }catch(e){ return null; }
}

function makeRow(label, text, src, warn){
  if (!text) return "";
  const ex = excerpt(text);
  const full = text.replace(/\s+/g," ").trim();
  const needExpand = full.length > ex.length;
  const id = "r"+Math.random().toString(36).slice(2,8);
  return `<div class="row" data-full="${esc(full)}" data-label="${esc(label)}">
    <span class="eyebrow">${esc(label)}</span>
    <p data-role="text">${esc(ex)}</p>
    ${needExpand?`<button class="expand" data-target="${id}">${esc(t("show_full_text"))}</button><p id="${id}" data-role="full" hidden style="margin-top:8px;color:var(--ink-soft);">${esc(full)}</p>`:""}
    <div class="src">${esc(src)}</div>
  </div>`;
}

/* the food/alcohol and allergy cross-sensitivity card on a Decode result —

  const rank = {major:0,moderate:1,minor:2};
  const foodRows = [...foodHits].sort((a,b)=>rank[a.severity]-rank[b.severity]).map(f => `

/* ---- voice input (Phase 5) ----------------------------------------
   Feature-detected: Firefox and some browsers don't support the Web
   Speech API at all, so the mic button simply never appears there —
   no broken UI, no dependency, nothing to configure. Chrome/Edge/Safari
   (recent versions) support it natively. */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

/* attaches a mic button right after `inputEl`. If `autoSubmit` is given,
   it's called automatically once speech is recognized (fine for a
   read-only action like Decode); if not, the field is just filled and
   the user reviews before submitting themselves (used for My Cabinet,
   where auto-submitting a mis-heard drug name would silently save it). */
function addVoiceButton(inputEl, autoSubmit){
  if (!SpeechRec) return;
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "mic-btn";
  btn.title = "Speak instead of typing";
  btn.setAttribute("aria-label", "Use voice input instead of typing");
  btn.textContent = "🎤";
  btn.addEventListener("click", () => {
    if (btn.classList.contains("listening")) return; // already listening — ignore a second tap
    const rec = new SpeechRec();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    btn.classList.add("listening");
    btn.textContent = "●";
    rec.onresult = (e) => {
      const text = e.results[0][0].transcript;
      inputEl.value = text;
      if (autoSubmit) autoSubmit();
    };
    rec.onerror = () => {};
    rec.onend = () => { btn.classList.remove("listening"); btn.textContent = "🎤"; };
    try{ rec.start(); }catch(e){ btn.classList.remove("listening"); btn.textContent = "🎤"; }
  });
  inputEl.insertAdjacentElement("afterend", btn);
}

/* resolve one name into curated-matching tokens + its FDA label. Shared by
   the pairwise Check tab and the whole-cabinet Scan (Phase 3) so both run
   the exact same resolution. */
async function resolveForAnalysis(name){
  const tokens = baseTokens(name);
  let label = null;
  try{ const rec = await fetchLabel(name); if (rec){ label = parseLabel(rec); (label.substances||[]).forEach(s=>tokens.add(s)); if(label.generic) tokens.add(label.generic.toLowerCase()); } }
  catch(e){ /* label optional */ }
  return { name, display:titlecase(name), tokens, label };
}

/* run every unique pair of resolved drugs through the curated set, then the
   FDA-label mention layer. Shared by the Check tab and Cabinet Scan. */
function analyzeDrugPairs(drugs){
  const findings = [];   // curated severity hits
  const mentions = [];   // FDA-label cross-references
  for (let i=0;i<drugs.length;i++){
    for (let j=i+1;j<drugs.length;j++){
      const A=drugs[i], B=drugs[j];

      let matched=false;
      for (const rule of INTERACTIONS){
        const ab = sideHit(A.tokens,rule.a) && sideHit(B.tokens,rule.b);
        const ba = sideHit(A.tokens,rule.b) && sideHit(B.tokens,rule.a);
        if (ab||ba){ findings.push({A,B,rule}); matched=true; break; }
      }
      if (matched) continue;

      const m = labelMentions(A,B) || labelMentions(B,A);
      if (m) mentions.push(m);
    }
  }
  return { findings, mentions };
}

async function checkInteractions(){
  const inputs = [...$("#drug-list").querySelectorAll("input")].map(i=>i.value.trim()).filter(Boolean);
  const box = $("#check-results");
  if (inputs.length < 2){ box.innerHTML = `<div class="err">${esc(t("check_min_two"))}</div>`; return; }
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("check_checking_prefix"))} ${inputs.length} ${esc(t("check_checking_suffix"))}</div>`;

  const drugs = [];
  for (const name of inputs) drugs.push(await resolveForAnalysis(name));

  const { findings, mentions } = analyzeDrugPairs(drugs);
  renderResults(box, drugs, findings, mentions);
}

/* check whether drug X's FDA interaction text names drug Y */
function labelMentions(X, Y){
  if (!X.label || !X.label.interactionsText) return null;
  const text = X.label.interactionsText.toLowerCase();
  const cands = [...Y.tokens].filter(t=>t.length>=5); // avoid short false hits
  for (const t of cands){
    const idx = text.indexOf(t);
    if (idx>-1){
      // grab the surrounding sentence as a snippet
      let start = text.lastIndexOf(".", idx); start = start<0?0:start+1;
      let end = text.indexOf(".", idx); end = end<0?Math.min(text.length, idx+160):end+1;
      const snip = X.label.interactionsText.slice(start,end).replace(/\s+/g," ").trim();
      return { from:X.display, to:Y.display, term:t, snippet: snip.length>220? snip.slice(0,220)+"…":snip };
    }
  }
  return null;
}

function renderResults(box, drugs, findings, mentions){
  let html = "";

  // order curated findings by severity
  const rank = {major:0,moderate:1,minor:2};

      html += `<div class="verdict v-${s}">

          <p>${esc(pickLang(f.rule.what))}</p>

        </div>
      </div>`;

  }

  if (mentions.length){
    html += `<p class="eyebrow" style="margin:18px 0 2px;">${esc(t("also_noted_fda"))} · ${mentions.length}</p>`;
    for (const m of mentions){
      html += `<div class="verdict v-note">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(m.from)} → mentions → ${esc(m.to)}</div>
          <div class="sev"><span class="pill">${esc(t("label_pill"))}</span> ${esc(t("named_in_label"))}</div>
          <p>${esc(m.from)}${esc(t("mentions_text"))} ${esc(m.to)} ${esc(t("mentions_text2"))}</p>

      <span class="eyebrow">${esc(t("no_interaction_eyebrow"))}</span>
      <h3>${esc(t("no_interaction_title"))}</h3>
      <p>${esc(t("no_interaction_body"))}</p>
    </div>`;
  } else {
    html += `<p class="status" style="padding-top:14px;">${esc(t("check_results_note"))}</p>`;
  }

  box.innerHTML = html;
}

async function runSymptomLookup(){
  const box = $("#symptom-results");
  const checked = [...document.querySelectorAll('#symptom-list input:checked')].map(i => i.value);
  if (!checked.length){ box.innerHTML = `<div class="err">${esc(t("symptoms_pick_one"))}</div>`; return; }

  // multiple picked symptoms can map to the same category (headache + fever
  // both land on pain/fever relievers) — collapse to one section each
  const matched = [];
  const seenCategory = new Set();
  for (const key of checked){
    const entry = SYMPTOM_CATEGORIES.find(s => s.key === key);
    if (!entry || seenCategory.has(entry.catKey)) continue;
    seenCategory.add(entry.catKey);
    matched.push(entry);
  }

  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("symptoms_looking_up"))}</div>`;

  const sections = [];
  for (const m of matched){
    const items = [];
    for (const ingredient of m.examples){
      try{
        const rec = await fetchLabel(ingredient);
        if (rec){
          const p = parseLabel(rec);
          const label = titlecase(p.brand || p.generic || ingredient);
          if (!items.some(x => x.name.toLowerCase() === label.toLowerCase())){
            items.push({ name: label, generic: p.generic || ingredient });
          }
        }
      }catch(e){ /* skip this one example, keep going */ }
    }
    sections.push({ ...m, items });
  }

  box.innerHTML = sections.map(s => `
    <article class="card" style="margin-bottom:14px;">
      <div class="card-head">
        <span class="eyebrow">${esc(t("symptom_category_eyebrow"))} · ${esc(pickLang(s.symptom))}</span>
        <div class="name" style="font-size:19px;">${esc(pickLang(s.category))}</div>
      </div>
      <div class="card-body">
        <div class="row">
          <p>${esc(pickLang(s.note))}</p>
          <div class="src">${esc(t("src_symptom_category"))}</div>
        </div>
        ${s.items.length ? `<div class="row">
          <span class="eyebrow">${esc(t("real_examples_eyebrow"))}</span>
          <div class="cabinet-map" style="margin-top:8px;">
            ${s.items.map(it => `<button class="map-chip" data-name="${esc(it.name)}"><b>${esc(it.name)}</b>${it.generic ? ` · ${esc(titlecase(it.generic))}` : ""}</button>`).join("")}
          </div>
        </div>` : ""}
      </div>
    </article>
  `).join("") + `<p class="status" style="padding-top:6px;">${esc(t("symptoms_result_note"))}</p>`;

  box.querySelectorAll("button.map-chip").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      selectTab("decode");
      $("#decode-input").value = btn.dataset.name;
      decode();
    });
  });
}

/* =================================================================
   THEME — light by default. Persists to localStorage always, and to
   the Supabase profile when signed in (so it follows you across
   devices). Profile wins over localStorage once it loads.
   ================================================================= */
const THEME_KEY = "plainscript.theme";

function isDark(){ return document.documentElement.getAttribute("data-theme") === "dark"; }

function applyTheme(dark, opts){
  opts = opts || {};
  const btn = $("#theme-toggle");
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  btn.querySelector(".ticon").textContent  = dark ? "☀" : "☾";

  btn.setAttribute("aria-label", dark ? t("theme_aria_light") : t("theme_aria_dark"));
  if (opts.persist !== false){
    try{ localStorage.setItem(THEME_KEY, dark ? "dark" : "light"); }catch(e){}
    // upsert (not update) so it works even if the profile row doesn't exist yet
    if (session) db("profiles", {
      method:"POST", body:{ id: session.user.id, theme: dark?"dark":"light" },
      prefer:"resolution=merge-duplicates,return=minimal"
    }).catch(()=>{});
  }
}

/* =================================================================
   LANGUAGE (Phase 5 — i18n) — same persistence pattern as theme:
   localStorage always, synced to the Supabase profile when signed in
   so it follows you across devices. Re-renders whatever dynamic
   content is currently on screen so switching language doesn't need a
   page reload.

   SUPPORTED_LANGS is the single source of truth for which languages are
   selectable — it must match the <option> values in the #lang-select
   markup and the keys actually present in I18N. Adding a language means
   adding it here, adding an <option>, adding an I18N.<code> block, and
   adding {lang} fields to the 5 curated data arrays + one more
   LOCKED_SYSTEM entry in worker.js — nothing else needs to change.
   ================================================================= */
const SUPPORTED_LANGS = ["en","es","zh","vi","ar","fr","ko","ru","pt","de","ja"];
const RTL_LANGS = ["ar"]; // right-to-left languages — flips document direction

function applyLang(lang, opts){
  opts = opts || {};
  uiLang = SUPPORTED_LANGS.includes(lang) ? lang : "en";
  document.documentElement.dir = RTL_LANGS.includes(uiLang) ? "rtl" : "ltr";
  const select = $("#lang-select");
  if (select) select.value = uiLang;
  applyTranslations();
  applyTheme(isDark(), {persist:false}); // refresh the theme-toggle's own label text
  if (opts.persist !== false){
    try{ localStorage.setItem(LANG_KEY, uiLang); }catch(e){}
    if (session) db("profiles", {
      method:"POST", body:{ id: session.user.id, lang: uiLang },
      prefer:"resolution=merge-duplicates,return=minimal"
    }).catch(()=>{});
  }
  refreshDynamicContentForLang();
}

/* re-renders anything already on screen that was built from JS template
   strings (not data-i18n), so a language switch mid-session doesn't
   leave stale-language content sitting next to freshly-translated chrome */

  if (typeof renderAcct === "function") renderAcct();
  if (typeof renderCabinet === "function" && SB_ENABLED) renderCabinet();
}

$("#lang-select").addEventListener("change", e => applyLang(e.target.value));
/* NOTE: the actual "restore stored language on load" call happens at the
   very bottom of this script (in initAccounts), not here — applyLang()
   touches SB_ENABLED/session/cabinet, which aren't declared yet at this
   point in the file. Calling it this early would throw (temporal dead

/* =================================================================
   PHASE 2 — ACCOUNTS + MY CABINET (Supabase)

   Deliberately dependency-free: instead of shipping the supabase-js
   library, we talk to Supabase's two HTTP APIs directly with fetch —
   - GoTrue (auth):   /auth/v1/*  — OAuth redirect, token refresh, logout
   - PostgREST (db):  /rest/v1/*  — the profiles + medications tables
   Security model: the anon key is public by design; every table has
   Row-Level Security scoped to auth.uid() (supabase/schema.sql), so
   the access token — not this client code — is what limits reads and
   writes to the signed-in user's own rows.

   None of this touches the medical-data path: cabinet rows only store
   what the user chose to save (name + FDA-resolved identifiers + their
   own note). All drug FACTS still come from openFDA/RxNorm at view time.
   ================================================================= */
const SB_ENABLED  = !!(SUPABASE_URL && SUPABASE_ANON_KEY);
const SESSION_KEY = "plainscript.session";

let session   = null;  // {access_token, refresh_token, expires_at, user:{id,email}}
let cabinet   = null;  // the signed-in user's saved meds, once loaded
let authError = null;  // OAuth error passed back on the redirect, if any
let magicSent = null;  // email we just sent a magic link to, if any
let refreshTimer = null;

/* --- session plumbing -------------------------------------------- */

/* read a JWT's payload (no verification needed client-side — the server
   verifies the signature on every request; we just want email + user id) */
function jwtPayload(token){
  try{
    const p = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    return JSON.parse(atob(p));
  }catch(e){ return null; }
}

function saveSession(s){
  try{
    if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s));
    else   localStorage.removeItem(SESSION_KEY);
  }catch(e){}
}

function loadStoredSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) session = JSON.parse(raw);
  }catch(e){ session = null; }
}

/* after the OAuth round-trip, Supabase puts tokens in the URL fragment
   (#access_token=…). Capture them, then scrub the URL so tokens never
   sit in the address bar or browser history. Returns true if we just
   arrived from a sign-in. */
function captureOAuthRedirect(){
  if (!location.hash || location.hash.length < 2) return false;
  const h = new URLSearchParams(location.hash.slice(1));
  if (h.get("error") || h.get("error_description")){
    authError = h.get("error_description") || h.get("error");
    history.replaceState(null, "", location.pathname + location.search);
    return false;
  }
  const at = h.get("access_token");
  if (!at) return false;
  const payload = jwtPayload(at) || {};
  session = {
    access_token:  at,
    refresh_token: h.get("refresh_token") || "",
    expires_at:    Math.floor(Date.now()/1000) + (parseInt(h.get("expires_in"),10) || 3600),
    user: { id: payload.sub || "", email: payload.email || "" }
  };
  saveSession(session);
  history.replaceState(null, "", location.pathname + location.search);
  return true;
}

async function refreshSession(){
  if (!session || !session.refresh_token) throw new Error("signed out");
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
    method:"POST",
    headers:{ apikey:SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ refresh_token: session.refresh_token })
  });
  if (!res.ok) throw new Error("session refresh failed");
  const d = await res.json();
  const payload = jwtPayload(d.access_token) || {};
  session = {
    access_token:  d.access_token,
    refresh_token: d.refresh_token || session.refresh_token,
    expires_at:    Math.floor(Date.now()/1000) + (d.expires_in || 3600),
    user: {
      id:    (d.user && d.user.id)    || payload.sub   || session.user.id,
      email: (d.user && d.user.email) || payload.email || session.user.email
    }
  };
  saveSession(session);
  scheduleRefresh();
}

/* refresh a couple of minutes before the access token expires */
function scheduleRefresh(){
  clearTimeout(refreshTimer);
  if (!session) return;
  const secs = Math.max(30, session.expires_at - Math.floor(Date.now()/1000) - 120);
  refreshTimer = setTimeout(()=>refreshSession().catch(localSignOut), secs*1000);
}

async function ensureFreshSession(){
  if (!session) throw new Error("You're signed out — sign in to use your cabinet.");
  if (Math.floor(Date.now()/1000) > session.expires_at - 60){
    try{ await refreshSession(); }
    catch(e){ localSignOut(); throw new Error("Your session expired — please sign in again."); }
  }
}

function signIn(provider){
  // GoTrue handles the whole OAuth dance; it sends the user back to this
  // exact page with tokens in the URL fragment (captured above).
  const back = encodeURIComponent(location.origin + location.pathname);
  location.href = SUPABASE_URL + "/auth/v1/authorize?provider=" + provider + "&redirect_to=" + back;
}

/* passwordless email sign-in: GoTrue's /otp endpoint emails a magic link.
   Clicking it redirects back here with tokens in the URL fragment — the
   exact same shape as the OAuth redirect, so captureOAuthRedirect() above
   handles both with no changes. No password to create, store, or reset. */
async function sendMagicLink(email){
  const back = location.origin + location.pathname;
  const res = await fetch(SUPABASE_URL + "/auth/v1/otp?redirect_to=" + encodeURIComponent(back), {
    method:"POST",
    headers:{ apikey:SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ email, create_user:true })
  });
  if (!res.ok){
    let msg = "Couldn't send that link — try again.";
    try{ const d = await res.json(); msg = d.msg || d.error_description || msg; }catch(e){}
    throw new Error(msg);
  }
}

async function onSendMagicLink(btn){
  const input = $("#magic-email");
  const email = (input.value || "").trim();
  const statusEl = $("#magic-status");
  if (!/^\S+@\S+\.\S+$/.test(email)){ statusEl.textContent = t("magic_invalid_email"); input.focus(); return; }
  btn.disabled = true;
  statusEl.innerHTML = `<span class="spin"></span>${esc(t("magic_sending"))}`;
  try{
    await sendMagicLink(email);
    magicSent = email;
    renderCabinet();
  }catch(e){
    statusEl.textContent = e.message;
    btn.disabled = false;
  }
}

function localSignOut(){
  clearTimeout(refreshTimer);
  session = null; cabinet = null; magicSent = null;
  saveSession(null);
  renderAcct(); renderCabinet();
}

async function signOut(){
  const t = session && session.access_token;
  localSignOut(); // drop local state first so the UI never hangs on the network
  if (t){
    try{
      await fetch(SUPABASE_URL + "/auth/v1/logout", {
        method:"POST", headers:{ apikey:SUPABASE_ANON_KEY, Authorization:"Bearer "+t }
      });
    }catch(e){/* server-side revoke is best-effort */}
  }
}

/* --- database calls (PostgREST) ---------------------------------- */
async function db(path, opts){
  opts = opts || {};
  await ensureFreshSession();
  const call = () => fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: opts.method || "GET",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + session.access_token,   // RLS keys off this
      "Content-Type": "application/json",
      Prefer: opts.prefer || "return=representation"
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  let res = await call();
  if (res.status === 401){ // stale token → one refresh + retry
    try{ await refreshSession(); }
    catch(e){ localSignOut(); throw new Error("Your session expired — please sign in again."); }
    res = await call();
  }
  if (!res.ok) throw new Error("Couldn't reach your cabinet (error "+res.status+") — try again.");
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

/* unauthenticated variant of db() — used only for the share-link viewer
   flow (Phase 5), which by design has no session at all. Talks to
   PostgREST as the anon role, same as everything else that isn't
   scoped to a signed-in user. */
async function publicDb(path, opts){
  opts = opts || {};
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: opts.method || "GET",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
      Prefer: opts.prefer || "return=representation"
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error("Couldn't reach that shared cabinet (error "+res.status+").");
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadProfile(){
  const rows = await db("profiles?select=theme,lang&id=eq." + session.user.id);
  const row = rows && rows[0];
  const savedTheme = row && row.theme;
  if (savedTheme === "dark" || savedTheme === "light"){
    applyTheme(savedTheme === "dark", {persist:false});
    try{ localStorage.setItem(THEME_KEY, savedTheme); }catch(e){}
  }
  const savedLang = row && row.lang;
  if (savedLang && SUPPORTED_LANGS.includes(savedLang) && savedLang !== uiLang){
    applyLang(savedLang, {persist:false});
  }
}

const CABINET_CACHE_KEY = "plainscript.cabinet_cache";
let cabinetIsOffline = false;

/* tries the live fetch first; if that fails (offline, or a real error) it
   falls back to the last successful fetch cached in localStorage, so My
   Cabinet is still viewable — read-only — without a connection. Only
   throws if there's truly nothing to fall back to. */
async function loadCabinet(){
  cabinetIsOffline = false;
  try{
    cabinet = (await db("medications?select=*&order=created_at.asc")) || [];
    try{ localStorage.setItem(CABINET_CACHE_KEY, JSON.stringify(cabinet)); }catch(e){/* storage full/blocked — not fatal */}
  }catch(e){
    let cached = null;
    try{ cached = JSON.parse(localStorage.getItem(CABINET_CACHE_KEY) || "null"); }catch(err){/* ignore corrupt cache */}
    if (cached){ cabinet = cached; cabinetIsOffline = true; }
    else throw e;
  }
}

/* =================================================================
   SHARE A READ-ONLY CABINET (Phase 5)
   Full security model is documented in supabase/schema.sql next to the
   cabinet_shares table and get_shared_cabinet() function — read that
   before touching anything here. Short version: the share token is an
   unguessable random uuid, anon has no direct table access at all, and
   the only way in is a SECURITY DEFINER function that takes exactly
   one token and returns a narrow, non-identifying column set.
   ================================================================= */
let shareToken = null; // the signed-in user's current active share, if any

async function getActiveShare(){
  const rows = await db("cabinet_shares?select=token&user_id=eq."+session.user.id+"&revoked_at=is.null&order=created_at.desc&limit=1");
  return (rows && rows[0]) ? rows[0].token : null;
}

async function createShare(){
  const rows = await db("cabinet_shares", { method:"POST", body:{ user_id: session.user.id } });
  return (rows && rows[0]) ? rows[0].token : null;
}

async function revokeShare(token){
  await db("cabinet_shares?token=eq."+encodeURIComponent(token), {
    method:"PATCH", body:{ revoked_at: new Date().toISOString() }, prefer:"return=minimal"
  });
}

async function renderSharePanel(){
  const box = $("#share-panel");
  if (!box) return;
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("share_checking"))}</div>`;
  try{ shareToken = await getActiveShare(); }
  catch(e){ shareToken = null; }
  paintSharePanel();
}

function paintSharePanel(){
  const box = $("#share-panel");
  if (!box) return;
  if (!shareToken){
    box.innerHTML = `<p class="status" style="padding:6px 0 10px;">${esc(t("share_intro"))}</p>
      <button class="go" data-act="share-create">${esc(t("share_create_btn"))}</button>`;
    return;
  }
  const url = location.origin + location.pathname + "?share=" + encodeURIComponent(shareToken);
  const qr  = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(url);
  box.innerHTML = `
    <div class="field" style="margin-top:10px;">
      <label class="eyebrow" for="share-link-input">${esc(t("share_link_label"))}</label>
      <div class="inrow">
        <input type="text" id="share-link-input" readonly value="${esc(url)}" />
        <button class="ghost" data-act="share-copy">${esc(t("share_copy_btn"))}</button>
      </div>
    </div>
    <img src="${qr}" width="180" height="180" alt="QR code for the share link above" loading="lazy"
      style="margin-top:12px; border-radius:8px; border:1px solid var(--line); display:block;"
      onerror="this.style.display='none'" />
    <p style="margin-top:12px;"><button class="mini" data-act="share-revoke">${esc(t("share_revoke_btn"))}</button></p>`;
}

async function onCreateShare(){
  const box = $("#share-panel");

/* is this drug already saved? Match by RxCUI when we have it, else by
   resolved generic/brand name, else by what was typed. */
function findInCabinet(d, typed){
  if (!cabinet) return null;
  const rx  = d && d.rxcui;
  const key = ((d && (d.generic || d.brand)) || typed || "").toLowerCase();
  for (const m of cabinet){
    if (rx && m.rxcui && m.rxcui === rx) return m;
    const mkey = (m.generic || m.brand || m.name || "").toLowerCase();
    if (key && mkey === key) return m;
  }
  return null;
}

async function insertMed(typed, d){
  const rows = await db("medications", { method:"POST", body:{
    user_id:    session.user.id,       // RLS double-checks this equals auth.uid()
    name:       typed,
    generic:    d && d.generic ? titlecase(d.generic) : null,
    brand:      d && d.brand   ? titlecase(d.brand)   : null,
    rxcui:      (d && d.rxcui) || null,
    drug_class: (d && d.klass) || null
  }});
  if (rows && rows[0]){ cabinet = cabinet || []; cabinet.push(rows[0]); }
  return rows && rows[0];
}

   Three FDA/RxNorm-sourced views on a decoded drug, opened from a button

                          pharm_class (real FDA pharmacologic classification).

   - In combination products — products where this ingredient shows up
                          alongside OTHER actives (e.g. cold medicines) —
                          directly useful for spotting accidental double-dosing.
   Nothing here is invented: every list comes straight from an openFDA
   query, same sourcing rule as the rest of the app.
   ================================================================= */

/* one openFDA query on substance_name serves both "other forms" and
   "combination products" — partitioned client-side by how many active
   ingredients each result actually has. */
async function fetchSimilarAndRelated(d){
  const out = { sameClass: [], otherForms: [], combos: [] };

  if (d.klassRaw){
    try{
      const res = await fetch(`${FDA}?search=openfda.pharm_class_epc:"${encodeURIComponent(d.klassRaw)}"&limit=10`);
      if (res.ok){
        const data = await res.json();
        const seen = new Set();
        for (const rec of (data.results||[])){
          const p = parseLabel(rec);
          const label = titlecase(p.brand || p.generic || "");
          const key = (p.generic || label).toLowerCase();
          if (!label || !key || key === (d.generic||"").toLowerCase() || seen.has(key)) continue;
          seen.add(key);
          out.sameClass.push({ name:label, generic:p.generic });
          if (out.sameClass.length >= 8) break;
        }
      }
    }catch(e){/* best-effort */}
  }

  const primarySubstance = (d.substances && d.substances[0]) || (d.generic||"").toLowerCase();
  if (primarySubstance){
    try{
      const res = await fetch(`${FDA}?search=openfda.substance_name:"${encodeURIComponent(primarySubstance)}"&limit=25`);
      if (res.ok){
        const data = await res.json();
        const seen = new Set();
        for (const rec of (data.results||[])){
          const p = parseLabel(rec);
          const label = titlecase(p.brand || p.generic || "");
          const key = label.toLowerCase();
          if (!label || seen.has(key)) continue;
          if (key === (d.brand||"").toLowerCase() || key === (d.generic||"").toLowerCase()) continue;
          seen.add(key);
          const entry = { name:label, substances:p.substances||[] };
          if ((p.substances||[]).length > 1) out.combos.push(entry);
          else out.otherForms.push(entry);
        }
        out.otherForms = out.otherForms.slice(0,10);
        out.combos = out.combos.slice(0,10);
      }
    }catch(e){/* best-effort */}
  }
  return out;
}

function similarPaneHTML(items, kind, emptyMsg){
  if (!items.length) return `<p class="status" style="padding:8px 0;">${esc(emptyMsg)}</p>`;
  const chips = items.map(it=>{
    const sub = kind==="combos"
      ? ` · ${esc(t("contains_word"))} ${esc((it.substances||[]).map(titlecase).join(" + "))}`
      : (kind==="class" && it.generic ? ` · ${esc(titlecase(it.generic))}` : "");
    return `<button class="map-chip" data-name="${esc(it.name)}"><b>${esc(it.name)}</b>${sub}</button>`;
  }).join("");
  const note = kind==="combos" ? `<p class="status" style="padding-top:10px;">${esc(t("similar_combo_note"))}</p>` : "";
  return `<div class="cabinet-map">${chips}</div>${note}`;
}

async function openSimilarModal(d, displayName){
  const trigger = document.activeElement; // restore focus here when the modal closes
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal-box" role="dialog" aria-modal="true" aria-label="${esc(t("similar_modal_aria"))}">
    <div class="modal-head">
      <h2>${esc(displayName)} ${t("similar_related_title_suffix")}</h2>
      <button class="mini" data-act="close">${t("close_btn")}</button>
    </div>
    <div class="modal-tabs" role="tablist">
      <button class="mtab" role="tab" data-tab="class" aria-selected="true">${t("tab_same_class")}</button>
      <button class="mtab" role="tab" data-tab="forms" aria-selected="false">${t("tab_other_forms")}</button>
      <button class="mtab" role="tab" data-tab="combos" aria-selected="false">${t("tab_combo_products")}</button>
    </div>
    <div class="modal-body" aria-live="polite"><div class="status"><span class="spin"></span>${esc(t("similar_looking_up"))}</div></div>
  </div>`;
  document.body.appendChild(overlay);

  // keep both listeners scoped to one open/close cycle — without this, every
  // open added a new document-level keydown listener that never got cleaned
  // up unless the user happened to close via Escape specifically
  function onEsc(e){ if (e.key === "Escape") close(); }
  function trapTab(e){
    if (e.key !== "Tab") return;
    const focusables = [...overlay.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')];
    if (!focusables.length) return;
    const first = focusables[0], last = focusables[focusables.length-1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
  function close(){
    overlay.remove();
    document.removeEventListener("keydown", onEsc);
    if (trigger && typeof trigger.focus === "function") trigger.focus();
  }
  document.addEventListener("keydown", onEsc);
  overlay.addEventListener("keydown", trapTab);
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  overlay.querySelector('[data-act="close"]').addEventListener("click", close);
  overlay.querySelector('[data-act="close"]').focus();

  const data = await fetchSimilarAndRelated(d);
  const panes = {
    class: similarPaneHTML(data.sameClass, "class", t("similar_no_class")),
    forms: similarPaneHTML(data.otherForms, "forms", t("similar_no_forms")),
    combos: similarPaneHTML(data.combos, "combos", t("similar_no_combos"))
  };
  const body = overlay.querySelector(".modal-body");
  function renderPane(tab){
    body.innerHTML = panes[tab];
    body.querySelectorAll("button.map-chip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        close();
        selectTab("decode");
        $("#decode-input").value = chip.dataset.name;
        decode();
      });
    });
  }
  renderPane("class");
  overlay.querySelectorAll(".mtab").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      overlay.querySelectorAll(".mtab").forEach(b=>b.setAttribute("aria-selected", String(b===btn)));
      renderPane(btn.dataset.tab);
    });
  });
}

/* =================================================================
   PHASE 3 — 🚩 CABINET SCAN (the flagship)
   Runs the exact same analyzeDrugPairs engine the Check tab uses, just
   across the whole saved cabinet (N×N instead of a pair), then reduces
   the result into a severity summary, a scannable cabinet map, and
   grounded pharmacist questions. No new medical logic — same rules,
   same sourcing, just applied to everything at once.
   ================================================================= */
async function runCabinetScan(){
  const box = $("#scan-results");
  if (!cabinet || cabinet.length < 2){ box.innerHTML = `<div class="err">${esc(t("scan_min_two"))}</div>`; return; }
  const pairCount = cabinet.length*(cabinet.length-1)/2;
  const pairWord = pairCount>1 ? t("scan_pairs_word_plural") : t("scan_pairs_word");
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("scan_scanning_prefix"))} ${cabinet.length} ${esc(t("medications_word"))} — ${pairCount} ${esc(pairWord)}…</div>`;

  const drugs = [];
  for (const m of cabinet) drugs.push(await resolveForAnalysis(m.generic || m.brand || m.name));
  const { findings, mentions } = analyzeDrugPairs(drugs);

  box.innerHTML = renderScanSummary(findings, mentions)
    + renderCabinetMap(cabinet)
    + renderScanMatrix(findings, mentions)
    + renderPharmacistQuestions(findings, mentions);
}

function renderScanSummary(findings, mentions){
  const counts = { major:0, moderate:0, minor:0 };
  findings.forEach(f => counts[f.rule.severity]++);
  const totalFlags = counts.major+counts.moderate+counts.minor;
  const pills = [];
  let headline;

  if (totalFlags===0 && !mentions.length){
    headline = t("scan_all_clear");
  } else {
    const parts = [];
    if (counts.major)    { parts.push(`${counts.major} ${t("scan_major_word")}`);    pills.push(`<span class="count-pill cpill-major">${counts.major} ${esc(t("scan_major_word"))}</span>`); }
    if (counts.moderate) { parts.push(`${counts.moderate} ${t("scan_moderate_word")}`); pills.push(`<span class="count-pill cpill-mod">${counts.moderate} ${esc(t("scan_moderate_word"))}</span>`); }
    if (counts.minor)    { parts.push(`${counts.minor} ${t("scan_minor_word")}`);     pills.push(`<span class="count-pill cpill-minor">${counts.minor} ${esc(t("scan_minor_word"))}</span>`); }
    headline = parts.length ? `${parts.join(", ")} ${t("scan_to_ask")}` : t("scan_no_severity");
  }
  if (mentions.length) pills.push(`<span class="count-pill cpill-note">${mentions.length} ${esc(mentions.length>1?t("scan_label_mentions"):t("scan_label_mention"))}</span>`);

  const flagCount = findings.length+mentions.length;
  const flagText = flagCount ? `${flagCount} ${flagCount>1?t("scan_flags_word"):t("scan_flag_word")} ${t("scan_found_suffix")}` : t("scan_complete");
  return `<div class="scan-summary">
    <span class="eyebrow">${esc(t("scan_summary_eyebrow"))} · ${esc(flagText)}</span>
    <div class="headline">${esc(headline)}</div>
    ${pills.length?`<div class="counts">${pills.join("")}</div>`:""}
    <p class="status" style="padding:10px 0 0;">${esc(t("scan_disclaimer"))}</p>
  </div>`;
}

function renderCabinetMap(meds){
  return `<p class="eyebrow" style="margin:20px 0 2px;">${esc(t("your_cabinet_eyebrow"))} · ${meds.length} ${esc(t("medications_word"))}</p>
    <div class="cabinet-map">
      ${meds.map(m=>`<span class="map-chip"><b>${esc(titlecase(m.generic||m.name))}</b>${m.drug_class?` · ${esc(m.drug_class)}`:""}</span>`).join("")}
    </div>`;
}

/* same verdict-card markup renderResults uses for the pairwise Check tab —
   one rendering path for both, so a finding always looks and reads the same */
function renderScanMatrix(findings, mentions){
  const rank = {major:0,moderate:1,minor:2};
  const sorted = [...findings].sort((x,y)=>rank[x.rule.severity]-rank[y.rule.severity]);
  let html = "";
  if (sorted.length){
    html += `<p class="eyebrow" style="margin:20px 0 2px;">${esc(t("documented_interactions"))} · ${sorted.length}</p>`;
    for (const f of sorted){
      const s=f.rule.severity;
      const sevLabel = s==="major"?t("sev_major"):s==="moderate"?t("sev_moderate"):t("sev_minor");
      html += `<div class="verdict v-${s}">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(f.A.display)} ✕ ${esc(f.B.display)}</div>
          <div class="sev"><span class="pill">${s}</span> ${esc(sevLabel)}</div>
          <p>${esc(pickLang(f.rule.what))}</p>
          <p class="mgmt"><b>${esc(t("why_label"))}</b> ${esc(pickLang(f.rule.why))}</p>
          <p class="mgmt"><b>${esc(t("mgmt_label"))}</b> ${esc(pickLang(f.rule.mgmt))}</p>
          <div class="src">${t("src_curated_interaction")}</div>
        </div>
      </div>`;
    }
  }
  if (mentions.length){
    html += `<p class="eyebrow" style="margin:18px 0 2px;">${esc(t("also_noted_fda"))} · ${mentions.length}</p>`;
    for (const m of mentions){
      html += `<div class="verdict v-note">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(m.from)} → mentions → ${esc(m.to)}</div>
          <div class="sev"><span class="pill">${esc(t("label_pill"))}</span> ${esc(t("named_in_label"))}</div>
          <p>${esc(m.from)}${esc(t("mentions_text"))} ${esc(m.to)} ${esc(t("mentions_text2"))}</p>
          <p class="mgmt" style="font-style:italic;">"…${esc(m.snippet)}…"</p>
          <div class="src">${esc(t("src_fda_mention"))}</div>
        </div>
      </div>`;
    }
  }
  return html;
}

/* "what to ask your pharmacist" — grounded ONLY in what the scan found,
   never advice about what to do. Highest severity first, capped at 4 so
   it stays something a person would actually bring to a pharmacy counter. */
function renderPharmacistQuestions(findings, mentions){
  const rank = {major:0,moderate:1,minor:2};
  const sorted = [...findings].sort((x,y)=>rank[x.rule.severity]-rank[y.rule.severity]);
  const qs = [];
  const sevWordFor = s => s==="major"?t("scan_major_word"):s==="moderate"?t("scan_moderate_word"):t("scan_minor_word");

  for (const f of sorted.slice(0,4)){
    const whatText = pickLang(f.rule.what).replace(/\.$/,"").toLowerCase();
    qs.push(`${esc(t("ask_q_finding"))} <b>${esc(f.A.display)}</b> ${esc(t("ask_q_and"))} <b>${esc(f.B.display)}</b> ${esc(t("ask_q_together"))} <b>${esc(sevWordFor(f.rule.severity))}</b> ${esc(t("ask_q_interaction"))} (${esc(whatText)}). ${esc(t("ask_q_watch"))}`);
  }
  if (qs.length < 4){
    for (const m of mentions.slice(0, 4-qs.length)){
      qs.push(`${esc(m.from)}${esc(t("ask_q_mention"))} ${esc(m.to)} ${esc(t("ask_q_mention2"))}`);
    }
  }
  if (!qs.length){
    qs.push(esc(t("ask_q_none")));
  }

  return `<div class="askpharmacist">
    <h3>${esc(t("ask_pharmacist_title"))}</h3>
    <ol>${qs.map(q=>`<li>${q}</li>`).join("")}</ol>
    <p class="status" style="padding:10px 0 0;">${esc(t("ask_pharmacist_footer"))}</p>
  </div>`;
}

/* one delegated listener covers every button the cabinet re-renders */
$("#cabinet-body").addEventListener("click", e => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const act  = btn.dataset.act;
  const card = btn.closest(".medrow");
  if (act === "signin-google") signIn("google");
  else if (act === "magic-send") onSendMagicLink(btn);
  else if (act === "add")     onAddMed();
  else if (act === "scan")    runCabinetScan();
  else if (act === "print")   printCabinet();
  else if (act === "share")        renderSharePanel();
  else if (act === "share-create") onCreateShare();
  else if (act === "share-copy")   onCopyShareLink();
  else if (act === "share-revoke") onRevokeShare();
  else if (card && act === "edit")        openNoteEditor(card);
  else if (card && act === "note-save")   saveNote(card);
  else if (card && act === "note-cancel") renderCabinet();
  else if (card && act === "remove")      removeMed(card);
});
$("#cabinet-body").addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (e.target.id === "cab-input") onAddMed();
  else if (e.target.id === "magic-email") onSendMagicLink($('[data-act="magic-send"]'));
});

/* --- boot -------------------------------------------------------- */
(async function initAccounts(){
  // restore a saved language preference before anything else renders
  try{
    const storedLang = localStorage.getItem(LANG_KEY);
    if (storedLang && SUPPORTED_LANGS.includes(storedLang)) applyLang(storedLang, {persist:false});
  }catch(e){/* ignore — defaults to English */}

  // a ?share=<token> link takes over the whole page — no session, no
  // sign-in, nothing else in this function is relevant to that visitor
  if (await checkSharedCabinetView()) return;

  if (!SB_ENABLED){ renderAcct(); renderCabinet(); return; }
  const justSignedIn = captureOAuthRedirect();
  if (!session) loadStoredSession();
  if (session && Math.floor(Date.now()/1000) > session.expires_at - 60){
    try{ await refreshSession(); }
    catch(e){ session = null; saveSession(null); }
  }
  renderAcct();
  renderCabinet();
  if (authError) selectTab("cabinet"); // surface the sign-in error where it's explained
  if (!session) return;
  scheduleRefresh();
  loadProfile().catch(()=>{/* theme falls back to localStorage */});
  try{ await loadCabinet(); }
  catch(e){ cabinet = []; cabinetStatus(e.message); }
  renderCabinet();
  if (justSignedIn) selectTab("cabinet"); // land the user on their cabinet after OAuth
})();

/* =================================================================
   PWA (Phase 5) — installable, works offline for the app shell + the
   curated interaction/symptom/class data already embedded in this
   file. Feature-detected so it's a silent no-op on anything that
   doesn't support service workers.
   ================================================================= */
if ("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{/* offline support just won't be available */});
  });
}
