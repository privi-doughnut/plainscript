    method_heading: "Как это работает и чего не может",
    method_source_summary: "Откуда берутся данные",
    method_source_content: `
      <p><b>Сведения о лекарствах</b> поступают из <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">API этикеток лекарств openFDA</a> Управления по санитарному надзору США (FDA) — фактически утверждённой маркировки каждого препарата (что лечит, как действует, побочные эффекты, торговые/международные названия, класс препарата).</p>
      <p><b>Сопоставление названий</b> использует <a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">API RxNorm</a> от NIH/NLM, который стандартизирует названия лекарств и допускает опечатки.</p>
      <p><b>Тяжесть взаимодействий</b> берётся из вручную составленного набора хорошо задокументированных взаимодействий, каждое из которых сверено с информацией о назначении FDA и стандартными клиническими справочниками.</p>
      <p><b>Пояснения о классах препаратов, взаимодействия с едой/алкоголем и заметки о перекрёстной чувствительности к аллергии</b> — это собственный контент Plainscript, соответствующий тем же стандартам, что и набор взаимодействий выше — никогда не текст FDA, всегда обозначен как наш везде, где он появляется.</p>
    `,
    method_safe_summary: `Почему нет простого результата «вы в безопасности»`,
    method_safe_content: `
      <p>В январе 2024 года Национальная медицинская библиотека США закрыла свой бесплатный API взаимодействия лекарств. Больше нет бесплатной, полной базы данных взаимодействий с оценкой тяжести — платные клинические базы (DrugBank, Micromedex) теперь владеют этими данными.</p>
      <p>Поэтому этот инструмент может подтвердить известное ему взаимодействие, но <b>никогда</b> не может доказать, что комбинация безопасна. Результат «ничего не найдено» означает лишь, что этого не было в нашем наборе или проверенных этикетках FDA — а не то, что лекарства безопасны вместе. Вот почему вы никогда не увидите здесь зелёную галочку. Всегда уточняйте у фармацевта.</p>
    `,
    method_why_summary: "Почему вообще происходят взаимодействия лекарств?",
    method_why_content: `
      <p>Каждое объяснение «почему» на этом сайте восходит к одному из нескольких повторяющихся механизмов. Зная их, отдельные объяснения становятся понятными, а не кажутся случайными фактами:</p>
      <p><b>Конкуренция за ферменты печени.</b> Печень выводит большинство лекарств с помощью семейства ферментов под названием CYP450. Некоторые лекарства блокируют или перегружают конкретный фермент CYP, так что всё остальное, что зависит от того же фермента, накапливается в крови вместо нормального выведения — это стоит за большинством взаимодействий «повышает уровень» здесь (статины + определённые антибиотики, варфарин + определённые противогрибковые).</p>
      <p><b>Аддитивные (складывающиеся) эффекты.</b> Два лекарства, которые делают с организмом нечто похожее — угнетают центральную нервную систему, разжижают кровь, повышают серотонин — не просто слегка складываются при сочетании; совокупный эффект часто гораздо сильнее, чем у каждого по отдельности. Вот почему опиоиды + бензодиазепины, или два повышающих серотонин лекарства вместе, считаются серьёзными.</p>
      <p><b>Сдвиги электролитов и почечного клиренса.</b> Некоторые пары лекарств оба толкают один и тот же электролит (например, калий) в одном направлении, или одно меняет скорость, с которой почки выводят другое — по отдельности мало, но комбинация может слишком повысить или понизить уровень.</p>
      <p><b>Помехи всасыванию или связыванию с белками.</b> Иногда одно вещество физически блокирует всасывание другого или вытесняет его из белков, переносящих его по кровотоку, меняя количество реально доступного активного препарата.</p>
      <p>Каждое конкретное взаимодействие на этом сайте называет, какой из них действительно происходит, в своей строке «Почему» — этот раздел лишь соединяет точки.</p>
    `,
    method_account_summary: "Что происходит с данными моей учётной записи",
    method_account_content: `<p>Вход необязателен — «Разобрать» и проверка взаимодействий работают без учётной записи. Если вы входите (чтобы пользоваться «Моей аптечкой»), сохраняются только выбранные вами лекарства и введённые заметки, в базе данных <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> под вашим идентификатором пользователя. Безопасность на уровне строк обеспечивает, на уровне базы данных, что ваши строки может читать и изменять только вы. Удаление лекарства удаляет его строку; отдельной копии нет. Ничего из ваших поисков не сохраняется.</p>`,
    method_symptoms_summary: "Что такое вкладка «Симптомы» на самом деле (и чем не является)",
    method_symptoms_content: `
      <p><b>Она ничего не диагностирует.</b> Нет ранжированного списка «вероятных причин», нет оценки тяжести и нет ИИ, угадывающего, что с вами не так. Выбор «головная боль» и «насморк» не даёт диагноза — он даёт общие категории безрецептурных средств, которые люди обычно используют при этих симптомах (например, «обезболивающие», «противоотёчные»), — то же сопоставление на уровне учебника, что и в справочнике первой помощи.</p>
      <p>Это сопоставление симптом-категория — небольшой, вручную составленный набор, сверенный со стандартными справочниками, а не выдуманный на ходу. Сами примеры продуктов под каждой категорией берутся <b>напрямую из openFDA</b> в момент поиска — так же, как работает любая другая часть этого приложения.</p>
      <p>Список «обратитесь за помощью немедленно» — это стандартные рекомендации служб здравоохранения в экстренных случаях, а не что-то вычисленное из ваших выборов — он показывается полностью независимо от ваших ответов, потому что распознавание экстренной ситуации не должно зависеть от правильного заполнения анкеты.</p>
    `,
    method_limits_summary: "Честные ограничения",
    method_limits_content: `<p>Составленный набор охватывает несколько десятков важнейших взаимодействий, а не все. Слой этикеток FDA улавливает только те взаимодействия, которые этикетка называет напрямую, а этикетки различаются по детальности. Дозы, ваши состояния здоровья, еда и добавки — всё это важно и здесь не учитывается. Это обучающий инструмент, а не система клинических решений.</p>`,

    faq_notfound_summary: "Почему моё лекарство не отображается в «Разобрать»?",
    faq_notfound_content: `<p>«Разобрать» показывает только то, что есть в базе этикеток openFDA от FDA. Некоторые изготавливаемые препараты, очень новые лекарства или продукты под необычным названием могут ещё не быть проиндексированы там. Попробуйте международное название, если искали торговое (или наоборот) — подсказки «возможно, вы имели в виду» помогут, если дело в написании.</p>`,
    faq_current_summary: "Насколько актуальны данные?",
    faq_current_content: `<p>«Разобрать» и слой этикеток FDA в проверке взаимодействий берутся напрямую из openFDA при каждом поиске — никогда не кэшируются и не устаревают с нашей стороны. Составленный контент о взаимодействиях, еде/алкоголе и классах препаратов проверяется вручную периодически, а не обновляется автоматически в реальном времени, поэтому меняется медленнее, чем сами данные этикеток FDA.</p>`,
    faq_free_summary: "Это бесплатно? Останется ли бесплатным?",
    faq_free_content: `<p>Да, и таков план. Plainscript работает на бесплатной инфраструктуре (openFDA и RxNorm бесплатны и не требуют ключа; у Supabase и Cloudflare щедрые бесплатные тарифы). Платного тарифа не планируется.</p>`,
    faq_caregiver_summary: "Могу ли я использовать это для того, за кем ухаживаю, а не только для себя?",
    faq_caregiver_content: `<p>Да — «Разобрать», проверка взаимодействий и вкладка «Симптомы» работают для лекарств кого угодно, с входом или без. «Моя аптечка» построена вокруг одной учётной записи с входом и пока не разделяет списки лекарств нескольких человек — если вы управляете лекарствами более чем одного человека, пока учитывайте это.</p>`,
    faq_error_summary: "Что делать, если я нашёл ошибку?",
    faq_error_content: `<p>Пожалуйста, сообщите нам — см. «Сообщить об ошибке» в нижнем колонтитуле ниже. Каждый составленный здесь факт (взаимодействия, пояснения о классах препаратов, заметки о еде/алкоголе) сверен со стандартными справочниками, но ошибки всё равно возможны, а инструмент, который нельзя исправить, не заслуживает доверия. Исправления рассматриваются и вносятся, а не игнорируются.</p>`,

    method_heading: "Como isto funciona e o que não pode fazer",
    method_source_summary: "De onde vêm os dados",
    method_source_content: `
      <p><b>As informações sobre medicamentos</b> vêm da <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">API de bulas openFDA</a> da FDA dos EUA — a rotulagem realmente aprovada de cada medicamento (o que trata, como age, efeitos colaterais, nomes comercial/genérico, classe do medicamento).</p>
      <p><b>A correspondência de nomes</b> usa a <a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">API RxNorm</a> do NIH/NLM, que padroniza nomes de medicamentos e tolera erros de digitação.</p>
      <p><b>A gravidade das interações</b> vem de um conjunto de interações bem documentadas selecionado manualmente, cada uma revisada em relação às informações de prescrição da FDA e a referências clínicas padrão.</p>
      <p><b>As explicações de classes de medicamentos, interações com alimentos/álcool e notas de sensibilidade cruzada a alergias</b> são conteúdo próprio do Plainscript, mantido no mesmo padrão do conjunto de interações acima — nunca texto da FDA, sempre identificado como nosso onde quer que apareça.</p>
    `,
    method_safe_summary: `Por que não há um resultado simples de "você está seguro"`,
    method_safe_content: `
      <p>Em janeiro de 2024, a Biblioteca Nacional de Medicina dos EUA encerrou sua API gratuita de interações medicamentosas. Não há mais um banco de dados de interações gratuito, abrangente e com classificação de gravidade — bancos de dados clínicos pagos (DrugBank, Micromedex) detêm esses dados agora.</p>
      <p>Então esta ferramenta pode confirmar uma interação que conhece, mas <b>nunca</b> pode provar que uma combinação é segura. Um resultado de "nada encontrado" significa apenas que não estava no nosso conjunto ou nas bulas da FDA que verificamos — não que os medicamentos são seguros juntos. É por isso que você nunca verá um visto verde aqui. Confirme sempre com um farmacêutico.</p>
    `,
    method_why_summary: "Por que as interações medicamentosas acontecem, afinal?",
    method_why_content: `
      <p>Toda explicação de "por quê" neste site remonta a um punhado de mecanismos recorrentes. Conhecê-los faz as explicações individuais fazerem sentido em vez de parecerem curiosidades aleatórias:</p>
      <p><b>Competição por enzimas do fígado.</b> Seu fígado elimina a maioria dos medicamentos usando uma família de enzimas chamada CYP450. Alguns medicamentos bloqueiam ou sobrecarregam uma enzima CYP específica, então qualquer outra coisa que dependa dessa mesma enzima se acumula no seu sangue em vez de ser eliminada normalmente — isso está por trás da maioria das interações de "aumenta o nível de" aqui (estatinas + certos antibióticos, varfarina + certos antifúngicos).</p>
      <p><b>Efeitos aditivos (que se somam).</b> Dois medicamentos que fazem algo semelhante ao seu corpo — sedar o sistema nervoso central, afinar o sangue, aumentar a serotonina — não se somam apenas levemente quando combinados; o efeito combinado costuma ser muito mais forte do que cada um sozinho. É por isso que opioides + benzodiazepínicos, ou dois medicamentos que aumentam a serotonina juntos, são tratados como sérios.</p>
      <p><b>Mudanças de eletrólitos e de eliminação renal.</b> Alguns pares de medicamentos empurram o mesmo eletrólito (como o potássio) na mesma direção, ou um muda a rapidez com que os rins eliminam o outro — pequeno individualmente, mas a combinação pode levar um nível a ficar alto ou baixo demais.</p>
      <p><b>Interferência na absorção ou na ligação a proteínas.</b> Ocasionalmente uma substância bloqueia fisicamente a absorção de outra, ou a desloca das proteínas que a carregam pela corrente sanguínea, mudando a quantidade de medicamento ativo realmente disponível.</p>
      <p>Cada interação específica listada neste site nomeia qual desses está realmente acontecendo na sua própria linha "Por quê" — esta seção é apenas a versão que liga os pontos.</p>
    `,
    method_account_summary: "O que acontece com os dados da minha conta",
    method_account_content: `<p>Entrar é opcional — Decodificar e a verificação de interações funcionam sem conta. Se você entrar (para usar o Meu armário), as únicas coisas armazenadas são os medicamentos que você escolheu salvar e quaisquer notas que digitou, em um banco de dados <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a> sob seu ID de usuário. A segurança em nível de linha garante, no nível do banco de dados, que suas linhas só podem ser lidas e alteradas por você. Remover um medicamento apaga sua linha; não há cópia separada. Nada das suas buscas é armazenado.</p>`,
    method_symptoms_summary: "O que a aba Sintomas realmente é (e não é)",
    method_symptoms_content: `
      <p><b>Ela não diagnostica nada.</b> Não há lista ordenada de "causas prováveis", nem pontuação de gravidade, nem IA adivinhando o que há de errado com você. Escolher "dor de cabeça" e "nariz escorrendo" não produz uma condição — produz as categorias gerais de produtos de venda livre que as pessoas comumente usam para esses sintomas (por exemplo, "analgésicos", "descongestionantes"), o mesmo tipo de mapeamento de nível de manual usado em um guia de primeiros socorros.</p>
      <p>Esse mapeamento sintoma-categoria é um conjunto pequeno, selecionado manualmente, revisado em relação a referências padrão — não inventado na hora. Os exemplos reais de produtos mostrados sob cada categoria são obtidos <b>ao vivo do openFDA</b> no momento da busca, do mesmo jeito que todas as outras partes deste aplicativo funcionam.</p>
      <p>A lista "procure atendimento agora" é orientação padrão de emergência de saúde pública, não algo calculado a partir do que você escolheu — ela é mostrada por inteiro independentemente das suas respostas, porque reconhecer uma emergência não deve depender de preencher um questionário corretamente.</p>
    `,
    method_limits_summary: "Limitações honestas",
    method_limits_content: `<p>O conjunto selecionado cobre algumas dezenas das interações mais importantes, não todas. A camada da bula da FDA só capta interações que uma bula nomeia diretamente, e as bulas variam em detalhe. Doses, suas condições de saúde, alimentos e suplementos importam e não são considerados aqui. Esta é uma ferramenta de aprendizado, não um sistema de decisão clínica.</p>`,

    faq_heading: "Perguntas frequentes",
    faq_pharmacist_summary: "Isto substitui meu farmacêutico ou médico?",
    faq_pharmacist_content: `<p>Não — nunca. O Plainscript é uma referência para entender seus medicamentos e se situar antes de uma conversa de verdade, não um substituto para ela. Um farmacêutico conhece todo o seu histórico, suas doses e suas outras condições; nada aqui conhece.</p>`,
    faq_notfound_summary: "Por que meu medicamento não aparece em Decodificar?",
    faq_notfound_content: `<p>Decodificar mostra apenas o que está no banco de bulas openFDA da FDA. Alguns medicamentos manipulados, medicamentos muito novos ou produtos vendidos com um nome incomum podem ainda não estar indexados lá. Tente o nome genérico se você buscou um comercial (ou vice-versa) — as sugestões "você quis dizer" podem ajudar se for um problema de ortografia.</p>`,
    faq_current_summary: "Quão atuais são os dados?",
    faq_current_content: `<p>Decodificar e a camada de bula da FDA do verificador de interações são obtidos ao vivo do openFDA a cada busca — nunca em cache ou desatualizados do nosso lado. O conteúdo selecionado de interações, alimentos/álcool e classes de medicamentos é revisado manualmente periodicamente, não atualizado automaticamente ao vivo, então muda mais devagar do que os próprios dados de bula da FDA.</p>`,
    faq_free_summary: "É gratuito? Vai continuar gratuito?",

    faq_caregiver_summary: "Posso usar isto para alguém de quem cuido, não só para mim?",
    faq_caregiver_content: `<p>Sim — Decodificar, o verificador de interações e a aba Sintomas funcionam para os medicamentos de qualquer pessoa, com login ou não. O Meu armário é construído em torno de uma única conta com login e ainda não separa listas de medicamentos de várias pessoas — se você gerencia os medicamentos de mais de uma pessoa, tenha isso em mente por enquanto.</p>`,

    method_heading: "Wie das funktioniert und was es nicht kann",
    method_source_summary: "Woher die Daten stammen",
    method_source_content: `
      <p><b>Medikamenteninformationen</b> stammen aus der <a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">openFDA-Medikamentenetikett-API</a> der US-amerikanischen FDA — der tatsächlich zugelassenen Kennzeichnung jedes Medikaments (wofür es behandelt, wie es wirkt, Nebenwirkungen, Handels-/Wirkstoffnamen, Medikamentenklasse).</p>
      <p><b>Der Namensabgleich</b> nutzt die <a href="https://lhncbc.nlm.nih.gov/RxNav/APIs/" target="_blank" rel="noopener">RxNorm-API</a> der NIH/NLM, die Medikamentennamen standardisiert und Tippfehler toleriert.</p>
      <p><b>Der Schweregrad von Wechselwirkungen</b> stammt aus einer handkuratierten Sammlung gut dokumentierter Wechselwirkungen, jede geprüft anhand von FDA-Verschreibungsinformationen und klinischen Standardreferenzen.</p>
      <p><b>Erklärungen zu Medikamentenklassen, Wechselwirkungen mit Nahrung/Alkohol und Hinweise zu Kreuzsensibilität bei Allergien</b> sind Plainscripts eigener Inhalt, nach demselben Standard wie die obige Wechselwirkungssammlung — niemals FDA-Text, immer als unser eigener gekennzeichnet, wo immer er erscheint.</p>
    `,
    method_safe_summary: `Warum es kein einfaches „Sie sind sicher“-Ergebnis gibt`,
    method_safe_content: `
      <p>Im Januar 2024 stellte die US-amerikanische National Library of Medicine ihre kostenlose Wechselwirkungs-API ein. Es gibt keine kostenlose, umfassende, nach Schweregrad bewertete Wechselwirkungsdatenbank mehr — kostenpflichtige klinische Datenbanken (DrugBank, Micromedex) besitzen diese Daten jetzt.</p>
      <p>Dieses Werkzeug kann also eine ihm bekannte Wechselwirkung bestätigen, aber es kann <b>niemals</b> beweisen, dass eine Kombination sicher ist. Ein Ergebnis „nichts gefunden“ bedeutet nur, dass es nicht in unserer Sammlung oder den geprüften FDA-Etiketten war — nicht, dass die Medikamente zusammen sicher sind. Deshalb werden Sie hier nie ein grünes Häkchen sehen. Bestätigen Sie immer mit einem Apotheker.</p>
    `,
    method_why_summary: "Warum treten Wechselwirkungen überhaupt auf?",
    method_why_content: `
      <p>Jede „Warum“-Erklärung auf dieser Seite geht auf eine Handvoll wiederkehrender Mechanismen zurück. Sie zu kennen, macht die einzelnen Erklärungen verständlich, statt wie zufällige Fakten zu wirken:</p>
      <p><b>Wettbewerb um Leberenzyme.</b> Ihre Leber baut die meisten Medikamente mithilfe einer Enzymfamilie namens CYP450 ab. Manche Medikamente blockieren oder überlasten ein bestimmtes CYP-Enzym, sodass alles andere, das auf dasselbe Enzym angewiesen ist, sich im Blut anreichert, statt normal abgebaut zu werden — das steckt hinter den meisten „erhöht den Spiegel von“-Wechselwirkungen hier (Statine + bestimmte Antibiotika, Warfarin + bestimmte Antimykotika).</p>
      <p><b>Additive (sich aufaddierende) Effekte.</b> Zwei Medikamente, die Ähnliches mit Ihrem Körper tun — das Zentralnervensystem dämpfen, das Blut verdünnen, Serotonin erhöhen — addieren sich in Kombination nicht nur leicht; der kombinierte Effekt ist oft viel stärker als jeder für sich. Deshalb werden Opioide + Benzodiazepine oder zwei serotoninerhöhende Medikamente zusammen als ernst behandelt.</p>
      <p><b>Verschiebungen von Elektrolyten und Nierenausscheidung.</b> Manche Medikamentenpaare schieben beide denselben Elektrolyten (wie Kalium) in dieselbe Richtung, oder eines verändert, wie schnell die Nieren das andere ausscheiden — einzeln gering, aber die Kombination kann einen Spiegel zu hoch oder zu niedrig treiben.</p>
      <p><b>Störung von Aufnahme oder Eiweißbindung.</b> Gelegentlich blockiert eine Substanz die Aufnahme einer anderen physisch, oder verdrängt sie von den Eiweißen, die sie durch den Blutkreislauf transportieren, und verändert so, wie viel Wirkstoff tatsächlich verfügbar ist.</p>
      <p>Jede spezifische Wechselwirkung auf dieser Seite benennt in ihrer eigenen „Warum“-Zeile, welcher davon tatsächlich abläuft — dieser Abschnitt ist nur die verbindende Übersicht.</p>
    `,
    method_account_summary: "Was mit meinen Kontodaten geschieht",
    method_account_content: `<p>Die Anmeldung ist optional — Entschlüsseln und die Wechselwirkungsprüfung funktionieren ohne Konto. Wenn Sie sich anmelden (um Meine Hausapotheke zu nutzen), werden nur die Medikamente, die Sie speichern wollten, und alle eingegebenen Notizen gespeichert, in einer <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a>-Datenbank unter Ihrer Nutzer-ID. Sicherheit auf Zeilenebene erzwingt auf Datenbankebene, dass Ihre Zeilen nur von Ihnen gelesen und beschrieben werden können. Ein Medikament zu entfernen löscht seine Zeile; es gibt keine separate Kopie. Nichts von Ihren Suchen wird gespeichert.</p>`,
    method_symptoms_summary: "Was der Symptome-Tab wirklich ist (und nicht ist)",
    method_symptoms_content: `
      <p><b>Er diagnostiziert nichts.</b> Es gibt keine geordnete Liste „wahrscheinlicher Ursachen“, keinen Schweregrad-Wert und keine KI, die errät, was mit Ihnen los ist. „Kopfschmerz“ und „laufende Nase“ auszuwählen ergibt keine Erkrankung — es ergibt die allgemeinen Kategorien rezeptfreier Produkte, die Menschen üblicherweise bei diesen Symptomen verwenden (z. B. „Schmerzmittel“, „Abschwellmittel“), dieselbe Art von Zuordnung auf Lehrbuchniveau wie in einem Erste-Hilfe-Leitfaden.</p>
      <p>Diese Symptom-Kategorie-Zuordnung ist eine kleine, handkuratierte Sammlung, geprüft anhand von Standardreferenzen — nicht spontan erfunden. Die tatsächlichen Beispielprodukte unter jeder Kategorie werden <b>live von openFDA</b> im Moment Ihrer Suche abgerufen, genau wie jeder andere Teil dieser App funktioniert.</p>
      <p>Die Liste „jetzt Hilfe suchen“ ist eine standardmäßige Notfall-Empfehlung des öffentlichen Gesundheitswesens, nichts aus Ihren Auswahlen Berechnetes — sie wird unabhängig von Ihren Antworten vollständig angezeigt, denn einen Notfall zu erkennen sollte nicht davon abhängen, einen Fragebogen richtig auszufüllen.</p>
    `,
    method_limits_summary: "Ehrliche Grenzen",
    method_limits_content: `<p>Die kuratierte Sammlung deckt einige Dutzend der wichtigsten Wechselwirkungen ab, nicht alle. Die FDA-Etikett-Ebene erfasst nur Wechselwirkungen, die ein Etikett direkt nennt, und Etiketten unterscheiden sich in der Detailtiefe. Dosen, Ihre Gesundheitszustände, Nahrung und Nahrungsergänzungsmittel sind alle wichtig und werden hier nicht berücksichtigt. Dies ist ein Lernwerkzeug, kein klinisches Entscheidungssystem.</p>`,

    faq_heading: "Häufig gestellte Fragen",
    faq_pharmacist_summary: "Ersetzt das meinen Apotheker oder Arzt?",
    faq_pharmacist_content: `<p>Nein — niemals. Plainscript ist eine Referenz, um Ihre Medikamente zu verstehen und sich vor einem echten Gespräch zu orientieren, kein Ersatz dafür. Ein Apotheker kennt Ihre gesamte Vorgeschichte, Ihre Dosen und Ihre anderen Erkrankungen; nichts hier tut das.</p>`,
    faq_notfound_summary: "Warum wird mein Medikament in Entschlüsseln nicht angezeigt?",
    faq_notfound_content: `<p>Entschlüsseln zeigt nur, was in der openFDA-Etikettendatenbank der FDA ist. Manche Rezepturarzneimittel, sehr neue Medikamente oder unter einem ungewöhnlichen Namen verkaufte Produkte sind dort möglicherweise noch nicht indexiert. Versuchen Sie den Wirkstoffnamen, wenn Sie einen Handelsnamen gesucht haben (oder umgekehrt) — die „Meinten Sie“-Vorschläge können bei einem Schreibfehler helfen.</p>`,
    faq_current_summary: "Wie aktuell sind die Daten?",
    faq_current_content: `<p>Entschlüsseln und die FDA-Etikett-Ebene der Wechselwirkungsprüfung werden bei jeder Suche live von openFDA abgerufen — auf unserer Seite nie zwischengespeichert oder veraltet. Der kuratierte Inhalt zu Wechselwirkungen, Nahrung/Alkohol und Medikamentenklassen wird regelmäßig von Hand geprüft, nicht automatisch live aktualisiert, verändert sich also langsamer als die FDA-Etikettendaten selbst.</p>`,
    faq_free_summary: "Ist es kostenlos? Bleibt es kostenlos?",
    faq_free_content: `<p>Ja, und das ist der Plan. Plainscript läuft auf kostenloser Infrastruktur (openFDA und RxNorm sind kostenlos und ohne Schlüssel; Supabase und Cloudflare haben großzügige kostenlose Stufen). Eine kostenpflichtige Stufe ist nicht geplant.</p>`,
    faq_caregiver_summary: "Kann ich das für jemanden nutzen, den ich pflege, nicht nur für mich?",
    faq_caregiver_content: `<p>Ja — Entschlüsseln, die Wechselwirkungsprüfung und der Symptome-Tab funktionieren für die Medikamente jeder Person, angemeldet oder nicht. Meine Hausapotheke ist um ein einzelnes angemeldetes Konto herum aufgebaut und trennt noch nicht die Medikamentenlisten mehrerer Personen — wenn Sie die Medikamente von mehr als einer Person verwalten, behalten Sie das vorerst im Hinterkopf.</p>`,
    faq_error_summary: "Was, wenn ich etwas Falsches finde?",
    faq_error_content: `<p>Bitte sagen Sie es uns — siehe „Fehler melden“ in der Fußzeile unten. Jeder kuratierte Fakt hier (Wechselwirkungen, Erklärungen zu Medikamentenklassen, Hinweise zu Nahrung/Alkohol) wird anhand von Standardreferenzen geprüft, aber Fehler sind trotzdem möglich, und ein Werkzeug, das nicht korrigiert werden kann, ist nicht vertrauenswürdig. Korrekturen werden geprüft und behoben, nicht ignoriert.</p>`,

    method_source_summary: "データの出所",
    method_source_content: `
      <p><b>薬の情報</b>は、米国FDAの<a href="https://open.fda.gov/apis/drug/label/" target="_blank" rel="noopener">openFDA医薬品添付文書API</a>から取得しています — 各薬の実際に承認されたラベル（何を治療するか、どう作用するか、副作用、商品名／一般名、薬効分類）です。</p>

      <p><b>相互作用の重症度</b>は、よく記録された相互作用を手作業で厳選したセットから取得しており、それぞれFDAの処方情報と標準的な臨床リファレンスに照らして確認されています。</p>
      <p><b>薬効分類の解説、食品／アルコールとの相互作用、アレルギー交差感受性の注記</b>はPlainscript独自のコンテンツで、上記の相互作用セットと同じ基準を守っています — FDAのテキストではなく、表示される場所すべてで常に当社のものとして明示されます。</p>

    method_safe_summary: `なぜ単純な「あなたは安全です」という結果がないのか`,
    method_safe_content: `
      <p>2024年1月、米国国立医学図書館は無料の医薬品相互作用APIを閉鎖しました。もはや無料で包括的な、重症度評価付きの相互作用データベースは存在しません — 有料の臨床データベース（DrugBank、Micromedex）が現在そのデータを保有しています。</p>
      <p>そのため、このツールは知っている相互作用は確認できますが、ある組み合わせが安全だと<b>証明することは決してできません</b>。「何も見つからない」という結果は、当社の厳選セットや確認したFDAラベルになかったというだけで、薬が一緒に安全という意味ではありません。だからここで緑のチェックマークを見ることは決してありません。必ず薬剤師に確認してください。</p>

    method_why_summary: "そもそもなぜ薬の相互作用は起こるのか？",
    method_why_content: `
      <p>このサイトのすべての「なぜ」の説明は、いくつかの繰り返し現れる仕組みのどれかにたどり着きます。それらを知ると、個々の説明が無作為な豆知識ではなく腑に落ちるようになります：</p>
      <p><b>肝酵素の競合。</b>肝臓はほとんどの薬をCYP450という酵素群を使って処理します。一部の薬は特定のCYP酵素を阻害または過負荷にするため、同じ酵素に頼る他の薬が正常に処理されず血中に蓄積します — これがここにある「〜の濃度を上げる」相互作用のほとんどの背後にあります（スタチン＋特定の抗生物質、ワルファリン＋特定の抗真菌薬）。</p>
      <p><b>相加（重なり合う）効果。</b>体に似たことをする2つの薬 — 中枢神経系を鎮静する、血液を薄める、セロトニンを上げる — は、組み合わせると単に少し足し合わさるのではなく、合わさった効果が単独よりもはるかに強くなることがよくあります。だからオピオイド＋ベンゾジアゼピン、またはセロトニンを上げる2つの薬を一緒に使うことは深刻に扱われます。</p>
      <p><b>電解質と腎排泄の変化。</b>一部の薬の組み合わせは、どちらも同じ電解質（カリウムなど）を同じ方向に押したり、一方が他方を腎臓が排泄する速さを変えたりします — 個々では小さくても、組み合わせると値が高すぎたり低すぎたりに傾くことがあります。</p>
      <p><b>吸収またはタンパク結合の妨げ。</b>時折、ある物質が別の物質の吸収を物理的に妨げたり、血流中を運ぶタンパク質から追い出したりして、実際に利用できる有効薬の量を変えます。</p>
      <p>このサイトに載っている各具体的な相互作用は、独自の「なぜ」の行で、このうちどれが実際に起きているかを示しています — このセクションは、その点をつなぐ版にすぎません。</p>

    method_account_content: `<p>サインインは任意です — 「調べる」と相互作用の確認はアカウントなしで機能します。サインインした場合（マイキャビネットを使うため）、保存することを選んだ薬と入力したメモだけが、あなたのユーザーIDのもとで<a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a>データベースに保存されます。行レベルのセキュリティが、データベースのレベルで、あなたの行をあなただけが読み書きできるように強制します。薬を削除するとその行が削除され、別のコピーはありません。あなたの検索については何も保存されません。</p>`,
    method_symptoms_summary: "症状タブが実際に何か（そして何でないか）",
    method_symptoms_content: `

      <p>「今すぐ受診」のリストは標準的な公衆衛生の緊急ガイダンスであり、あなたの選択から計算されたものではありません — 緊急事態を見分けることがアンケートを正しく記入できるかに左右されるべきではないため、あなたの回答に関係なく全文が表示されます。</p>

    faq_current_content: `<p>「調べる」と相互作用チェッカーのFDAラベルの層は、検索するたびにopenFDAからライブで取得され、当社側でキャッシュされたり古くなったりすることはありません。厳選した相互作用・食品／アルコール・薬効分類のコンテンツは、自動でライブ更新されるのではなく定期的に手作業で確認されるため、FDAラベルデータそのものより変化がゆっくりです。</p>`,

function t(key){
  const dict = I18N[uiLang] || I18N.en;
  return (key in dict) ? dict[key] : (I18N.en[key] || key);
}

/* picks the current-language version of a {en, es, ...} translatable
   field on the curated data arrays below; falls back to English. */
function pickLang(field){
  if (!field) return "";
  if (typeof field === "string") return field; // already-plain string, untranslated field
  return field[uiLang] || field.en || "";
}

function applyTranslations(){
  document.documentElement.lang = uiLang;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.querySelectorAll("[data-i18n-aria-label]").forEach(el => { el.setAttribute("aria-label", t(el.dataset.i18nAriaLabel)); });
  const langLabel = document.getElementById("lang-label");
  if (langLabel) langLabel.textContent = uiLang.toUpperCase();
}

    what:{en:"Opioid painkillers and benzodiazepine sedatives together can slow or stop breathing.",

          zh:"阿片类止痛药与苯二氮䓬类镇静药同时使用可能会减慢甚至停止呼吸。", vi:"Thuốc giảm đau opioid và thuốc an thần benzodiazepine dùng cùng nhau có thể làm chậm hoặc ngừng hô hấp.", ar:"مسكنات الألم الأفيونية ومهدئات البنزوديازيبين معًا يمكن أن تُبطئ التنفس أو توقفه.", fr:"Les analgésiques opioïdes et les sédatifs benzodiazépines ensemble peuvent ralentir ou arrêter la respiration.", ko:"오피오이드 진통제와 벤조디아제핀 진정제를 함께 쓰면 호흡이 느려지거나 멈출 수 있습니다.", ru:"Опиоидные обезболивающие и бензодиазепиновые седативы вместе могут замедлить или остановить дыхание.", pt:"Analgésicos opioides e sedativos benzodiazepínicos juntos podem retardar ou parar a respiração.", de:"Opioid-Schmerzmittel und Benzodiazepin-Beruhigungsmittel zusammen können die Atmung verlangsamen oder anhalten.", ja:"オピオイド鎮痛薬とベンゾジアゼピン系鎮静薬を一緒に使うと、呼吸が遅くなったり止まったりすることがあります。"},
    why:{en:"Both depress the central nervous system; combined, they can suppress the drive to breathe.",
         es:"Ambos deprimen el sistema nervioso central; combinados, pueden suprimir el impulso de respirar.",
          zh:"两者都会抑制中枢神经系统；合用时可能抑制呼吸驱动力。", vi:"Cả hai đều ức chế hệ thần kinh trung ương; khi kết hợp, chúng có thể ức chế phản xạ hô hấp.", ar:"كلاهما يُثبّط الجهاز العصبي المركزي؛ ومجتمعين، يمكن أن يُثبّطا الدافع للتنفس.", fr:"Les deux dépriment le système nerveux central ; combinés, ils peuvent supprimer l'envie de respirer.", ko:"둘 다 중추신경계를 억제하며, 함께 쓰면 호흡 욕구를 억눌 수 있습니다.", ru:"Оба угнетают центральную нервную систему; в сочетании они могут подавить позыв к дыханию.", pt:"Ambos deprimem o sistema nervoso central; combinados, podem suprimir o impulso de respirar.", de:"Beide dämpfen das Zentralnervensystem; kombiniert können sie den Atemantrieb unterdrücken.", ja:"どちらも中枢神経系を抑制し、併用すると呼吸をしようとする働きを抑え込むことがあります。"},
    mgmt:{en:"The FDA places a boxed warning on this combination. It should only ever happen under direct medical supervision.",
          es:"La FDA coloca una advertencia destacada en esta combinación. Solo debería ocurrir bajo supervisión médica directa.",
          zh:"FDA对这种组合设有黑框警告。这种组合只应在医生的直接监督下进行。", vi:"FDA đặt cảnh báo đóng khung cho sự kết hợp này. Chỉ nên thực hiện dưới sự giám sát y tế trực tiếp.", ar:"تضع FDA تحذيرًا محاطًا بإطار على هذا المزيج. يجب ألا يحدث إلا تحت إشراف طبي مباشر.", fr:"La FDA place un avertissement encadré sur cette combinaison. Elle ne devrait jamais se produire que sous surveillance médicale directe.", ko:"FDA는 이 조합에 블랙박스 경고를 부여합니다. 오직 직접적인 의료 감독하에서만 이루어져야 합니다.", ru:"FDA размещает предупреждение в рамке на этой комбинации. Она должна происходить только под прямым медицинским наблюдением.", pt:"A FDA coloca uma advertência em destaque nesta combinação. Ela só deveria acontecer sob supervisão médica direta.", de:"Die FDA versieht diese Kombination mit einem umrahmten Warnhinweis. Sie sollte nur unter direkter ärztlicher Aufsicht erfolgen.", ja:"FDAはこの組み合わせに枠囲み警告を付けています。直接の医療監督の下でのみ行われるべきです。"} },

  { a:MAOIS, b:SSRIS, severity:"major",
    what:{en:"Two different antidepressant types together can trigger serotonin syndrome — a serious, sometimes fatal reaction.",
          es:"Dos tipos diferentes de antidepresivos juntos pueden desencadenar el síndrome serotoninérgico — una reacción grave, a veces mortal.",
          zh:"两种不同类型的抗抑郁药同时使用可能引发5-羟色胺综合征——一种严重、有时致命的反应。", vi:"Hai loại thuốc chống trầm cảm khác nhau dùng cùng nhau có thể gây ra hội chứng serotonin — một phản ứng nghiêm trọng, đôi khi gây tử vong.", ar:"نوعان مختلفان من مضادات الاكتئاب معًا يمكن أن يُحفّزا متلازمة السيروتونين — رد فعل خطير، وقاتل أحيانًا.", fr:"Deux types différents d'antidépresseurs ensemble peuvent déclencher un syndrome sérotoninergique — une réaction grave, parfois mortelle.", ko:"서로 다른 두 종류의 항우울제를 함께 쓰면 세로토닌 증후군 — 심각하고 때로 치명적인 반응 —이 유발될 수 있습니다.", ru:"Два разных типа антидепрессантов вместе могут вызвать серотониновый синдром — серьёзную, иногда смертельную реакцию.", pt:"Dois tipos diferentes de antidepressivos juntos podem desencadear a síndrome serotoninérgica — uma reação grave, às vezes fatal.", de:"Zwei verschiedene Arten von Antidepressiva zusammen können ein Serotonin-Syndrom auslösen — eine schwere, manchmal tödliche Reaktion.", ja:"2種類の異なる抗うつ薬を一緒に使うと、セロトニン症候群 — 重く、時に致命的な反応 — を引き起こすことがあります。"},
    why:{en:"Both raise serotonin levels; combined, serotonin can spike dangerously high.",
         es:"Ambos elevan los niveles de serotonina; combinados, la serotonina puede subir a niveles peligrosos.",
          zh:"两者都会提高5-羟色胺水平；合用时5-羟色胺可能升高到危险程度。", vi:"Cả hai đều làm tăng nồng độ serotonin; khi kết hợp, serotonin có thể tăng vọt đến mức nguy hiểm.", ar:"كلاهما يرفع مستويات السيروتونين؛ ومجتمعين، يمكن أن يرتفع السيروتونين إلى مستويات خطيرة.", fr:"Les deux augmentent les niveaux de sérotonine ; combinés, la sérotonine peut monter à des niveaux dangereux.", ko:"둘 다 세로토닌 수치를 높이며, 함께 쓰면 세로토닌이 위험하게 급등할 수 있습니다.", ru:"Оба повышают уровень серотонина; в сочетании серотонин может опасно подскочить.", pt:"Ambos elevam os níveis de serotonina; combinados, a serotonina pode disparar a níveis perigosos.", de:"Beide erhöhen den Serotoninspiegel; kombiniert kann Serotonin gefährlich hoch ansteigen.", ja:"どちらもセロトニン値を上げるため、併用するとセロトニンが危険なほど急上昇することがあります。"},
    mgmt:{en:"A washout period (often 2+ weeks) is required when switching between these drugs. Never overlap them without a prescriber's plan.",
          es:"Se requiere un período de lavado (a menudo 2+ semanas) al cambiar entre estos medicamentos. Nunca los combines sin un plan de tu médico.",
          zh:"在这两类药物之间切换时需要一个洗脱期（通常2周以上）。未经医生的方案安排，切勿让两者重叠使用。", vi:"Cần có một khoảng thời gian đào thải (thường từ 2 tuần trở lên) khi chuyển đổi giữa các loại thuốc này. Không bao giờ dùng chồng lấn nếu không có kế hoạch của bác sĩ.", ar:"تُطلب فترة تخلّص (غالبًا أسبوعان أو أكثر) عند التبديل بين هذه الأدوية. لا تجمع بينها أبدًا دون خطة من الطبيب المعالج.", fr:"Une période de sevrage (souvent 2 semaines ou plus) est nécessaire lors du passage d'un médicament à l'autre. Ne les combinez jamais sans un plan de votre médecin prescripteur.", ko:"이 약들을 바꿀 때는 휴약 기간(흔히 2주 이상)이 필요합니다. 처방자의 계획 없이 절대 겹쳐 쓰지 마세요.", ru:"При переходе между этими лекарствами нужен период вымывания (часто 2+ недели). Никогда не сочетайте их без плана назначающего врача.", pt:"Um período de eliminação (muitas vezes 2+ semanas) é necessário ao trocar entre esses medicamentos. Nunca os sobreponha sem um plano do médico prescritor.", de:"Beim Wechsel zwischen diesen Medikamenten ist eine Auswaschphase (oft 2+ Wochen) nötig. Überlappen Sie sie nie ohne einen Plan des verordnenden Arztes.", ja:"これらの薬を切り替える際には休薬期間（多くは2週間以上）が必要です。処方医の計画なしに決して重ねないでください。"} },

  { a:SSRIS, b:["sumatriptan","rizatriptan","zolmitriptan","tramadol","linezolid"], severity:"moderate",
    what:{en:"Adding a migraine triptan (or certain other serotonin‑raising drugs) to an SSRI can increase serotonin syndrome risk.",
          es:"Agregar un triptán para la migraña (u otros medicamentos que elevan la serotonina) a un ISRS puede aumentar el riesgo de síndrome serotoninérgico.",
          zh:"在服用SSRI的基础上加用偏头痛曲坦类药物（或其他某些提高5-羟色胺的药物）可能增加5-羟色胺综合征的风险。", vi:"Thêm thuốc nhóm triptan trị đau nửa đầu (hoặc một số thuốc khác làm tăng serotonin) vào SSRI có thể tăng nguy cơ hội chứng serotonin.", ar:"إضافة دواء تريبتان لعلاج الصداع النصفي (أو بعض الأدوية الأخرى الرافعة للسيروتونين) إلى SSRI يمكن أن يزيد من خطر متلازمة السيروتونين.", fr:"Ajouter un triptan contre la migraine (ou certains autres médicaments qui augmentent la sérotonine) à un ISRS peut augmenter le risque de syndrome sérotoninergique.", ko:"편두통 트립탄(또는 세로토닌을 높이는 특정 다른 약)을 SSRI에 추가하면 세로토닌 증후군 위험이 높아질 수 있습니다.", ru:"Добавление триптана от мигрени (или некоторых других повышающих серотонин лекарств) к СИОЗС может повысить риск серотонинового синдрома.", pt:"Adicionar um triptano para enxaqueca (ou certos outros medicamentos que elevam a serotonina) a um ISRS pode aumentar o risco de síndrome serotoninérgica.", de:"Ein Migräne-Triptan (oder bestimmte andere serotoninerhöhende Medikamente) zu einem SSRI hinzuzufügen, kann das Risiko eines Serotonin-Syndroms erhöhen.", ja:"片頭痛のトリプタン（またはセロトニンを上げる他の特定の薬）をSSRIに加えると、セロトニン症候群のリスクが高まることがあります。"},
    why:{en:"Each nudges serotonin upward; together the rise can become a problem in some people.",
         es:"Cada uno eleva un poco la serotonina; juntos, el aumento puede ser un problema en algunas personas.",
          zh:"每种药物都会略微提高5-羟色胺；合用时这种升高在部分人身上可能成为问题。", vi:"Mỗi loại đều đẩy serotonin tăng nhẹ; khi kết hợp, mức tăng này có thể trở thành vấn đề ở một số người.", ar:"كل منهما يرفع السيروتونين قليلاً؛ ومعًا يمكن أن يصبح هذا الارتفاع مشكلة لدى بعض الأشخاص.", fr:"Chacun pousse légèrement la sérotonine vers le haut ; ensemble, cette hausse peut devenir un problème chez certaines personnes.", ko:"각각이 세로토닌을 조금씩 올리며, 함께 쓰면 그 상승이 일부 사람에게 문제가 될 수 있습니다.", ru:"Каждый немного повышает серотонин; вместе это повышение может стать проблемой у некоторых людей.", pt:"Cada um empurra a serotonina um pouco para cima; juntos, essa elevação pode virar um problema em algumas pessoas.", de:"Jedes schiebt Serotonin ein wenig nach oben; zusammen kann dieser Anstieg bei manchen Menschen zum Problem werden.", ja:"それぞれがセロトニンを少しずつ押し上げるため、併用するとその上昇が一部の人で問題になることがあります。"},
    mgmt:{en:"Often used together with monitoring, but watch for agitation, racing heart, tremor, or fever and report them.",
          es:"A menudo se usan juntos con supervisión, pero vigila la agitación, el corazón acelerado, el temblor, o la fiebre, y repórtalos.",
          zh:"两者常在监测下合用，但要留意躁动、心跳加快、震颤或发热等情况并及时报告。", vi:"Thường được dùng cùng nhau kèm theo dõi, nhưng cần chú ý các dấu hiệu như kích động, tim đập nhanh, run rẩy, hoặc sốt và báo cáo ngay.", ar:"غالبًا ما تُستخدم معًا مع المراقبة، لكن راقب الهياج، وتسارع نبضات القلب، والارتعاش، أو الحمى وأبلغ عنها.", fr:"Souvent utilisés ensemble avec surveillance, mais surveillez l'agitation, un rythme cardiaque rapide, des tremblements, ou de la fièvre et signalez-les.", ko:"흔히 관찰하면서 함께 쓰지만, 초조, 빠른 심박, 떨림, 또는 발열을 살피고 보고하세요.", ru:"Часто применяют вместе с наблюдением, но следите за возбуждением, учащённым сердцебиением, тремором или лихорадкой и сообщайте о них.", pt:"Frequentemente usados juntos com monitoramento, mas observe agitação, coração acelerado, tremor ou febre e relate-os.", de:"Oft zusammen mit Überwachung verwendet, aber achten Sie auf Unruhe, Herzrasen, Zittern oder Fieber und melden Sie diese.", ja:"しばしば監視のもとで併用されますが、興奮、動悸、震え、発熱に注意し、それらを報告してください。"} },

  { a:STATINS, b:MACRO, severity:"major",
    what:{en:"Certain cholesterol statins with certain antibiotics can cause severe muscle breakdown (rhabdomyolysis).",
          es:"Ciertas estatinas para el colesterol con ciertos antibióticos pueden causar una descomposición muscular grave (rabdomiólisis).",
          zh:"某些降胆固醇的他汀类药物与某些抗生素同时使用可能导致严重的肌肉分解（横纹肌溶解）。", vi:"Một số thuốc statin hạ cholesterol dùng cùng một số kháng sinh có thể gây tiêu cơ vân nghiêm trọng.", ar:"بعض أدوية الستاتين لخفض الكوليسترول مع بعض المضادات الحيوية يمكن أن تسبب انحلالًا شديدًا للعضلات (انحلال الربيدات).", fr:"Certaines statines pour le cholestérol avec certains antibiotiques peuvent provoquer une dégradation musculaire sévère (rhabdomyolyse).", ko:"특정 콜레스테롤 스타틴과 특정 항생제를 함께 쓰면 심각한 근육 분해(횡문근융해증)가 생길 수 있습니다.", ru:"Некоторые статины от холестерина с определёнными антибиотиками могут вызвать тяжёлое разрушение мышц (рабдомиолиз).", pt:"Certas estatinas para colesterol com certos antibióticos podem causar quebra muscular grave (rabdomiólise).", de:"Bestimmte Cholesterin-Statine mit bestimmten Antibiotika können einen schweren Muskelabbau (Rhabdomyolyse) verursachen.", ja:"特定のコレステロール用スタチンを特定の抗生物質と併用すると、重い筋肉の崩壊（横紋筋融解症）を起こすことがあります。"},
    why:{en:"The antibiotic blocks the liver enzyme (CYP3A4) that clears the statin, so statin levels climb.",
         es:"El antibiótico bloquea la enzima hepática (CYP3A4) que elimina la estatina, así que los niveles de la estatina suben.",
          zh:"该抗生素会阻断清除他汀类药物的肝酶（CYP3A4），导致他汀水平升高。", vi:"Kháng sinh này ức chế enzyme gan (CYP3A4) đào thải statin, khiến nồng độ statin tăng cao.", ar:"يُثبّط المضاد الحيوي إنزيم الكبد (CYP3A4) الذي يُخلّص الستاتين، فترتفع مستوياته.", fr:"L'antibiotique bloque l'enzyme hépatique (CYP3A4) qui élimine la statine, donc les niveaux de statine augmentent.", ko:"이 항생제가 스타틴을 제거하는 간 효소(CYP3A4)를 차단해 스타틴 농도가 올라갑니다.", ru:"Антибиотик блокирует фермент печени (CYP3A4), выводящий статин, поэтому уровень статина растёт.", pt:"O antibiótico bloqueia a enzima do fígado (CYP3A4) que elimina a estatina, então os níveis de estatina sobem.", de:"Das Antibiotikum blockiert das Leberenzym (CYP3A4), das das Statin abbaut, sodass die Statinspiegel steigen.", ja:"抗生物質がスタチンを処理する肝酵素（CYP3A4）を阻害するため、スタチン値が上がります。"},
    mgmt:{en:"Doctors may pause the statin during the antibiotic course. Report unexplained muscle pain or dark urine.",
          es:"Los médicos pueden pausar la estatina durante el tratamiento con el antibiótico. Reporta dolor muscular inexplicado u orina oscura.",
          zh:"医生可能会在使用抗生素期间暂停他汀类药物。如出现不明原因的肌肉疼痛或尿液发黑，请及时报告。", vi:"Bác sĩ có thể tạm ngừng statin trong thời gian dùng kháng sinh. Hãy báo ngay nếu có đau cơ không rõ nguyên nhân hoặc nước tiểu sẫm màu.", ar:"قد يُوقف الأطباء الستاتين مؤقتًا أثناء دورة المضاد الحيوي. أبلغ عن أي ألم عضلي غير مُفسَّر أو بول داكن.", fr:"Les médecins peuvent suspendre la statine pendant la cure d'antibiotique. Signalez toute douleur musculaire inexpliquée ou urine foncée.", ko:"의사는 항생제 치료 기간 동안 스타틴을 중단할 수 있습니다. 원인 모를 근육통이나 짙은 소변을 보고하세요.", ru:"Врачи могут приостановить статин на время курса антибиотика. Сообщайте о необъяснимой мышечной боли или тёмной моче.", pt:"Os médicos podem pausar a estatina durante o ciclo do antibiótico. Relate dor muscular inexplicada ou urina escura.", de:"Ärzte pausieren das Statin während der Antibiotikakur möglicherweise. Melden Sie unerklärliche Muskelschmerzen oder dunklen Urin.", ja:"医師は抗生物質の投与期間中スタチンを一時中止することがあります。原因不明の筋肉痛や濃い色の尿を報告してください。"} },

  { a:STATINS, b:AZOLES, severity:"major",
    what:{en:"Some statins with azole antifungals can cause severe muscle injury.",
          es:"Algunas estatinas con antimicóticos azólicos pueden causar una lesión muscular grave.",
          zh:"某些他汀类药物与唑类抗真菌药同时使用可能导致严重的肌肉损伤。", vi:"Một số statin dùng cùng thuốc kháng nấm nhóm azole có thể gây tổn thương cơ nghiêm trọng.", ar:"بعض أدوية الستاتين مع مضادات الفطريات الآزولية يمكن أن تسبب إصابة عضلية شديدة.", fr:"Certaines statines avec des antifongiques azolés peuvent provoquer une lésion musculaire sévère.", ko:"일부 스타틴과 아졸계 항진균제를 함께 쓰면 심각한 근육 손상이 생길 수 있습니다.", ru:"Некоторые статины с азольными противогрибковыми могут вызвать тяжёлое повреждение мышц.", pt:"Algumas estatinas com antifúngicos azólicos podem causar lesão muscular grave.", de:"Einige Statine mit Azol-Antimykotika können eine schwere Muskelschädigung verursachen.", ja:"一部のスタチンをアゾール系抗真菌薬と併用すると、重い筋肉の障害を起こすことがあります。"},
    why:{en:"Azoles strongly inhibit the enzyme that breaks down the statin, letting it accumulate.",
         es:"Los azoles inhiben fuertemente la enzima que descompone la estatina, permitiendo que se acumule.",
          zh:"唑类药物会强烈抑制分解他汀类药物的酶，使其在体内蓄积。", vi:"Azole ức chế mạnh enzyme phân giải statin, khiến thuốc tích tụ trong cơ thể.", ar:"تُثبّط الآزولات بشدة الإنزيم الذي يُفكّك الستاتين، مما يسمح بتراكمه.", fr:"Les azolés inhibent fortement l'enzyme qui décompose la statine, lui permettant de s'accumuler.", ko:"아졸계는 스타틴을 분해하는 효소를 강하게 억제해 축적되게 합니다.", ru:"Азолы сильно ингибируют фермент, расщепляющий статин, позволяя ему накапливаться.", pt:"Os azólicos inibem fortemente a enzima que decompõe a estatina, permitindo que ela se acumule.", de:"Azole hemmen stark das Enzym, das das Statin abbaut, sodass es sich anreichert.", ja:"アゾール系はスタチンを分解する酵素を強く阻害し、蓄積させます。"},
    mgmt:{en:"A different statin or a temporary hold is often used. Watch for muscle pain or weakness.",
          es:"A menudo se usa una estatina diferente o se pausa temporalmente. Vigila el dolor o la debilidad muscular.",
          zh:"通常会改用其他他汀类药物或暂时停用。请留意肌肉疼痛或无力的情况。", vi:"Thường sẽ đổi sang statin khác hoặc tạm ngừng thuốc. Hãy chú ý các dấu hiệu đau hoặc yếu cơ.", ar:"غالبًا ما يُستخدم ستاتين مختلف أو يُوقَف مؤقتًا. راقب ألم العضلات أو الضعف.", fr:"Une statine différente ou un arrêt temporaire est souvent utilisé. Surveillez la douleur ou la faiblesse musculaire.", ko:"다른 스타틴을 쓰거나 일시적으로 중단하는 경우가 흔합니다. 근육통이나 근력 약화를 살피세요.", ru:"Часто применяют другой статин или временную отмену. Следите за мышечной болью или слабостью.", pt:"Uma estatina diferente ou uma pausa temporária costuma ser usada. Observe dor ou fraqueza muscular.", de:"Oft wird ein anderes Statin oder eine vorübergehende Pause verwendet. Achten Sie auf Muskelschmerzen oder -schwäche.", ja:"しばしば別のスタチンを使うか一時的に中止します。筋肉痛や筋力低下に注意してください。"} },

  { a:ACE, b:KSPARE, severity:"major",
    what:{en:"This blood‑pressure combination can drive potassium too high, which can disturb heart rhythm.",
          es:"Esta combinación de medicamentos para la presión arterial puede elevar demasiado el potasio, lo cual puede alterar el ritmo cardíaco.",
          zh:"这种降血压药物组合可能使血钾过高，从而扰乱心律。", vi:"Sự kết hợp thuốc huyết áp này có thể đẩy kali lên quá cao, gây rối loạn nhịp tim.", ar:"مزيج أدوية ضغط الدم هذا يمكن أن يرفع البوتاسيوم كثيرًا، مما قد يُخلّ بنظم القلب.", fr:"Cette combinaison de médicaments pour la tension artérielle peut faire monter le potassium trop haut, ce qui peut perturber le rythme cardiaque.", ko:"이 혈압약 조합은 칼륨을 너무 높여 심장 리듬을 흐트러뜨릴 수 있습니다.", ru:"Эта комбинация препаратов от давления может слишком повысить калий, что может нарушить сердечный ритм.", pt:"Esta combinação de medicamentos para pressão pode elevar demais o potássio, o que pode perturbar o ritmo cardíaco.", de:"Diese Blutdruck-Kombination kann das Kalium zu hoch treiben, was den Herzrhythmus stören kann.", ja:"この血圧薬の組み合わせはカリウムを高くしすぎ、心拍リズムを乱すことがあります。"},
    why:{en:"Both raise potassium; stacked together, levels can become dangerous.",
         es:"Ambos elevan el potasio; combinados, los niveles pueden volverse peligrosos.",
          zh:"两者都会提高血钾水平；叠加使用时，血钾水平可能变得危险。", vi:"Cả hai đều làm tăng kali; khi kết hợp, nồng độ có thể trở nên nguy hiểm.", ar:"كلاهما يرفع البوتاسيوم؛ ومع تراكمهما معًا، يمكن أن تصبح المستويات خطيرة.", fr:"Les deux augmentent le potassium ; cumulés ensemble, les niveaux peuvent devenir dangereux.", ko:"둘 다 칼륨을 높이며, 함께 겹치면 수치가 위험해질 수 있습니다.", ru:"Оба повышают калий; сложенные вместе, уровни могут стать опасными.", pt:"Ambos elevam o potássio; somados, os níveis podem se tornar perigosos.", de:"Beide erhöhen das Kalium; zusammengelegt können die Werte gefährlich werden.", ja:"どちらもカリウムを上げるため、重なると値が危険になることがあります。"},
    mgmt:{en:"Potassium and kidney function are usually monitored with blood tests when these are combined.",
          es:"El potasio y la función renal suelen monitorearse con análisis de sangre cuando se combinan estos medicamentos.",
          zh:"这两类药物合用时，通常需要通过血液检查监测血钾和肾功能。", vi:"Kali và chức năng thận thường được theo dõi bằng xét nghiệm máu khi kết hợp hai loại thuốc này.", ar:"عادةً ما تتم مراقبة البوتاسيوم ووظيفة الكلى بواسطة تحاليل الدم عند الجمع بين هذين الدواءين.", fr:"Le potassium et la fonction rénale sont généralement surveillés par des analyses de sang lorsque ceux-ci sont combinés.", ko:"이 약들을 함께 쓸 때는 보통 혈액 검사로 칼륨과 신장 기능을 관찰합니다.", ru:"При сочетании этих препаратов калий и функцию почек обычно контролируют анализами крови.", pt:"O potássio e a função renal costumam ser monitorados com exames de sangue quando estes são combinados.", de:"Kalium und Nierenfunktion werden bei dieser Kombination meist mit Bluttests überwacht.", ja:"これらを併用する際は、通常血液検査でカリウムと腎機能を監視します。"} },

  { a:ACE, b:["potassium","losartan","valsartan","olmesartan","irbesartan","candesartan"], severity:"moderate",
    what:{en:"Pairing an ACE inhibitor with a potassium supplement or an ARB can raise potassium and stress the kidneys.",
          es:"Combinar un inhibidor de la ECA con un suplemento de potasio o un ARA-II puede elevar el potasio y estresar los riñones.",
          zh:"将ACE抑制剂与钾补充剂或ARB类药物同时使用，可能升高血钾并给肾脏带来负担。", vi:"Kết hợp thuốc ức chế men chuyển (ACE) với thực phẩm bổ sung kali hoặc thuốc ức chế thụ thể angiotensin (ARB) có thể làm tăng kali và gây áp lực lên thận.", ar:"الجمع بين مثبط ACE ومكمل بوتاسيوم أو دواء ARB يمكن أن يرفع البوتاسيوم ويُجهد الكلى.", fr:"Associer un inhibiteur de l'ECA à un supplément de potassium ou à un ARA peut augmenter le potassium et stresser les reins.", ko:"ACE 억제제를 칼륨 보충제나 ARB와 함께 쓰면 칼륨이 오르고 신장에 부담을 줄 수 있습니다.", ru:"Сочетание ингибитора АПФ с добавкой калия или БРА может повысить калий и нагрузить почки.", pt:"Associar um inibidor da ECA a um suplemento de potássio ou a um BRA pode elevar o potássio e sobrecarregar os rins.", de:"Einen ACE-Hemmer mit einem Kaliumpräparat oder einem ARB zu kombinieren, kann das Kalium erhöhen und die Nieren belasten.", ja:"ACE阻害薬をカリウム補助剤やARBと併用すると、カリウムが上がり腎臓に負担がかかることがあります。"},
    why:{en:"Both reduce how much potassium the body gets rid of.",
         es:"Ambos reducen cuánto potasio elimina el cuerpo.",
          zh:"两者都会减少身体排出钾的量。", vi:"Cả hai đều làm giảm lượng kali cơ thể đào thải ra ngoài.", ar:"كلاهما يُقلّل من كمية البوتاسيوم التي يتخلص منها الجسم.", fr:"Les deux réduisent la quantité de potassium que le corps élimine.", ko:"둘 다 몸이 배출하는 칼륨의 양을 줄입니다.", ru:"Оба снижают количество калия, которое выводит организм.", pt:"Ambos reduzem a quantidade de potássio que o corpo elimina.", de:"Beide verringern, wie viel Kalium der Körper ausscheidet.", ja:"どちらも体が排出するカリウムの量を減らします。"},
    mgmt:{en:"Generally avoided unless specifically directed and monitored with blood tests.",
          es:"Generalmente se evita a menos que sea indicado específicamente y monitoreado con análisis de sangre.",
          zh:"一般应避免这种组合，除非有明确的医嘱并通过血液检查进行监测。", vi:"Thường được tránh trừ khi có chỉ định cụ thể và được theo dõi bằng xét nghiệm máu.", ar:"يُتجنَّب هذا عمومًا ما لم يُوجَّه به تحديدًا وتتم مراقبته بتحاليل الدم.", fr:"Généralement évité sauf indication spécifique et surveillance par analyses de sang.", ko:"특별히 지시되고 혈액 검사로 관찰되지 않는 한 일반적으로 피합니다.", ru:"Обычно избегают, если это специально не назначено и не контролируется анализами крови.", pt:"Geralmente evitado, a menos que especificamente indicado e monitorado com exames de sangue.", de:"Wird generell vermieden, sofern nicht ausdrücklich angeordnet und mit Bluttests überwacht.", ja:"特に指示され血液検査で監視される場合を除き、一般に避けられます。"} },

  { a:["methotrexate"], b:NSAIDS, severity:"major",
    what:{en:"Anti‑inflammatory painkillers can raise methotrexate to toxic levels, especially at higher methotrexate doses.",
          es:"Los analgésicos antiinflamatorios pueden elevar el metotrexato a niveles tóxicos, especialmente con dosis más altas de metotrexato.",
          zh:"抗炎止痛药可能使甲氨蝶呤升高到中毒水平，尤其是在甲氨蝶呤剂量较高时。", vi:"Thuốc giảm đau kháng viêm có thể làm tăng methotrexate lên mức gây độc, đặc biệt ở liều methotrexate cao hơn.", ar:"يمكن لمسكنات الألم المضادة للالتهاب أن ترفع الميثوتريكسات إلى مستويات سامة، خاصة عند جرعات الميثوتريكسات الأعلى.", fr:"Les analgésiques anti-inflammatoires peuvent faire monter le méthotrexate à des niveaux toxiques, surtout à des doses de méthotrexate plus élevées.", ko:"항염증 진통제는 특히 고용량 메토트렉세이트에서 메토트렉세이트를 독성 수준까지 높일 수 있습니다.", ru:"Противовоспалительные обезболивающие могут повысить метотрексат до токсичного уровня, особенно при более высоких дозах метотрексата.", pt:"Analgésicos anti-inflamatórios podem elevar o metotrexato a níveis tóxicos, especialmente em doses mais altas de metotrexato.", de:"Entzündungshemmende Schmerzmittel können Methotrexat auf toxische Werte erhöhen, besonders bei höheren Methotrexat-Dosen.", ja:"抗炎症性の鎮痛薬はメトトレキサートを毒性のある水準まで上げることがあり、特にメトトレキサートの用量が高いときに顕著です。"},
    why:{en:"NSAIDs reduce how fast the kidneys clear methotrexate.",
         es:"Los AINE reducen qué tan rápido los riñones eliminan el metotrexato.",
          zh:"非甾体抗炎药会降低肾脏清除甲氨蝶呤的速度。", vi:"NSAID làm giảm tốc độ thận đào thải methotrexate.", ar:"تُقلّل مضادات الالتهاب غير الستيرويدية من سرعة تخلّص الكلى من الميثوتريكسات.", fr:"Les AINS réduisent la vitesse à laquelle les reins éliminent le méthotrexate.", ko:"NSAID는 신장이 메토트렉세이트를 제거하는 속도를 늦춥니다.", ru:"НПВП снижают скорость, с которой почки выводят метотрексат.", pt:"Os AINEs reduzem a rapidez com que os rins eliminam o metotrexato.", de:"NSAR verringern, wie schnell die Nieren Methotrexat ausscheiden.", ja:"NSAIDは腎臓がメトトレキサートを排出する速さを下げます。"},
    mgmt:{en:"Higher‑dose methotrexate and NSAIDs are a dangerous mix; low‑dose use needs a doctor's guidance.",
          es:"El metotrexato en dosis altas y los AINE son una mezcla peligrosa; el uso en dosis bajas necesita la guía de un médico.",
          zh:"高剂量甲氨蝶呤与非甾体抗炎药同用是危险的组合；低剂量使用也需要在医生指导下进行。", vi:"Methotrexate liều cao kết hợp NSAID là sự kết hợp nguy hiểm; ngay cả dùng liều thấp cũng cần có hướng dẫn của bác sĩ.", ar:"الميثوتريكسات بجرعة أعلى مع مضادات الالتهاب غير الستيرويدية مزيج خطير؛ الاستخدام بجرعة منخفضة يحتاج إلى توجيه من طبيب.", fr:"Le méthotrexate à forte dose et les AINS sont un mélange dangereux ; l'utilisation à faible dose nécessite les conseils d'un médecin.", ko:"고용량 메토트렉세이트와 NSAID는 위험한 조합이며, 저용량 사용도 의사의 지도가 필요합니다.", ru:"Метотрексат в высокой дозе и НПВП — опасная смесь; применение в низкой дозе требует указаний врача.", pt:"Metotrexato em dose alta e AINEs são uma mistura perigosa; o uso em dose baixa precisa de orientação médica.", de:"Methotrexat in höherer Dosis und NSAR sind eine gefährliche Mischung; die niedrig dosierte Anwendung braucht ärztliche Anleitung.", ja:"高用量のメトトレキサートとNSAIDは危険な組み合わせで、低用量の使用でも医師の指導が必要です。"} },

  { a:["lithium"], b:NSAIDS, severity:"moderate",
    what:{en:"NSAIDs can push lithium levels up, and lithium has a narrow safe range.",
          es:"Los AINE pueden elevar los niveles de litio, y el litio tiene un rango seguro muy estrecho.",
          zh:"非甾体抗炎药可能使锂盐水平升高，而锂盐的安全范围本身就很窄。", vi:"NSAID có thể làm tăng nồng độ lithium, trong khi lithium có phạm vi an toàn rất hẹp.", ar:"يمكن لمضادات الالتهاب غير الستيرويدية أن ترفع مستويات الليثيوم، والليثيوم له نطاق أمان ضيق.", fr:"Les AINS peuvent faire monter les niveaux de lithium, et le lithium a une marge de sécurité étroite.", ko:"NSAID는 리튬 수치를 높일 수 있고, 리튬은 안전 범위가 좁습니다.", ru:"НПВП могут повысить уровень лития, а у лития узкий безопасный диапазон.", pt:"Os AINEs podem elevar os níveis de lítio, e o lítio tem uma faixa segura estreita.", de:"NSAR können den Lithiumspiegel erhöhen, und Lithium hat einen engen sicheren Bereich.", ja:"NSAIDはリチウム値を上げることがあり、リチウムは安全な範囲が狭いです。"},
    why:{en:"NSAIDs reduce lithium clearance through the kidneys.",
         es:"Los AINE reducen la eliminación de litio a través de los riñones.",
          zh:"非甾体抗炎药会降低肾脏对锂盐的清除能力。", vi:"NSAID làm giảm khả năng đào thải lithium qua thận.", ar:"تُقلّل مضادات الالتهاب غير الستيرويدية من تصفية الليثيوم عبر الكلى.", fr:"Les AINS réduisent la clairance du lithium par les reins.", ko:"NSAID는 신장을 통한 리튬 배설을 줄입니다.", ru:"НПВП снижают выведение лития через почки.", pt:"Os AINEs reduzem a eliminação do lítio pelos rins.", de:"NSAR verringern die Lithium-Ausscheidung über die Nieren.", ja:"NSAIDは腎臓を通したリチウムの排出を減らします。"},
    mgmt:{en:"Lithium levels are often checked if an NSAID is added. Watch for tremor, confusion, or nausea.",
          es:"Los niveles de litio suelen revisarse si se agrega un AINE. Vigila el temblor, la confusión, o las náuseas.",
          zh:"加用非甾体抗炎药后通常会复查锂盐水平。请留意震颤、意识模糊或恶心等情况。", vi:"Nồng độ lithium thường được kiểm tra lại nếu thêm NSAID. Hãy chú ý các dấu hiệu run rẩy, lú lẫn, hoặc buồn nôn.", ar:"غالبًا ما تُفحص مستويات الليثيوم إذا أُضيف مضاد التهاب غير ستيرويدي. راقب الارتعاش أو الارتباك أو الغثيان.", fr:"Les niveaux de lithium sont souvent vérifiés si un AINS est ajouté. Surveillez les tremblements, la confusion, ou les nausées.", ko:"NSAID를 추가하면 흔히 리튬 수치를 확인합니다. 떨림, 혼란, 또는 메스꺼움을 살피세요.", ru:"При добавлении НПВП часто проверяют уровень лития. Следите за тремором, спутанностью или тошнотой.", pt:"Os níveis de lítio são frequentemente verificados se um AINE for adicionado. Observe tremor, confusão ou náusea.", de:"Bei Hinzunahme eines NSAR wird der Lithiumspiegel oft kontrolliert. Achten Sie auf Zittern, Verwirrtheit oder Übelkeit.", ja:"NSAIDを加えると、しばしばリチウム値が確認されます。震え、混乱、吐き気に注意してください。"} },

  { a:["lithium"], b:THIAZ, severity:"moderate",
    what:{en:"Thiazide water pills can raise lithium to toxic levels.",
          es:"Los diuréticos tiazídicos pueden elevar el litio a niveles tóxicos.",
          zh:"噻嗪类利尿药（水丸）可能使锂盐升高到中毒水平。", vi:"Thuốc lợi tiểu nhóm thiazide có thể làm tăng lithium lên mức gây độc.", ar:"يمكن لأقراص الماء الثيازيدية أن ترفع الليثيوم إلى مستويات سامة.", fr:"Les diurétiques thiazidiques peuvent faire monter le lithium à des niveaux toxiques.", ko:"티아지드 이뇨제는 리튬을 독성 수준까지 높일 수 있습니다.", ru:"Тиазидные мочегонные могут повысить литий до токсичного уровня.", pt:"Diuréticos tiazídicos podem elevar o lítio a níveis tóxicos.", de:"Thiazid-Wassertabletten können Lithium auf toxische Werte erhöhen.", ja:"チアジド系の利尿薬はリチウムを毒性のある水準まで上げることがあります。"},
    why:{en:"They make the kidneys hold on to lithium.",
         es:"Hacen que los riñones retengan el litio.",
          zh:"它们会让肾脏更多地保留锂盐。", vi:"Chúng khiến thận giữ lại lithium nhiều hơn.", ar:"تجعل الكلى تحتفظ بالليثيوم أكثر.", fr:"Ils font en sorte que les reins retiennent davantage le lithium.", ko:"신장이 리튬을 더 많이 붙잡게 만듭니다.", ru:"Они заставляют почки удерживать литий.", pt:"Eles fazem os rins reterem o lítio.", de:"Sie sorgen dafür, dass die Nieren Lithium zurückhalten.", ja:"腎臓にリチウムを保持させます。"},
    mgmt:{en:"Lithium monitoring and dose adjustment are common when a thiazide is started.",
          es:"El monitoreo de litio y el ajuste de dosis son comunes cuando se inicia una tiazida.",
          zh:"开始使用噻嗪类药物时，通常需要监测锂盐水平并调整剂量。", vi:"Việc theo dõi lithium và điều chỉnh liều là phổ biến khi bắt đầu dùng thiazide.", ar:"مراقبة الليثيوم وتعديل الجرعة أمران شائعان عند بدء استخدام دواء ثيازيدي.", fr:"La surveillance du lithium et l'ajustement de la dose sont courants lorsqu'un thiazidique est débuté.", ko:"티아지드를 시작할 때는 리튬 관찰과 용량 조정이 흔합니다.", ru:"Контроль лития и корректировка дозы обычны при начале приёма тиазида.", pt:"O monitoramento do lítio e o ajuste da dose são comuns quando um tiazídico é iniciado.", de:"Lithium-Überwachung und Dosisanpassung sind üblich, wenn ein Thiazid begonnen wird.", ja:"チアジドを始めるときは、リチウムの監視と用量調整がよく行われます。"} },

  { a:["digoxin"], b:["amiodarone"], severity:"major",
    what:{en:"Amiodarone can roughly double digoxin levels, and digoxin is toxic in excess.",
          es:"La amiodarona puede aproximadamente duplicar los niveles de digoxina, y la digoxina es tóxica en exceso.",

    mgmt:{en:"The digoxin dose is usually cut and levels monitored. Watch for nausea, visual changes, or palpitations.",

    category:{en:"Anti-nausea (antiemetics)", es:"Antináuseas (antieméticos)", zh:"止吐药（抗恶心药）", vi:"Thuốc chống buồn nôn (antiemetics)", ar:"مضادات الغثيان", fr:"Anti-nauséeux (antiémétiques)", ko:"진토제", ru:"Противорвотные (антиэметики)", pt:"Antináusea (antieméticos)", de:"Mittel gegen Übelkeit (Antiemetika)", ja:"制吐薬"},
    note:{en:"Taken before travel, these antihistamine-type antiemetics help prevent the nausea of motion sickness.", es:"Tomados antes de viajar, estos antieméticos de tipo antihistamínico ayudan a prevenir las náuseas del mareo por movimiento.", zh:"在出行前服用，这些抗组胺类止吐药有助于预防晕动症引起的恶心。", vi:"Uống trước khi di chuyển, các thuốc chống buồn nôn dạng kháng histamine này giúp ngăn ngừa buồn nôn do say tàu xe.", ar:"عند تناولها قبل السفر، تساعد مضادات الغثيان هذه من نوع مضادات الهيستامين على منع غثيان دوار الحركة.", fr:"Pris avant le voyage, ces antiémétiques de type antihistaminique aident à prévenir la nausée du mal des transports.", ko:"이동 전에 복용하면, 이 항히스타민 계열의 진토제가 멀미로 인한 메스꺼움을 예방하는 데 도움이 됩니다.", ru:"Принятые перед поездкой, эти противорвотные антигистаминного типа помогают предотвратить тошноту при укачивании.", pt:"Tomados antes de viajar, esses antieméticos do tipo anti-histamínico ajudam a prevenir a náusea do enjoo de movimento.", de:"Vor der Reise eingenommen, helfen diese Antiemetika vom Antihistaminikum-Typ, der Übelkeit der Reisekrankheit vorzubeugen.", ja:"移動の前に飲むと、これらの抗ヒスタミン系の制吐薬が乗り物酔いの吐き気を防ぐのに役立ちます。"},

    category:{en:"Hemorrhoid treatments", es:"Tratamientos para hemorroides", zh:"痔疮治疗药", vi:"Thuốc trị trĩ", ar:"علاجات البواسير", fr:"Traitements des hémorroïdes", ko:"치질 치료제", ru:"Средства от геморроя", pt:"Tratamentos para hemorroidas", de:"Hämorrhoidenmittel", ja:"痔の治療薬"},
    note:{en:"OTC creams and wipes soothe itching and swelling; they don't fix the underlying cause.", es:"Las cremas y toallitas de venta libre calman la picazón y la hinchazón; no corrigen la causa de fondo.", zh:"非处方药膏和湿巾能缓解瘙痒和肿胀，但无法解决根本原因。", vi:"Kem và khăn lau không kê đơn làm dịu ngứa và sưng; chúng không giải quyết nguyên nhân gốc.", ar:"تخفف الكريمات والمناديل التي تُصرف دون وصفة الحكة والتورم؛ لكنها لا تعالج السبب الأساسي.", fr:"Les crèmes et lingettes en vente libre apaisent les démangeaisons et le gonflement ; elles ne corrigent pas la cause sous-jacente.", ko:"시판 크림과 물티슈는 가려움과 부기를 가라앉히지만, 근본 원인을 해결하지는 않습니다.", ru:"Безрецептурные кремы и салфетки успокаивают зуд и отёк; они не устраняют основную причину.", pt:"Cremes e lenços de venda livre aliviam a coceira e o inchaço; não resolvem a causa de fundo.", de:"Rezeptfreie Cremes und Tücher lindern Juckreiz und Schwellung; die zugrunde liegende Ursache beheben sie nicht.", ja:"市販のクリームやシートはかゆみや腫れをやわらげますが、根本的な原因を治すものではありません。"},

    note:{en:"The same OTC pain relievers used for other aches; NSAIDs are often chosen because they also target the inflammation behind cramps.", es:"Los mismos analgésicos de venta libre que para otros dolores; a menudo se eligen los AINE porque también atacan la inflamación detrás de los cólicos.", zh:"与其他疼痛使用的是同类非处方止痛药；人们常选用非甾体抗炎药，因为它还能针对痛经背后的炎症。", vi:"Cùng loại thuốc giảm đau không kê đơn dùng cho các cơn đau khác; NSAID thường được chọn vì còn tác động đến tình trạng viêm gây ra đau bụng kinh.", ar:"نفس مسكنات الألم التي تُصرف دون وصفة والمستخدمة للآلام الأخرى؛ وغالبًا تُختار مضادات الالتهاب غير الستيرويدية لأنها تستهدف أيضًا الالتهاب المسبب للتقلصات.", fr:"Les mêmes antidouleurs en vente libre que pour d'autres douleurs ; on choisit souvent les AINS car ils ciblent aussi l'inflammation à l'origine des crampes.", ko:"다른 통증에 쓰는 것과 같은 시판 진통제입니다. NSAID는 생리통의 원인이 되는 염증에도 작용하기 때문에 자주 선택됩니다.", ru:"Те же безрецептурные обезболивающие, что и при других болях; НПВП часто выбирают, потому что они также действуют на воспаление, стоящее за спазмами.", pt:"Os mesmos analgésicos de venda livre usados para outras dores; os AINEs são frequentemente escolhidos porque também atuam na inflamação por trás das cólicas.", de:"Dieselben rezeptfreien Schmerzmittel wie bei anderen Beschwerden; NSAR werden oft gewählt, weil sie auch auf die Entzündung hinter den Krämpfen wirken.", ja:"他の痛みに使うのと同じ市販の鎮痛薬です。NSAIDは生理痛の背後にある炎症にも働くため、よく選ばれます。"},
    selfcare:{en:"A heating pad on your lower belly, gentle movement, and rest ease cramps."} },

    category:{en:"Topical antihistamines & hydrocortisone", es:"Antihistamínicos tópicos e hidrocortisona", zh:"局部抗组胺药和氢化可的松", vi:"Thuốc kháng histamine bôi ngoài da và hydrocortisone", ar:"مضادات الهيستامين الموضعية والهيدروكورتيزون", fr:"Antihistaminiques topiques &amp; hydrocortisone", ko:"국소 항히스타민제 &amp; 하이드로코르티손", ru:"Местные антигистаминные &amp; гидрокортизон", pt:"Anti-histamínicos tópicos &amp; hidrocortisona", de:"Örtliche Antihistaminika &amp; Hydrocortison", ja:"外用抗ヒスタミン薬 &amp; ヒドロコルチゾン"},

    category:{en:"Topical antifungals", es:"Antifúngicos tópicos", zh:"外用抗真菌药", vi:"Thuốc kháng nấm bôi ngoài da", ar:"مضادات الفطريات الموضعية", fr:"Antifongiques topiques", ko:"국소 항진균제", ru:"Местные противогрибковые", pt:"Antifúngicos tópicos", de:"Örtliche Antimykotika", ja:"外用抗真菌薬"},
    note:{en:"Topical antifungals treat common skin fungal infections; they're usually used for a couple of weeks, even after it looks better.", es:"Los antifúngicos tópicos tratan las infecciones fúngicas comunes de la piel; suelen usarse durante un par de semanas, incluso después de que mejore.", zh:"外用抗真菌药用于治疗常见的皮肤真菌感染；通常需连用两周左右，即使看起来好转也要继续用。", vi:"Thuốc kháng nấm bôi ngoài da điều trị các nhiễm nấm da thường gặp; thường dùng trong khoảng hai tuần, kể cả khi đã trông đỡ hơn.", ar:"تعالج مضادات الفطريات الموضعية عدوى الجلد الفطرية الشائعة؛ وتُستخدم عادةً لأسبوعين، حتى بعد أن يبدو التحسن.", fr:"Les antifongiques topiques traitent les infections fongiques cutanées courantes ; on les utilise généralement pendant environ deux semaines, même après amélioration.", ko:"국소 항진균제는 흔한 피부 곰팡이 감염을 치료합니다. 보통 나아 보여도 2주 정도 계속 사용합니다.", ru:"Местные противогрибковые лечат распространённые грибковые инфекции кожи; их обычно применяют около двух недель, даже после видимого улучшения.", pt:"Os antifúngicos tópicos tratam infecções fúngicas comuns da pele; geralmente são usados por cerca de duas semanas, mesmo depois de melhorar.", de:"Örtliche Antimykotika behandeln häufige Hautpilzinfektionen; sie werden meist etwa zwei Wochen lang angewendet, auch wenn es schon besser aussieht.", ja:"外用抗真菌薬は、よくある皮膚の真菌感染を治療します。良くなったように見えても、通常2週間ほど使い続けます。"},

    note:{en:"OTC acne products unclog pores and reduce the bacteria and oil behind breakouts.", es:"Los productos de venta libre para el acné destapan los poros y reducen las bacterias y el sebo detrás de los brotes.", zh:"非处方祛痘产品能疏通毛孔，减少引发痘痘的细菌和油脂。", vi:"Sản phẩm trị mụn không kê đơn giúp thông thoáng lỗ chân lông và giảm vi khuẩn cùng dầu nhờn gây ra mụn.", ar:"تعمل منتجات حب الشباب التي تُصرف دون وصفة على فتح المسام وتقليل البكتيريا والدهون المسببة للبثور.", fr:"Les produits anti-acné en vente libre débouchent les pores et réduisent les bactéries et le sébum à l'origine des poussées.", ko:"시판 여드름 제품은 모공을 뚫어 주고 여드름의 원인이 되는 세균과 피지를 줄입니다.", ru:"Безрецептурные средства от акне очищают поры и уменьшают количество бактерий и жира, стоящих за высыпаниями.", pt:"Os produtos de venda livre para acne desobstruem os poros e reduzem as bactérias e a oleosidade por trás das espinhas.", de:"Rezeptfreie Aknemittel befreien die Poren und verringern die Bakterien und den Talg hinter den Ausbrüchen.", ja:"市販のにきび用製品は毛穴のつまりを取り、にきびの原因となる細菌や皮脂を減らします。"},

    note:{en:"Topical antibiotics help prevent infection in small wounds after cleaning them.", es:"Los antibióticos tópicos ayudan a prevenir infecciones en heridas pequeñas después de limpiarlas.", zh:"外用抗生素在清洁小伤口后有助于预防感染。", vi:"Thuốc kháng sinh bôi ngoài da giúp ngăn ngừa nhiễm trùng ở vết thương nhỏ sau khi làm sạch.", ar:"تساعد المضادات الحيوية الموضعية على منع العدوى في الجروح الصغيرة بعد تنظيفها.", fr:"Les antibiotiques topiques aident à prévenir l'infection des petites plaies après les avoir nettoyées.", ko:"국소 항생제는 작은 상처를 깨끗이 씻은 뒤 감염을 예방하는 데 도움이 됩니다.", ru:"Местные антибиотики помогают предотвратить инфекцию в небольших ранах после их очистки.", pt:"Os antibióticos tópicos ajudam a prevenir infecção em pequenos ferimentos após limpá-los.", de:"Örtliche Antibiotika helfen, eine Infektion kleiner Wunden nach dem Reinigen zu verhindern.", ja:"外用抗生物質は、小さな傷を清潔にしたあとの感染予防に役立ちます。"},
