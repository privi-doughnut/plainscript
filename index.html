/* =================================================================
   THEME — light by default. Persists to localStorage always, and to
   the Supabase profile when signed in (so it follows you across
   devices). Profile wins over localStorage once it loads.
   ================================================================= */
const THEME_KEY = "plainscript.theme";

function isDark(){ return document.documentElement.getAttribute("data-theme") === "dark"; }

function applyTheme(dark, opts){
  opts = opts || {};
  const btn = $("#theme-toggle");
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  btn.querySelector(".ticon").textContent  = dark ? "☀" : "☾";
  btn.querySelector(".tlabel").textContent = dark ? t("theme_light") : t("theme_dark");
  btn.setAttribute("aria-label", dark ? t("theme_aria_light") : t("theme_aria_dark"));
  if (opts.persist !== false){
    try{ localStorage.setItem(THEME_KEY, dark ? "dark" : "light"); }catch(e){}
    // upsert (not update) so it works even if the profile row doesn't exist yet
    if (session) db("profiles", {
      method:"POST", body:{ id: session.user.id, theme: dark?"dark":"light" },
      prefer:"resolution=merge-duplicates,return=minimal"
    }).catch(()=>{});
  }
}
$("#theme-toggle").addEventListener("click", ()=>applyTheme(!isDark()));
try{ if (localStorage.getItem(THEME_KEY) === "dark") applyTheme(true, {persist:false}); }catch(e){}

/* =================================================================
   LANGUAGE (Phase 5 — i18n) — same persistence pattern as theme:
   localStorage always, synced to the Supabase profile when signed in
   so it follows you across devices. Re-renders whatever dynamic
   content is currently on screen so switching language doesn't need a
   page reload.

   SUPPORTED_LANGS is the single source of truth for which languages are
   selectable — it must match the <option> values in the #lang-select
   markup and the keys actually present in I18N. Adding a language means
   adding it here, adding an <option>, adding an I18N.<code> block, and
   adding {lang} fields to the 5 curated data arrays + one more
   LOCKED_SYSTEM entry in worker.js — nothing else needs to change.
   ================================================================= */
const SUPPORTED_LANGS = ["en","es","zh","vi","ar","fr","ko","ru","pt","de","ja"];
const RTL_LANGS = ["ar"]; // right-to-left languages — flips document direction

function applyLang(lang, opts){
  opts = opts || {};
  uiLang = SUPPORTED_LANGS.includes(lang) ? lang : "en";
  document.documentElement.dir = RTL_LANGS.includes(uiLang) ? "rtl" : "ltr";
  const select = $("#lang-select");
  if (select) select.value = uiLang;
  applyTranslations();
  applyTheme(isDark(), {persist:false}); // refresh the theme-toggle's own label text
  if (opts.persist !== false){
    try{ localStorage.setItem(LANG_KEY, uiLang); }catch(e){}
    if (session) db("profiles", {
      method:"POST", body:{ id: session.user.id, lang: uiLang },
      prefer:"resolution=merge-duplicates,return=minimal"
    }).catch(()=>{});
  }
  refreshDynamicContentForLang();
}

/* re-renders anything already on screen that was built from JS template
   strings (not data-i18n), so a language switch mid-session doesn't
   leave stale-language content sitting next to freshly-translated chrome */
function refreshDynamicContentForLang(){
  renderSymptomList();
  if (typeof renderAcct === "function") renderAcct();
  if (typeof renderCabinet === "function" && SB_ENABLED) renderCabinet();
}

$("#lang-select").addEventListener("change", e => applyLang(e.target.value));
/* NOTE: the actual "restore stored language on load" call happens at the
   very bottom of this script (in initAccounts), not here — applyLang()
   touches SB_ENABLED/session/cabinet, which aren't declared yet at this
   point in the file. Calling it this early would throw (temporal dead
   zone) and abort the rest of the script. */

/* =================================================================
   PHASE 2 — ACCOUNTS + MY CABINET (Supabase)

   Deliberately dependency-free: instead of shipping the supabase-js
   library, we talk to Supabase's two HTTP APIs directly with fetch —
   - GoTrue (auth):   /auth/v1/*  — OAuth redirect, token refresh, logout
   - PostgREST (db):  /rest/v1/*  — the profiles + medications tables
   Security model: the anon key is public by design; every table has
   Row-Level Security scoped to auth.uid() (supabase/schema.sql), so
   the access token — not this client code — is what limits reads and
   writes to the signed-in user's own rows.

   None of this touches the medical-data path: cabinet rows only store
   what the user chose to save (name + FDA-resolved identifiers + their
   own note). All drug FACTS still come from openFDA/RxNorm at view time.
   ================================================================= */
const SB_ENABLED  = !!(SUPABASE_URL && SUPABASE_ANON_KEY);
const SESSION_KEY = "plainscript.session";

let session   = null;  // {access_token, refresh_token, expires_at, user:{id,email}}
let cabinet   = null;  // the signed-in user's saved meds, once loaded
let authError = null;  // OAuth error passed back on the redirect, if any
let magicSent = null;  // email we just sent a magic link to, if any
let refreshTimer = null;

/* --- session plumbing -------------------------------------------- */

/* read a JWT's payload (no verification needed client-side — the server
   verifies the signature on every request; we just want email + user id) */
function jwtPayload(token){
  try{
    const p = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    return JSON.parse(atob(p));
  }catch(e){ return null; }
}

function saveSession(s){
  try{
    if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s));
    else   localStorage.removeItem(SESSION_KEY);
  }catch(e){}
}

function loadStoredSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) session = JSON.parse(raw);
  }catch(e){ session = null; }
}

/* after the OAuth round-trip, Supabase puts tokens in the URL fragment
   (#access_token=…). Capture them, then scrub the URL so tokens never
   sit in the address bar or browser history. Returns true if we just
   arrived from a sign-in. */
function captureOAuthRedirect(){
  if (!location.hash || location.hash.length < 2) return false;
  const h = new URLSearchParams(location.hash.slice(1));
  if (h.get("error") || h.get("error_description")){
    authError = h.get("error_description") || h.get("error");
    history.replaceState(null, "", location.pathname + location.search);
    return false;
  }
  const at = h.get("access_token");
  if (!at) return false;
  const payload = jwtPayload(at) || {};
  session = {
    access_token:  at,
    refresh_token: h.get("refresh_token") || "",
    expires_at:    Math.floor(Date.now()/1000) + (parseInt(h.get("expires_in"),10) || 3600),
    user: { id: payload.sub || "", email: payload.email || "" }
  };
  saveSession(session);
  history.replaceState(null, "", location.pathname + location.search);
  return true;
}

async function refreshSession(){
  if (!session || !session.refresh_token) throw new Error("signed out");
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
    method:"POST",
    headers:{ apikey:SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ refresh_token: session.refresh_token })
  });
  if (!res.ok) throw new Error("session refresh failed");
  const d = await res.json();
  const payload = jwtPayload(d.access_token) || {};
  session = {
    access_token:  d.access_token,
    refresh_token: d.refresh_token || session.refresh_token,
    expires_at:    Math.floor(Date.now()/1000) + (d.expires_in || 3600),
    user: {
      id:    (d.user && d.user.id)    || payload.sub   || session.user.id,
      email: (d.user && d.user.email) || payload.email || session.user.email
    }
  };
  saveSession(session);
  scheduleRefresh();
}

/* refresh a couple of minutes before the access token expires */
function scheduleRefresh(){
  clearTimeout(refreshTimer);
  if (!session) return;
  const secs = Math.max(30, session.expires_at - Math.floor(Date.now()/1000) - 120);
  refreshTimer = setTimeout(()=>refreshSession().catch(localSignOut), secs*1000);
}

async function ensureFreshSession(){
  if (!session) throw new Error("You're signed out — sign in to use your cabinet.");
  if (Math.floor(Date.now()/1000) > session.expires_at - 60){
    try{ await refreshSession(); }
    catch(e){ localSignOut(); throw new Error("Your session expired — please sign in again."); }
  }
}

function signIn(provider){
  // GoTrue handles the whole OAuth dance; it sends the user back to this
  // exact page with tokens in the URL fragment (captured above).
  const back = encodeURIComponent(location.origin + location.pathname);
  location.href = SUPABASE_URL + "/auth/v1/authorize?provider=" + provider + "&redirect_to=" + back;
}

/* passwordless email sign-in: GoTrue's /otp endpoint emails a magic link.
   Clicking it redirects back here with tokens in the URL fragment — the
   exact same shape as the OAuth redirect, so captureOAuthRedirect() above
   handles both with no changes. No password to create, store, or reset. */
async function sendMagicLink(email){
  const back = location.origin + location.pathname;
  const res = await fetch(SUPABASE_URL + "/auth/v1/otp?redirect_to=" + encodeURIComponent(back), {
    method:"POST",
    headers:{ apikey:SUPABASE_ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ email, create_user:true })
  });
  if (!res.ok){
    let msg = "Couldn't send that link — try again.";
    try{ const d = await res.json(); msg = d.msg || d.error_description || msg; }catch(e){}
    throw new Error(msg);
  }
}

async function onSendMagicLink(btn){
  const input = $("#magic-email");
  const email = (input.value || "").trim();
  const statusEl = $("#magic-status");
  if (!/^\S+@\S+\.\S+$/.test(email)){ statusEl.textContent = t("magic_invalid_email"); input.focus(); return; }
  btn.disabled = true;
  statusEl.innerHTML = `<span class="spin"></span>${esc(t("magic_sending"))}`;
  try{
    await sendMagicLink(email);
    magicSent = email;
    renderCabinet();
  }catch(e){
    statusEl.textContent = e.message;
    btn.disabled = false;
  }
}

function localSignOut(){
  clearTimeout(refreshTimer);
  session = null; cabinet = null; magicSent = null;
  saveSession(null);
  renderAcct(); renderCabinet();
}

async function signOut(){
  const t = session && session.access_token;
  localSignOut(); // drop local state first so the UI never hangs on the network
  if (t){
    try{
      await fetch(SUPABASE_URL + "/auth/v1/logout", {
        method:"POST", headers:{ apikey:SUPABASE_ANON_KEY, Authorization:"Bearer "+t }
      });
    }catch(e){/* server-side revoke is best-effort */}
  }
}

/* --- database calls (PostgREST) ---------------------------------- */
async function db(path, opts){
  opts = opts || {};
  await ensureFreshSession();
  const call = () => fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: opts.method || "GET",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + session.access_token,   // RLS keys off this
      "Content-Type": "application/json",
      Prefer: opts.prefer || "return=representation"
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  let res = await call();
  if (res.status === 401){ // stale token → one refresh + retry
    try{ await refreshSession(); }
    catch(e){ localSignOut(); throw new Error("Your session expired — please sign in again."); }
    res = await call();
  }
  if (!res.ok) throw new Error("Couldn't reach your cabinet (error "+res.status+") — try again.");
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

/* unauthenticated variant of db() — used only for the share-link viewer
   flow (Phase 5), which by design has no session at all. Talks to
   PostgREST as the anon role, same as everything else that isn't
   scoped to a signed-in user. */
async function publicDb(path, opts){
  opts = opts || {};
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: opts.method || "GET",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
      Prefer: opts.prefer || "return=representation"
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error("Couldn't reach that shared cabinet (error "+res.status+").");
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadProfile(){
  const rows = await db("profiles?select=theme,lang&id=eq." + session.user.id);
  const row = rows && rows[0];
  const savedTheme = row && row.theme;
  if (savedTheme === "dark" || savedTheme === "light"){
    applyTheme(savedTheme === "dark", {persist:false});
    try{ localStorage.setItem(THEME_KEY, savedTheme); }catch(e){}
  }
  const savedLang = row && row.lang;
  if (savedLang && SUPPORTED_LANGS.includes(savedLang) && savedLang !== uiLang){
    applyLang(savedLang, {persist:false});
  }
}

const CABINET_CACHE_KEY = "plainscript.cabinet_cache";
let cabinetIsOffline = false;

/* tries the live fetch first; if that fails (offline, or a real error) it
   falls back to the last successful fetch cached in localStorage, so My
   Cabinet is still viewable — read-only — without a connection. Only
   throws if there's truly nothing to fall back to. */
async function loadCabinet(){
  cabinetIsOffline = false;
  try{
    cabinet = (await db("medications?select=*&order=created_at.asc")) || [];
    try{ localStorage.setItem(CABINET_CACHE_KEY, JSON.stringify(cabinet)); }catch(e){/* storage full/blocked — not fatal */}
  }catch(e){
    let cached = null;
    try{ cached = JSON.parse(localStorage.getItem(CABINET_CACHE_KEY) || "null"); }catch(err){/* ignore corrupt cache */}
    if (cached){ cabinet = cached; cabinetIsOffline = true; }
    else throw e;
  }
}

/* =================================================================
   SHARE A READ-ONLY CABINET (Phase 5)
   Full security model is documented in supabase/schema.sql next to the
   cabinet_shares table and get_shared_cabinet() function — read that
   before touching anything here. Short version: the share token is an
   unguessable random uuid, anon has no direct table access at all, and
   the only way in is a SECURITY DEFINER function that takes exactly
   one token and returns a narrow, non-identifying column set.
   ================================================================= */
let shareToken = null; // the signed-in user's current active share, if any

async function getActiveShare(){
  const rows = await db("cabinet_shares?select=token&user_id=eq."+session.user.id+"&revoked_at=is.null&order=created_at.desc&limit=1");
  return (rows && rows[0]) ? rows[0].token : null;
}

async function createShare(){
  const rows = await db("cabinet_shares", { method:"POST", body:{ user_id: session.user.id } });
  return (rows && rows[0]) ? rows[0].token : null;
}

async function revokeShare(token){
  await db("cabinet_shares?token=eq."+encodeURIComponent(token), {
    method:"PATCH", body:{ revoked_at: new Date().toISOString() }, prefer:"return=minimal"
  });
}

async function renderSharePanel(){
  const box = $("#share-panel");
  if (!box) return;
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("share_checking"))}</div>`;
  try{ shareToken = await getActiveShare(); }
  catch(e){ shareToken = null; }
  paintSharePanel();
}

function paintSharePanel(){
  const box = $("#share-panel");
  if (!box) return;
  if (!shareToken){
    box.innerHTML = `<p class="status" style="padding:6px 0 10px;">${esc(t("share_intro"))}</p>
      <button class="go" data-act="share-create">${esc(t("share_create_btn"))}</button>`;
    return;
  }
  const url = location.origin + location.pathname + "?share=" + encodeURIComponent(shareToken);
  const qr  = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(url);
  box.innerHTML = `
    <div class="field" style="margin-top:10px;">
      <label class="eyebrow" for="share-link-input">${esc(t("share_link_label"))}</label>
      <div class="inrow">
        <input type="text" id="share-link-input" readonly value="${esc(url)}" />
        <button class="ghost" data-act="share-copy">${esc(t("share_copy_btn"))}</button>
      </div>
    </div>
    <img src="${qr}" width="180" height="180" alt="QR code for the share link above" loading="lazy"
      style="margin-top:12px; border-radius:8px; border:1px solid var(--line); display:block;"
      onerror="this.style.display='none'" />
    <p style="margin-top:12px;"><button class="mini" data-act="share-revoke">${esc(t("share_revoke_btn"))}</button></p>`;
}

async function onCreateShare(){
  const box = $("#share-panel");
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("share_creating"))}</div>`;
  try{ shareToken = await createShare(); paintSharePanel(); }
  catch(e){ box.innerHTML = `<div class="err">${esc(t("share_create_failed"))}</div>`; }
}

async function onCopyShareLink(){
  const input = $("#share-link-input");
  if (!input) return;
  input.select();
  try{
    await navigator.clipboard.writeText(input.value);
    const btn = document.querySelector('[data-act="share-copy"]');
    if (btn){ const orig = btn.textContent; btn.textContent = t("share_copied"); setTimeout(()=>{ btn.textContent = orig; }, 1500); }
  }catch(e){ /* clipboard API blocked — the input is already selected as a fallback */ }
}

async function onRevokeShare(){
  if (!shareToken) return;
  const box = $("#share-panel");
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("share_revoking"))}</div>`;
  try{ await revokeShare(shareToken); shareToken = null; paintSharePanel(); }
  catch(e){ box.innerHTML = `<div class="err">${esc(t("share_revoke_failed"))}</div>`; }
}

/* --- the viewer side: someone opened a ?share=<token> link ---------- */
async function checkSharedCabinetView(){
  if (!SB_ENABLED) return false;
  const token = new URLSearchParams(location.search).get("share");
  if (!token) return false;
  let rows = null;
  try{ rows = await publicDb("rpc/get_shared_cabinet", { method:"POST", body:{ share_token: token } }); }
  catch(e){ rows = null; }
  renderSharedCabinetView(rows);
  return true;
}

function renderSharedCabinetView(rows){
  const tabsEl = document.querySelector("header.site .tabs");
  if (tabsEl) tabsEl.style.display = "none";
  document.querySelectorAll("main .panel").forEach(p => p.hidden = true);
  const wrap = document.querySelector("main .wrap");
  const div = document.createElement("div");
  div.id = "shared-view";

  if (!rows){
    div.innerHTML = `<div class="nofind">
      <span class="eyebrow">${esc(t("shared_view_not_available_eyebrow"))}</span>
      <h3>${esc(t("shared_view_not_available_title"))}</h3>
      <p>${esc(t("shared_view_not_available_body"))}</p>
    </div>`;
  } else if (!rows.length){
    div.innerHTML = `<div class="nofind">
      <span class="eyebrow">${esc(t("shared_view_empty_eyebrow"))}</span>
      <h3>${esc(t("shared_view_empty_title"))}</h3>
      <p>${esc(t("shared_view_empty_body"))}</p>
    </div>`;
  } else {
    div.innerHTML = `<p class="eyebrow" style="margin:20px 0 6px;">${esc(t("shared_view_eyebrow"))}</p>
      <div class="results">${rows.map(r => `
        <article class="card">
          <div class="card-head">
            <div class="name">${esc(titlecase(r.generic || r.brand || t("shared_view_unknown_med")))}</div>
            ${r.drug_class ? `<div class="datastrip"><span><b>${esc(t("med_note_class"))}</b> ${esc(r.drug_class)}</span></div>` : ""}
          </div>
          ${r.notes ? `<div class="card-body"><div class="row"><span class="eyebrow">${esc(t("shared_view_note_label"))}</span><p>${esc(r.notes)}</p></div></div>` : ""}
        </article>`).join("")}
      </div>
      <p class="status" style="padding-top:16px;">${esc(t("shared_view_footer"))}</p>`;
  }
  div.innerHTML += `<p style="margin-top:24px;"><a href="${esc(location.pathname)}">${esc(t("shared_view_open_app"))}</a></p>`;
  wrap.insertBefore(div, wrap.firstChild);
}

/* is this drug already saved? Match by RxCUI when we have it, else by
   resolved generic/brand name, else by what was typed. */
function findInCabinet(d, typed){
  if (!cabinet) return null;
  const rx  = d && d.rxcui;
  const key = ((d && (d.generic || d.brand)) || typed || "").toLowerCase();
  for (const m of cabinet){
    if (rx && m.rxcui && m.rxcui === rx) return m;
    const mkey = (m.generic || m.brand || m.name || "").toLowerCase();
    if (key && mkey === key) return m;
  }
  return null;
}

async function insertMed(typed, d){
  const rows = await db("medications", { method:"POST", body:{
    user_id:    session.user.id,       // RLS double-checks this equals auth.uid()
    name:       typed,
    generic:    d && d.generic ? titlecase(d.generic) : null,
    brand:      d && d.brand   ? titlecase(d.brand)   : null,
    rxcui:      (d && d.rxcui) || null,
    drug_class: (d && d.klass) || null
  }});
  if (rows && rows[0]){ cabinet = cabinet || []; cabinet.push(rows[0]); }
  return rows && rows[0];
}

/* --- header account chip ----------------------------------------- */
function renderAcct(){
  const el = $("#acct");
  if (!SB_ENABLED){ el.innerHTML = ""; return; }
  if (session){
    el.innerHTML = `<span class="who" title="${esc(session.user.email)}">${esc(session.user.email || t("signed_in_email_fallback"))}</span>
      <button class="mini" id="signout-btn">${esc(t("sign_out"))}</button>`;
    $("#signout-btn").addEventListener("click", signOut);
  } else {
    el.innerHTML = `<button class="mini" id="signin-btn">${esc(t("sign_in"))}</button>`;
    $("#signin-btn").addEventListener("click", ()=>selectTab("cabinet"));
  }
}

/* --- "save to cabinet" button on a decoded card ------------------- */
function addCabinetSave(box, d, typed){
  if (!SB_ENABLED) return;
  const head = box.querySelector(".card-head");
  if (!head) return;
  const btn = document.createElement("button");
  btn.className = "mini";
  btn.style.marginTop = "12px";
  if (!session){
    btn.textContent = t("cabinet_save_btn_signin");
    btn.addEventListener("click", ()=>selectTab("cabinet"));
  } else if (findInCabinet(d, typed)){
    btn.textContent = t("cabinet_in_cabinet");
    btn.disabled = true;
  } else {
    btn.textContent = t("cabinet_save_btn");
    btn.addEventListener("click", async ()=>{
      btn.disabled = true; btn.textContent = t("cabinet_saving");
      try{
        await insertMed(typed, d);
        renderCabinet();
        btn.textContent = t("cabinet_saved");
      }catch(e){
        btn.disabled = false; btn.textContent = t("cabinet_save_failed");
      }
    });
  }
  head.appendChild(btn);
}

/* =================================================================
   SIMILAR & RELATED MEDICATIONS (Phase 4)
   Three FDA/RxNorm-sourced views on a decoded drug, opened from a button
   on the overview card:
   - Same drug class   — other drugs sharing this drug's openFDA
                          pharm_class (real FDA pharmacologic classification).
   - Other forms & strengths — other branded/generic products with the
                          SAME active ingredient (e.g. Tylenol Extra Strength).
   - In combination products — products where this ingredient shows up
                          alongside OTHER actives (e.g. cold medicines) —
                          directly useful for spotting accidental double-dosing.
   Nothing here is invented: every list comes straight from an openFDA
   query, same sourcing rule as the rest of the app.
   ================================================================= */
function addSimilarButton(box, d, displayName){
  const head = box.querySelector(".card-head");
  if (!head) return;
  const btn = document.createElement("button");
  btn.className = "mini";
  btn.style.marginTop = "12px";
  btn.style.marginLeft = "8px";
  btn.innerHTML = t("similar_related_btn");
  btn.addEventListener("click", ()=> openSimilarModal(d, displayName));
  head.appendChild(btn);
}

/* one openFDA query on substance_name serves both "other forms" and
   "combination products" — partitioned client-side by how many active
   ingredients each result actually has. */
async function fetchSimilarAndRelated(d){
  const out = { sameClass: [], otherForms: [], combos: [] };

  if (d.klassRaw){
    try{
      const res = await fetch(`${FDA}?search=openfda.pharm_class_epc:"${encodeURIComponent(d.klassRaw)}"&limit=10`);
      if (res.ok){
        const data = await res.json();
        const seen = new Set();
        for (const rec of (data.results||[])){
          const p = parseLabel(rec);
          const label = titlecase(p.brand || p.generic || "");
          const key = (p.generic || label).toLowerCase();
          if (!label || !key || key === (d.generic||"").toLowerCase() || seen.has(key)) continue;
          seen.add(key);
          out.sameClass.push({ name:label, generic:p.generic });
          if (out.sameClass.length >= 8) break;
        }
      }
    }catch(e){/* best-effort */}
  }

  const primarySubstance = (d.substances && d.substances[0]) || (d.generic||"").toLowerCase();
  if (primarySubstance){
    try{
      const res = await fetch(`${FDA}?search=openfda.substance_name:"${encodeURIComponent(primarySubstance)}"&limit=25`);
      if (res.ok){
        const data = await res.json();
        const seen = new Set();
        for (const rec of (data.results||[])){
          const p = parseLabel(rec);
          const label = titlecase(p.brand || p.generic || "");
          const key = label.toLowerCase();
          if (!label || seen.has(key)) continue;
          if (key === (d.brand||"").toLowerCase() || key === (d.generic||"").toLowerCase()) continue;
          seen.add(key);
          const entry = { name:label, substances:p.substances||[] };
          if ((p.substances||[]).length > 1) out.combos.push(entry);
          else out.otherForms.push(entry);
        }
        out.otherForms = out.otherForms.slice(0,10);
        out.combos = out.combos.slice(0,10);
      }
    }catch(e){/* best-effort */}
  }
  return out;
}

function similarPaneHTML(items, kind, emptyMsg){
  if (!items.length) return `<p class="status" style="padding:8px 0;">${esc(emptyMsg)}</p>`;
  const chips = items.map(it=>{
    const sub = kind==="combos"
      ? ` · ${esc(t("contains_word"))} ${esc((it.substances||[]).map(titlecase).join(" + "))}`
      : (kind==="class" && it.generic ? ` · ${esc(titlecase(it.generic))}` : "");
    return `<button class="map-chip" data-name="${esc(it.name)}"><b>${esc(it.name)}</b>${sub}</button>`;
  }).join("");
  const note = kind==="combos" ? `<p class="status" style="padding-top:10px;">${esc(t("similar_combo_note"))}</p>` : "";
  return `<div class="cabinet-map">${chips}</div>${note}`;
}

async function openSimilarModal(d, displayName){
  const trigger = document.activeElement; // restore focus here when the modal closes
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal-box" role="dialog" aria-modal="true" aria-label="${esc(t("similar_modal_aria"))}">
    <div class="modal-head">
      <h2>${esc(displayName)} ${t("similar_related_title_suffix")}</h2>
      <button class="mini" data-act="close">${t("close_btn")}</button>
    </div>
    <div class="modal-tabs" role="tablist">
      <button class="mtab" role="tab" data-tab="class" aria-selected="true">${t("tab_same_class")}</button>
      <button class="mtab" role="tab" data-tab="forms" aria-selected="false">${t("tab_other_forms")}</button>
      <button class="mtab" role="tab" data-tab="combos" aria-selected="false">${t("tab_combo_products")}</button>
    </div>
    <div class="modal-body" aria-live="polite"><div class="status"><span class="spin"></span>${esc(t("similar_looking_up"))}</div></div>
  </div>`;
  document.body.appendChild(overlay);

  // keep both listeners scoped to one open/close cycle — without this, every
  // open added a new document-level keydown listener that never got cleaned
  // up unless the user happened to close via Escape specifically
  function onEsc(e){ if (e.key === "Escape") close(); }
  function trapTab(e){
    if (e.key !== "Tab") return;
    const focusables = [...overlay.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')];
    if (!focusables.length) return;
    const first = focusables[0], last = focusables[focusables.length-1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
  function close(){
    overlay.remove();
    document.removeEventListener("keydown", onEsc);
    if (trigger && typeof trigger.focus === "function") trigger.focus();
  }
  document.addEventListener("keydown", onEsc);
  overlay.addEventListener("keydown", trapTab);
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  overlay.querySelector('[data-act="close"]').addEventListener("click", close);
  overlay.querySelector('[data-act="close"]').focus();

  const data = await fetchSimilarAndRelated(d);
  const panes = {
    class: similarPaneHTML(data.sameClass, "class", t("similar_no_class")),
    forms: similarPaneHTML(data.otherForms, "forms", t("similar_no_forms")),
    combos: similarPaneHTML(data.combos, "combos", t("similar_no_combos"))
  };
  const body = overlay.querySelector(".modal-body");
  function renderPane(tab){
    body.innerHTML = panes[tab];
    body.querySelectorAll("button.map-chip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        close();
        selectTab("decode");
        $("#decode-input").value = chip.dataset.name;
        decode();
      });
    });
  }
  renderPane("class");
  overlay.querySelectorAll(".mtab").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      overlay.querySelectorAll(".mtab").forEach(b=>b.setAttribute("aria-selected", String(b===btn)));
      renderPane(btn.dataset.tab);
    });
  });
}

/* --- the cabinet panel ------------------------------------------- */
function cabinetStatus(msg){ $("#cabinet-status").textContent = msg || ""; }

function medRowHTML(m){

  if (m.drug_class) strip.push(`<span><b>${esc(t("med_note_class"))}</b> ${esc(m.drug_class)}</span>`);
  if (m.rxcui)      strip.push(`<span><b>${esc(t("med_note_rxcui"))}</b> ${esc(m.rxcui)}</span>`);
  if (!m.rxcui && !m.generic)
    strip.push(`<span><b>${esc(t("med_note_class"))}</b> ${esc(t("med_note_unmatched"))}</span>`);
  return `<article class="card medrow" data-id="${esc(m.id)}">
    <div class="medgrid">
      <div class="medinfo">
        <div class="name">${esc(titlecase(display))}</div>
        ${strip.length ? `<div class="datastrip">${strip.join("")}</div>` : ""}
        <div class="mednote" data-role="note">
          ${m.notes
            ? `<p>“${esc(m.notes)}”</p><button class="expand" data-act="edit">${esc(t("med_note_edit_existing"))}</button>`
            : `<button class="expand" data-act="edit">${t("med_note_edit")}</button>`}
        </div>
      </div>
      <button class="rm" data-act="remove" title="${esc(t("med_note_remove_label_prefix"))}" aria-label="${esc(t("med_note_remove_label_prefix"))} ${esc(titlecase(display))} ${esc(t("med_note_remove_from"))}">×</button>

/* printable caregiver one-pager (Phase 5) — scopes print styling with a
   body class instead of touching @page globally, so printing from any
   other tab is completely unaffected. */
const DATE_LOCALES = { en:"en-US", es:"es-ES", zh:"zh-CN", vi:"vi-VN", ar:"ar-SA", fr:"fr-FR", ko:"ko-KR", ru:"ru-RU", pt:"pt-BR", de:"de-DE", ja:"ja-JP" };

function printCabinet(){
  selectTab("cabinet");
  const locale = DATE_LOCALES[uiLang] || "en-US";
  $("#print-date").textContent = t("printed_on") + " " + new Date().toLocaleDateString(locale, {year:"numeric", month:"long", day:"numeric"});
  document.body.classList.add("printing-cabinet");
  window.print();
}
window.addEventListener("afterprint", () => document.body.classList.remove("printing-cabinet"));

async function onAddMed(){
  const input = $("#cab-input");
  const typed = (input.value || "").trim();
  if (!typed){ cabinetStatus(t("cabinet_add_type_first")); input.focus(); return; }
  const btn = $("#cab-add-btn");
  btn.disabled = true;
  cabinetStatus(t("cabinet_looking_up_prefix") + " “" + typed + "” " + t("decode_looking_up_suffix"));
  // resolve against the real FDA label so the saved row carries sourced
  // identifiers (generic, brand, RxCUI, class) — never made-up ones
  let d = null;
  try{ const rr = await resolveLabel(typed); if (rr.rec) d = parseLabel(rr.rec); }
  catch(e){/* FDA hiccup — still allow saving the raw name */}
  const dup = findInCabinet(d, typed);
  if (dup){
    cabinetStatus(t("cabinet_already_have_prefix") + " " + titlecase(dup.generic || dup.name) + ".");
    btn.disabled = false;
    return;
  }
  try{
    await insertMed(typed, d);
    renderCabinet();
    cabinetStatus(d ? t("cabinet_saved_status") : t("cabinet_saved_no_match"));
  }catch(e){
    cabinetStatus(e.message);
    btn.disabled = false;
  }
}

function openNoteEditor(card){
  const m = cabinet.find(x => x.id === card.dataset.id);
  if (!m) return;
  const holder = card.querySelector('[data-role="note"]');
  holder.innerHTML = `<textarea maxlength="500" aria-label="${esc(t("personal_note_aria"))}" placeholder="${esc(t("note_placeholder"))}">${esc(m.notes || "")}</textarea>
    <div class="notebtns">
      <button class="mini" data-act="note-save">${esc(t("note_save_btn"))}</button>
      <button class="mini" data-act="note-cancel">${esc(t("note_cancel_btn"))}</button>
    </div>`;
  holder.querySelector("textarea").focus();
}

async function saveNote(card){
  const id = card.dataset.id;
  const val = card.querySelector("textarea").value.trim();
  try{
    await db("medications?id=eq." + encodeURIComponent(id),
      { method:"PATCH", body:{ notes: val || null }, prefer:"return=minimal" });
    const m = cabinet.find(x => x.id === id);
    if (m) m.notes = val || null;
    renderCabinet();
  }catch(e){ cabinetStatus(e.message); }
}

async function removeMed(card){
  const id = card.dataset.id;
  try{
    await db("medications?id=eq." + encodeURIComponent(id),
      { method:"DELETE", prefer:"return=minimal" });
    cabinet = cabinet.filter(x => x.id !== id);
    renderCabinet();
  }catch(e){ cabinetStatus(e.message); }
}

/* =================================================================
   PHASE 3 — 🚩 CABINET SCAN (the flagship)
   Runs the exact same analyzeDrugPairs engine the Check tab uses, just
   across the whole saved cabinet (N×N instead of a pair), then reduces
   the result into a severity summary, a scannable cabinet map, and
   grounded pharmacist questions. No new medical logic — same rules,
   same sourcing, just applied to everything at once.
   ================================================================= */
async function runCabinetScan(){
  const box = $("#scan-results");
  if (!cabinet || cabinet.length < 2){ box.innerHTML = `<div class="err">${esc(t("scan_min_two"))}</div>`; return; }
  const pairCount = cabinet.length*(cabinet.length-1)/2;
  const pairWord = pairCount>1 ? t("scan_pairs_word_plural") : t("scan_pairs_word");
  box.innerHTML = `<div class="status"><span class="spin"></span>${esc(t("scan_scanning_prefix"))} ${cabinet.length} ${esc(t("medications_word"))} — ${pairCount} ${esc(pairWord)}…</div>`;

  const drugs = [];
  for (const m of cabinet) drugs.push(await resolveForAnalysis(m.generic || m.brand || m.name));
  const { findings, mentions } = analyzeDrugPairs(drugs);

  box.innerHTML = renderScanSummary(findings, mentions)
    + renderCabinetMap(cabinet)
    + renderScanMatrix(findings, mentions)
    + renderPharmacistQuestions(findings, mentions);
}

function renderScanSummary(findings, mentions){
  const counts = { major:0, moderate:0, minor:0 };
  findings.forEach(f => counts[f.rule.severity]++);
  const totalFlags = counts.major+counts.moderate+counts.minor;
  const pills = [];
  let headline;

  if (totalFlags===0 && !mentions.length){
    headline = t("scan_all_clear");
  } else {
    const parts = [];
    if (counts.major)    { parts.push(`${counts.major} ${t("scan_major_word")}`);    pills.push(`<span class="count-pill cpill-major">${counts.major} ${esc(t("scan_major_word"))}</span>`); }
    if (counts.moderate) { parts.push(`${counts.moderate} ${t("scan_moderate_word")}`); pills.push(`<span class="count-pill cpill-mod">${counts.moderate} ${esc(t("scan_moderate_word"))}</span>`); }
    if (counts.minor)    { parts.push(`${counts.minor} ${t("scan_minor_word")}`);     pills.push(`<span class="count-pill cpill-minor">${counts.minor} ${esc(t("scan_minor_word"))}</span>`); }
    headline = parts.length ? `${parts.join(", ")} ${t("scan_to_ask")}` : t("scan_no_severity");
  }
  if (mentions.length) pills.push(`<span class="count-pill cpill-note">${mentions.length} ${esc(mentions.length>1?t("scan_label_mentions"):t("scan_label_mention"))}</span>`);

  const flagCount = findings.length+mentions.length;
  const flagText = flagCount ? `${flagCount} ${flagCount>1?t("scan_flags_word"):t("scan_flag_word")} ${t("scan_found_suffix")}` : t("scan_complete");
  return `<div class="scan-summary">
    <span class="eyebrow">${esc(t("scan_summary_eyebrow"))} · ${esc(flagText)}</span>
    <div class="headline">${esc(headline)}</div>
    ${pills.length?`<div class="counts">${pills.join("")}</div>`:""}
    <p class="status" style="padding:10px 0 0;">${esc(t("scan_disclaimer"))}</p>
  </div>`;
}

function renderCabinetMap(meds){
  return `<p class="eyebrow" style="margin:20px 0 2px;">${esc(t("your_cabinet_eyebrow"))} · ${meds.length} ${esc(t("medications_word"))}</p>
    <div class="cabinet-map">
      ${meds.map(m=>`<span class="map-chip"><b>${esc(titlecase(m.generic||m.name))}</b>${m.drug_class?` · ${esc(m.drug_class)}`:""}</span>`).join("")}
    </div>`;
}

/* same verdict-card markup renderResults uses for the pairwise Check tab —
   one rendering path for both, so a finding always looks and reads the same */
function renderScanMatrix(findings, mentions){
  const rank = {major:0,moderate:1,minor:2};
  const sorted = [...findings].sort((x,y)=>rank[x.rule.severity]-rank[y.rule.severity]);
  let html = "";
  if (sorted.length){
    html += `<p class="eyebrow" style="margin:20px 0 2px;">${esc(t("documented_interactions"))} · ${sorted.length}</p>`;
    for (const f of sorted){
      const s=f.rule.severity;
      const sevLabel = s==="major"?t("sev_major"):s==="moderate"?t("sev_moderate"):t("sev_minor");
      html += `<div class="verdict v-${s}">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(f.A.display)} ✕ ${esc(f.B.display)}</div>
          <div class="sev"><span class="pill">${s}</span> ${esc(sevLabel)}</div>
          <p>${esc(pickLang(f.rule.what))}</p>
          <p class="mgmt"><b>${esc(t("why_label"))}</b> ${esc(pickLang(f.rule.why))}</p>
          <p class="mgmt"><b>${esc(t("mgmt_label"))}</b> ${esc(pickLang(f.rule.mgmt))}</p>
          <div class="src">${t("src_curated_interaction")}</div>
        </div>
      </div>`;
    }
  }
  if (mentions.length){
    html += `<p class="eyebrow" style="margin:18px 0 2px;">${esc(t("also_noted_fda"))} · ${mentions.length}</p>`;
    for (const m of mentions){
      html += `<div class="verdict v-note">
        <div class="bar"></div>
        <div class="vbody">
          <div class="pair">${esc(m.from)} → mentions → ${esc(m.to)}</div>
          <div class="sev"><span class="pill">${esc(t("label_pill"))}</span> ${esc(t("named_in_label"))}</div>
          <p>${esc(m.from)}${esc(t("mentions_text"))} ${esc(m.to)} ${esc(t("mentions_text2"))}</p>
          <p class="mgmt" style="font-style:italic;">"…${esc(m.snippet)}…"</p>
          <div class="src">${esc(t("src_fda_mention"))}</div>
        </div>
      </div>`;
    }
  }
  return html;
}

/* "what to ask your pharmacist" — grounded ONLY in what the scan found,
   never advice about what to do. Highest severity first, capped at 4 so
   it stays something a person would actually bring to a pharmacy counter. */
function renderPharmacistQuestions(findings, mentions){
  const rank = {major:0,moderate:1,minor:2};
  const sorted = [...findings].sort((x,y)=>rank[x.rule.severity]-rank[y.rule.severity]);
  const qs = [];
  const sevWordFor = s => s==="major"?t("scan_major_word"):s==="moderate"?t("scan_moderate_word"):t("scan_minor_word");

  for (const f of sorted.slice(0,4)){
    const whatText = pickLang(f.rule.what).replace(/\.$/,"").toLowerCase();
    qs.push(`${esc(t("ask_q_finding"))} <b>${esc(f.A.display)}</b> ${esc(t("ask_q_and"))} <b>${esc(f.B.display)}</b> ${esc(t("ask_q_together"))} <b>${esc(sevWordFor(f.rule.severity))}</b> ${esc(t("ask_q_interaction"))} (${esc(whatText)}). ${esc(t("ask_q_watch"))}`);
  }
  if (qs.length < 4){
    for (const m of mentions.slice(0, 4-qs.length)){
      qs.push(`${esc(m.from)}${esc(t("ask_q_mention"))} ${esc(m.to)} ${esc(t("ask_q_mention2"))}`);
    }
  }
  if (!qs.length){
    qs.push(esc(t("ask_q_none")));
  }

  return `<div class="askpharmacist">
    <h3>${esc(t("ask_pharmacist_title"))}</h3>
    <ol>${qs.map(q=>`<li>${q}</li>`).join("")}</ol>
    <p class="status" style="padding:10px 0 0;">${esc(t("ask_pharmacist_footer"))}</p>
  </div>`;
}

/* one delegated listener covers every button the cabinet re-renders */
$("#cabinet-body").addEventListener("click", e => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const act  = btn.dataset.act;
  const card = btn.closest(".medrow");
  if (act === "signin-google") signIn("google");
  else if (act === "magic-send") onSendMagicLink(btn);
  else if (act === "add")     onAddMed();
  else if (act === "scan")    runCabinetScan();
  else if (act === "print")   printCabinet();
  else if (act === "share")        renderSharePanel();
  else if (act === "share-create") onCreateShare();
  else if (act === "share-copy")   onCopyShareLink();
  else if (act === "share-revoke") onRevokeShare();
  else if (card && act === "edit")        openNoteEditor(card);
  else if (card && act === "note-save")   saveNote(card);
  else if (card && act === "note-cancel") renderCabinet();
  else if (card && act === "remove")      removeMed(card);
});
$("#cabinet-body").addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (e.target.id === "cab-input") onAddMed();
  else if (e.target.id === "magic-email") onSendMagicLink($('[data-act="magic-send"]'));
});

/* --- boot -------------------------------------------------------- */
(async function initAccounts(){
  // restore a saved language preference before anything else renders
  try{
    const storedLang = localStorage.getItem(LANG_KEY);
    if (storedLang && SUPPORTED_LANGS.includes(storedLang)) applyLang(storedLang, {persist:false});
  }catch(e){/* ignore — defaults to English */}

  // a ?share=<token> link takes over the whole page — no session, no
  // sign-in, nothing else in this function is relevant to that visitor
  if (await checkSharedCabinetView()) return;

  if (!SB_ENABLED){ renderAcct(); renderCabinet(); return; }
  const justSignedIn = captureOAuthRedirect();
  if (!session) loadStoredSession();
  if (session && Math.floor(Date.now()/1000) > session.expires_at - 60){
    try{ await refreshSession(); }
    catch(e){ session = null; saveSession(null); }
  }
  renderAcct();
  renderCabinet();
  if (authError) selectTab("cabinet"); // surface the sign-in error where it's explained
  if (!session) return;
  scheduleRefresh();
  loadProfile().catch(()=>{/* theme falls back to localStorage */});
  try{ await loadCabinet(); }
  catch(e){ cabinet = []; cabinetStatus(e.message); }
  renderCabinet();
  if (justSignedIn) selectTab("cabinet"); // land the user on their cabinet after OAuth
})();

   PWA (Phase 5) — installable, works offline for the app shell + the
   curated interaction/symptom/class data already embedded in this
   file. Feature-detected so it's a silent no-op on anything that
   doesn't support service workers.
   ================================================================= */
if ("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{/* offline support just won't be available */});
  });
}
